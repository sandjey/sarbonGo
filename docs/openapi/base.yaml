    SSEDispatcherUnifiedEvent:
      type: object
      description: |
        Унифицированное событие диспетчерского SSE-потока.
        Используется в потоках:
        - `GET /v1/dispatchers/cargo-manager/sse/events`
        - `GET /v1/dispatchers/driver-manager/sse/events`
        - `GET /v1/dispatchers/driver-manager/sse/notifications`

        Событие содержит служебные поля (`type`, `id`, `event_kind`, `stream_kind`, `recipient_id`, `at`)
        и типизированный payload в `data`.
        Клиент должен маршрутизировать обработку по полю `type`.

        Поддерживаемые типы:
        - `trip_status`
        - `trip_notification`
        - `cargo_offer`
        - `connection_offer`
        - `driver_update`
        - `message`
        - `call`

        Ниже приведен пример подключения и минимальной обработки.
        ```js
        const BASE         = "https://api.sarbon.example";
        const CLIENT_TOKEN = localStorage.getItem("client_token");
        const jwt          = localStorage.getItem("access_token");

        // Для браузера токен можно передавать query-параметром.
        const url = new URL(`${BASE}/v1/dispatchers/driver-manager/sse/events`);
        url.searchParams.set("token",        jwt);
        url.searchParams.set("device_type",  "web");
        url.searchParams.set("language",     "ru");
        url.searchParams.set("client_token", CLIENT_TOKEN);

        const es = new EventSource(url.toString());

        es.onopen = () => console.log("SSE connected");
        es.onmessage = (e) => {
          const evt = JSON.parse(e.data);
          // Маршрутизация события в зависимости от типа.
          switch (evt.type) {
            case "trip_status":       onTripSnapshot(evt.id, evt.data); break;
            case "trip_notification": onTripEvent(evt.id, evt.event_kind, evt.data); break;
            case "cargo_offer":       onCargoOffer(evt.id, evt.event_kind, evt.data); break;
            case "connection_offer":  onConnOffer(evt.id, evt.event_kind, evt.data); break;
            case "driver_update":     onDriverUpdate(evt.id, evt.event_kind, evt.data); break;
            case "message":           onChatMessage(evt.id, evt.data); break;
            case "call":              onCallSignal(evt.event_kind, evt.id, evt.data); break;
          }
        };

        // На обрыв/401 делайте refresh токена и переподключение.
        es.onerror = () => {
          if (es.readyState === EventSource.CLOSED) refreshTokenAndReopen();
        };
        ```

        Пример подключения через curl:

        ```bash
        curl -N \
          -H "X-Device-Type: web" \
          -H "X-Language: ru" \
          -H "X-Client-Token: $CLIENT_TOKEN" \
          -H "X-User-Token: $JWT" \
          "$BASE/v1/dispatchers/driver-manager/sse/events"
        ```

        Служебные строки потока:

        ```
        : sse connected
        data: {"type":"trip_notification","event_kind":"COMPLETED", ...}
        : ping
        ```

        Базовая структура полезного события:

        ```json
        {
          "type":            "trip_notification|cargo_offer|connection_offer|driver_update|trip_status|message|call",
          "id":              "entity-uuid",
          "event_kind":      "COMPLETED|accepted|message|call.ringing",
          "stream_kind":     "notifications|trip_status|driver_updates|chat",
          "recipient_kind":  "dispatcher",
          "recipient_id":    "dispatcher-uuid",
          "dispatcher_role": "CARGO_MANAGER|DRIVER_MANAGER",
          "at":              "2026-04-20T12:00:00Z",
          "data":            { "kind": "trip_notification", "...": "..." }
        }
        ```

        Дополнительно:
        - `id` интерпретируется в зависимости от `type`.
        - `event_kind` описывает конкретный подтип события.
        - `stream_kind` показывает логический канал.
        - `data` содержит типизированную нагрузку.

        - `id` = `trip_id`
        - `event_kind` = текущий статус или бизнес-событие по рейсу
        - `data` = снимок состояния рейса

        ### 4.2 `trip_notification` (inbox, `stream_kind=notifications`)
        Уведомление по рейсу для inbox диспетчера.

        - `id` = `notification_id` (fallback: `trip_id`)
        - `event_kind` = событие по рейсу (`IN_TRANSIT`, `DELIVERED`, `COMPLETED`, ...)
        - `data` = `#/components/schemas/SSETripNotificationEvent` (kind, notification_id, trip_id, event_kind, from_status, to_status, rate_driver_id, rate_cargo_manager_id, created_at)

        ### 4.3 `cargo_offer` (inbox)
        - `id` = `offer_id`
        - `event_kind` = `created|accepted|rejected|cancelled`
        - `data` = детали оффера и связанного груза

        ### 4.4 `connection_offer` (inbox)
        Приглашение/событие по связи водитель <-> диспетчер.
        - `id` = `invitation_id`
        - `event_kind` = `created|accepted|rejected|cancelled`
        - `data` = данные приглашения и участников

        - `id` = `driver_id`
        - `event_kind` = изменение профиля/статуса водителя
        - `data` = payload обновления водителя

        - `id` = `message_id`
        - `event_kind` = `message`
        - `data` = объект сообщения чата

        ### 4.7 `call` (`stream_kind=chat`)
        Сигнальные события звонка в канале чата.
        - `id` = `call_id`
        - `event_kind` = `call.ringing|call.accepted|call.ended|...`
        - `data` = payload с идентификаторами и состоянием звонка

        Обработка должна быть идемпотентной: дубликаты событий допустимы.

        ---

        ## 5. Heartbeat & reconnect

        - Сервер периодически отправляет `: ping` для поддержания соединения.
        - При `401`/`403` обновите токен и откройте новый SSE.
        - При сетевой ошибке используйте backoff для переподключения.
        - Обрабатывайте события только после успешного `JSON.parse`.

        ---

        Дополнительные заметки по совместимости со старыми клиентами.

        Примеры сопоставления каналов:
        |---|---|---|
        | `cargo-manager/sse/events`         | `CARGO_MANAGER`  | notifications + trip_status + driver_updates + chat |
        | `driver-manager/sse/events`        | `DRIVER_MANAGER` | notifications + trip_status + driver_updates + chat |
        | `driver-manager/sse/notifications` | `DRIVER_MANAGER` | notifications + driver_updates + chat |

        ---

        Гарантии доставки и порядок обработки:

        - порядок событий в одном соединении сохраняется;
        - допускаются повторы, обработка должна быть идемпотентной;
        - неизвестные `type`/`event_kind` нужно логировать и безопасно пропускать.
      required:
      - type
      - stream_kind
      - recipient_kind
      - recipient_id
      - dispatcher_role
      - at
      properties:
        type:
          type: string
          description: Тип события верхнего уровня для роутинга в клиенте.
          enum:
          - trip_notification
          - cargo_offer
          - connection_offer
          - driver_update
          - trip_status
          - message
          - call
        id:
          type: string
          description: |
            Идентификатор сущности события.
            В зависимости от `type` это может быть:
            - `trip_id` для `trip_status`,
            - `notification_id` для `trip_notification`,
            - `offer_id` для `cargo_offer`,
            - `invitation_id` для `connection_offer`,
            - `driver_id` для `driver_update`,
            - `message_id` для `message`,
            - `call_id` для `call`.
        event_kind:
          type: string
          description: |
            Подтип события внутри `type`.
            Примеры:
            - `IN_TRANSIT`, `DELIVERED`, `COMPLETED` для рейсов,
            - `created`, `accepted`, `rejected`, `cancelled` для офферов,
            - `message` для чата,
            - `call.ringing`, `call.accepted`, `call.ended` для звонков.
        stream_kind:
          type: string
          description: Логический канал доставки события.
          enum:
          - notifications
          - trip_status
          - driver_updates
          - chat
        recipient_kind:
          type: string
          enum:
          - dispatcher
        recipient_id:
          type: string
          format: uuid
          description: UUID получателя события (диспетчера).
        dispatcher_role:
          type: string
          enum:
          - CARGO_MANAGER
          - DRIVER_MANAGER
          description: Роль диспетчера-получателя события.
        at:
          type: string
          format: date-time
          description: Время генерации события в UTC.
        data:
          description: |
            Типизированный payload события.
            Конкретная структура зависит от `type` и `event_kind`.
            Для большинства событий это объект JSON, для отдельных кейсов допускается массив.
          oneOf:
          - type: object
            additionalProperties: true
          - type: array
            items: {}
    SSETripNotificationEvent:
      type: object
      description: Payload события `trip_notification`.
      required:
      - kind
      - notification_id
      - trip_id
      - event_kind
      - created_at
      properties:
        kind:
          type: string
          enum:

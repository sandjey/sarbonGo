openapi: 3.0.3
info:
  title: "Sarbon API — документация и руководство"
  version: 0.1.0
  description: "OpenAPI-спецификация логистической платформы Sarbon."
servers:
- url: /
security:
- DeviceTypeHeader: []
  LanguageHeader: []
  ClientTokenHeader: []
tags:
- name: Водители / Авторизация и регистрация
- name: Водители / Профиль и KYC
- name: Водители / Грузы
- name: Водители / Офферы
- name: Водители / Рейсы
- name: Водители / Избранное
- name: Водители / Связи
- name: Водители / Уведомления
- name: Водители / SSE
- name: Диспетчеры / Авторизация и регистрация
- name: Диспетчеры / Профиль
- name: Диспетчеры / Уведомления и рейтинги
- name: Карго-менеджер / Грузы
- name: Карго-менеджер / Офферы
- name: Карго-менеджер / Рейсы
- name: Карго-менеджер / Избранное
- name: Карго-менеджер / Менеджеры водителей
- name: Карго-менеджер / SSE
  description: "SSE-каналы карго-менеджера. Доступны только пользователям с manager_role=CARGO_MANAGER."
- name: Менеджер водителей / Водители и связи
- name: Менеджер водителей / Офферы
- name: Менеджер водителей / Рейсы
- name: Менеджер водителей / Грузы
- name: Менеджер водителей / Избранное
- name: Менеджер водителей / SSE
  description: "SSE-каналы менеджера водителей. Доступны только пользователям с manager_role=DRIVER_MANAGER."
- name: Админ / Авторизация
- name: Админ / Компании
- name: Админ / Инструменты
  description: "Инструменты администратора: модерация грузов, проверка push-инфраструктуры и сервисные операции."
- name: Справочник
- name: Chat
- name: Chat / Voice
- name: Компания / Пользователи и авторизация
- name: Компания
- name: Легаси / Устаревшее
- name: Карго-менеджер / Аналитика
  description: "Аналитика для роли CARGO_MANAGER: KPI, таймлайн, воронка, топ-маршруты и топ водителей."
- name: Менеджер водителей / Аналитика
  description: "Аналитика для роли DRIVER_MANAGER: KPI по водителям, офферам, рейсам и таймлайн."
- name: Админ / Аналитика
  description: "Системная аналитика для creator-admin: KPI, воронки, retention, коммуникации, география и drill-down по пользователям."
components:
  securitySchemes:
    DeviceTypeHeader:
      type: apiKey
      in: header
      name: X-Device-Type
      description: 'Тип клиента. Допустимые значения: `web`, `ios`, `android`.'
    LanguageHeader:
      type: apiKey
      in: header
      name: X-Language
      description: 'Язык ответа. Допустимые значения: `ru`, `uz`, `en`, `tr`, `zh`.'
    ClientTokenHeader:
      type: apiKey
      in: header
      name: X-Client-Token
      description: 'Токен приложения или клиента. Используется сервером для дополнительных проверок доступа.'
    UserTokenHeader:
      type: apiKey
      in: header
      name: X-User-Token
      description: 'JWT access token текущего пользователя. Для admin-методов токен должен содержать `role=admin`.'
    UserIDHeader:
      type: apiKey
      in: header
      name: X-User-ID
      description: 'Служебный идентификатор пользователя для тестов и отладки в Swagger. Обычно в runtime не используется.'
  parameters:
    SSEQueryToken:
      name: token
      in: query
      required: false
      schema:
        type: string
      description: |
        JWT access token для SSE-подключений через query-параметр.
        Используется в сценариях, где нельзя передать `X-User-Token` в header, например в `EventSource`.
    SSEQueryDeviceType:
      name: device_type
      in: query
      required: false
      schema:
        type: string
        enum: [web, ios, android]
      description: Копия `X-Device-Type` для SSE-подключений через `EventSource`.
    SSEQueryLanguage:
      name: language
      in: query
      required: false
      schema:
        type: string
        enum: [ru, uz, en, tr, zh]
      description: Копия `X-Language` для SSE-подключений через `EventSource`.
    SSEQueryClientToken:
      name: client_token
      in: query
      required: false
      schema:
        type: string
      description: Копия `X-Client-Token` для SSE-подключений через `EventSource`.
  examples:
    SSEFrameTripStatus:
      summary: "`type=trip_status` — событие изменения статуса рейса (поток `/events`)"
      value: |
        data: {"type":"trip_status","id":"e3111111-2222-3333-4444-555555555555","event_kind":"IN_TRANSIT","stream_kind":"trip_status","recipient_kind":"dispatcher","recipient_id":"11111111-1111-1111-1111-111111111111","dispatcher_role":"CARGO_MANAGER","at":"2026-04-20T12:00:00Z","data":{"kind":"trip_status","trip_id":"e3111111-2222-3333-4444-555555555555","cargo_id":"c1...","offer_id":"of...","driver_id":"d1...","status":"IN_TRANSIT","agreed_price":15000000,"agreed_currency":"UZS","completion_awaiting_dispatcher_confirm":false,"updated_at":"2026-04-20T12:00:00Z","created_at":"2026-04-20T09:00:00Z"}}
    SSEFrameTripNotificationCompleted:
      summary: "`type=trip_notification`, `event_kind=COMPLETED` — уведомление в inbox"
      value: |
        data: {"type":"trip_notification","id":"n0111111-1111-1111-1111-111111111111","event_kind":"COMPLETED","stream_kind":"notifications","recipient_kind":"dispatcher","recipient_id":"11111111-1111-1111-1111-111111111111","dispatcher_role":"DRIVER_MANAGER","at":"2026-04-20T15:30:00Z","data":{"kind":"trip_notification","notification_id":"n0111111-1111-1111-1111-111111111111","trip_id":"e3111111-2222-3333-4444-555555555555","event_kind":"COMPLETED","from_status":"DELIVERED","to_status":"COMPLETED","rate_driver_id":"d1...","rate_cargo_manager_id":"cm...","created_at":"2026-04-20T15:30:00.123Z"}}
    SSEFrameCargoOfferAccepted:
      summary: "`type=cargo_offer`, `event_kind=accepted`"
      value: |
        data: {"type":"cargo_offer","id":"of222222-2222-2222-2222-222222222222","event_kind":"accepted","stream_kind":"notifications","recipient_kind":"dispatcher","recipient_id":"11111111-1111-1111-1111-111111111111","dispatcher_role":"CARGO_MANAGER","at":"2026-04-20T12:05:00Z","data":{"kind":"cargo_offer","offer_id":"of222222-2222-2222-2222-222222222222","cargo_id":"c1111111-1111-1111-1111-111111111111","event":"accepted","proposed_by":"DRIVER","proposed_by_id":"d1..."}}
    SSEFrameConnectionOfferAccepted:
      summary: "`type=connection_offer`, `event_kind=accepted`"
      value: |
        data: {"type":"connection_offer","id":"inv33333-3333-3333-3333-333333333333","event_kind":"accepted","stream_kind":"notifications","recipient_kind":"dispatcher","recipient_id":"11111111-1111-1111-1111-111111111111","dispatcher_role":"DRIVER_MANAGER","at":"2026-04-20T12:10:00Z","data":{"kind":"connection_offer","invitation_id":"inv33333-3333-3333-3333-333333333333","token":"tok_abc","event":"accepted","from_user_id":"d1...","to_user_id":"11111111-1111-1111-1111-111111111111"}}
    SSEFrameDriverUpdate:
      summary: "`type=driver_update` — событие обновления профиля или статуса водителя"
      value: |
        data: {"type":"driver_update","id":"d1444444-4444-4444-4444-444444444444","event_kind":"profile_updated","stream_kind":"driver_updates","recipient_kind":"dispatcher","recipient_id":"11111111-1111-1111-1111-111111111111","dispatcher_role":"DRIVER_MANAGER","at":"2026-04-20T12:15:00Z","data":{"kind":"driver_update","driver_id":"d1444444-4444-4444-4444-444444444444","action":"profile_updated"}}
    SSEFrameChatMessage:
      summary: "`type=message` — входящее сообщение чата (SSE/WS)"
      value: |
        data: {"type":"message","id":"m0555555-5555-5555-5555-555555555555","event_kind":"message","stream_kind":"chat","recipient_kind":"dispatcher","recipient_id":"11111111-1111-1111-1111-111111111111","dispatcher_role":"CARGO_MANAGER","at":"2026-04-20T12:20:00Z","data":{"type":"message","data":{"message_id":"m0555555-5555-5555-5555-555555555555","conversation_id":"cv...","from_user_id":"d1...","text":"Новое сообщение","created_at":"2026-04-20T12:20:00Z"}}}
    SSEFrameCallRinging:
      summary: "`type=call`, `event_kind=call.ringing`"
      value: |
        data: {"type":"call","id":"cl666666-6666-6666-6666-666666666666","event_kind":"call.ringing","stream_kind":"chat","recipient_kind":"dispatcher","recipient_id":"11111111-1111-1111-1111-111111111111","dispatcher_role":"CARGO_MANAGER","at":"2026-04-20T12:25:00Z","data":{"type":"call.ringing","data":{"call_id":"cl666666-6666-6666-6666-666666666666","caller_id":"d1...","callee_id":"11111111-1111-1111-1111-111111111111","status":"RINGING"}}}
    SSEConnectedBanner:
      summary: "Служебные строки подключения `: sse connected` и heartbeat `: ping`"
      value: |
        : sse connected

        : ping
  schemas:
    NotificationItem:
      type: object
      description: |
        Элемент уведомления для мобильного приложения и веб-клиента.
        Используется в списках уведомлений водителя и диспетчера.
        Содержит тип события, человекочитаемый текст, состояние прочтения,
        а также дополнительный payload для deep-link и карточек в интерфейсе.
        Поля `trip_id`, `from_status`, `to_status` и `payload` могут быть `null`
        в зависимости от типа уведомления.
      properties:
        id:
          type: string
          format: uuid
          description: UUID уведомления.
        trip_id:
          type: string
          format: uuid
          nullable: true
          description: UUID рейса, если уведомление относится к рейсу.
        event_kind:
          type: string
          description: |
            Код бизнес-события уведомления.
            Примеры: `IN_TRANSIT`, `DELIVERED`, `COMPLETED`, `CANCELLED`,
            `cargo_offer_created`, `connection_offer_created`, `message.new`, `call.invite`.
            (`cargo_offer_created`, `connection_offer_created`, `message.new`, `call.invite`,
            `driver.profile.patch`, ...).
        type:
          type: string
          enum:
          - connection_offer
          - cargo_offer
          - message
          - call
          - driver_profile_edit
          - trip_notification
          description: Тип уведомления для маршрутизации в клиенте.
        step:
          type: string
          description: Логический шаг/подтип в рамках выбранного `type`.
        from_status:
          type: string
          nullable: true
        to_status:
          type: string
          nullable: true
        message:
          type: string
          description: Локализованный текст уведомления для отображения пользователю.
        payload:
          nullable: true
          description: |
            Дополнительные данные уведомления в JSON-формате.
            Структура зависит от типа уведомления и может быть объектом или массивом.
          oneOf:
          - type: object
            additionalProperties: true
          - type: array
            items: {}
        read:
          type: boolean
          description: Флаг, что уведомление уже прочитано пользователем.
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
      - id
      - event_kind
      - type
      - step
      - message
      - read
      - created_at
    Envelope:
      type: object
      properties:
        status:
          type: string
          enum:
          - success
          - error
        code:
          type: integer
          example: 200
        description:
          type: string
          example: ok
        data:
          nullable: true
      required:
      - status
      - code
      - description
      - data
    ChatMessage:
      type: object
      description: Сообщение чата в диалоге между пользователями.
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        sender_id:
          type: string
          format: uuid
        type:
          type: string
          enum:
          - text
          - img
          - audio
          - video
          - video_note
          - location
          - TEXT
          - PHOTO
          - VOICE
          - VIDEO
          - VIDEO_NOTE
          - LOCATION
        body:
          type: string
          nullable: true
          description: Текст сообщения для типа `text`.
        payload:
          type: object
          nullable: true
          description: Структурированные данные сообщения (медиа, геолокация и т.д.).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
        delivered_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Время доставки сообщения получателю (если подтверждено сервером).
            Для недоставленных сообщений может быть `null`.
              - Описание
              - Описание
              - Описание
        read_by_me:
          type: boolean
          description: Признак, что текущее сообщение прочитано текущим пользователем.
        read_by_peer:
          type: boolean
          description: Признак, что сообщение прочитано собеседником.
      required:
      - id
      - conversation_id
      - sender_id
      - type
      - created_at
      - updated_at
    ChatMediaPayload:
      type: object
      description: Payload медиа-сообщения (изображение, аудио, видео, видеокружок).
      properties:
        attachment_id:
          type: string
          format: uuid
        link:
          type: string
          description: Относительная ссылка на скачивание медиа-файла через API.
          example: /v1/chat/media/aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
        url:
          type: string
          example: /v1/chat/media/aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
        links:
          type: object
          description: Набор ссылок на оригинал и миниатюру.
          properties:
            media:
              type: string
            thumb:
              type: string
              nullable: true
        thumb_url:
          type: string
          nullable: true
          description: Ссылка на миниатюру медиа-файла (если доступна).
        mime:
          type: string
          example: video/mp4
        size_bytes:
          type: integer
          format: int64
        duration_ms:
          type: integer
          nullable: true
          description: Длительность медиа в миллисекундах (для аудио/видео).
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
      required:
      - attachment_id
      - url
      - mime
      - size_bytes
    ChatLocationPayload:
      type: object
      description: Payload сообщения с геолокацией.
      properties:
        lat:
          type: number
          format: double
          example: 41.311081
        lng:
          type: number
          format: double
          example: 69.240562
        address:
          type: string
          nullable: true
        place_id:
          type: string
          nullable: true
      required:
      - lat
      - lng
    ChatPresence:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        online:
          type: boolean
        last_seen:
          type: integer
          nullable: true
          description: Unix seconds
        typing:
          type: boolean
          nullable: true
      required:
      - user_id
      - online
    Call:
      type: object
      description: Данные о звонке между двумя пользователями.
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
          nullable: true
        caller_id:
          type: string
          format: uuid
        callee_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - RINGING
          - ACTIVE
          - ENDED
          - DECLINED
          - MISSED
          - CANCELLED
          - FAILED
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        ended_at:
          type: string
          format: date-time
          nullable: true
        ended_by:
          type: string
          format: uuid
          nullable: true
        ended_reason:
          type: string
          nullable: true
        client_request_id:
          type: string
          nullable: true
          description: Идемпотентный ключ запроса создания звонка от клиента.
      required:
      - id
      - caller_id
      - callee_id
      - status
      - created_at
    CallCreateRequest:
      type: object
      properties:
        peer_id:
          type: string
          format: uuid
          description: UUID пользователя, которому совершается звонок.
        conversation_id:
          type: string
          format: uuid
          nullable: true
          description: UUID диалога чата, если звонок инициирован из конкретного чата.
        client_request_id:
          type: string
          nullable: true
          description: Идемпотентный ключ создания звонка для повторных попыток.
      required:
      - peer_id
    CallDeclineRequest:
      type: object
      properties:
        reason:
          type: string
          nullable: true
          example: busy
    CallEndRequest:
      type: object
      properties:
        reason:
          type: string
          nullable: true
          example: hangup
    Tokens:
      type: object
      description: Набор access/refresh токенов и сроков их действия.
      properties:
        access_token:
          type: string
          example: eyJhbGciOi...
        refresh_token:
          type: string
          example: eyJhbGciOi...
        expires_in:
          type: integer
          example: 900
          description: Время жизни access token в секундах.
        expires_at:
          type: integer
          example: 1741600800000
          description: UNIX timestamp (ms) истечения access token.
        refresh_expires_in:
          type: integer
          example: 604800
          description: Время жизни refresh token в секундах.
        refresh_expires_at:
          type: integer
          example: 1742205600000
          description: UNIX timestamp (ms) истечения refresh token.
      required:
      - access_token
      - refresh_token
      - expires_in
      - expires_at
    DisplayName:
      type: string
      minLength: 2
      maxLength: 64
      pattern: ^[A-Za-z_]{2,64}$
      description: Отображаемое имя пользователя (латиница и `_`, 2..64 символа).
      example: John_Doe
    Driver:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
          example: '+998331108810'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_online_at:
          type: string
          format: date-time
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
          example: 41.311081
        longitude:
          type: number
          format: double
          nullable: true
          example: 69.240562
        push_token:
          type: string
          nullable: true
          example: optional-device-token
        registration_step:
          type: string
          nullable: true
          enum:
          - name-oferta
          - geo-push
          - transport-type
          - completed
          description: Шаг регистрации водителя в onboarding-процессе.
        registration_status:
          type: string
          nullable: true
          enum:
          - start
          - basic
          - full
        name:
          type: string
          nullable: true
          example: Ali Valiyev
        driver_type:
          type: string
          nullable: true
          enum:
          - company
          - freelancer
          - driver
        rating:
          type: number
          format: double
          nullable: true
        work_status:
          type: string
          nullable: true
          enum:
          - available
          - loaded
          - busy
          example: available
        freelancer_id:
          type: string
          format: uuid
          nullable: true
        company_id:
          type: string
          format: uuid
          nullable: true
        account_status:
          type: string
          nullable: true
        driver_passport_series:
          type: string
          nullable: true
          example: AB
        driver_passport_number:
          type: string
          nullable: true
          example: '1234567'
        driver_pinfl:
          type: string
          nullable: true
          example: '12345678901234'
        driver_scan_status:
          type: boolean
          nullable: true
          example: true
        power_plate_type:
          type: string
          nullable: true
          example: TRUCK
          description: Тип тягача/силовой установки (например, `TRUCK`, `TRACTOR`).
        power_plate_number:
          type: string
          nullable: true
          example: 01A123BC
        power_tech_series:
          type: string
          nullable: true
        power_tech_number:
          type: string
          nullable: true
        power_owner_name:
          type: string
          nullable: true
          example: Ali Valiyev
        power_scan_status:
          type: boolean
          nullable: true
        trailer_plate_type:
          type: string
          nullable: true
          example: TENTED
          description: Тип прицепа (например, `TENTED`, `REFRIGERATOR`, `FLATBED`).
        trailer_plate_number:
          type: string
          nullable: true
        trailer_tech_series:
          type: string
          nullable: true
        trailer_tech_number:
          type: string
          nullable: true
        trailer_owner_name:
          type: string
          nullable: true
          example: Ali Valiyev
        trailer_scan_status:
          type: boolean
          nullable: true
        driver_owner:
          type: boolean
          nullable: true
          example: true
        kyc_status:
          type: string
          nullable: true
          enum:
          - pending
          - approved
          description: Статус KYC-проверки водителя.
          example: pending
        has_trips:
          type: boolean
          description: Признак, что у водителя есть завершенные или активные рейсы.
        has_photo:
          type: boolean
          description: Признак, что у водителя загружена фотография профиля.
      required:
      - id
      - phone
      - created_at
      - updated_at
    Dispatcher:
      type: object
      description: Профиль фриланс-диспетчера.
      properties:
        id:
          type: string

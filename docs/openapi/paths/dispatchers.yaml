paths:
  /v1/dispatchers/auth/refresh:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: "Обновить токены диспетчера."
      description: "Выдает новую пару access/refresh токенов для диспетчера."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required:
              - refresh_token
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    $ref: '../base.yaml#/components/schemas/Tokens'
        '401':
          description: invalid refresh_token
  /v1/dispatchers/auth/phone:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: "Запросить OTP-код для входа диспетчера."
      description: "Отправляет одноразовый код на телефон диспетчера."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998901234567'
              required:
              - phone
            example:
              phone: '+998901234567'
      responses:
        '200':
          description: "OTP-код успешно отправлен."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: otp_sent
                  ttl_seconds:
                    type: integer
                    example: 180
        '400':
          description: "Некорректный номер телефона или запрос."
        '429':
          description: Cooldown / rate limit
        '502':
          description: "Ошибка SMS-провайдера или внешнего сервиса."
  /v1/dispatchers/auth/otp/verify:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: "Проверить OTP-код диспетчера."
      description: "Подтверждает OTP и возвращает токены входа или `session_id` для регистрации."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998901234567'
                otp:
                  type: string
                  example: '123456'
              required:
              - phone
              - otp
            example:
              phone: '+998901234567'
              otp: '123456'
      responses:
        '200':
          description: "OTP-код подтвержден."
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  properties:
                    status:
                      type: string
                      example: login
                    tokens:
                      $ref: '../base.yaml#/components/schemas/Tokens'
                - type: object
                  properties:
                    status:
                      type: string
                      example: register
                    session_id:
                      type: string
                      format: uuid
        '401':
          description: "Неверный или просроченный OTP-код."
        '429':
          description: "Превышен лимит попыток проверки OTP."
  /v1/dispatchers/auth/login/password:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: "Вход диспетчера по паролю."
      description: "Авторизует диспетчера по номеру телефона и паролю."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998901234567'
                password:
                  type: string
                  example: TestPass123!
              required:
              - phone
              - password
            example:
              phone: '+998901234567'
              password: TestPass123!
      responses:
        '200':
          description: "Авторизация успешна."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: login
                  tokens:
                    $ref: '../base.yaml#/components/schemas/Tokens'
        '401':
          description: "Неверный телефон или пароль."
  /v1/dispatchers/auth/reset-password/request:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: "Запросить сброс пароля диспетчера."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998901234567'
              required:
              - phone
            example:
              phone: '+998901234567'
      responses:
        '200':
          description: "OTP для сброса пароля отправлен."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: otp_sent
                  session_id:
                    type: string
                    format: uuid
                  ttl_seconds:
                    type: integer
        '400':
          description: "Некорректный формат телефона."
        '404':
          description: "Диспетчер с таким телефоном не найден."
        '502':
          description: "Ошибка SMS-провайдера или внешнего сервиса."
  /v1/dispatchers/auth/reset-password/confirm:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: "Подтвердить сброс пароля диспетчера."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
                otp:
                  type: string
                  example: '123456'
                new_password:
                  type: string
              required:
              - session_id
              - otp
              - new_password
            example:
              session_id: d4e5f6a7-b8c9-0123-def0-234567890123
              otp: '123456'
              new_password: NewPass456!
      responses:
        '200':
          description: "Пароль успешно изменен."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '401':
          description: "Неверный OTP или недействительная сессия сброса."
        '429':
          description: "Превышен лимит попыток."
  /v1/dispatchers/auth/logout:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: "Выход диспетчера из системы."
      description: "Инвалидирует refresh token и завершает сессию диспетчера."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: "Refresh token, который нужно отозвать."
                access_token:
                  type: string
                  description: "Текущий access token (опционально)."
            example:
              access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: "Выход выполнен успешно."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '400':
          description: "Некорректное тело запроса."
        '401':
          description: "Сессия недействительна или токен невалиден."
  /v1/dispatchers/registration/complete:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: "Завершить регистрацию диспетчера."
      description: "Создает аккаунт диспетчера по `session_id`, роли и персональным данным."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
                name:
                  $ref: '../base.yaml#/components/schemas/DisplayName'
                role:
                  $ref: '../base.yaml#/components/schemas/FreelanceDispatcherRole'
                password:
                  type: string
                passport_series:
                  type: string
                  example: AB
                passport_number:
                  type: string
                  example: '1234567'
                pinfl:
                  type: string
                  example: '12345678901234'
              required:
              - session_id
              - name
              - password
              - passport_series
              - passport_number
              - pinfl
            example:
              session_id: d4e5f6a7-b8c9-0123-def0-234567890123
              name: Dispatcher_User
              role: CARGO_MANAGER
              password: SecurePass123!
              passport_series: AB
              passport_number: '1234567'
              pinfl: '31234567890123'
      responses:
        '200':
          description: "Регистрация диспетчера завершена успешно."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: registered
                  tokens:
                    $ref: '../base.yaml#/components/schemas/Tokens'
                  dispatcher:
                    $ref: '../base.yaml#/components/schemas/Dispatcher'
        '400':
          description: "Ошибка валидации данных регистрации."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '401':
          description: "Сессия регистрации недействительна или просрочена."
        '409':
          description: "Пользователь уже зарегистрирован или данные конфликтуют."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
  /v1/dispatchers/profile:
    get:
      tags:
      - Dispatchers / Profile
      summary: "Получить профиль диспетчера."
      description: "Возвращает данные профиля текущего авторизованного диспетчера."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: OK, data.dispatcher
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '401':
          description: "Требуется авторизация диспетчера."
    patch:
      tags:
      - Dispatchers / Profile
      summary: "Обновить профиль диспетчера."
      description: "Обновляет персональные данные диспетчера и рабочие поля профиля."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: '../base.yaml#/components/schemas/DisplayName'
                role:
                  $ref: '../base.yaml#/components/schemas/FreelanceDispatcherRole'
                passport_series:
                  type: string
                passport_number:
                  type: string
                pinfl:
                  type: string
                photo:
                  type: string
                  nullable: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '400':
          description: "Ошибка валидации переданных полей."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '401':
          description: "Требуется авторизация диспетчера."
        '409':
          description: "Конфликт данных профиля (например, дубликаты документов)."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
  /v1/dispatchers/driver-invitations:
    post:
      tags:
      - Driver Manager / Drivers & connections
      summary: "Отправить приглашение водителю."
      description: "Создает приглашение на связь водителю от менеджера водителей."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_id:
                  type: string
                  format: uuid
                  example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
              required:
              - driver_id
      responses:
        '201':
          description: created, data.token
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '409':
          description: connection_limit_reached / driver_invitation_already_pending
        '401':
          description: "Требуется авторизация диспетчера."
        '404':
          description: "Водитель не найден."
  /v1/dispatchers/profile/photo:
    post:
      tags:
      - Dispatchers / Profile
      summary: "Загрузить фото профиля диспетчера."
      description: "Принимает изображение и назначает его текущей фотографией диспетчера."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - photo
              properties:
                photo:
                  type: string
                  format: binary
                  description: "Файл изображения профиля."
      responses:
        '200':
          description: "Фото профиля успешно загружено."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  code:
                    type: integer
                    example: 200
                  description:
                    type: string
                    example: Photo uploaded
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      event:
                        type: string
                        example: photo_uploaded
              examples:
                en:
                  summary: English
                  value:
                    status: success
                    code: 200
                    description: Photo uploaded
                    data:
                      status: ok
                      event: photo_uploaded
                ru:
                  summary: Русский
                  value:
                    status: success
                    code: 200
                    description: Фото загружено
                    data:
                      status: ok
                      event: photo_uploaded
                uz:
                  summary: O'zbek
                  value:
                    status: success
                    code: 200
                    description: Foto yuklandi
                    data:
                      status: ok
                      event: photo_uploaded
                tr:
                  summary: Türkçe
                  value:
                    status: success
                    code: 200
                    description: Fotoğraf yüklendi
                    data:
                      status: ok
                      event: photo_uploaded
                zh:
                  summary: 中文
                  value:
                    status: success
                    code: 200
                    description: 照片已上传
                    data:
                      status: ok
                      event: photo_uploaded
        '400':
          description: "Некорректный файл (тип, размер, отсутствие файла)."
        '401':
          description: "Требуется авторизация диспетчера."
    get:
      tags:
      - Dispatchers / Profile
      summary: "Получить фото профиля диспетчера."
      description: "Возвращает бинарное изображение текущей фотографии профиля."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: "Фото профиля получено."
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '401':
          description: "Требуется авторизация диспетчера."
        '404':
          description: "Фото профиля отсутствует."
    delete:
      tags:
      - Dispatchers / Profile
      summary: "Удалить фото профиля диспетчера."
      description: "Удаляет текущую фотографию профиля диспетчера."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: "Фото профиля удалено."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  code:
                    type: integer
                    example: 200
                  description:
                    type: string
                    description: "Локализованное текстовое описание результата операции."
                    example: Photo deleted
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      event:
                        type: string
                        example: photo_deleted
              examples:
                en:
                  summary: English
                  value:
                    status: success
                    code: 200
                    description: Photo deleted
                    data:
                      status: ok
                      event: photo_deleted
                ru:
                  summary: Русский
                  value:
                    status: success
                    code: 200
                    description: Фото удалено
                    data:
                      status: ok
                      event: photo_deleted
                uz:
                  summary: O'zbek
                  value:
                    status: success
                    code: 200
                    description: Foto o'chirildi
                    data:
                      status: ok
                      event: photo_deleted
                tr:
                  summary: Türkçe
                  value:
                    status: success
                    code: 200
                    description: Fotoğraf silindi
                    data:
                      status: ok
                      event: photo_deleted
                zh:
                  summary: 中文
                  value:
                    status: success
                    code: 200
                    description: 照片已删除
                    data:
                      status: ok
                      event: photo_deleted
        '401':
          description: "Требуется авторизация диспетчера."
  /v1/dispatchers/profile/password:
    put:
      tags:
      - Dispatchers / Profile
      summary: "Изменить пароль диспетчера."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
              required:
              - current_password
              - new_password
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '401':
          description: "Текущий пароль неверен или сессия недействительна."
  /v1/dispatchers/profile/phone-change/request:
    post:
      tags:
      - Dispatchers / Profile
      summary: "Запросить смену телефона диспетчера."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_phone:
                  type: string
                  example: '+998901234567'
              required:
              - new_phone
      responses:
        '200':
          description: "OTP для подтверждения смены телефона отправлен."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: otp_sent
                  session_id:
                    type: string
                    format: uuid
                  ttl_seconds:
                    type: integer
        '400':
          description: "Некорректный формат нового телефона."
        '409':
          description: "Новый телефон уже используется."
        '502':
          description: "Ошибка SMS-провайдера или внешнего сервиса."
  /v1/dispatchers/profile/phone-change/verify:
    post:
      tags:
      - Dispatchers / Profile
      summary: "Подтвердить смену телефона диспетчера."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
                otp:
                  type: string
                  example: '123456'
              required:
              - session_id
              - otp
      responses:
        '200':
          description: "Телефон успешно изменен."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  dispatcher:
                    $ref: '../base.yaml#/components/schemas/Dispatcher'
        '401':
          description: "Неверный OTP или недействительная сессия подтверждения."
        '409':
          description: "Телефон уже занят другим пользователем."
  /v1/dispatchers/connection-offers:
    get:
      tags:
      - Driver Manager / Drivers & connections
      summary: "Список приглашений на связь."
      description: "Возвращает входящие/исходящие invitation-офферы на связь водителей и диспетчеров."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: direction
        in: query
        required: false
        schema:
          type: string
          enum:
          - all
          - incoming
          - outgoing
          default: all
      responses:
        '200':
          description: data.direction, data.items[]
        '400':
          description: invalid direction
    post:
      tags:
      - Driver Manager / Drivers & connections
      summary: "Создать приглашение на связь."
      description: "Создает invitation для привязки водителя к менеджеру водителей."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_id:
                  type: string
                  format: uuid
              required:
              - driver_id
      responses:
        '201':
          description: data.token, data.expires_in_hours, data.linked
        '400':
          description: invalid driver_id
        '403':
          description: access denied
        '404':
          description: driver not found
        '409':
          description: driver already linked or invitation pending (driver_invitation_already_pending)
  /v1/dispatchers/connection-offers/{token}:
    delete:
      tags:
      - Driver Manager / Drivers & connections
      summary: "Отменить приглашение по токену."
      description: "Удаляет/отклоняет invitation с указанием причины."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
          example: a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: driver does not respond
              required:
              - reason
      responses:
        '200':
          description: ok (invitation row deleted)
        '400':
          description: rejection_reason_required / rejection_reason_too_short
        '403':
          description: not your invitation
        '404':
          description: invitation not found or expired
  /v1/dispatchers/connection-offers/accept:
    post:
      tags:
      - Driver Manager / Drivers & connections
      summary: "Принять приглашение на связь."
      description: "Принимает invitation по токену и создает связь с водителем."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
              required:
              - token
      responses:
        '200':
          description: data.driver_id

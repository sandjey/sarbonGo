paths:
  /v1/driver/transport-options:
    get:
      tags:
      - Drivers / Auth & registration
      summary: "Получить справочник типов транспорта."
      description: "Возвращает доступные типы тягачей и совместимые типы прицепов."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '../base.yaml#/components/schemas/Envelope'
                - type: object
                  properties:
                    data:
                      $ref: '../base.yaml#/components/schemas/TransportOptionsResponse'
        '400':
          description: "Некорректный запрос."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
  /v1/driver/auth/phone:
    post:
      tags:
      - Drivers / Auth & registration
      summary: "Запросить OTP-код для входа водителя."
      description: "Отправляет одноразовый код на указанный номер телефона."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998331108810'
              required:
              - phone
      responses:
        '200':
          description: "OTP-код успешно отправлен."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: otp_sent
                  ttl_seconds:
                    type: integer
                    example: 180
                required:
                - status
                - ttl_seconds
        '400':
          description: "Некорректный номер телефона или тело запроса."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '429':
          description: Cooldown / rate limit
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '502':
          description: "Ошибка SMS-провайдера или внешнего сервиса."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
  /v1/driver/auth/otp/verify:
    post:
      tags:
      - Drivers / Auth & registration
      summary: "Проверить OTP-код водителя."
      description: "Подтверждает код и возвращает либо токены входа, либо `session_id` для регистрации."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998331108810'
                otp:
                  type: string
                  example: '123456'
              required:
              - phone
              - otp
      responses:
        '200':
          description: "Код подтвержден."
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  properties:
                    status:
                      type: string
                      example: login
                    tokens:
                      $ref: '../base.yaml#/components/schemas/Tokens'
                  required:
                  - status
                  - tokens
                - type: object
                  properties:
                    status:
                      type: string
                      example: register
                    session_id:
                      type: string
                      format: uuid
                  required:
                  - status
                  - session_id
        '401':
          description: "Неверный или просроченный OTP-код."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '429':
          description: "Превышен лимит попыток проверки OTP."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
  /v1/driver/registration/start:
    post:
      tags:
      - Drivers / Auth & registration
      summary: "Начать регистрацию водителя."
      description: "Завершает стартовый шаг регистрации по `session_id` и выдает токены."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
                name:
                  $ref: '../base.yaml#/components/schemas/DisplayName'
                oferta_accepted:
                  type: boolean
                  example: true
              required:
              - session_id
              - name
              - oferta_accepted
      responses:
        '200':
          description: "Регистрация успешно начата, токены и профиль возвращены."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: registered
                  tokens:
                    $ref: '../base.yaml#/components/schemas/Tokens'
                  driver:
                    $ref: '../base.yaml#/components/schemas/Driver'
                  registration_status:
                    type: string
                    example: start
                  registration_step:
                    type: string
                    example: name-oferta
                required:
                - status
                - tokens
        '400':
          description: "Ошибка валидации входных данных регистрации."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '401':
          description: "Сессия регистрации недействительна или просрочена."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '409':
          description: "Пользователь уже зарегистрирован."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
  /v1/driver/profile:
    get:
      tags:
      - Drivers / Profile & KYC
      summary: "Получить профиль водителя."
      description: |
        Возвращает текущий профиль авторизованного водителя.
        Включает персональные данные, KYC-поля, статусы и сведения о транспорте.
        Используется на экране профиля и в шагах регистрации.
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: OK (data.driver.profile, data.driver.power_plate, data.driver.trailer_plate)
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '401':
          description: "Требуется авторизация водителя."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
    delete:
      tags:
      - Drivers / Profile & KYC
      summary: "Удалить профиль водителя."
      description: "Удаляет учетную запись и связанные данные профиля водителя."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '401':
          description: "Требуется авторизация водителя."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '404':
          description: "Профиль водителя не найден."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
  /v1/driver/profile/driver:
    patch:
      tags:
      - Drivers / Profile & KYC
      summary: "Обновить данные водителя."
      description: "Обновляет основные поля профиля водителя и рабочий статус."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: '../base.yaml#/components/schemas/DisplayName'
                work_status:
                  type: string
                  enum:
                  - available
                  - loaded
                  - busy
                  example: available
                driver_passport_series:
                  type: string
                  example: AB
                driver_passport_number:
                  type: string
                  example: '1234567'
                driver_pinfl:
                  type: string
                  example: '12345678901234'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '400':
          description: "Ошибка валидации переданных полей."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '409':
          description: "Конфликт данных профиля (например, дубликаты документов)."
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
  /v1/driver/profile/heartbeat:
    put:
      tags:
      - Drivers / Profile & KYC
      summary: "Обновить геопозицию (heartbeat)."
      description: |
        Принимает актуальные координаты водителя.
        Используется для онлайн-статуса, карты и диспетчерского мониторинга.
        Рекомендуется отправлять периодически при активной сессии.
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                latitude:
                  type: number
                  format: double
                  example: 41.311081
                longitude:
                  type: number
                  format: double
                  example: 69.240562
              required:
              - latitude
              - longitude
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '../base.yaml#/components/schemas/Envelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        event:
                          type: string
                          example: heartbeat
                        push_token_registered:
                          type: boolean
                          description: |
                            Признак, что push-токен был передан и сохранен.
                            Используется для диагностики доставки push-уведомлений.
                        driver:
                          type: object
                          description: "Актуальные данные профиля водителя после обновления."
  /v1/driver/profile/photo:
    post:
      tags:
      - Drivers / Profile & KYC
      summary: "Загрузить фото профиля водителя."
      description: "Принимает изображение и назначает его текущей фотографией профиля."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - photo
              properties:
                photo:
                  type: string
                  format: binary
                  description: "Файл изображения профиля."
      responses:
        '200':
          description: "Фото профиля успешно загружено."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      event:
                        type: string
                        example: photo_uploaded
        '400':
          description: "Некорректный файл (тип, размер, отсутствие файла)."
        '401':
          description: "Требуется авторизация водителя."
    get:
      tags:
      - Drivers / Profile & KYC
      summary: "Получить фото профиля водителя."
      description: "Возвращает бинарное изображение текущей фотографии профиля."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: "Фото профиля получено."
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '401':
          description: "Требуется авторизация водителя."
        '404':
          description: "Фото профиля отсутствует."
    delete:
      tags:
      - Drivers / Profile & KYC
      summary: "Удалить фото профиля водителя."
      description: "Удаляет текущую фотографию профиля."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: "Фото профиля удалено."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      event:
                        type: string
                        example: photo_deleted
        '401':
          description: "Требуется авторизация водителя."
  /v1/driver/profile/phone-change/request:
    post:
      tags:
      - Drivers / Profile & KYC
      summary: "Запросить смену номера телефона."
      description: "Отправляет OTP-код на новый номер для подтверждения смены."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_phone:
                  type: string
                  example: '+998901234567'
              required:
              - new_phone
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
        '400':
          description: "Ошибка валидации нового номера телефона."
        '502':
          description: "Ошибка SMS-провайдера или внешнего сервиса."
  /v1/driver/profile/phone-change/verify:
    post:
      tags:
      - Drivers / Profile & KYC
      summary: "Подтвердить смену номера телефона."
      description: "Подтверждает OTP и применяет новый номер телефона к профилю."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
                otp:
                  type: string
                  example: '123456'
              required:
              - session_id
              - otp
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
  /v1/driver/profile/power:
    patch:
      tags:
      - Drivers / Profile & KYC
      summary: "Обновить данные тягача."
      description: "Сохраняет регистрационные и технические данные тягача водителя."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                power_plate_number:
                  type: string
                  example: 01A123BC
                power_tech_series:
                  type: string
                  example: AA
                power_tech_number:
                  type: string
                  example: '9876543'
                power_owner_name:
                  type: string
                  example: Ali Valiyev
                power_scan_status:
                  type: boolean
                  example: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
  /v1/driver/profile/trailer:
    patch:
      tags:
      - Drivers / Profile & KYC
      summary: "Обновить данные прицепа."
      description: "Сохраняет регистрационные и технические данные прицепа водителя."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trailer_plate_number:
                  type: string
                  example: 01A123BC
                trailer_tech_series:
                  type: string
                  example: AA
                trailer_tech_number:
                  type: string
                  example: '9876543'
                trailer_owner_name:
                  type: string
                  example: Ali Valiyev
                trailer_scan_status:
                  type: boolean
                  example: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
  /v1/driver/registration/geo-push:
    patch:
      tags:
      - Drivers / Auth & registration
      summary: "Сохранить геопозицию и push-токен."
      description: "Обновляет координаты водителя и (опционально) push-токен на шаге регистрации."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                latitude:
                  type: number
                  format: double
                  example: 41.311081
                longitude:
                  type: number
                  format: double
                  example: 69.240562
                push_token:
                  type: string
                  example: optional-device-token
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  driver:
                    $ref: '../base.yaml#/components/schemas/Driver'
                required:
                - status
                - driver
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../base.yaml#/components/schemas/Envelope'
  /v1/driver/registration/transport-type:
    patch:
      tags:
      - Drivers / Auth & registration
      summary: "Сохранить тип транспорта водителя."
      description: "Фиксирует тип водителя и выбранные типы тягача/прицепа."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_type:
                  type: string
                  enum:
                  - company
                  - freelancer
                  - driver
                  example: driver
                power_plate_type:
                  type: string
                  example: uz_private
                trailer_plate_type:
                  type: string
                  example: uz_private
                freelancer_id:
                  type: string
                  format: uuid
                  nullable: true
                company_id:
                  type: string
                  format: uuid
                  nullable: true
              required:
              - driver_type
              - power_plate_type
              - trailer_plate_type
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  driver:
                    $ref: '../base.yaml#/components/schemas/Driver'
                required:
                - status
                - driver
  /v1/driver/kyc:
    patch:
      tags:
      - Drivers / Profile & KYC
      summary: "Отправить KYC-данные водителя."
      description: "Принимает документы водителя и данные по тягачу/прицепу для KYC-проверки."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_owner:
                  type: boolean
                  example: true
                driver_data:
                  type: object
                  properties:
                    driver_passport_series:
                      type: string
                      example: AB
                    driver_passport_number:
                      type: string
                      example: '1234567'
                    driver_pinfl:
                      type: string
                      example: '12345678901234'
                    driver_scan_status:
                      type: boolean
                      example: true
                  required:
                  - driver_passport_series
                  - driver_passport_number
                  - driver_pinfl
                  - driver_scan_status
                power_data:
                  type: object
                  properties:
                    power_plate_number:
                      type: string
                      example: 01A123BC
                    power_tech_series:
                      type: string
                      example: AA
                    power_tech_number:
                      type: string
                      example: '9876543'
                    power_owner_name:
                      type: string
                      example: Ali Valiyev
                    power_scan_status:
                      type: boolean
                      example: true
                  required:
                  - power_plate_number
                  - power_tech_series
                  - power_tech_number
                  - power_owner_name
                  - power_scan_status
                trailer_data:
                  type: object
                  properties:
                    trailer_plate_number:
                      type: string
                      example: 01A123BC
                    trailer_tech_series:
                      type: string
                      example: AA
                    trailer_tech_number:
                      type: string
                      example: '9876543'
                    trailer_owner_name:
                      type: string
                      example: Ali Valiyev
                    trailer_scan_status:
                      type: boolean
                      example: true
                  required:
                  - trailer_plate_number
                  - trailer_tech_series
                  - trailer_tech_number
                  - trailer_owner_name
                  - trailer_scan_status
              required:
              - driver_owner
              - driver_data
              - power_data
              - trailer_data
      responses:
        '200':
          description: "KYC-данные успешно сохранены."
          content:
            application/json:
              schema:
                type: object
                description: "Ответ по результату обновления KYC."
                properties:
                  event:
                    type: string
                    example: updated
                  is_full:
                    type: boolean
                    example: true
                    description: "Признак, что профиль заполнен полностью."
                  driver:
                    $ref: '../base.yaml#/components/schemas/Driver'
                required:
                - event
                - is_full
                - driver
  /v1/driver/auth/refresh:
    post:
      tags:
      - Drivers / Auth & registration
      summary: "Обновить токены водителя."
      description: "Выдает новую пару access/refresh токенов по действующему refresh token."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required:
              - refresh_token
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    $ref: '../base.yaml#/components/schemas/Tokens'
        '401':
          description: invalid refresh_token
  /v1/driver/auth/logout:
    post:
      tags:
      - Drivers / Auth & registration
      summary: "Выход водителя из системы."
      description: "Инвалидирует refresh token и завершает текущую авторизованную сессию."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: "Refresh token, который нужно отозвать."
                access_token:
                  type: string
                  description: "Текущий access token (опционально для серверной очистки контекста)."
      responses:
        '200':
          description: "Выход выполнен успешно."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

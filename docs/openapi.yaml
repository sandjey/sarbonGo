        '502':
          description: otp send failed — OTP не отправлен
  /v1/dispatchers/profile/phone-change/verify:
    post:
      tags:
      - Dispatchers / Profile
      summary: Смена телефона — подтверждение OTP
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
                otp:
                  type: string
                  example: '123456'
              required:
              - session_id
              - otp
      responses:
        '200':
          description: Телефон обновлён
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  dispatcher:
                    $ref: '#/components/schemas/Dispatcher'
        '401':
          description: Сессия/OTP неверны
        '409':
          description: Телефон уже занят
  /v1/dispatchers/connection-offers:
    get:
      tags:
      - Driver Manager / Drivers & connections
      summary: Список connection offers (incoming/outgoing)
      description: 'Единый список connection offers между driver manager и водителями.

        Параметр `direction`:

        - `outgoing` — offers, которые отправил диспетчер водителям;

        - `incoming` — offers, которые пришли диспетчеру от водителей;

        - `all` — оба направления (по умолчанию).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: direction
        in: query
        required: false
        schema:
          type: string
          enum:
          - all
          - incoming
          - outgoing
          default: all
      responses:
        '200':
          description: data.direction, data.items[]
        '400':
          description: invalid direction
    post:
      tags:
      - Driver Manager / Drivers & connections
      summary: Отправить connection offer водителю
      description: '**Диспетчер:** отправить connection offer водителю. Тело: `driver_id`.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_id:
                  type: string
                  format: uuid
              required:
              - driver_id
      responses:
        '201':
          description: data.token, data.expires_in_hours, data.linked
        '400':
          description: invalid driver_id
        '403':
          description: access denied
        '404':
          description: driver not found
        '409':
          description: driver already linked or invitation pending (driver_invitation_already_pending)
  /v1/dispatchers/connection-offers/{token}:
    delete:
      tags:
      - Driver Manager / Drivers & connections
      summary: Отменить исходящий connection offer (диспетчер)
      description: 'Отмена требует обязательную причину, запись приглашения удаляется из таблицы.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
          example: a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: driver does not respond
              required:
              - reason
      responses:
        '200':
          description: ok (invitation row deleted)
        '400':
          description: rejection_reason_required / rejection_reason_too_short
        '403':
          description: not your invitation
        '404':
          description: invitation not found or expired
  /v1/dispatchers/connection-offers/accept:
    post:
      tags:
      - Driver Manager / Drivers & connections
      summary: Принять incoming connection offer от водителя
      description: 'Тело: `token`.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
              required:
              - token
      responses:

  /api/cargo/{id}/status:
    patch:
      tags:
      - Cargo Manager / Cargo
      summary: 6. Изменить статус груза
      description: '**Кто вызывает:** Диспетчер, компания, админ. Водитель статусы груза не меняет.

        **Назначение:** Смена статуса с проверкой допустимых переходов.


        **Допустимые переходы:** created → searching | cancelled; searching → assigned | cancelled; assigned → in_transit | cancelled; in_transit → delivered; delivered и cancelled — конечные. Любой другой
        переход вернёт 400.


        **Тело запроса:** Один объект с полем status (значение из enum).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CargoStatusRequest'
            example:
              status: SEARCHING_ALL
      responses:
        '200':
          description: Статус обновлён
        '400':
          description: Переход недопустим (например delivered → searching)
  /api/cargo/{id}/offers:
    get:
      tags:
      - Cargo Manager / Offers
      summary: 7. Список офферов по грузу
      description: '**Кто вызывает:** Диспетчер, компания, админ (перед принятием оффера). Водитель может смотреть свои офферы через список грузов или отдельный экран.

        **Назначение:** Просмотр офферов по конкретному грузу.


        **Логика:** По умолчанию — все записи из `offers` с `cargo_id = id`, отсортированные по `created_at` (новые сверху).

        В каждом элементе `items[]`:

        - `offer` — поля оффера (id, cargo_id, carrier_id, proposed_by, price, currency, comment, status, rejection_reason, created_at);

        - `cargo` — кратко по грузу: `cargo_type_name`, `weight`, `volume`;

        - `driver` — водитель оффера: `phone`, `name`.


        **Фильтры (query)** — те же смыслы, что у `GET /v1/dispatchers/offers/all`, но в рамках одного груза:

        - `direction` — необязательно; если не передан — показываются **все** направления. `outgoing` / алиасы from_me, sent, by — `proposed_by=DISPATCHER`; `incoming` / to_me, received — `proposed_by=DRIVER`.

        - `status` — PENDING, ACCEPTED или REJECTED (необязательно).

        - `counterparty_id` — фильтр по `carrier_id` (водитель). При необходимости алиасы: `to_driver_id` (удобно при outgoing), `from_driver_id` (при incoming); если `direction` не задан — берётся `to_driver_id`,
        иначе `from_driver_id`, если первый пуст.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        description: UUID груза
      - name: direction
        in: query
        required: false
        description: Исходящие/входящие офферы по грузу (необязательно; без параметра — все)
        schema:
          type: string
          example: outgoing
      - name: counterparty_id
        in: query
        required: false
        description: Фильтр по водителю (carrier_id)
        schema:
          type: string
          format: uuid
      - name: to_driver_id
        in: query
        required: false
        description: Алиас при direction=outgoing
        schema:
          type: string
          format: uuid
      - name: from_driver_id
        in: query
        required: false
        description: Алиас при direction=incoming
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        required: false
        schema:
          type: string
          example: PENDING
      responses:
        '200':
          description: data.items — массив элементов {offer, cargo, driver}; при использовании фильтров — data.direction (если задан), data.status, data.counterparty_id
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Envelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              offer:
                                $ref: '#/components/schemas/Offer'
                              cargo:
                                type: object
                                properties:
                                  cargo_type_name:
                                    type: string
                                    nullable: true
                                  weight:
                                    type: number
                                  volume:
                                    type: number
                              driver:
                                type: object
                                properties:
                                  phone:
                                    type: string
                                    nullable: true
                                  name:
                                    type: string
                                    nullable: true
                        direction:
                          type: string
                          nullable: true
                        status:
                          type: string
                        counterparty_id:
                          type: string
                          format: uuid
                          nullable: true
        '400':
          description: invalid_payload_detail / invalid_id
  /api/cargo/photos:

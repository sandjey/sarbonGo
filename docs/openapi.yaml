  /v1/chat/conversations/{id}/messages/media:
    post:
      tags:
      - Chat
      summary: Отправить медиа (фото/голос/видео/кружок)
      description: 'Загружает файл, оптимизирует «как в Telegram» и создаёт сообщение:

        - **PHOTO** → JPEG (оптимизация/пережатие); при ошибке ffmpeg — копия JPEG/PNG/WebP

        - **VOICE** → если исходник **MP3** (`audio/mpeg`) — сохраняется как MP3; иначе **OGG/Opus** (моно, 48kHz, ~32kbps)

        - **AUDIO** — синоним **VOICE** (mp3/голос с клиентов, где поле названо audio)

        - **VIDEO** → если исходник уже **MP4** — быстрый путь (копия); иначе перекодирование в MP4 (H.264/AAC) + faststart + thumbnail; при необходимости пробуется remux `ffmpeg -c copy`

        - **VIDEO_NOTE** → квадратный MP4 (под UI-кружок) + thumbnail


        Поле файла в multipart: **`file`** (предпочтительно); также принимаются **`upload`**, **`media`**, **`photo`**, **`video`**, **`voice`**. Лимит тела запроса до **128 MiB** (большие видео).


        Файл хранится на диске сервера, в БД сохраняются метаданные. В `payload` сообщения возвращается `attachment_id` и `url` для скачивания.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      - UserIDHeader: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - type
              properties:
                type:
                  type: string
                  enum:
                  - PHOTO
                  - VOICE
                  - AUDIO
                  - VIDEO
                  - VIDEO_NOTE
                  description: AUDIO обрабатывается как VOICE
                body:
                  type: string
                  nullable: true
                  description: Подпись/текст (опционально)
                file:
                  type: string
                  format: binary
                  description: Основной файл
                upload:
                  type: string
                  format: binary
                  description: Альтернативное имя поля файла
                media:
                  type: string
                  format: binary
                photo:
                  type: string
                  format: binary
                video:
                  type: string
                  format: binary
                voice:
                  type: string
                  format: binary
            examples:
              voice:
                summary: VOICE (голосовое)
                value:
                  type: VOICE
                  body: Голосовое сообщение
              photo:
                summary: PHOTO (фото)
                value:
                  type: PHOTO
                  body: Фото с погрузки
              video:
                summary: VIDEO (видео)
                value:
                  type: VIDEO
                  body: Видео с места
              video_note:
                summary: VIDEO_NOTE (кружок)
                value:
                  type: VIDEO_NOTE
                  body: Кружок
      responses:
        '201':
          description: data = ChatMessage (type=PHOTO/VOICE/VIDEO/VIDEO_NOTE; payload содержит url)
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Envelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/ChatMessage'
        '400':
          description: invalid payload/file
        '401':
          description: unauthorized
        '404':
          description: conversation not found

      summary: Получить профиль водителя
      description: "**Кто вызывает:** Водитель (мобильное приложение). Обязателен X-User-Token (JWT).\n**Назначение:** Получение текущего профиля в сгруппированном виде.  \nВ ответе `data.driver` содержит\
        \ 3 блока:\n- `profile` — основные данные водителя (id, phone, name, статусы, паспорт, координаты и т.д.)\n- `power_plate` — данные тягача\n- `trailer_plate` — данные прицепа\n"
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []

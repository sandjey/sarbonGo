        '400':
          description: invalid_driver_id
        '403':
          description: driver_not_linked
        '404':
          description: driver_not_found
    patch:
      tags:
      - Driver Manager / Drivers & connections
      summary: Изменить данные своего водителя (кроме имени и телефона)
      description: '**Диспетчер (cargo/driver manager):** может менять данные привязанного водителя (`freelancer_id = текущий диспетчер`).

        Ограничение: поля `name` и `phone` не редактируются этим методом.

        Поддерживает обновление профиля + тягача + прицепа одним PATCH.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: driverId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                work_status:
                  type: string
                  example: available
                driver_passport_series:
                  type: string
                driver_passport_number:
                  type: string
                driver_pinfl:
                  type: string
                driver_scan_status:
                  type: boolean
                driver_type:
                  type: string
                  example: freelancer
                account_status:
                  type: string
                  example: active
                driver_owner:
                  type: boolean
                kyc_status:
                  type: string
                  example: pending
                registration_step:
                  type: string
                registration_status:
                  type: string
                  example: BASIC
                power_plate_type:
                  type: string
                  example: TRACTOR
                power_plate_number:
                  type: string
                power_tech_series:
                  type: string
                power_tech_number:
                  type: string
                power_owner_name:
                  type: string
                power_scan_status:
                  type: boolean
                trailer_plate_type:
                  type: string
                  example: REEFER
                trailer_plate_number:
                  type: string
                trailer_tech_series:
                  type: string
                trailer_tech_number:
                  type: string
                trailer_owner_name:
                  type: string
                trailer_scan_status:
                  type: boolean
      responses:
        '200':
          description: data.event = updated, data.driver — обновлённый объект водителя
        '400':
          description: invalid payload / validation errors
        '403':
          description: driver_must_accept_invitation
        '404':
          description: driver_not_found
    delete:
      tags:
      - Driver Manager / Drivers & connections
      summary: Удалить водителя из списка (отвязать)
      description: '**Диспетчер:** отвязать водителя от себя (driver.freelancer_id = NULL). Водитель должен быть в списке «мои водители» (принял приглашение). После отвязки водитель исчезает из GET /v1/dispatchers/drivers.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: driverId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: data.message = unlinked
        '403':
          description: driver not found or not linked to you

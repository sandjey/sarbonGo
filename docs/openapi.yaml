                  nullable: true
                company_id:
                  type: string
                  format: uuid
                  nullable: true
              required:
              - driver_type
              - power_plate_type
              - trailer_plate_type
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

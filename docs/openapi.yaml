  /v1/dispatchers/trips/{id}/confirm-transition:
    post:
      tags:
      - Cargo Manager / Trips
      - Driver Manager / Trips
      summary: Подтвердить следующий статус рейса (диспетчер)
      description: 'Доступно в едином scope диспетчера: владелец груза, выбранная компания, либо Driver Manager из переговорной цепочки оффера.

        **Роль `CARGO_MANAGER`:** через этот метод может только **закрыть** рейс — поставить `COMPLETED`, и только когда рейс в `DELIVERED` и водитель уже запросил завершение (`POST /v1/driver/trips/{id}/confirm`).
        Промежуточные шаги (`IN_PROGRESS`→`IN_TRANSIT`→`DELIVERED`) для cargo manager **запрещены** (ответ `403`, ключ `trip_cargo_manager_completed_only`); их подтверждает водитель или диспетчер с ролью
        `DRIVER_MANAGER`.

        **Роль `DRIVER_MANAGER` (и прочие диспетчеры без роли cargo manager):** промежуточные шаги (`IN_PROGRESS`→`IN_TRANSIT`→`DELIVERED`) — как раньше, совместно с водителем. **Закрыть рейс в `COMPLETED`
        не может** — финальный `COMPLETED` подтверждает только cargo manager.

        **Закрытие (`COMPLETED`):** с `DELIVERED` никто не может перейти в `COMPLETED`, пока водитель не запросил завершение. Если водитель ещё не запросил — `400` `trip_completion_needs_driver_first`.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: data — поля рейса после шага (см. GET /api/trips/:id)
        '400':
          description: invalid_status_transition | trip_completion_needs_driver_first | trip_completion_already_pending
        '403':
          description: not your cargo | trip_cargo_manager_completed_only (only CARGO_MANAGER can confirm COMPLETED; cargo manager cannot confirm intermediate steps)
        '404':
          description: trip not found

      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          minimum: 1
          maximum: 100
      responses:
        '200':
          description: 'data.items[]: event_type, event_at, offer?/trip?'
        '401':
          description: unauthorized
  /v1/driver/trips/me:
    get:
      tags:
      - Drivers / Trips
      summary: Мой текущий рейс (водитель)
      description: 'Одна строка из `trips` для текущего водителя: статус **не** `COMPLETED` и **не** `CANCELLED`, выбирается по наибольшему `updated_at`.

        Если такого рейса нет — `data.trip` равен `null` (не 404).

        В `data.trip` дополнительно возвращается менеджер сделки:

        - `driver_manager_id` — если рейс был согласован через Driver Manager flow;

        - `cargo_manager_id` — если рейс был согласован напрямую с Cargo Manager.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: 'Стандартный `Envelope` (`status`: success, `code`: 200, `description` по `X-Language`).

            `data.trip` — объект `Trip` или `null`, если активного рейса нет.

            '
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Envelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        trip:
                          nullable: true
                          allOf:
                          - $ref: '#/components/schemas/Trip'
                          properties:
                            driver_manager_id:
                              type: string
                              format: uuid
                              nullable: true
                              description: UUID driver manager, если рейс через менеджера водителя
                            cargo_manager_id:
                              type: string
                              format: uuid
                              nullable: true
                              description: UUID cargo manager, если рейс напрямую с cargo manager
        '401':
          description: unauthorized
        '500':
          description: failed_to_list
  /v1/driver/trips/{id}/confirm:
    post:
      tags:
      - Drivers / Trips
      summary: Подтвердить шаг рейса (водитель)
      description: 'Переводит рейс на следующий операционный статус: `IN_PROGRESS` → `IN_TRANSIT` → `DELIVERED` (один вызов — один шаг).

        **Завершение:** с `DELIVERED` первый вызов **не** ставит `COMPLETED`: фиксируется запрос водителя, в ответе `completion_awaiting_dispatcher_confirm: true`, статус остаётся `DELIVERED`. Закрывает
        рейс **cargo manager** через `POST /v1/dispatchers/trips/{id}/confirm-transition`.

        В `data` возвращаются **`cargo_manager_id`** и при необходимости **`driver_manager_id`** (UUID freelance dispatcher), чтобы клиент знал, кто должен вызвать `confirm-transition`.

        Диспетчер может вызывать тот же переход для промежуточных шагов (см. Cargo Manager / Trips).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: поля рейса после перехода
        '400':
          description: invalid_status_transition | trip_completion_already_pending
        '403':
          description: trip not assigned to you
        '404':
          description: trip not found
  /v1/driver/trips/{id}/reject:
    post:
      tags:
      - Drivers / Trips
      summary: Отказ от рейса на любом этапе (водитель)
      description: 'Для статусов `IN_PROGRESS`, `IN_TRANSIT`, `DELIVERED`: рейс копируется в `archived_trips`, строка **удаляется** из `trips`, оффер снова `PENDING`, откат `cargo_drivers` / `vehicles_left`
        по правилам отмены.

        Не завершает рейс как `COMPLETED` — это полный выход из сделки после принятия оффера.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: 'Как POST /cancel: data.status, trip_id, cargo_id, offer_id'
        '400':
          description: trip_already_completed
        '403':
          description: trip not assigned to you
        '404':
          description: trip not found
  /v1/driver/trips/{id}/cancel:
    post:
      tags:
      - Drivers / Trips
      summary: Отменить рейс до выезда (водитель)
      description: 'Только **`IN_PROGRESS`** (ещё не `IN_TRANSIT`): архив + **удаление** строки из `trips` (без отдельного UPDATE `driver_id = NULL` — рейс целиком снимается с доски).

        После `IN_TRANSIT` используйте **`POST .../reject`**.

        До принятия оффера: `POST /v1/driver/offers/{id}/reject` (входящий диспетчера или отзыв своего DRIVER).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: id
        in: path
        required: true
        description: UUID рейса (trip_id)
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: data.status=cancelled, data.trip_id, data.cargo_id, data.offer_id
        '400':
          description: trip already completed | trip_cancel_only_in_progress (не IN_PROGRESS)
        '403':
          description: trip not assigned to you
        '404':
          description: trip not found

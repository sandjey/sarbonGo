      description: '**Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.

        **Назначение:** Подтверждение смены телефона. Передаёте session_id из request и otp. При успехе обновляется drivers.phone; при ошибке — сообщение об ошибке.


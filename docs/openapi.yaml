      tags:
      - Dispatchers / Profile
      summary: "Обновить профиль диспетчера."
      description: "Обновляет персональные данные диспетчера и рабочие поля профиля."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: '#/components/schemas/DisplayName'
                role:
                  $ref: '#/components/schemas/FreelanceDispatcherRole'
                passport_series:
                  type: string
                passport_number:
                  type: string
                pinfl:
                  type: string
                photo:
                  type: string
                  nullable: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '400':
          description: "Ошибка валидации переданных полей."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '401':
          description: "Требуется авторизация диспетчера."
        '409':
          description: "Конфликт данных профиля (например, дубликаты документов)."

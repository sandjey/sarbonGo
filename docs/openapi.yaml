                type: object
                properties:
                  status:
                    type: string
                    example: otp_sent
                  session_id:
                    type: string
                    format: uuid
                  ttl_seconds:
                    type: integer
        '400':
          description: no account — у номера нет аккаунта Telegram
        '409':

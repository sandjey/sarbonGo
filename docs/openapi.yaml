  /v1/company-users/auth/phone:
    post:
      tags: [Company Users]
      summary: "Запросить OTP для входа/регистрации"
      description: "Отправляет OTP на номер телефона. Все владельцы/пользователи компаний проходят верификацию по OTP."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [phone], properties: { phone: { type: string } } }
      responses:
        "200": { description: "otp_sent, ttl_seconds" }
        "400": { description: "invalid phone; или no account — у номера нет аккаунта Telegram" }
        "429": { description: "otp cooldown or rate limited" }
        "502": { description: "otp send failed — OTP не отправлен (ошибка шлюза/сети)" }

  /v1/company-users/auth/otp/verify:
    post:
      tags: [Company Users]
      summary: "Проверить OTP — вход или регистрация"
      description: "Если пользователь с таким телефоном есть — возвращает status=login и tokens. Если нет — status=register и session_id для завершения регистрации."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp]
              properties:
                phone: { type: string }
                otp: { type: string }
      responses:
        "200": { description: "login (tokens + user) или register (session_id)" }
        "401": { description: "otp expired or invalid" }

  /v1/company-users/registration/complete:
    post:
      tags: [Company Users]
      summary: "Завершить регистрацию (после OTP)"
      description: "Вызывается после otp/verify при status=register. Передать session_id, first_name, last_name (опц.), password. Номер телефона берётся из сессии (уже верифицирован в шаге OTP). Роль автоматически owner. В ответе — tokens и user."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, first_name, password]
              properties:
                session_id: { type: string, format: uuid }
                first_name: { type: string }
                last_name: { type: string }
                password: { type: string }
      responses:
        "200": { description: "registered, tokens + user (role=owner)" }
        "400": { description: "invalid payload or phone mismatch" }
        "401": { description: "session expired" }
        "409": { description: "phone already registered" }


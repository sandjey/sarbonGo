      description: 'Путь: `dispatcher_id` диспетчера, которого оцениваете. Тело: **`trip_id`** завершённого рейса и **`stars`**.

        Разрешены участники этого trip:

        - cargo manager (владелец груза),

        - driver manager (если оффер по рейсу был `proposed_by=DRIVER_MANAGER`).

        Оценка пишется в `trip_ratings` и агрегат **`freelance_dispatchers.rating`**.

        '

            schema:
              type: object
              properties:
                search_visibility:
                  type: string
                  enum:
                  - all
                  - company
                  description: all — груз виден всем (SEARCHING_ALL); company — только водителям компании (SEARCHING_COMPANY). Для диспетчера игнорируется.
      responses:
        '200':
          description: data.status = SEARCHING_ALL или SEARCHING_COMPANY
        '400':
          description: cargo not pending moderation

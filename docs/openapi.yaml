  /v1/driver/driver-invitations:
    get:
      tags:
      - Drivers / Relations
      - Driver Manager / Drivers & connections
      summary: Список приглашений для водителя
      description: '**Водитель:** приглашения на свой номер телефона (от компании или от фриланс-диспетчера), **включая историю** (кто пригласил — invited_by, итог — status). По активному pending можно
        принять (POST .../accept) или отказаться (POST .../decline).

        В ответе data.items: token, type (company | freelance), company_id или dispatcher_id, invited_by, status (pending | accepted | declined | cancelled | expired), expires_at, created_at, responded_at.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: data.items — приглашения (token, type, status, invited_by, company_id/dispatcher_id, expires_at, created_at, responded_at)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            token:
                              type: string
                            type:
                              type: string
                              enum:
                              - company
                              - freelance
                              - unknown
                            company_id:
                              type: string
                              format: uuid
                            dispatcher_id:
                              type: string
                              format: uuid
                            phone:
                              type: string
                            invited_by:
                              type: string
                              format: uuid
                              description: Диспетчер, отправивший приглашение
                            status:
                              type: string
                              enum:
                              - pending
                              - accepted
                              - declined
                              - cancelled
                              - expired
                            expires_at:
                              type: string
                              format: date-time
                            created_at:
                              type: string
                              format: date-time
                            responded_at:
                              type: string
                              format: date-time
                              nullable: true
  /v1/driver/driver-invitations/accept:
    post:
      tags:
      - Drivers / Relations
      - Driver Manager / Drivers & connections
      summary: Принять приглашение (водитель)
      description: 'Тело: token. Телефон водителя должен совпадать с приглашением.

        **От компании:** после принятия у водителя устанавливается company_id. **От фриланс-диспетчера:** у водителя устанавливается freelancer_id = id диспетчера; у диспетчера в списке GET /v1/dispatchers/drivers
        появляется этот водитель.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
              required:
              - token
            example:
              token: a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789
      responses:
        '200':
          description: data.company_id или data.freelancer_id
        '400':
          description: invitation not found or expired
        '403':
          description: invitation was sent to another phone

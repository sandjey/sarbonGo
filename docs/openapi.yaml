  /v1/driver/profile/heartbeat:
    put:
      tags:
      - Drivers / Profile & KYC
      summary: "Обновить геопозицию (heartbeat)."
      description: |
        Принимает актуальные координаты водителя.
        Используется для онлайн-статуса, карты и диспетчерского мониторинга.
        Рекомендуется отправлять периодически при активной сессии.
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                latitude:
                  type: number
                  format: double
                  example: 41.311081
                longitude:
                  type: number
                  format: double
                  example: 69.240562
              required:
              - latitude
              - longitude
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Envelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        event:
                          type: string
                          example: heartbeat
                        push_token_registered:
                          type: boolean
                          description: |
                            Признак, что push-токен был передан и сохранен.
                            Используется для диагностики доставки push-уведомлений.
                        driver:
                          type: object
                          description: "Актуальные данные профиля водителя после обновления."

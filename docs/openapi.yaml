      summary: Удалить профиль водителя
      description: '**Кто вызывает:** Водитель (мобильное приложение). Обязателен X-User-Token.

        **Назначение:** Жёсткое удаление аккаунта: запись переносится в deleted_drivers, из drivers удаляется. Связанные рейсы (trips) отвязываются от водителя (driver_id = NULL), затем удаляется строка
        водителя.

        '

        **Основные поля:** id — уникальный идентификатор; weight — вес в тоннах; volume — объём в м³; truck_type — тип кузова (TENT, REFRIGERATOR, FLATBED, TANKER, OTHER); status — жизненный цикл груза:
        PENDING_MODERATION → SEARCHING_ALL / SEARCHING_COMPANY (пока идут рейсы) → COMPLETED; также CANCELLED.


        **Контакт:** contact_name, contact_phone — для связи с грузоотправителем/получателем.


        **Кто создал:** created_by_type (ADMIN / DISPATCHER / COMPANY) и created_by_id заполняются автоматически при создании по JWT или company_id.

        '
      properties:
        id:
          type: string

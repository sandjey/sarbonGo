      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '401':
          description: Неверный current_password
  /v1/dispatchers/profile/phone-change/request:
    post:
      tags:
      - Dispatchers / Profile
      summary: Смена телефона — запрос OTP
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_phone:

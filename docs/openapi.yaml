        '401':
          description: unauthorized
    post:
      tags:
      - Chat / Voice
      summary: Создать исходящий звонок (RINGING)
      description: 'Создаёт звонок со статусом **RINGING** и best-effort отправляет событие `call.invite` в WebSocket peer''а (если он онлайн).

        Для защиты от двойного тапа используйте `client_request_id` (идемпотентность по caller_id + client_request_id).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallCreateRequest'
            examples:
              basic:
                summary: Позвонить peer
                value:
                  peer_id: 11111111-1111-1111-1111-111111111111
                  client_request_id: ui-tap-1700000000
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  code:
                    type: integer
                    example: 201
                  description:
                    type: string
                    example: created
                  data:
                    type: object
                    properties:
                      call:
                        $ref: '#/components/schemas/Call'
                required:
                - status
                - code
                - description
                - data
        '400':
          description: invalid payload
        '401':
          description: unauthorized
        '409':
          description: busy (caller or peer has ongoing call)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              examples:
                caller_busy:
                  summary: Caller already in RINGING/ACTIVE
                  value:
                    status: error
                    code: 409
                    description: Вы уже в звонке
                    data: null
                peer_busy:
                  summary: Peer already in RINGING/ACTIVE
                  value:
                    status: error
                    code: 409
                    description: Пользователь занят
                    data: null
        '429':
          description: rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: error
                code: 429
                description: Слишком много запросов, попробуйте позже
                data: null

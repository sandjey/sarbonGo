          description: 'Для ответов **водителю** или **cargo manager (диспетчеру)** с JWT: **true**, если груз в избранном у текущего пользователя (`driver_cargo_favorites` / `freelance_dispatcher_cargo_favorites`,
            см. cargo-likes API), иначе **false**.

            Поле может отсутствовать, если запрос без подходящего JWT (или роль не driver/dispatcher).

            '
          example: false
    RoutePoint:
      type: object
      description: '**Точка маршрута** (погрузка, выгрузка, таможня, транзит). В каждой точке указывается страна + город (коды из справочника), точный адрес и координаты.


        **Типы:** LOAD — погрузка; UNLOAD — выгрузка; CUSTOMS — таможня; TRANSIT — транзитная точка. В маршруте обязательно минимум одна погрузка (LOAD) и одна выгрузка (UNLOAD).


        **Страна и город:** country_code + city_code берутся из GET /v1/reference/cities (например country_code=UZ, city_code=TAS).

        '
      properties:
        id:
          type: string
          format: uuid
          example: af8be3f7-a8a4-4485-96ad-b6a96f58d015
          description: Уникальный идентификатор точки маршрута
        cargo_id:
          type: string
          format: uuid
          example: ebc30874-161a-4c29-b284-139e4e7d9120
          description: UUID груза, к которому относится точка
        type:
          type: string
          enum:
          - LOAD
          - UNLOAD
          - CUSTOMS
          - TRANSIT
          example: LOAD
          description: 'Тип точки (UPPERCASE): LOAD, UNLOAD, CUSTOMS, TRANSIT'
        country_code:
          type: string
          example: UZ
          description: 'Код страны (ISO-like): UZ, AE, RU и т.д.'
        city_code:
          type: string
          example: TAS
          description: Код города из справочника GET /v1/reference/cities (TAS, SAM, DXB и т.д.)
        region_code:
          type: string
          example: ''
          description: Код региона/области (пустая строка если не задан)
        address:
          type: string
          example: ул. Амира Темура 1, склад №5
          description: 'Полный адрес: улица, дом, склад, промзона'
        orientir:
          type: string
          example: Въезд со стороны метро Хамза, ворота А
          description: 'Ориентир для водителя: как найти место (въезд, КПП, рядом с чем)'
        lat:
          type: number
          example: 41.311081
          description: Широта в градусах
        lng:
          type: number
          example: 69.240562
          description: Долгота в градусах
        place_id:
          type: string
          nullable: true
          example: maps-tas-warehouse-5
          description: Идентификатор места из карт
        date:
          type: string
          format: date-time
          nullable: true
          example: '2026-03-23T08:00:00Z'
          description: Плановая дата/время по точке в UTC (RFC3339). null для старых грузов.
        comment:
          type: string
          nullable: true
          example: Склад зерна, погрузка с 08:00 до 18:00
          description: Произвольный комментарий к точке
        point_order:
          type: integer
          example: 1
          description: Порядок точки в маршруте (1, 2, 3…)
        is_main_load:
          type: boolean
          example: true
          description: Является ли эта точка основной погрузкой
        is_main_unload:
          type: boolean
          example: false
          description: Является ли эта точка основной выгрузкой
    Payment:
      type: object
      description: '**Условия оплаты по грузу** (одна запись на груз). Указывается при создании/редактировании груза в блоке payment.


        **Сумма:** total_amount и total_currency — итоговая цена перевозки; если price_request=true, фиксированной суммы нет (запрос цены). is_negotiable — цена договорная.


        **Предоплата:** with_prepayment, prepayment_amount, prepayment_currency; остаток — remaining_amount, remaining_currency.

        '
      properties:
        id:
          type: string
          format: uuid
          example: 697fbbb1-1b34-41ff-9180-41f3698985e0
          description: UUID записи об оплате
        cargo_id:
          type: string
          format: uuid
          example: ebc30874-161a-4c29-b284-139e4e7d9120
          description: UUID груза
        is_negotiable:
          type: boolean
          example: false
          description: Цена договорная (обсуждается с перевозчиком)
        price_request:
          type: boolean
          example: false
          description: 'Запрос цены: true — без фиксированной суммы, перевозчик предлагает сам'
        total_amount:
          type: number
          nullable: true
          example: 1500
          description: Общая сумма оплаты за перевозку
        total_currency:
          type: string
          nullable: true
          example: USD
          description: 'Валюта суммы: USD, UZS и т.д.'
        with_prepayment:
          type: boolean
          example: true
          description: Есть ли предоплата
        prepayment_amount:
          type: number
          nullable: true
          example: 500
          description: Сумма предоплаты
        prepayment_currency:
          type: string
          nullable: true
          example: USD
          description: Валюта предоплаты
        prepayment_type:
          type: string
          nullable: true
          example: BANK_TRANSFER
          description: Тип предоплаты (BANK_TRANSFER, CASH и т.д.)
        remaining_amount:
          type: number
          nullable: true
          example: 1000
          description: Сумма остатка к оплате
        remaining_currency:
          type: string
          nullable: true
          example: USD
          description: Валюта остатка
        remaining_type:
          type: string
          nullable: true
          example: ON_DELIVERY
          description: Условия оплаты остатка (ON_DELIVERY, AFTER_UNLOAD и т.д.)
        payment_note:
          type: string
          nullable: true
          maxLength: 500
          example: Оплата строго после выгрузки и проверки документов.
          description: Примечание к оплате (до 500 символов)
        payment_terms_note:
          type: string
          nullable: true
          example: При задержке оплаты более 3 дней начисляется пеня 0.1% в день.
          description: Особые условия оплаты
    Offer:
      type: object
      description: "**Оффер (согласование цены)** по грузу. Поле **proposed_by** задаёт, кто предложил цену в этом оффере:\n- **DRIVER** — водитель предложил цену; принять может только владелец груза.\n\
        - **DISPATCHER** — Cargo Manager предложил цену водителю; принять может водитель или его Driver Manager; при принятии менеджером — **WAITING_DRIVER_CONFIRM** и поле **negotiation_dispatcher_id**\
        \ = этот менеджер.\n- **DRIVER_MANAGER** — менеджер водителя предложил цену на чужой груз; принять может только владелец груза. При принятии Cargo Manager статус **WAITING_DRIVER_CONFIRM**, **negotiation_dispatcher_id**\
        \ = менеджер из **proposed_by_id**.\n\n**Статусы:** \n- PENDING — на рассмотрении;\n- ACCEPTED — принят (создан рейс);\n- REJECTED — отклонён стороной, которая **отказалась по чужому** предложению\
        \ (входящая заявка / приглашение);\n- CANCELED — **отменён автором** своего исходящего оффера или снят согласованный до водителя этап владельцем груза / negotiation DM (см. POST reject);\n- WAITING_DRIVER_CONFIRM\
        \ — ожидает подтверждения водителем (после согласования CM↔DM).\n"
      properties:
        id:
          type: string
          format: uuid
          example: f1a2b3c4-d5e6-7890-abcd-ef1234567890
          description: UUID оффера
        cargo_id:
          type: string
          format: uuid
          example: ebc30874-161a-4c29-b284-139e4e7d9120
          description: UUID груза
        carrier_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
          description: ID перевозчика (водителя)
        proposed_by:
          type: string
          enum:
          - DRIVER
          - DISPATCHER
          - DRIVER_MANAGER
          example: DRIVER
          description: Кто задал цену
        proposed_by_id:
          type: string
          format: uuid
          nullable: true
          description: UUID диспетчера-автора для DISPATCHER/DRIVER_MANAGER (если есть)
        negotiation_dispatcher_id:
          type: string
          format: uuid
          nullable: true
          description: Driver Manager в цепочке при WAITING_DRIVER_CONFIRM / оценках после рейса
        price:
          type: number
          example: 1500
          description: Предложенная цена
        currency:
          type: string
          example: USD
          description: Валюта
        comment:
          type: string
          nullable: true
          example: Готов выехать завтра
          description: Комментарий
        status:
          type: string
          enum:
          - PENDING
          - ACCEPTED
          - REJECTED
          - CANCELED
          - WAITING_DRIVER_CONFIRM
          example: PENDING
          description: Статус оффера
        created_at:
          type: string
          format: date-time
          example: '2026-03-23T16:00:00Z'
    CargoListResponse:
      type: object
      description: 'Ответ списка грузов (legacy: GET /api/cargo; рекомендовано: GET /v1/dispatchers/cargo/mine или GET /v1/dispatchers/cargo/all) — список грузов с полными данными (route_points, payment)
        и общее количество для пагинации.'
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CargoDetailResponse'
          description: Массив грузов на текущей странице (каждый элемент = полный объект с route_points и payment)
        total:
          type: integer
          description: Общее число записей (без лимита страницы)
      required:
      - items
      - total
    CargoCreateRequest:
      type: object
      description: '**Тело запроса POST /api/cargo** — создание груза с точками маршрута и условиями оплаты.


        **Обязательные поля:** weight (вес в тоннах, > 0), volume (объём в м³, > 0), **vehicles_amount** (количество машин, 1..100), **power_plate_type** и **trailer_plate_type** (из справочника GET /v1/driver/transport-options),
        route_points — массив точек маршрута. В route_points обязательно минимум одна точка с type=LOAD (погрузка) и одна с type=UNLOAD (выгрузка). У каждой точки обязательны: type (LOAD/UNLOAD/CUSTOMS/TRANSIT),
        **country_code**, city_code, address, lat, lng, point_order, **date** (RFC3339 UTC, например `2026-03-23T10:45:30Z`).


        **Справочники:** города — GET /v1/reference/cities (коды TAS, SAM, DXB…); транспорт — GET /v1/driver/transport-options (power_plate_type, trailer_plate_type).


        **Создатель:** при заголовке X-User-Token (JWT админа или диспетчера) создатель подставляется автоматически; при отсутствии JWT можно передать company_id — тогда создателем будет компания.


        **Статус при создании:** всегда устанавливается автоматически в `PENDING_MODERATION` (модерация). Админ принимает груз и переводит в `SEARCHING_ALL` или `SEARCHING_COMPANY` (через параметр search_visibility).

        '
      properties:
        name:
          type: string
          nullable: true
          description: 'Короткое название груза (например: Пшеница, Бытовая техника)'
        weight:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: Вес груза в тоннах; обязательно, число больше 0
        volume:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: Объём груза в кубических метрах (м³); обязательно, число больше 0
        vehicles_amount:
          type: integer
          minimum: 1
          maximum: 100
          description: Количество машин (водителей), требуемых для этого груза; обязательное поле, 1..100
          example: 1
        packaging:
          type: string
          nullable: true
          description: Упаковка груза (мешки, паллеты и т.д.)
        packaging_amount:
          type: integer
          nullable: true
          description: Количество упаковок (шт.)
        dimensions:
          type: string
          nullable: true
          description: Габариты груза (например, ДxШxВ в метрах)
        photos:
          type: array
          items:
            type: string
          nullable: true
          description: 'До 5 элементов: внешние URL ИЛИ ссылки/UUID с POST /api/cargo/photos (`/api/cargo/photos/{uuid}` или сам uuid). После создания груза pending-фото переносятся в cargo_photos; в ответе
            — URL `/api/cargo/{cargo_id}/photos/{id}`. Один pending UUID не повторять.'
        way_points:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/WayPointInput'
          description: Промежуточные точки маршрута (ехать через) и таможня. Не заменяют route_points.
        ready_enabled:
          type: boolean
          default: false
          description: Указана ли дата готовности груза к погрузке
        ready_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время готовности; обязательна, если ready_enabled=true
        comment:
          type: string
          nullable: true
          description: Комментарий к грузу/условиям (общий комментарий)
        power_plate_type:
          type: string
          description: 'Тип основной машины: TRUCK или TRACTOR (из GET /v1/driver/transport-options → power_plate_types)'
          example: TRUCK
        trailer_plate_type:
          type: string
          description: Тип прицепа/полуприцепа (из GET /v1/driver/transport-options → trailer_plate_types_by_power[power_plate_type])
          example: TENTED
        temp_min:
          type: number
          nullable: true
          description: Минимальная температура (°C); допустимо только при truck_type=refrigerator
        temp_max:
          type: number
          nullable: true
          description: Максимальная температура (°C); допустимо только при truck_type=refrigerator
        adr_enabled:
          type: boolean
          default: false
          description: Опасный груз (ADR); при true обязательно указать adr_class
        adr_class:
          type: string
          nullable: true
          description: Класс опасного груза; обязателен при adr_enabled=true
        loading_types:
          type: array
          items:
            type: string
          nullable: true
          description: Способы погрузки (массив строк)
        unloading_types:
          type: array
          items:
            type: string
          nullable: true
          description: Типы выгрузки (массив строк), отдельно от loading_types
        is_two_drivers_required:
          type: boolean
          default: false
          description: Требуется ли 2 водителя
        shipment_type:
          type: string
          nullable: true
          example: FTL
          description: 'Тип отправки: FTL (полная загрузка), LTL и т.д.'
        belts_count:
          type: integer
          nullable: true
          description: Количество ремней крепления
        documents:
          type: object
          nullable: true
          description: 'Требуемые документы: объект с полями TIR, T1, CMR, Medbook, GLONASS, Seal, Permit (boolean)'
        contact_name:
          type: string
          nullable: true
          description: Имя контактного лица для связи
        contact_phone:
          type: string
          nullable: true
          description: Телефон контакта, например +998901234567
        cargo_type_id:
          type: string
          format: uuid
          nullable: true
          description: UUID типа груза. Получите реальный UUID через GET /v1/reference/cargo-types/hint?q=пшеница → items[0].id
        company_id:
          type: string
          format: uuid
          nullable: true
          description: UUID компании, от имени которой создаётся груз (опционально)
        route_points:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/RoutePointInput'
          description: 'Точки маршрута: минимум две точки и минимум одна погрузка (LOAD) и одна выгрузка (UNLOAD); порядок задаётся point_order'
        payment:
          $ref: '#/components/schemas/PaymentInput'
          nullable: true
          description: Условия оплаты (опционально); при указании либо total_amount, либо price_request=true
      required:
      - weight
      - volume
      - vehicles_amount
      - power_plate_type
      - trailer_plate_type
      - route_points
    CargoUpdateRequest:
      type: object
      description: '**Тело PUT /api/cargo/:id** — частичное обновление груза. Все поля опциональны; передаются только те, что нужно изменить.

        Статус груза не передаётся в PUT — смена статуса через PATCH /api/cargo/:id/status.

        '
      properties:
        name:
          type: string
          nullable: true
          description: Короткое название груза (что везём)
        weight:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: Вес (т); > 0
        volume:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: Объём (м³); > 0
        packaging:
          type: string
          nullable: true
          description: Упаковка груза
        packaging_amount:
          type: integer
          nullable: true
          description: Количество упаковок (шт.)
        dimensions:
          type: string
          nullable: true
          description: Габариты груза
        photos:
          type: array
          items:
            type: string
          nullable: true
          description: Фото груза (массив ссылок/ID файлов)
        way_points:
          type: array
          items:
            $ref: '#/components/schemas/WayPointInput'
          nullable: true
        ready_enabled:
          type: boolean
        ready_at:
          type: string
          format: date-time
          nullable: true
        comment:
          type: string
          nullable: true
        truck_type:
          type: string
        temp_min:
          type: number
          nullable: true
        temp_max:
          type: number
          nullable: true
        adr_enabled:
          type: boolean
        adr_class:
          type: string
          nullable: true
        loading_types:
          type: array
          items:
            type: string
        unloading_types:
          type: array
          items:
            type: string
        is_two_drivers_required:
          type: boolean
          nullable: true
        shipment_type:
          type: string
          nullable: true
        belts_count:
          type: integer
          nullable: true
        documents:
          type: object
          nullable: true
        contact_name:
          type: string
          nullable: true
        contact_phone:
          type: string
          nullable: true
        route_points:
          type: array
          items:
            $ref: '#/components/schemas/RoutePointInput'
        payment:
          $ref: '#/components/schemas/PaymentInput'
          nullable: true
    RoutePointInput:
      type: object
      description: '**Одна точка маршрута** при создании или редактировании груза (POST /api/cargo, PUT /api/cargo/:id).


        **Обязательно:** type (LOAD/UNLOAD/CUSTOMS/TRANSIT), country_code + city_code (коды страны/города из GET /v1/reference/cities), address (улица, дом, склад), lat, lng (координаты), point_order (порядок
        1, 2, 3…), **date** (RFC3339 в UTC, например `2026-03-23T10:45:30Z`).


        **Опционально:** orientir — подсказка для водителя, как найти место; place_id; comment; is_main_load / is_main_unload — отметить основную погрузку/выгрузку.

        '
      properties:
        type:
          type: string
          enum:
          - LOAD
          - UNLOAD
          - CUSTOMS
          - TRANSIT
          description: 'Тип точки: LOAD — погрузка, UNLOAD — выгрузка, CUSTOMS — таможня, TRANSIT — транзит'
        country_code:
          type: string
          description: Код страны из справочника GET /v1/reference/cities (например UZ, AE, RU)
          example: UZ
        city_code:
          type: string
          description: Код города из справочника GET /v1/reference/cities (TAS — Ташкент, SAM — Самарканд, DXB — Дубай и т.д.)
          example: TAS
        region_code:
          type: string
          nullable: true
          description: Код региона/области (опционально)
        address:
          type: string
          description: 'Полный адрес: улица, дом, номер склада, промзона'
        orientir:
          type: string
          description: 'Ориентир для водителя: с какой стороны въезд, рядом с чем, КПП'
          example: склад №5, въезд с ул. Мира
        lat:
          type: number
          description: Широта в градусах (для карты)
        lng:
          type: number
          description: Долгота в градусах (для карты)
        place_id:
          type: string
          nullable: true
          description: Идентификатор места из карт (для автокомплита и избежания дублей)
        comment:
          type: string
          nullable: true
          description: Произвольный комментарий к точке
        point_order:
          type: integer
          description: Порядок точки в маршруте (1 — первая, 2 — вторая и т.д.)
        is_main_load:
          type: boolean
          default: false
          description: Отметить как основную точку погрузки
        is_main_unload:
          type: boolean
          default: false
          description: Отметить как основную точку выгрузки
        date:
          type: string
          format: date-time
          description: Плановая дата/время точки в UTC (RFC3339), сохраняется и отдаётся в UTC
          example: '2026-03-23T10:45:30Z'
      required:
      - type
      - country_code
      - city_code
      - address
      - lat
      - lng
      - point_order
      - date
    PaymentInput:
      type: object
      description: '**Условия оплаты** при создании или обновлении груза (блок payment в теле POST/PUT /api/cargo). Один блок на груз.


        **Правило:** если передан блок payment и price_request=false, нужно указать total_amount (фиксированная сумма). Если price_request=true — сумма не обязательна (запрос цены от перевозчика).


        **Предоплата:** with_prepayment, prepayment_amount, prepayment_currency; остаток к оплате — remaining_amount, remaining_currency.

        '
      properties:
        is_negotiable:
          type: boolean
          default: false
          description: Цена договорная (обсуждается с перевозчиком)
        price_request:
          type: boolean
          default: false
          description: 'Запрос цены: true — без фиксированной суммы, перевозчик предлагает цену сам'
        total_amount:
          type: number
          nullable: true
          description: Общая сумма оплаты за перевозку (обязательна при price_request=false)
        total_currency:
          type: string
          nullable: true
          example: USD
          description: 'Валюта: USD, UZS и т.д.'
        with_prepayment:
          type: boolean
          default: false
          description: Есть предоплата
        prepayment_amount:
          type: number
          nullable: true
          description: Сумма предоплаты
        prepayment_currency:
          type: string
          nullable: true
          description: Валюта предоплаты
        prepayment_type:
          type: string
          nullable: true
          description: Тип/условия предоплаты
        remaining_amount:
          type: number
          nullable: true
          description: Сумма остатка к оплате после доставки
        remaining_currency:
          type: string
          nullable: true
          description: Валюта остатка
        remaining_type:
          type: string
          nullable: true
          description: Условия оплаты остатка
        payment_note:
          type: string
          nullable: true
          maxLength: 500
          description: Примечание к оплате (до 500 символов)
        payment_terms_note:
          type: string
          nullable: true
          description: Особые условия оплаты
    WayPointInput:
      type: object
      description: Промежуточная точка маршрута (ехать через) или таможня.
      properties:
        type:
          type: string
          enum:
          - TRANSIT
          - CUSTOMS
          description: 'Тип точки: TRANSIT или CUSTOMS'
        country_code:
          type: string
          nullable: true
          example: KZ
        city_code:
          type: string
          nullable: true
          example: SHY
        region_code:
          type: string
          nullable: true
          example: SHYMKENT
        address:
          type: string
          nullable: true
          example: Трасса М-39, КПП 2
        orientir:
          type: string
          nullable: true
          example: Таможенный пост у северных ворот
        lat:
          type: number
          nullable: true
          example: 42.341
        lng:
          type: number
          nullable: true
          example: 69.589
        place_id:
          type: string
          nullable: true
          example: maps-customs-2
        comment:
          type: string
          nullable: true
          example: Оформление 3-4 часа
    CargoStatusRequest:
      type: object
      description: Тело PATCH /api/cargo/:id/status — смена статуса с проверкой допустимых переходов.
      properties:
        status:
          type: string
          enum:
          - PENDING_MODERATION
          - SEARCHING_ALL
          - SEARCHING_COMPANY
          - COMPLETED
          - CANCELLED
          example: SEARCHING_ALL
      required:
      - status
    OfferCreateRequest:
      type: object
      description: Тело POST /api/cargo/:id/offers. Оффер от перевозчика (водителя); carrier_id — ID водителя из таблицы drivers.
      properties:
        carrier_id:
          type: string
          format: uuid
          description: ID перевозчика (водителя)
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        price:
          type: number
          description: Предлагаемая цена
          example: 1500
        currency:
          type: string
          example: USD
        comment:
          type: string
          nullable: true
          example: Готов выехать завтра, своя тентовая фура
      required:
      - carrier_id
      - price
      - currency
    CargoDetailResponse:
      type: object
      description: Ответ GET /api/cargo/:id — груз с вложенными route_points и payment.
      allOf:
      - $ref: '#/components/schemas/Cargo'
      - type: object
        properties:
          route_points:
            type: array
            items:
              $ref: '#/components/schemas/RoutePoint'
          payment:
            $ref: '#/components/schemas/Payment'
            nullable: true
          offer_invitation_stats:
            type: object
            nullable: true
            description: Счётчики офферов/приглашений по грузу (GET /api/cargo/:id). from_* — от водителей к владельцу груза; to_* — от диспетчера к водителям.
            properties:
              from_drivers_total:
                type: integer
                example: 3
              from_drivers_pending:
                type: integer
                example: 1
              to_drivers_total:
                type: integer
                example: 2
              to_drivers_pending:
                type: integer
                example: 0
    Trip:
      type: object
      description: 'Рейс по грузу. Линейный поток IN_PROGRESS → IN_TRANSIT → DELIVERED → COMPLETED (или CANCELLED).

        После оценки по рейсу: **`rating_from_driver`** — звёзды, которые водитель поставил cargo manager (если уже оценил); **`rating_from_dispatcher`** — звёзды от cargo manager водителю. Дублируют `trip_ratings`
        для удобства клиента.

        '
      properties:
        id:
          type: string
          format: uuid
        cargo_id:
          type: string
          format: uuid
        offer_id:
          type: string
          format: uuid
        driver_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum:
          - IN_PROGRESS
          - IN_TRANSIT
          - DELIVERED
          - COMPLETED
          - CANCELLED
        agreed_price:
          type: number
        agreed_currency:
          type: string
        rating_from_driver:
          type: number
          format: double
          nullable: true
          minimum: 1
          maximum: 5
          multipleOf: 0.5
          description: Оценка водителя cargo manager по этому рейсу (если выставлена).
        rating_from_dispatcher:
          type: number
          format: double
          nullable: true
          minimum: 1
          maximum: 5
          multipleOf: 0.5
          description: Оценка cargo manager водителю по этому рейсу (если выставлена).
        next_status:
          type: string
          nullable: true
          description: Следующий шаг после текущего статуса (из DELIVERED обычно COMPLETED)
        completion_awaiting_dispatcher_confirm:
          type: boolean
          description: '`true`, если водитель запросил завершение рейса (статус остаётся `DELIVERED`), и **cargo manager** должен вызвать `POST /v1/dispatchers/trips/{id}/confirm-transition`, чтобы перевести
            рейс в `COMPLETED`.

            '
        pending_confirm_to:
          type: string
          nullable: true
          description: При ожидании завершения — обычно `COMPLETED`
        driver_confirmed_at:
          type: string
          format: date-time
          nullable: true
        dispatcher_confirmed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        driver_manager_id:
          type: string
          format: uuid
          nullable: true
          description: UUID freelance dispatcher (driver manager), если сделка шла через менеджера водителя (`negotiation_dispatcher_id` / DRIVER_MANAGER).
        cargo_manager_id:
          type: string
          format: uuid
          nullable: true
          description: UUID freelance dispatcher (cargo manager) — кто подтверждает переход в COMPLETED после DELIVERED или владелец груза по цепочке оффера.
    SSETripNotificationEvent:
      type: object
      description: Одна строка в потоке GET .../sse/trip-notifications (поле `data` в SSE).
      required:
      - kind
      - notification_id
      - trip_id
      - event_kind
      - created_at
      properties:
        kind:
          type: string
          enum:
          - trip_notification
        notification_id:
          type: string
          format: uuid
        trip_id:
          type: string
          format: uuid
        event_kind:
          type: string
          description: Например IN_TRANSIT, DELIVERED, COMPLETED, CANCELLED, COMPLETION_PENDING_MANAGER
        from_status:
          type: string
          nullable: true
        to_status:
          type: string
          nullable: true
        rate_driver_id:
          type: string
          format: uuid
          nullable: true
          description: 'Если это уведомление о COMPLETED для Driver Manager: кого оценить (driver_id).'
        rate_cargo_manager_id:
          type: string
          format: uuid
          nullable: true
          description: 'Если это уведомление о COMPLETED для Driver Manager: кого оценить (dispatcher_id cargo manager).'
        created_at:
          type: string
          description: Время генерации push (RFC3339 nano)
    SSETripStatusEvent:
      type: object
      description: Одна строка в потоке GET .../sse/trip-status.
      required:
      - kind
      - trip_id
      - cargo_id
      - offer_id
      - status
      - agreed_price
      - agreed_currency
      - updated_at
      - created_at
      properties:
        kind:
          type: string
          enum:
          - trip_status
        trip_id:
          type: string
          format: uuid
        cargo_id:
          type: string
          format: uuid
        offer_id:
          type: string
          format: uuid
        driver_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum:
          - IN_PROGRESS
          - IN_TRANSIT
          - DELIVERED
          - COMPLETED
          - CANCELLED
        agreed_price:
          type: number
        agreed_currency:
          type: string
        pending_confirm_to:
          type: string
          nullable: true
        completion_awaiting_dispatcher_confirm:
          type: boolean
          nullable: true
        updated_at:
          type: string
        created_at:
          type: string
    ProfileTripRatingRequest:
      type: object
      required:
      - trip_id
      - stars
      properties:
        trip_id:
          type: string
          format: uuid
          description: 'Завершённый рейс (`COMPLETED`), в котором участвовали вы и оцениваемый; одна строка оценки в `trip_ratings` на пару (рейс, кто оценивает).

            Итоговое число на карточке пользователя — агрегат по всем таким оценкам на **профиль** получателя.

            '

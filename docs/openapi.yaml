components:
  securitySchemes:
    DeviceTypeHeader:
      type: apiKey
      in: header
      name: X-Device-Type
      description: 'Тип клиента. Допустимые значения: `web`, `ios`, `android`.'
    LanguageHeader:
      type: apiKey
      in: header
      name: X-Language
      description: 'Язык ответа. Допустимые значения: `ru`, `uz`, `en`, `tr`, `zh`.'
    ClientTokenHeader:
      type: apiKey
      in: header
      name: X-Client-Token
      description: 'Токен приложения или клиента. Используется сервером для дополнительных проверок доступа.'
    UserTokenHeader:
      type: apiKey
      in: header
      name: X-User-Token
      description: 'JWT access token текущего пользователя. Для admin-методов токен должен содержать `role=admin`.'
    UserIDHeader:
      type: apiKey
      in: header
      name: X-User-ID
      description: 'Служебный идентификатор пользователя для тестов и отладки в Swagger. Обычно в runtime не используется.'
  parameters:
    SSEQueryToken:
      name: token
      in: query
      required: false
      schema:
        type: string
      description: |
        JWT access token для SSE-подключений через query-параметр.
        Используется в сценариях, где нельзя передать `X-User-Token` в header, например в `EventSource`.
    SSEQueryDeviceType:
      name: device_type
      in: query
      required: false
      schema:
        type: string
        enum: [web, ios, android]
      description: Копия `X-Device-Type` для SSE-подключений через `EventSource`.
    SSEQueryLanguage:
      name: language
      in: query
      required: false
      schema:
        type: string
        enum: [ru, uz, en, tr, zh]
      description: Копия `X-Language` для SSE-подключений через `EventSource`.
    SSEQueryClientToken:
      name: client_token
      in: query
      required: false
      schema:
        type: string
      description: Копия `X-Client-Token` для SSE-подключений через `EventSource`.
  examples:
    SSEFrameTripStatus:
      summary: "`type=trip_status` — событие изменения статуса рейса (поток `/events`)"
      value: |
        data: {"type":"trip_status","id":"e3111111-2222-3333-4444-555555555555","event_kind":"IN_TRANSIT","stream_kind":"trip_status","recipient_kind":"dispatcher","recipient_id":"11111111-1111-1111-1111-111111111111","dispatcher_role":"CARGO_MANAGER","at":"2026-04-20T12:00:00Z","data":{"kind":"trip_status","trip_id":"e3111111-2222-3333-4444-555555555555","cargo_id":"c1...","offer_id":"of...","driver_id":"d1...","status":"IN_TRANSIT","agreed_price":15000000,"agreed_currency":"UZS","completion_awaiting_dispatcher_confirm":false,"updated_at":"2026-04-20T12:00:00Z","created_at":"2026-04-20T09:00:00Z"}}
    SSEFrameTripNotificationCompleted:
      summary: "`type=trip_notification`, `event_kind=COMPLETED` — уведомление в inbox"
      value: |
        data: {"type":"trip_notification","id":"n0111111-1111-1111-1111-111111111111","event_kind":"COMPLETED","stream_kind":"notifications","recipient_kind":"dispatcher","recipient_id":"11111111-1111-1111-1111-111111111111","dispatcher_role":"DRIVER_MANAGER","at":"2026-04-20T15:30:00Z","data":{"kind":"trip_notification","notification_id":"n0111111-1111-1111-1111-111111111111","trip_id":"e3111111-2222-3333-4444-555555555555","event_kind":"COMPLETED","from_status":"DELIVERED","to_status":"COMPLETED","rate_driver_id":"d1...","rate_cargo_manager_id":"cm...","created_at":"2026-04-20T15:30:00.123Z"}}
    SSEFrameCargoOfferAccepted:
      summary: "`type=cargo_offer`, `event_kind=accepted`"
      value: |
        data: {"type":"cargo_offer","id":"of222222-2222-2222-2222-222222222222","event_kind":"accepted","stream_kind":"notifications","recipient_kind":"dispatcher","recipient_id":"11111111-1111-1111-1111-111111111111","dispatcher_role":"CARGO_MANAGER","at":"2026-04-20T12:05:00Z","data":{"kind":"cargo_offer","offer_id":"of222222-2222-2222-2222-222222222222","cargo_id":"c1111111-1111-1111-1111-111111111111","event":"accepted","proposed_by":"DRIVER","proposed_by_id":"d1..."}}
    SSEFrameConnectionOfferAccepted:
      summary: "`type=connection_offer`, `event_kind=accepted`"
      value: |
        data: {"type":"connection_offer","id":"inv33333-3333-3333-3333-333333333333","event_kind":"accepted","stream_kind":"notifications","recipient_kind":"dispatcher","recipient_id":"11111111-1111-1111-1111-111111111111","dispatcher_role":"DRIVER_MANAGER","at":"2026-04-20T12:10:00Z","data":{"kind":"connection_offer","invitation_id":"inv33333-3333-3333-3333-333333333333","token":"tok_abc","event":"accepted","from_user_id":"d1...","to_user_id":"11111111-1111-1111-1111-111111111111"}}
    SSEFrameDriverUpdate:
      summary: "`type=driver_update` — событие обновления профиля или статуса водителя"
      value: |
        data: {"type":"driver_update","id":"d1444444-4444-4444-4444-444444444444","event_kind":"profile_updated","stream_kind":"driver_updates","recipient_kind":"dispatcher","recipient_id":"11111111-1111-1111-1111-111111111111","dispatcher_role":"DRIVER_MANAGER","at":"2026-04-20T12:15:00Z","data":{"kind":"driver_update","driver_id":"d1444444-4444-4444-4444-444444444444","action":"profile_updated"}}
    SSEFrameChatMessage:
      summary: "`type=message` — входящее сообщение чата (SSE/WS)"
      value: |
        data: {"type":"message","id":"m0555555-5555-5555-5555-555555555555","event_kind":"message","stream_kind":"chat","recipient_kind":"dispatcher","recipient_id":"11111111-1111-1111-1111-111111111111","dispatcher_role":"CARGO_MANAGER","at":"2026-04-20T12:20:00Z","data":{"type":"message","data":{"message_id":"m0555555-5555-5555-5555-555555555555","conversation_id":"cv...","from_user_id":"d1...","text":"Р В Р’В Р РЋРЎСџР В Р Р‹Р В РІР‚С™Р В Р’В Р РЋРІР‚Р В Р’В Р вЂ™Р’ВµР В Р Р‹Р Р†Р вЂљР’В¦Р В Р’В Р вЂ™Р’В°Р В Р’В Р вЂ™Р’В» Р В Р’В Р В РІР‚В¦Р В Р’В Р вЂ™Р’В° Р В Р’В Р вЂ™Р’В·Р В Р’В Р вЂ™Р’В°Р В Р’В Р РЋРІР‚вЂњР В Р Р‹Р В РІР‚С™Р В Р Р‹Р РЋРІР‚СљР В Р’В Р вЂ™Р’В·Р В Р’В Р РЋРІР‚СњР В Р Р‹Р РЋРІР‚Сљ","created_at":"2026-04-20T12:20:00Z"}}}
    SSEFrameCallRinging:
      summary: "`type=call`, `event_kind=call.ringing`"
      value: |
        data: {"type":"call","id":"cl666666-6666-6666-6666-666666666666","event_kind":"call.ringing","stream_kind":"chat","recipient_kind":"dispatcher","recipient_id":"11111111-1111-1111-1111-111111111111","dispatcher_role":"CARGO_MANAGER","at":"2026-04-20T12:25:00Z","data":{"type":"call.ringing","data":{"call_id":"cl666666-6666-6666-6666-666666666666","caller_id":"d1...","callee_id":"11111111-1111-1111-1111-111111111111","status":"RINGING"}}}
    SSEConnectedBanner:
      summary: "Служебные строки подключения `: sse connected` и heartbeat `: ping`"
      value: |
        : sse connected

        : ping
  schemas:
    NotificationItem:
      type: object
      description: |
        Р В Р’В Р РЋРІР‚С”Р В Р’В Р СћРІР‚Р В Р’В Р В РІР‚В¦Р В Р’В Р вЂ™Р’В° Р В Р’В Р вЂ™Р’В·Р В Р’В Р вЂ™Р’В°Р В Р’В Р РЋРІР‚вЂќР В Р’В Р РЋРІР‚Р В Р Р‹Р В РЎвЂњР В Р Р‹Р В Р вЂ° Р В Р’В Р РЋРІР‚Р В Р’В Р вЂ™Р’В· Р В Р’В Р вЂ™Р’В»Р В Р’В Р вЂ™Р’ВµР В Р’В Р В РІР‚В¦Р В Р Р‹Р Р†Р вЂљРЎв„ўР В Р Р‹Р Р†Р вЂљРІвЂћвЂ“ Р В Р Р‹Р РЋРІР‚СљР В Р’В Р В РІР‚В Р В Р’В Р вЂ™Р’ВµР В Р’В Р СћРІР‚Р В Р’В Р РЋРІР‚СћР В Р’В Р РЋР В Р’В Р вЂ™Р’В»Р В Р’В Р вЂ™Р’ВµР В Р’В Р В РІР‚В¦Р В Р’В Р РЋРІР‚Р В Р’В Р Р†РІР‚С›РІР‚вЂњ (`GET /v1/driver/notifications` Р В Р’В Р РЋРІР‚ `GET /v1/dispatchers/notifications`).
        Р В Р’В Р Р†Р вЂљРЎвЂќР В Р’В Р вЂ™Р’ВµР В Р’В Р В РІР‚В¦Р В Р Р‹Р Р†Р вЂљРЎв„ўР В Р’В Р вЂ™Р’В° Р В Р’В Р РЋРІР‚СћР В Р’В Р вЂ™Р’В±Р В Р Р‹Р В РІР‚В°Р В Р’В Р вЂ™Р’ВµР В Р’В Р СћРІР‚Р В Р’В Р РЋРІР‚Р В Р’В Р В РІР‚В¦Р В Р Р‹Р В Р РЏР В Р’В Р вЂ™Р’ВµР В Р Р‹Р Р†Р вЂљРЎв„ў Р В Р’В Р В РІР‚В Р В Р Р‹Р В РЎвЂњР В Р’В Р вЂ™Р’Вµ Р В Р’В Р РЋРІР‚СњР В Р’В Р вЂ™Р’В°Р В Р Р‹Р Р†Р вЂљРЎв„ўР В Р’В Р вЂ™Р’ВµР В Р’В Р РЋРІР‚вЂњР В Р’В Р РЋРІР‚СћР В Р Р‹Р В РІР‚С™Р В Р’В Р РЋРІР‚Р В Р’В Р РЋРІР‚: Р В Р Р‹Р В РІР‚С™Р В Р’В Р вЂ™Р’ВµР В Р’В Р Р†РІР‚С›РІР‚вЂњР В Р Р‹Р В РЎвЂњР В Р Р‹Р Р†Р вЂљРІвЂћвЂ“ (`trip_notification`), Р В Р’В Р РЋРІР‚вЂњР В Р Р‹Р В РІР‚С™Р В Р Р‹Р РЋРІР‚СљР В Р’В Р вЂ™Р’В·Р В Р’В Р РЋРІР‚СћР В Р’В Р В РІР‚В Р В Р Р‹Р Р†Р вЂљРІвЂћвЂ“Р В Р’В Р вЂ™Р’Вµ Р В Р’В Р РЋРІР‚СћР В Р Р‹Р Р†Р вЂљРЎвЂєР В Р Р‹Р Р†Р вЂљРЎвЂєР В Р’В Р вЂ™Р’ВµР В Р Р‹Р В РІР‚С™Р В Р Р‹Р Р†Р вЂљРІвЂћвЂ“ (`cargo_offer`),
        Р В Р’В Р РЋРІР‚вЂќР В Р Р‹Р В РІР‚С™Р В Р’В Р РЋРІР‚Р В Р’В Р РЋРІР‚вЂњР В Р’В Р вЂ™Р’В»Р В Р’В Р вЂ™Р’В°Р В Р Р‹Р Р†РІР‚С™Р’В¬Р В Р’В Р вЂ™Р’ВµР В Р’В Р В РІР‚В¦Р В Р’В Р РЋРІР‚Р В Р Р‹Р В Р РЏ/Р В Р Р‹Р В РЎвЂњР В Р’В Р В РІР‚В Р В Р Р‹Р В Р РЏР В Р’В Р вЂ™Р’В·Р В Р’В Р РЋРІР‚ (`connection_offer`), Р В Р Р‹Р В РЎвЂњР В Р’В Р РЋРІР‚СћР В Р’В Р РЋРІР‚СћР В Р’В Р вЂ™Р’В±Р В Р Р‹Р Р†Р вЂљР’В°Р В Р’В Р вЂ™Р’ВµР В Р’В Р В РІР‚В¦Р В Р’В Р РЋРІР‚Р В Р Р‹Р В Р РЏ Р В Р Р‹Р Р†Р вЂљР Р‹Р В Р’В Р вЂ™Р’В°Р В Р Р‹Р Р†Р вЂљРЎв„ўР В Р’В Р вЂ™Р’В° (`message`), Р В Р’В Р вЂ™Р’В·Р В Р’В Р В РІР‚В Р В Р’В Р РЋРІР‚СћР В Р’В Р В РІР‚В¦Р В Р’В Р РЋРІР‚СњР В Р’В Р РЋРІР‚ (`call`) Р В Р’В Р РЋРІР‚

openapi: 3.0.3
info:
  title: Sarbon API — документация и руководство
  version: 0.1.0
  description: |
    **Sarbon** — API для логистики и грузоперевозок: водители, диспетчеры, компании, грузы, офферы, рейсы. Полное руководство по API на русском языке: потоки (flow), логика, описание полей и примеры.

    **Как пользоваться Swagger:**
    1. Нажмите **Authorize** и укажите заголовки: **X-Device-Type** (web / ios / android), **X-Language** (ru / uz / en / tr / zh), **X-Client-Token**. Они обязательны для всех запросов к /v1 и /api.
    2. Для методов, требующих авторизации, дополнительно укажите **X-User-Token** (JWT access_token после входа водителя, диспетчера или админа).
    3. Вкладки (теги) сверху группируют методы по ролям: водители, Cargo Manager, Driver Manager, админ, чат, компании, справочники (Reference).

    **Категории API:** Водители (Drivers) — регистрация, профиль, KYC, рейсы; Cargo Manager — грузы, офферы, переговоры и связанные рейсы; Driver Manager — водители, приглашения и подбор грузов для водителей; Админ — компании и владельцы; Справочники (Reference) — города, типы кузова, статусы.
    В каждом разделе вверху дано краткое описание потока; у схем и методов — подробные русские пояснения к полям.

    **Единые правила для всех list API (чтобы не ошибаться):**
    - `page` начинается с `1`; `limit` обычно `1..100` (смотри ограничения у конкретного метода).
    - Если параметр не передан, сервер использует **default** (всегда указан в описании endpoint).
    - Поля `status` чувствительны к допустимым значениям; ориентируйся на `Reference`-разделы и `enum`.
    - `direction`:
      - `all` — показать оба направления в одном списке.
      - `outgoing` — отправлено мной.
      - `incoming` — отправлено мне.
      - Допускаются алиасы (если указаны у endpoint).
    - Сортировка:
      - если есть параметр `sort`, формат обычно `<field>:<asc|desc>`, например `created_at:desc`.
      - без `sort` используется дефолтный порядок, указанный в endpoint.
    - Примеры:
      - `GET /v1/dispatchers/offers/all?direction=incoming&status=PENDING&page=1&limit=30`
      - `GET /v1/driver/offers/all?direction=outgoing&page=1&limit=20`
      - `GET /api/cargo?status=SEARCHING_ALL&sort=created_at:desc&page=1&limit=20`
      - `GET /v1/dispatchers/cargo/mine?status=SEARCHING_ALL&from_city_code=TAS&to_city_code=SAM`
      - `POST /v1/driver/cargo/active` body: `{ "lat": 41.311, "lng": 69.279, "radius_km": 150, "page": 1, "limit": 20 }`

    **Полная документация на русском:** см. файл docs/DOCUMENTATION-RU.md в репозитории.

servers:
  - url: /

security:
  - DeviceTypeHeader: []
    LanguageHeader: []
    ClientTokenHeader: []

tags:
  - name: Drivers / Auth
    description: |
      **Руководство: Авторизация водителя (мобильное приложение)**

      **Кто вызывает:** Водитель (мобильное приложение). После входа все запросы к профилю и регистрации — с заголовком X-User-Token = access_token.

      **Поток входа (существующий водитель):** 1) POST /v1/driver/auth/phone (phone) → OTP отправлен через Telegram Gateway. 2) POST /v1/driver/auth/otp/verify (phone, otp) → status=login и tokens (access_token, refresh_token). Дальше запросы с X-User-Token.

      **Поток для нового номера:** 1) /v1/driver/auth/phone → 2) /v1/driver/auth/otp/verify → status=register и session_id (JWT пока нет). Дальше POST /v1/driver/registration/start с session_id, name, oferta_accepted → создаётся профиль и выдаются tokens.

      **Данные:** phone в формате +998XXXXXXXXX; otp — код из Telegram/смс. Refresh: POST /v1/driver/auth/refresh (refresh_token). Logout: POST /v1/driver/auth/logout (refresh_token или access_token).
  - name: Drivers / Registration
    description: |
      **Руководство: Регистрация и шаги водителя**

      **Кто вызывает:** Водитель (мобильное приложение), с JWT после auth или после registration/start.

      **Шаги (registration_step):** name-oferta → geo-push → transport-type. **Статусы (registration_status):** start → basic → full.

      **Поток:** 1) /v1/driver/registration/start (session_id, name, oferta_accepted) — создаёт запись в drivers, step=name-oferta. 2) geo-push (latitude, longitude, push_token опц.) — шаг geo-push при указании гео. 3) transport-type (driver_type, power_plate_type, trailer_plate_type) — step=transport-type, status=basic. Справочники типов транспорта: GET /v1/driver/transport-options.
  - name: Drivers / KYC
    description: |
      **Руководство: KYC (документы водителя)**

      **Кто вызывает:** Водитель (мобильное приложение), с JWT.

      **Поток:** Один запрос PATCH /v1/driver/kyc с блоками driver_data (паспорт, PINFL, driver_scan_status), power_data (ТС: номер, техпаспорт, владелец, power_scan_status), trailer_data (прицеп: то же), driver_owner (true/false). registration_status=full выставляется только когда все обязательные поля заполнены и scan_status подтверждены; прицеп можно не указывать или заполнить полностью.
  - name: Drivers / Profile
    description: |
      **Руководство: Профиль водителя**

      **Кто вызывает:** Водитель (мобильное приложение). Все методы требуют X-User-Token (JWT).

      **Поток и данные:** GET /v1/driver/profile — получить профиль (все поля, в т.ч. has_photo). PATCH /v1/driver/profile/driver — изменить имя, work_status, паспорт. PATCH /v1/driver/profile/power — данные тягача; PATCH /v1/driver/profile/trailer — данные прицепа. PUT /v1/driver/profile/heartbeat — обновить гео. **Фото:** необязательно при регистрации; можно добавить/обновить/удалить когда угодно: POST /v1/driver/profile/photo — загрузить фото (multipart, поле photo, JPEG/PNG, макс. 10 MB); GET /v1/driver/profile/photo — получить фото (ETag/Cache-Control); DELETE /v1/driver/profile/photo — удалить фото. Смена телефона: .../phone-change/request (new_phone) → OTP; .../phone-change/verify (session_id, otp). DELETE /v1/driver/profile — удалить аккаунт (архивация в deleted_drivers).
  - name: "Cargo Manager"
    description: |
      Роль Cargo Manager: создание и ведение грузов, офферы, переговоры, связанные рейсы, экспорт своих грузов.
  - name: "Cargo Manager / Auth"
    description: "Авторизация диспетчера (OTP/password/refresh/logout) для роли Cargo Manager."
  - name: "Cargo Manager / Registration"
    description: "Регистрация диспетчера (registration/complete) для роли Cargo Manager."
  - name: "Cargo Manager / Profile"
    description: "Профиль диспетчера: просмотр, изменение, фото, пароль, смена телефона."
  - name: "Cargo Manager / Cargo CRUD"
    description: |
      Создание, получение, обновление, удаление и статусы грузов, включая фото груза.
      Также содержит справочник типов груза для форм Cargo Manager:
      - `GET /v1/dispatchers/cargo-types` — список `cargo_types` с названием на языке из `X-Language`.
  - name: "Cargo Manager / View Cargo"
    description: |
      Просмотр грузов Cargo Manager.
      Базовые list-endpoints:
      - `/v1/dispatchers/cargo/mine` — только мои.
      - `/v1/dispatchers/cargo/all` — общий каталог.
      Фильтры: `status`, `truck_type`, `weight_min/max`, `created_from/to`, `q`, `from_city_code`, `to_city_code`.
      Сортировка: `sort=<field>:<asc|desc>`, по умолчанию `created_at:desc`.
  - name: "Cargo Manager / Offers"
    description: |
      Офферы Cargo Manager.
      - `/v1/dispatchers/offers/all` — единый список по `direction=all|incoming|outgoing` + `status` + `counterparty_id`.
      - `/v1/dispatchers/offers/{id}/accept|reject` — принять входящий оффер водителя или отклонить входящий; **reject** также снимает **свой исходящий** оффер водителю (`proposed_by=DISPATCHER`, PENDING).
      В ответе списка есть `counts.incoming/outgoing`.
  - name: "Cargo Manager / Trips"
    description: |
      **Рейсы Cargo Manager (диспетчер / компания).** Требуется X-User-Token (dispatcher).

      - **GET /v1/dispatchers/trips** — список рейсов по **своим** грузам (и грузам выбранной компании после `switch-company`).
        Фильтры: `cargo_id`, `driver_id`, `status` (через запятую), пагинация `limit`, `offset`,
        сортировка `sort=created_at|updated_at` + `order=asc|desc`.
      - **GET /v1/dispatchers/cargo/{id}/trips** — рейсы конкретного груза по `cargo_id` (только если груз ваш).
      - **GET /v1/dispatchers/trips/history** — лента событий (новые сверху): `trip_active`, `trip_completed`, `trip_cancelled`, `offer_accepted` (`has_open_trip`), `offer_rejected`.
      - **GET /v1/dispatchers/trips/{id}** — получить рейс по `trip_id` (только если груз ваш).
      - **POST /v1/dispatchers/trips/{id}/confirm-transition** — следующий шаг статуса рейса; **на `DELIVERED` после запроса водителя** — этим вызовом вы переводите рейс в `COMPLETED`.
      - **POST /v1/dispatchers/trips/{id}/cancel** — отменить рейс по `trip_id`.
      - **GET /v1/dispatchers/trips/{id}/state** — состояние рейса (включая next_status и `completion_awaiting_dispatcher_confirm`).
      - **Уведомления и оценки:** см. **Notifications and ratings / Cargo manager** (`trip-notifications`, `drivers/{driverId}/rating`).
  - name: "Cargo Manager / Cargo likes"
    description: |
      **Избранные грузы (Cargo Manager).** Добавить/удалить/список по JWT диспетчера. Можно сохранить **любой** существующий груз (свой или чужой): `POST /v1/dispatchers/cargo-likes` + `cargo_id`, `DELETE /cargo-likes/{cargoId}`, `GET` + `limit`.
  - name: "Cargo Manager / Driver likes"
    description: |
      **Избранные водители (Cargo Manager).** `POST` с `driver_id`, `DELETE /:driverId`, `GET` с `limit`. Предпочтительные пути: `/v1/dispatchers/driver-likes` (алиас: `/favorite-drivers`).
  - name: "Driver Manager"
    description: |
      Роль Driver Manager: добавление/ведение водителей, поиск грузов для своих водителей, приглашения и рекомендации.
  - name: "Driver Manager / Invitations"
    description: "Приглашения водитель↔диспетчер: пригласить водителя, история приглашений, приглашения от водителей, принятие/отказ."
  - name: "Driver Manager / My drivers"
    description: "Мои водители: список, отвязка, управление данными транспорта (тягач/прицеп) для привязанных водителей."
  - name: "Driver Manager / Drivers catalog"
    description: "Каталог/поиск водителей (по телефону, фильтры, гео) для дальнейших приглашений."
  - name: "Driver Manager / Favorites"
    description: "Избранные водители и избранные грузы (для подбора под водителей)."
  - name: "Company / Dispatcher (приглашённый)"
    description: |
      **Диспетчер компании — только через приглашение.** GET /v1/dispatchers/companies (мои компании), POST /v1/dispatchers/auth/switch-company. Приглашение: POST /v1/dispatchers/companies/:companyId/invitations, accept, decline.
  - name: Drivers / Trips
    description: |
      **Рейсы водителя.** Требуется X-User-Token (driver).

      - **GET /v1/driver/trips/history** — лента событий (новые сверху): `trip_active` (текущий незавершённый рейс), `trip_completed`, `trip_cancelled`, `offer_accepted` (поле `has_open_trip`), `offer_rejected`.
      - **GET /v1/driver/trips/me** — один текущий исполняемый рейс (в `trips`, статус не `COMPLETED`/`CANCELLED`, последний по `updated_at`); если нет — `data.trip: null`.
      - **GET /v1/driver/trips/{id}/state** — статус рейса и кратко по грузу.
      - **POST /v1/driver/trips/{id}/confirm** — подтвердить шаг (следующий статус рейса).
      - **POST /v1/driver/trips/{id}/reject** — отказ от рейса на **любом** этапе до `COMPLETED`: рейс уходит в архив и удаляется из `trips` (как полный сброс слота).
      - **POST /v1/driver/trips/{id}/cancel** — только при **`IN_PROGRESS`** (до `IN_TRANSIT`): архив + удаление строки рейса; не используйте для этапов после выезда — там **`reject`**.
      - **Завершение рейса:** на шаге `DELIVERED` водитель вызывает `POST .../confirm` — рейс **остаётся** `DELIVERED`, выставляется `completion_awaiting_dispatcher_confirm`; cargo manager затем подтверждает `COMPLETED` своим `confirm-transition`.
      - **Уведомления и оценки:** см. тег **Notifications and ratings / Driver** — `GET /v1/driver/trip-notifications`, вы оцениваете менеджера: `POST /v1/driver/dispatchers/{dispatcherId}/rating`; **ваш** рейтинг на профиле после рейса выставляет cargo manager (см. тот же тег — входящая оценка).
  - name: Notifications and ratings / Driver
    description: |
      **Уведомления по рейсу и оценки (водитель):** вы оцениваете cargo manager; cargo manager оценивает **ваш** профиль водителя.

      **Уведомления:** при смене статуса рейса (`IN_TRANSIT`, `DELIVERED`, `COMPLETED`, отмена) и когда завершение ждёт cargo manager — в ленте `GET /v1/driver/trip-notifications` каждый элемент содержит `step`, `event_kind`, `message` (одна строка по **`X-Language`**: ru, uz, en, tr, zh). Отметить прочитанным: `POST .../trip-notifications/{id}/read`, `POST .../trip-notifications/read-all`.

      **Исходящая оценка (профиль cargo manager):** после `COMPLETED` — `POST /v1/driver/dispatchers/{dispatcher_id}/rating` с телом `{"trip_id":"…","stars":1..5}` (шаг **0.5**). В пути — оцениваемый **менеджер по грузам**; `trip_id` в теле — за какой совместный завершённый рейс. Агрегат — `freelance_dispatchers.rating`. Для грузов компании без фриланс-владельца см. `trip_rating_cargo_manager_unknown`.

      **Входящая оценка вашего профиля:** тот же завершённый рейс — cargo manager с **JWT диспетчера** вызывает `POST /v1/dispatchers/drivers/{driver_id}/rating` с `{"trip_id":"…","stars":1..5}` (шаг **0.5**). Результат агрегируется в **`drivers.rating`** (поле в профиле водителя). Водитель этот запрос не отправляет — его отправляет менеджер по грузам.
  - name: Notifications and ratings / Cargo manager
    description: |
      **Уведомления по рейсу и оценка водителя (cargo manager / диспетчер).**

      **Уведомления:** те же события, плюс отдельное уведомление `COMPLETION_PENDING_MANAGER`, когда водитель запросил закрытие рейса и ждёт вашего `POST /v1/dispatchers/trips/{id}/confirm-transition` с переводом в `COMPLETED`. Список: `GET /v1/dispatchers/trip-notifications` — в каждом элементе **`message`** по **`X-Language`**.

      **Оценка (профиль водителя):** после `COMPLETED` — `POST /v1/dispatchers/drivers/{driver_id}/rating` с `{"trip_id":"…","stars":1..5}` (шаг **0.5**). В пути — оцениваемый **водитель**; `trip_id` — контекст завершённого рейса. Агрегат пишется в `drivers.rating`.
  - name: Drivers / Cargo view
    description: |
      Просмотр и поиск грузов для водителя:
      - `POST /v1/driver/cargo/active` — ближайшие по координатам (distance asc), опционально `radius_km`.
      - `GET /v1/driver/matching-cargo` — подбор по типу прицепа.
      Во всех списках есть пагинация `page/limit`.
  - name: Drivers / Cargo likes
    description: |
      **Избранные грузы (водитель).** `POST /v1/driver/cargo-likes` + `cargo_id`, `DELETE /cargo-likes/{cargoId}`, `GET` + `limit`. Хранение: `driver_cargo_favorites`.
  - name: Drivers / Dispatcher likes
    description: |
      **Избранные диспетчеры (водитель).** Закладки по `freelance_dispatchers.id`: `POST /v1/driver/dispatcher-likes` + `dispatcher_id`, `DELETE /dispatcher-likes/{dispatcherId}`, `GET` + `limit`. Таблица `driver_dispatcher_favorites`.
  - name: Drivers / Offers
    description: |
      Офферы водителя:
      - `/v1/driver/offers/all` — единый список по `direction=all|incoming|outgoing`, фильтры `status`, `counterparty_id`.
      - `/v1/driver/cargo/{id}/offers` — отправить оффер.
      - `/v1/driver/offers/{id}/accept` — принять входящий оффер диспетчера (`proposed_by=DISPATCHER`).
      - `/v1/driver/offers/{id}/reject` — отклонить входящий оффер диспетчера **или** отозвать **свой исходящий** (`proposed_by=DRIVER`, PENDING). Отмена рейса: `POST /v1/driver/trips/{trip_id}/cancel`. Текущий рейс: `GET /v1/driver/trips/me`.
      Для `/offers/all` сервер возвращает `counts.incoming/outgoing`.
  - name: Drivers / Driver invitations
    description: |
      **Приглашения для водителя: получить список, принять или отказать.**
      **Поток:** 1) GET /v1/driver/driver-invitations — список приглашений (token, type, company_id/dispatcher_id, expires_at). 2) Принять: POST /v1/driver/driver-invitations/accept (body: token). 3) Отказать: POST /v1/driver/driver-invitations/decline (body: token). X-User-Token (driver). Телефон водителя должен совпадать с приглашением. От компании → driver.company_id; от фриланс-диспетчера → driver.freelancer_id.
  - name: "Drivers / My dispatchers"
    description: |
      **Мои диспетчеры: просмотр и управление.**
      **Кто вызывает:** Водитель (X-User-Token).
      - GET /v1/driver/dispatchers — список диспетчеров, с которыми связан водитель: фриланс-диспетчер (type=freelance, если водитель принял приглашение) и диспетчеры компании (type=company, company_role), если водитель в компании.
      - DELETE /v1/driver/dispatchers/:dispatcherId — отвязаться от фриланс-диспетчера (только если driver.freelancer_id = dispatcherId).
      - GET /v1/driver/dispatchers/catalog — каталог всех фриланс-диспетчеров с пагинацией и фильтрами (password не возвращается).
      - GET /v1/driver/dispatchers/hint — быстрый hint по номеру (prefix) для автокомплита (password не возвращается).
      Ответы на 5 языках (X-Language: en, ru, uz, tr, zh).
  - name: "Drivers / Invite dispatcher"
    description: |
      **Водитель приглашает диспетчера.** Водитель отправляет приглашение по номеру телефона диспетчера. GET /v1/driver/dispatcher-invitations — список отправленных приглашений. POST /v1/driver/dispatcher-invitations (body: phone) — создать приглашение. DELETE /v1/driver/dispatcher-invitations/:token — отменить. Диспетчер видит приглашения в GET /v1/dispatchers/invitations-from-drivers и принимает или отказывает.
  - name: "Legacy / Deprecated"
    description: "Устаревшие эндпоинты. Не используйте в новых интеграциях."
  - name: Admin / Auth
    description: |
      **Руководство: Авторизация админа (оператор)**

      **Роль:** Админ из таблицы admins (логин/пароль). Используется для доступа к операциям, доступным только админу (например создание компаний).

      **Безопасность:** Для входа (login) сервер проверяет только X-Device-Type, X-Language, X-Client-Token. Все остальные запросы Admin (Companies и т.д.) требуют **обязательно** и X-Client-Token, и X-User-Token (JWT с role=admin); сервер отклоняет запрос при отсутствии или неверном токене.

      **Поток:** POST /v1/admin/auth/login/password — передать login и password. В ответе — tokens (access_token, refresh_token) и объект admin. Далее для запросов под /v1/admin/companies и др. передавать X-User-Token = access_token (и X-Client-Token).
  - name: Admin / Companies
    description: |
      **Руководство: Управление компаниями (только админ)**

      **Безопасность:** Все методы этого раздела доступны **только админам**. Сервер проверяет оба токена: **X-Client-Token** (обязателен для всех /v1) и **X-User-Token** (JWT после /v1/admin/auth/login/password с role=admin). При отсутствии или неверном X-User-Token или при JWT с другой ролью возвращается 401.

      **Поток (два шага):** 1) POST /v1/admin/companies — только создание компании (name обязательно, company_type, inn, address, phone, email, website, license_number, status, лимиты). Владелец не указывается. 2) GET /v1/admin/company-users/owners/search?q=... — поиск владельцев (только role=OWNER) по телефону, имени или фамилии; сортировка по релевантности. 3) PATCH /v1/admin/companies/:id/owner — привязать владельца (owner_id = UUID из company_users с **role=OWNER**). После назначения: у компании — owner_id и status=active, у пользователя в company_users — company_id (двусторонняя связь).
      **Dev режим:** если на сервере env `COMPANIES_MODERATION_ENABLED=false`, то `POST /v1/admin/companies` создаёт компанию сразу со статусом `active` (без `pending` и без обязательного dev-шага “проставить owner”).
  - name: "Admin / Cargo moderation"
    description: |
      **Модерация грузов.** Фрилансер создаёт груз → PENDING_MODERATION. Админ: GET /v1/admin/cargo/moderation — список; POST .../accept — принять (→ SEARCHING_ALL или SEARCHING_COMPANY); POST .../reject — отклонить (reason обязателен, → CANCELLED, причина сохраняется). Ответы на 5 языках.
      **Dev режим:** если на сервере env `CARGO_MODERATION_ENABLED=false`, то `POST /api/cargo` создаёт груз сразу в SEARCHING_ALL, и этот раздел модерации в разработке не требуется.
  - name: Reference
    description: |
      **Руководство: Справочники (общие)**

      GET /v1/driver/transport-options — типы машины и прицепа для водителя. Остальные справочники — по категориям ниже (Reference / Drivers, Cargo, Company, Admin, Dispatchers).
  - name: "Reference / Drivers"
    description: |
      **Справочник для раздела Drivers (водители).** Все допустимые значения статусов и типов — чтобы фронт и мобилка не спрашивали «какие статусы есть».

      **GET /v1/reference/drivers** возвращает (все value в верхнем регистре): registration_step (NAME-OFERTA, GEO-PUSH, TRANSPORT-TYPE, COMPLETED), registration_status (START, BASIC, FULL), driver_type (COMPANY, FREELANCER, DRIVER), work_status (AVAILABLE, LOADED, BUSY), power_plate_types, trailer_plate_types_by_power (TRUCK/TRACTOR → списки прицепов).
  - name: "Reference / Cargo"
    description: |
      **Справочник для раздела Cargo (грузы).** Все статусы груза, точки маршрута, офферы, типы создателя, типы ТС.

      **GET /v1/reference/cargo** — полный справочник для грузов (все value в UPPERCASE). cargo_status (с description), route_point_type (LOAD, UNLOAD, CUSTOMS, TRANSIT), truck_type (TENT, REFRIGERATOR...), shipment_type (FTL, LTL…), currency (USD, UZS…), prepayment_type (BANK_TRANSFER…), remaining_type (ON_DELIVERY…), loading_type (TOP, SIDE…), offer_status (PENDING/ACCEPTED/REJECTED), created_by_type (ADMIN/DISPATCHER/COMPANY), trip_status (IN_PROGRESS, IN_TRANSIT, DELIVERED, COMPLETED, CANCELLED), packaging_type (BAG, PALLETS, BULK, BOXES, HEAP). Все переданные в API значения валидируются по этим справочникам.
  - name: "Reference / Company"
    description: |
      **Справочник для раздела Company.** Типы компании, статусы компании, роли (с id и описанием) для приглашений и назначений.

      **GET /v1/reference/company** возвращает: company_type (только CARGO_OWNER, CARRIER, EXPEDITOR), company_status (ACTIVE, INACTIVE, BLOCKED, PENDING), company_user_roles (OWNER, CEO, TOP_MANAGER, TOP_DISPATCHER, DISPATCHER, MANAGER), roles — массив {id, name, description} из БД. Все value в верхнем регистре.
  - name: "Reference / Admin"
    description: |
      **Справочник для раздела Admin.** Статусы и типы админа.

      **GET /v1/reference/admin** возвращает (все value в верхнем регистре): admin_status (ACTIVE, INACTIVE, BLOCKED), admin_type (CREATOR, OPERATOR).
  - name: "Reference / Dispatchers"
    description: |
      **Справочник для раздела Dispatchers.** Статусы диспетчера.

      **GET /v1/reference/dispatchers** возвращает (все value в верхнем регистре): work_status (AVAILABLE, BUSY, OFFLINE); **manager_roles** и дубликат **roles** — допустимые значения поля `role` (CARGO_MANAGER, DRIVER_MANAGER).

      **GET /v1/reference/cities** — справочник всех городов мира (tidwall/cities + UZ/AE/TM/KG/TJ); in-memory, быстрый API; коды TAS, SAM, DXB и т.д.; query country_code — фильтр по стране.
  - name: Chat
    description: |
      **Универсальный чат (driver ↔ dispatcher и др.)**
      **Кто вызывает:** Водитель, диспетчер или админ (JWT в X-User-Token). Для тестов в Swagger можно передать **X-User-ID** (UUID пользователя) вместо JWT.
      **Поток (как в Telegram):** поиск контакта по телефону — **GET /v1/chat/user-finder** (алиасы **GET /v1/driver/user-finder**, **GET /v1/dispatchers/user-finder** с тем же JWT). Аватар собеседника — **GET /v1/chat/users/{id}/photo**. Список диалогов — **GET /v1/chat/conversations** (peer_name, peer_photo_url, последнее сообщение, unread_count, peer_read_my_last). Открытие чата / прочитано: **POST /v1/chat/conversations/{id}/read** или **GET** сообщений с `mark_read=1`. Далее: POST /v1/chat/conversations (peer_id) → GET/POST /v1/chat/conversations/:id/messages. PATCH/DELETE /v1/chat/messages/:id. Presence: GET /v1/chat/presence/:user_id. WebSocket: GET /v1/chat/ws?token=JWT.
  - name: Calls (Voice)
    description: |
      **Голосовые звонки (как Telegram по архитектуре):** медиа (аудио) идёт по **WebRTC**, а этот раздел отвечает за **создание/статусы звонка** и **signaling** через WebSocket чата.

      **Кто вызывает:** любой пользователь, у кого есть доступ к чату (driver/dispatcher/admin). Требуется **X-User-Token** (или X-User-ID для Swagger).

      **Signaling через WebSocket `/v1/chat/ws`:**
      - Клиент отправляет события `webrtc.offer`, `webrtc.answer`, `webrtc.ice` (и при желании `call.end`) в формате:
        `{ "type": "webrtc.offer", "data": { "call_id": "<uuid>", "payload": { ... } } }`
      - Сервер проверяет, что отправитель — участник `call_id`, и ретранслирует peer'у:
        `{ "type": "webrtc.offer", "data": { "call_id": "<uuid>", "from_id": "<uuid>", "payload": { ... } } }`

      **Качество на слабом интернете:** обеспечивается на клиенте настройками WebRTC (Opus, bitrate/ptime, jitter buffer) + инфраструктурой **TURN** (рекомендуется обязательно для прод).

      **Ограничения (server-side):**
      - **Busy**: сервер не даст создать новый звонок, если у caller или callee уже есть звонок в статусе RINGING/ACTIVE.
      - **Rate limit** на `POST /v1/calls` (по user_id): управляется env `CALLS_CREATE_LIMIT` и `CALLS_CREATE_WINDOW_SECONDS`.
      - **Timeout**: звонок в `RINGING` автоматически перейдёт в `MISSED` через `CALLS_RINGING_TIMEOUT_SECONDS`.
  - name: Calls (Voice) / Test Lab
    description: |
      **Каталог для тестирования voice call c 2 устройств.**

      Быстрые инструменты:
      - Веб-стенд: `/calls-test` (REST + WebSocket сценарии в одном месте)
      - WebSocket консоль: `/ws-test`
      - Swagger: `/docs?group=chat`

      Рекомендуемый порядок:
      1) Подключить WS на обоих устройствах.
      2) Caller создаёт звонок `POST /v1/calls`.
      3) Callee принимает `POST /v1/calls/{id}/accept`.
      4) Обмен `webrtc.offer/answer/ice`.
      5) Завершение `POST /v1/calls/{id}/end`.
  - name: Company Users
    description: |
      **Один auth API для пользователей компаний.** Все владельцы проходят верификацию номера телефона через OTP.
      **Поток:** 1) POST /v1/company-users/auth/phone (phone) → OTP отправлен. 2) POST /v1/company-users/auth/otp/verify (phone, otp) → при существующем пользователе status=login и tokens; при новом — status=register и session_id. 3) POST /v1/company-users/registration/complete (session_id, first_name, last_name опц., password) — создать пользователя; телефон из сессии, роль автоматически owner. В ответе — tokens и user (company_id, role). Таблица company_users (без email), поля company_id и role.
  - name: Company
    description: |
      **Компании по ТЗ.** Создание компаний (пользователь становится Owner), приглашения, роли, переключение компании. Вход/регистрация — через Company Users (OTP).
      **Заголовки:** X-Device-Type, X-Language, X-Client-Token. Для защищённых методов — X-User-Token (JWT после /v1/company-users/auth/otp/verify или /v1/company-users/registration/complete).

components:
  securitySchemes:
    DeviceTypeHeader:
      type: apiKey
      in: header
      name: X-Device-Type
      description: 'Обязателен для всех запросов. Допустимые значения: web, ios, android. Один раз выбранное значение действует для всех разделов (Drivers, Dispatchers, Admin, Cargo, Chat, Company).'
    LanguageHeader:
      type: apiKey
      in: header
      name: X-Language
      description: 'Обязателен для всех запросов. Допустимые значения: ru, uz, en, tr, zh. Один раз выбранное значение действует для всех разделов (любой язык в любом разделе).'
    ClientTokenHeader:
      type: apiKey
      in: header
      name: X-Client-Token
      description: Обязателен для всех API-запросов (включая Admin). Проверяется сервером на каждом запросе /v1/*.
    UserTokenHeader:
      type: apiKey
      in: header
      name: X-User-Token
      description: JWT access token. Для разделов Admin — обязательно JWT с role=admin (после /v1/admin/auth/login/password); сервер отклоняет запрос при другой роли или неверном токене.
    UserIDHeader:
      type: apiKey
      in: header
      name: X-User-ID
      description: 'Для теста чата в Swagger — UUID пользователя (водитель/диспетчер). Подставляется вместо JWT.'
  schemas:
    Envelope:
      type: object
      properties:
        status: { type: string, enum: ["success","error"] }
        code: { type: integer, example: 200 }
        description: { type: string, example: "ok" }
        data: { nullable: true }
      required: [status, code, description, data]
    ChatMessage:
      type: object
      description: |
        Сообщение чата. Поддерживаются типы:
        - TEXT: текст в поле body
        - PHOTO/VOICE/VIDEO/VIDEO_NOTE: body = опциональная подпись, payload = объект с attachment_id/url и метаданными
        - LOCATION: body = опциональная подпись, payload = { lat, lng, address?, place_id? }
      properties:
        id: { type: string, format: uuid }
        conversation_id: { type: string, format: uuid }
        sender_id: { type: string, format: uuid }
        type: { type: string, enum: [TEXT, PHOTO, VOICE, VIDEO, VIDEO_NOTE, LOCATION] }
        body: { type: string, nullable: true, description: "Текст/подпись (опционально)" }
        payload:
          type: object
          nullable: true
          description: "Type-specific payload (см. ChatMediaPayload/ChatLocationPayload)"
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }
      required: [id, conversation_id, sender_id, type, created_at, updated_at]
    ChatMediaPayload:
      type: object
      description: "payload для PHOTO/VOICE/VIDEO/VIDEO_NOTE"
      properties:
        attachment_id: { type: string, format: uuid }
        url: { type: string, example: "/v1/chat/files/aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee" }
        thumb_url: { type: string, nullable: true, description: "Превью (если есть)" }
        mime: { type: string, example: "video/mp4" }
        size_bytes: { type: integer, format: int64 }
        duration_ms: { type: integer, nullable: true, description: "Длительность (voice/video), мс" }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
      required: [attachment_id, url, mime, size_bytes]
    ChatLocationPayload:
      type: object
      description: "payload для LOCATION"
      properties:
        lat: { type: number, format: double, example: 41.311081 }
        lng: { type: number, format: double, example: 69.240562 }
        address: { type: string, nullable: true }
        place_id: { type: string, nullable: true }
      required: [lat, lng]
    ChatPresence:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        online: { type: boolean }
        last_seen: { type: integer, nullable: true, description: "Unix seconds" }
        typing: { type: boolean, nullable: true }
      required: [user_id, online]
    Call:
      type: object
      description: |
        Сессия голосового звонка (1:1). Медиа не проходит через API — только управление состоянием + signaling по WebSocket.
      properties:
        id: { type: string, format: uuid }
        conversation_id: { type: string, format: uuid, nullable: true }
        caller_id: { type: string, format: uuid }
        callee_id: { type: string, format: uuid }
        status:
          type: string
          enum: [RINGING, ACTIVE, ENDED, DECLINED, MISSED, CANCELLED, FAILED]
        created_at: { type: string, format: date-time }
        started_at: { type: string, format: date-time, nullable: true }
        ended_at: { type: string, format: date-time, nullable: true }
        ended_by: { type: string, format: uuid, nullable: true }
        ended_reason: { type: string, nullable: true }
        client_request_id: { type: string, nullable: true, description: "Идемпотентность (уникально на caller_id)" }
      required: [id, caller_id, callee_id, status, created_at]
    CallCreateRequest:
      type: object
      properties:
        peer_id: { type: string, format: uuid, description: "Кому звоним" }
        conversation_id: { type: string, format: uuid, nullable: true, description: "Опционально: существующий chat conversation_id (если уже есть)" }
        client_request_id: { type: string, nullable: true, description: "Идемпотентность: любое короткое значение от клиента" }
      required: [peer_id]
    CallDeclineRequest:
      type: object
      properties:
        reason: { type: string, nullable: true, example: "busy" }
    CallEndRequest:
      type: object
      properties:
        reason: { type: string, nullable: true, example: "hangup" }
    Tokens:
      type: object
      description: |
        Во всех auth API: 1) время жизни (expires_in, refresh_expires_in — секунды);
        2) expires_at и refresh_expires_at — Unix timestamp в миллисекундах (ms). Расчёт везде по времени Ташкента (Asia/Tashkent). Для JS: new Date(expires_at).
      properties:
        access_token: { type: string, example: "eyJhbGciOi..." }
        refresh_token: { type: string, example: "eyJhbGciOi..." }
        expires_in: { type: integer, example: 900, description: "Время жизни access токена (секунды)" }
        expires_at: { type: integer, example: 1741600800000, description: "Unix ms — когда истекает access токен (когда обновить); JS: new Date(expires_at)" }
        refresh_expires_in: { type: integer, example: 604800, description: "Время жизни refresh токена (секунды)" }
        refresh_expires_at: { type: integer, example: 1742205600000, description: "Unix ms — когда истекает refresh токен; JS: new Date(refresh_expires_at)" }
      required: [access_token, refresh_token, expires_in, expires_at]
    DisplayName:
      type: string
      minLength: 2
      maxLength: 64
      pattern: '^[A-Za-z_]{2,64}$'
      description: |
        Отображаемое имя: только латиница (A–Z, a–z) и символ подчёркивания `_`, длина 2–64.
        Должно быть уникально среди всех водителей и фриланс-диспетчеров (без учёта регистра).
        Ключи ошибок в теле ответа: `invalid_display_name` (HTTP 400), `display_name_taken` (HTTP 409).
      example: "John_Doe"
    Driver:
      type: object
      properties:
        id: { type: string, format: uuid }
        phone: { type: string, example: "+998331108810" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        last_online_at: { type: string, format: date-time, nullable: true }
        latitude: { type: number, format: double, nullable: true, example: 41.311081 }
        longitude: { type: number, format: double, nullable: true, example: 69.240562 }
        push_token: { type: string, nullable: true, example: "optional-device-token" }
        registration_step:
          type: string
          nullable: true
          enum: ["name-oferta", "geo-push", "transport-type", "completed"]
          description: "После PATCH /v1/driver/kyc сервер выставляет completed."
        registration_status:
          type: string
          nullable: true
          enum: ["start", "basic", "full"]
        name: { type: string, nullable: true, example: "Ali Valiyev" }
        driver_type:
          type: string
          nullable: true
          enum: ["company", "freelancer", "driver"]
        rating: { type: number, format: double, nullable: true }
        work_status:
          type: string
          nullable: true
          enum: ["available","loaded","busy"]
          example: "available"
        freelancer_id: { type: string, format: uuid, nullable: true }
        company_id: { type: string, format: uuid, nullable: true }
        account_status: { type: string, nullable: true }
        driver_passport_series: { type: string, nullable: true, example: "AB" }
        driver_passport_number: { type: string, nullable: true, example: "1234567" }
        driver_pinfl: { type: string, nullable: true, example: "12345678901234" }
        driver_scan_status: { type: boolean, nullable: true, example: true }
        power_plate_type: { type: string, nullable: true, example: "TRUCK", description: "TRUCK или TRACTOR (см. GET /v1/driver/transport-options)" }
        power_plate_number: { type: string, nullable: true, example: "01A123BC" }
        power_tech_series: { type: string, nullable: true }
        power_tech_number: { type: string, nullable: true }
        power_owner_name: { type: string, nullable: true, example: "Ali Valiyev" }
        power_scan_status: { type: boolean, nullable: true }
        trailer_plate_type: { type: string, nullable: true, example: "TENTED", description: "Должен соответствовать power_plate_type (см. transport-options)" }
        trailer_plate_number: { type: string, nullable: true }
        trailer_tech_series: { type: string, nullable: true }
        trailer_tech_number: { type: string, nullable: true }
        trailer_owner_name: { type: string, nullable: true, example: "Ali Valiyev" }
        trailer_scan_status: { type: boolean, nullable: true }
        driver_owner: { type: boolean, nullable: true, example: true }
        kyc_status:
          type: string
          nullable: true
          enum: ["pending", "approved"]
          description: "pending — KYC не полный или не все scan_status=true; approved — полный KYC (is_full)."
          example: "pending"
        has_photo: { type: boolean, description: "true если загружено фото в БД (получить через GET /v1/driver/profile/photo). Фото необязательно при регистрации; можно добавить/обновить/удалить когда угодно." }
      required: [id, phone, created_at, updated_at]
    Dispatcher:
      type: object
      description: "Пароль никогда не возвращается в JSON (поле отсутствует)."
      properties:
        id: { type: string, format: uuid }
        name: { type: string, nullable: true, example: "Dispetcher Name" }
        phone: { type: string, example: "+998331108810" }
        passport_series: { type: string, nullable: true, example: "AB" }
        passport_number: { type: string, nullable: true, example: "1234567" }
        pinfl: { type: string, nullable: true, example: "12345678901234" }
        cargo_id: { type: string, format: uuid, nullable: true }
        driver_id: { type: string, format: uuid, nullable: true }
        rating: { type: number, format: double, nullable: true }
        work_status: { type: string, nullable: true, example: "available" }
        status: { type: string, nullable: true, example: "active" }
        role:
          allOf:
            - $ref: "#/components/schemas/FreelanceDispatcherRole"
          nullable: true
          description: "Роль менеджера (груз / водители). У старых записей до ввода поля может быть null."
        photo: { type: string, nullable: true, description: "Ссылка/путь (устаревшее); для загруженного фото см. has_photo" }
        has_photo: { type: boolean, description: "true если загружено фото в БД (получить через GET /v1/dispatchers/profile/photo)" }
        last_online_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }
      required: [id, phone, created_at, updated_at]
    PowerPlateOption:
      type: object
      properties:
        code: { type: string, example: "TRUCK" }
        label: { type: string, example: "Грузовик + прицеп" }
      required: [code, label]
    TrailerPlateOption:
      type: object
      properties:
        code: { type: string, example: "FLATBED" }
        label: { type: string, example: "Бортовой прицеп" }
      required: [code, label]
    TransportOptionsResponse:
      type: object
      description: Списки power_plate_type и trailer_plate_type по типу базовой машины.
      properties:
        power_plate_types:
          type: array
          items:
            $ref: "#/components/schemas/PowerPlateOption"
        trailer_plate_types_by_power:
          type: object
          description: |
            Ключи — TRUCK, TRACTOR.
            TRUCK: FLATBED, TENTED, BOX, REEFER, TANKER, TIPPER, CAR_CARRIER.
            TRACTOR: FLATBED, TENTED, BOX, REEFER, TANKER, LOWBED, CONTAINER.
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/TrailerPlateOption"
      required: [power_plate_types, trailer_plate_types_by_power]
    ItemWithLabel:
      type: object
      description: Элемент справочника (value — код для API, label — подпись для UI).
      properties:
        value: { type: string }
        label: { type: string }
    ItemWithLabelAndDescription:
      type: object
      description: Элемент справочника с пояснением (используется для cargo_status — описание, что означает каждый статус).
      properties:
        value: { type: string, description: "Код для API (например PENDING_MODERATION, SEARCHING_ALL)" }
        label: { type: string, description: "Краткая подпись для UI" }
        description: { type: string, description: "Подробное описание значения" }
    RoleRef:
      type: object
      description: Роль в компании (из app_roles).
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
    ReferenceDriversResponse:
      type: object
      properties:
        registration_step: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        registration_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        driver_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        work_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        power_plate_types: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        trailer_plate_types_by_power: { type: object, additionalProperties: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } } }
    ReferenceCargoResponse:
      type: object
      description: |
        Справочник для раздела Cargo. Все значения из справочника обязательны при валидации (POST/PUT /api/cargo).
        cargo_status — первый PENDING_MODERATION; route_point_type (LOAD, UNLOAD, CUSTOMS, TRANSIT); truck_type (TENT, REFRIGERATOR…); shipment_type (FTL, LTL…);
        currency — для total_currency, prepayment_currency, remaining_currency; prepayment_type, remaining_type; loading_type — способы погрузки.
      properties:
        cargo_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabelAndDescription" } }
        route_point_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        offer_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        created_by_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        truck_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        trip_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        shipment_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "Тип отправки: FTL, LTL, PACKAGE, OTHER" }
        currency: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "Валюты для total_currency, prepayment_currency, remaining_currency: USD, UZS, EUR, RUB, KZT, AED, OTHER" }
        prepayment_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "Способ предоплаты: BANK_TRANSFER, CASH, CARD, INVOICE, OTHER" }
        remaining_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "Условия оплаты остатка: ON_DELIVERY, AFTER_INVOICE, CASH, DEFERRED, OTHER" }
        loading_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "Способы погрузки: TOP, SIDE, REAR, CRANE, FORKLIFT, OTHER" }
        packaging_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "Тип упаковки (UI dropdown): BAG, PALLETS, BULK, BOXES, HEAP" }
    ReferenceCompanyResponse:
      type: object
      properties:
        company_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "Только SHIPPER, CARRIER, BROKER (верхний регистр)" }
        company_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "ACTIVE, INACTIVE, BLOCKED, PENDING" }
        company_user_roles: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "Роли пользователей компании: OWNER, CEO, TOP_MANAGER, TOP_DISPATCHER, DISPATCHER, MANAGER" }
        roles: { type: array, items: { $ref: "#/components/schemas/RoleRef" }, description: "Роли из БД (id, name) для приглашений" }
    ReferenceAdminResponse:
      type: object
      properties:
        admin_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        admin_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
    ReferenceDispatchersResponse:
      type: object
      properties:
        work_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        manager_roles:
          type: array
          items: { $ref: "#/components/schemas/ItemWithLabel" }
          description: "CARGO_MANAGER, DRIVER_MANAGER — подписи по X-Language"
        roles:
          type: array
          items: { $ref: "#/components/schemas/ItemWithLabel" }
          description: "Дубликат manager_roles — те же значения для поля role в API"
    FreelanceDispatcherRole:
      type: string
      enum: [CARGO_MANAGER, DRIVER_MANAGER]
      description: "Роль фриланс-диспетчера (регистрация и поле role в объекте dispatcher). Только верхний регистр."
      example: CARGO_MANAGER
    Cargo:
      type: object
      description: |
        **Груз (запись в таблице cargo).** Возвращается в списке грузов (GET /api/cargo) и в карточке груза (GET /api/cargo/:id).

        **Основные поля:** id — уникальный идентификатор; weight — вес в тоннах; volume — объём в м³; truck_type — тип кузова (TENT, REFRIGERATOR, FLATBED, TANKER, OTHER); status — жизненный цикл груза: PENDING_MODERATION → SEARCHING_ALL / SEARCHING_COMPANY (пока идут рейсы) → COMPLETED; также CANCELLED.

        **Контакт:** contact_name, contact_phone — для связи с грузоотправителем/получателем.

        **Кто создал:** created_by_type (ADMIN / DISPATCHER / COMPANY) и created_by_id заполняются автоматически при создании по JWT или company_id.
      properties:
        id: { type: string, format: uuid, example: "ebc30874-161a-4c29-b284-139e4e7d9120", description: "Уникальный идентификатор груза (UUID)" }
        name: { type: string, nullable: true, example: "Пшеница, Ташкент → Самарканд, тент 20т/82м³", description: "Короткое имя/название груза (что везём), отображается в списках" }
        weight: { type: number, example: 20, description: "Вес груза в тоннах (обязательно > 0)" }
        volume: { type: number, example: 82, description: "Объём груза в кубических метрах (м³)" }
        vehicles_amount: { type: integer, example: 1, description: "Количество машин (водителей), требуемых для этого груза" }
        vehicles_left: { type: integer, example: 1, description: "Сколько машин ещё не «вышли в путь» (уменьшается при переходе рейса в IN_TRANSIT). Старт = vehicles_amount. Груз остаётся SEARCHING_* пока не завершены все рейсы, затем COMPLETED." }
        packaging: { type: string, nullable: true, example: "Мешки по 50 кг на паллетах", description: "Упаковка груза" }
        packaging_amount: { type: integer, nullable: true, example: 120, description: "Количество упаковок (шт.)" }
        dimensions: { type: string, nullable: true, example: "13.6x2.45x2.7", description: "Габариты груза (ДхШхВ в метрах)" }
        photos: { type: array, items: { type: string }, nullable: true, example: ["https://cdn.example.com/cargo/photo1.jpg", "/api/cargo/photos/aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"], description: "Ссылки на фото: CDN URL и/или pending с POST /api/cargo/photos" }
        way_points: { type: array, nullable: true, items: { $ref: "#/components/schemas/WayPointInput" }, description: "Промежуточные точки маршрута (\"ехать через\") и таможня. Отдельно от основных route_points." }
        ready_enabled: { type: boolean, example: true, description: "Указана ли дата готовности груза к перевозке" }
        ready_at: { type: string, format: date-time, nullable: true, example: "2026-03-25T08:00:00Z", description: "Дата и время, когда груз будет готов к погрузке (обязательно при ready_enabled=true)" }
        comment: { type: string, nullable: true, example: "Погрузка сверху, склад сухой. Груз пшеница, мешки 50 кг.", description: "Комментарий к грузу/условиям (общий комментарий)" }
        truck_type: { type: string, example: "TENT", description: "Тип кузова: TENT, REFRIGERATOR, FLATBED, TANKER, OTHER" }
        power_plate_type: { type: string, example: "TRUCK", description: "Тип основной машины: TRUCK или TRACTOR (из GET /v1/driver/transport-options → power_plate_types)" }
        trailer_plate_type: { type: string, example: "TENTED", description: "Тип прицепа/полуприцепа (из GET /v1/driver/transport-options → trailer_plate_types_by_power[power_plate_type])" }
        temp_min: { type: number, nullable: true, example: null, description: "Минимальная температура (°C) для рефрижератора; допустимо только при truck_type=REFRIGERATOR" }
        temp_max: { type: number, nullable: true, example: null, description: "Максимальная температура (°C) для рефрижератора; допустимо только при truck_type=REFRIGERATOR" }
        adr_enabled: { type: boolean, example: false, description: "Является ли груз опасным (ADR); при true обязательно указать adr_class" }
        adr_class: { type: string, nullable: true, example: null, description: "Класс опасного груза (ADR); обязателен при adr_enabled=true" }
        loading_types: { type: array, items: { type: string }, example: ["TOP", "SIDE"], description: "Способы погрузки (например верхняя, боковая)" }
        unloading_types: { type: array, items: { type: string }, example: ["REAR", "SIDE"], description: "Типы выгрузки. Отдельно от loading_types." }
        is_two_drivers_required: { type: boolean, example: false, description: "Требуется ли 2 водителя для выполнения рейса" }
        shipment_type: { type: string, nullable: true, example: "FTL", description: "Тип отправки: FTL (полная загрузка), LTL (частичная) и т.д." }
        belts_count: { type: integer, nullable: true, example: 6, description: "Количество ремней крепления" }
        documents:
          type: object
          nullable: true
          description: "Требуемые документы: TIR, T1, CMR, Medbook, GLONASS, Seal, Permit (булевы флаги)"
          example: { "TIR": true, "T1": false, "CMR": true, "Medbook": false, "GLONASS": false, "Seal": true, "Permit": false }
        contact_name: { type: string, nullable: true, example: "Иван Петров", description: "Имя контактного лица" }
        contact_phone: { type: string, nullable: true, example: "+998901234567", description: "Телефон контактного лица" }
        status: { type: string, enum: [PENDING_MODERATION, SEARCHING_ALL, SEARCHING_COMPANY, COMPLETED, CANCELLED], example: "SEARCHING_ALL", description: "Статус груза (UPPERCASE). Поток: PENDING_MODERATION → SEARCHING_ALL|SEARCHING_COMPANY (остаётся до завершения всех рейсов) → COMPLETED; CANCELLED." }
        created_at: { type: string, format: date-time, example: "2026-03-23T15:51:33Z", description: "Дата и время создания записи" }
        updated_at: { type: string, format: date-time, example: "2026-03-23T15:51:33Z", description: "Дата и время последнего обновления" }
        created_by_type: { type: string, enum: [ADMIN, DISPATCHER, COMPANY], nullable: true, example: "DISPATCHER", description: "Кто создал груз: ADMIN, DISPATCHER или COMPANY (подставляется автоматически по JWT или company_id)" }
        created_by_id: { type: string, format: uuid, nullable: true, example: "774e18eb-e4ef-488a-ba3a-e01cb1b41192", description: "UUID создателя (админ, диспетчер или компания)" }
        company_id: { type: string, format: uuid, nullable: true, example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890", description: "UUID компании. Если передано — груз привязывается к компании." }
        cargo_type:
          type: object
          nullable: true
          description: "Объект типа груза (из таблицы cargo_types). null если при создании cargo_type_id не был указан."
          properties:
            id: { type: string, format: uuid, example: "d4e5f6a7-b8c9-0123-4567-890abcdef012", description: "UUID типа груза" }
            code: { type: string, example: "PSHENITSA", description: "Код типа груза (PSHENITSA, TSEMENT, TEKSTIL и т.д.)" }
            name_ru: { type: string, example: "Пшеница", description: "Название на русском" }
            name_uz: { type: string, example: "Пшеница", description: "Название на узбекском" }
            name_en: { type: string, example: "PSHENITSA", description: "Название на английском" }
            name_tr: { type: string, example: "PSHENITSA", description: "Название на турецком" }
            name_zh: { type: string, example: "PSHENITSA", description: "Название на китайском" }
        moderation_rejection_reason: { type: string, nullable: true, example: null, description: "Причина отклонения модерации (если груз отменён на модерации)" }
        is_liked:
          type: boolean
          description: |
            Для ответов **водителю** или **cargo manager (диспетчеру)** с JWT: **true**, если груз в избранном у текущего пользователя (`driver_cargo_favorites` / `freelance_dispatcher_cargo_favorites`, см. cargo-likes API), иначе **false**.
            Поле может отсутствовать, если запрос без подходящего JWT (или роль не driver/dispatcher).
          example: false
    RoutePoint:
      type: object
      description: |
        **Точка маршрута** (погрузка, выгрузка, таможня, транзит). В каждой точке указывается страна + город (коды из справочника), точный адрес и координаты.

        **Типы:** LOAD — погрузка; UNLOAD — выгрузка; CUSTOMS — таможня; TRANSIT — транзитная точка. В маршруте обязательно минимум одна погрузка (LOAD) и одна выгрузка (UNLOAD).

        **Страна и город:** country_code + city_code берутся из GET /v1/reference/cities (например country_code=UZ, city_code=TAS).
      properties:
        id: { type: string, format: uuid, example: "af8be3f7-a8a4-4485-96ad-b6a96f58d015", description: "Уникальный идентификатор точки маршрута" }
        cargo_id: { type: string, format: uuid, example: "ebc30874-161a-4c29-b284-139e4e7d9120", description: "UUID груза, к которому относится точка" }
        type: { type: string, enum: [LOAD, UNLOAD, CUSTOMS, TRANSIT], example: "LOAD", description: "Тип точки (UPPERCASE): LOAD, UNLOAD, CUSTOMS, TRANSIT" }
        country_code: { type: string, example: "UZ", description: "Код страны (ISO-like): UZ, AE, RU и т.д." }
        city_code: { type: string, example: "TAS", description: "Код города из справочника GET /v1/reference/cities (TAS, SAM, DXB и т.д.)" }
        region_code: { type: string, example: "", description: "Код региона/области (пустая строка если не задан)" }
        address: { type: string, example: "ул. Амира Темура 1, склад №5", description: "Полный адрес: улица, дом, склад, промзона" }
        orientir: { type: string, example: "Въезд со стороны метро Хамза, ворота А", description: "Ориентир для водителя: как найти место (въезд, КПП, рядом с чем)" }
        lat: { type: number, example: 41.311081, description: "Широта в градусах" }
        lng: { type: number, example: 69.240562, description: "Долгота в градусах" }
        place_id: { type: string, nullable: true, example: "maps-tas-warehouse-5", description: "Идентификатор места из карт" }
        date: { type: string, format: date-time, nullable: true, example: "2026-03-23T08:00:00Z", description: "Плановая дата/время по точке в UTC (RFC3339). null для старых грузов." }
        comment: { type: string, nullable: true, example: "Склад зерна, погрузка с 08:00 до 18:00", description: "Произвольный комментарий к точке" }
        point_order: { type: integer, example: 1, description: "Порядок точки в маршруте (1, 2, 3…)" }
        is_main_load: { type: boolean, example: true, description: "Является ли эта точка основной погрузкой" }
        is_main_unload: { type: boolean, example: false, description: "Является ли эта точка основной выгрузкой" }
    Payment:
      type: object
      description: |
        **Условия оплаты по грузу** (одна запись на груз). Указывается при создании/редактировании груза в блоке payment.

        **Сумма:** total_amount и total_currency — итоговая цена перевозки; если price_request=true, фиксированной суммы нет (запрос цены). is_negotiable — цена договорная.

        **Предоплата:** with_prepayment, prepayment_amount, prepayment_currency; остаток — remaining_amount, remaining_currency.
      properties:
        id: { type: string, format: uuid, example: "697fbbb1-1b34-41ff-9180-41f3698985e0", description: "UUID записи об оплате" }
        cargo_id: { type: string, format: uuid, example: "ebc30874-161a-4c29-b284-139e4e7d9120", description: "UUID груза" }
        is_negotiable: { type: boolean, example: false, description: "Цена договорная (обсуждается с перевозчиком)" }
        price_request: { type: boolean, example: false, description: "Запрос цены: true — без фиксированной суммы, перевозчик предлагает сам" }
        total_amount: { type: number, nullable: true, example: 1500, description: "Общая сумма оплаты за перевозку" }
        total_currency: { type: string, nullable: true, example: "USD", description: "Валюта суммы: USD, UZS и т.д." }
        with_prepayment: { type: boolean, example: true, description: "Есть ли предоплата" }
        prepayment_amount: { type: number, nullable: true, example: 500, description: "Сумма предоплаты" }
        prepayment_currency: { type: string, nullable: true, example: "USD", description: "Валюта предоплаты" }
        prepayment_type: { type: string, nullable: true, example: "BANK_TRANSFER", description: "Тип предоплаты (BANK_TRANSFER, CASH и т.д.)" }
        remaining_amount: { type: number, nullable: true, example: 1000, description: "Сумма остатка к оплате" }
        remaining_currency: { type: string, nullable: true, example: "USD", description: "Валюта остатка" }
        remaining_type: { type: string, nullable: true, example: "ON_DELIVERY", description: "Условия оплаты остатка (ON_DELIVERY, AFTER_UNLOAD и т.д.)" }
        payment_note: { type: string, nullable: true, maxLength: 500, example: "Оплата строго после выгрузки и проверки документов.", description: "Примечание к оплате (до 500 символов)" }
        payment_terms_note: { type: string, nullable: true, example: "При задержке оплаты более 3 дней начисляется пеня 0.1% в день.", description: "Особые условия оплаты" }
    Offer:
      type: object
      description: |
        **Оффер (согласование цены)** по грузу. Поле **proposed_by** задаёт, кто предложил цену в этом оффере:
        - **DRIVER** — водитель предложил цену; принять может только владелец груза (диспетчер, создавший груз): POST /api/offers/{id}/accept или POST /v1/dispatchers/offers/{id}/accept с JWT диспетчера.
        - **DISPATCHER** — диспетчер предложил цену водителю (carrier_id); принять может только этот водитель: POST /api/offers/{id}/accept или POST /v1/driver/offers/{id}/accept с JWT водителя.

        При **принятии** оффера сумма **payments.total_amount** груза обновляется до **price** оффера (согласованная цена).

        **Статусы:** PENDING — на рассмотрении; ACCEPTED — принят (создаётся рейс); REJECTED — отклонён. carrier_id — ID водителя из таблицы drivers.
      properties:
        id: { type: string, format: uuid, example: "f1a2b3c4-d5e6-7890-abcd-ef1234567890", description: "UUID оффера" }
        cargo_id: { type: string, format: uuid, example: "ebc30874-161a-4c29-b284-139e4e7d9120", description: "UUID груза" }
        carrier_id: { type: string, format: uuid, example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890", description: "ID перевозчика (водителя из drivers)" }
        proposed_by: { type: string, enum: [DRIVER, DISPATCHER], example: "DRIVER", description: "Кто задал цену в оффере" }
        price: { type: number, example: 1500, description: "Предложенная цена" }
        currency: { type: string, example: "USD", description: "Валюта (USD, UZS и т.д.)" }
        comment: { type: string, nullable: true, example: "Готов выехать завтра, своя тентовая фура", description: "Комментарий перевозчика" }
        status: { type: string, enum: [PENDING, ACCEPTED, REJECTED], example: "PENDING", description: "Статус оффера: PENDING, ACCEPTED, REJECTED" }
        created_at: { type: string, format: date-time, example: "2026-03-23T16:00:00Z", description: "Дата и время создания оффера" }
    CargoListResponse:
      type: object
      description: "Ответ списка грузов (legacy: GET /api/cargo; рекомендовано: GET /v1/dispatchers/cargo/mine или GET /v1/dispatchers/cargo/all) — список грузов с полными данными (route_points, payment) и общее количество для пагинации."
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/CargoDetailResponse" }, description: "Массив грузов на текущей странице (каждый элемент = полный объект с route_points и payment)" }
        total: { type: integer, description: "Общее число записей (без лимита страницы)" }
      required: [items, total]
    CargoCreateRequest:
      type: object
      description: |
        **Тело запроса POST /api/cargo** — создание груза с точками маршрута и условиями оплаты.

        **Обязательные поля:** weight (вес в тоннах, > 0), volume (объём в м³, > 0), **vehicles_amount** (количество машин, 1..100), **power_plate_type** и **trailer_plate_type** (из справочника GET /v1/driver/transport-options), route_points — массив точек маршрута. В route_points обязательно минимум одна точка с type=LOAD (погрузка) и одна с type=UNLOAD (выгрузка). У каждой точки обязательны: type (LOAD/UNLOAD/CUSTOMS/TRANSIT), **country_code**, city_code, address, lat, lng, point_order, **date** (RFC3339 UTC, например `2026-03-23T10:45:30Z`).

        **Справочники:** города — GET /v1/reference/cities (коды TAS, SAM, DXB…); транспорт — GET /v1/driver/transport-options (power_plate_type, trailer_plate_type).

        **Создатель:** при заголовке X-User-Token (JWT админа или диспетчера) создатель подставляется автоматически; при отсутствии JWT можно передать company_id — тогда создателем будет компания.

        **Статус при создании:** всегда устанавливается автоматически в `PENDING_MODERATION` (модерация). Админ принимает груз и переводит в `SEARCHING_ALL` или `SEARCHING_COMPANY` (через параметр search_visibility).
      properties:
        name:
          type: string
          nullable: true
          description: "Короткое название груза (например: Пшеница, Бытовая техника)"
        weight: { type: number, minimum: 0, exclusiveMinimum: true, description: "Вес груза в тоннах; обязательно, число больше 0" }
        volume: { type: number, minimum: 0, exclusiveMinimum: true, description: "Объём груза в кубических метрах (м³); обязательно, число больше 0" }
        vehicles_amount: { type: integer, minimum: 1, maximum: 100, description: "Количество машин (водителей), требуемых для этого груза; обязательное поле, 1..100", example: 1 }
        packaging:
          type: string
          nullable: true
          description: "Упаковка груза (мешки, паллеты и т.д.)"
        packaging_amount:
          type: integer
          nullable: true
          description: "Количество упаковок (шт.)"
        dimensions:
          type: string
          nullable: true
          description: "Габариты груза (например, ДxШxВ в метрах)"
        photos:
          type: array
          items: { type: string }
          nullable: true
          description: "До 5 элементов: внешние URL ИЛИ ссылки/UUID с POST /api/cargo/photos (`/api/cargo/photos/{uuid}` или сам uuid). После создания груза pending-фото переносятся в cargo_photos; в ответе — URL `/api/cargo/{cargo_id}/photos/{id}`. Один pending UUID не повторять."
        way_points:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/WayPointInput" }
          description: "Промежуточные точки маршрута (ехать через) и таможня. Не заменяют route_points."
        ready_enabled: { type: boolean, default: false, description: "Указана ли дата готовности груза к погрузке" }
        ready_at: { type: string, format: date-time, nullable: true, description: "Дата и время готовности; обязательна, если ready_enabled=true" }
        comment: { type: string, nullable: true, description: "Комментарий к грузу/условиям (общий комментарий)" }
        power_plate_type: { type: string, description: "Тип основной машины: TRUCK или TRACTOR (из GET /v1/driver/transport-options → power_plate_types)", example: "TRUCK" }
        trailer_plate_type: { type: string, description: "Тип прицепа/полуприцепа (из GET /v1/driver/transport-options → trailer_plate_types_by_power[power_plate_type])", example: "TENTED" }
        temp_min: { type: number, nullable: true, description: "Минимальная температура (°C); допустимо только при truck_type=refrigerator" }
        temp_max: { type: number, nullable: true, description: "Максимальная температура (°C); допустимо только при truck_type=refrigerator" }
        adr_enabled: { type: boolean, default: false, description: "Опасный груз (ADR); при true обязательно указать adr_class" }
        adr_class: { type: string, nullable: true, description: "Класс опасного груза; обязателен при adr_enabled=true" }
        loading_types: { type: array, items: { type: string }, nullable: true, description: "Способы погрузки (массив строк)" }
        unloading_types: { type: array, items: { type: string }, nullable: true, description: "Типы выгрузки (массив строк), отдельно от loading_types" }
        is_two_drivers_required: { type: boolean, default: false, description: "Требуется ли 2 водителя" }
        shipment_type: { type: string, nullable: true, example: FTL, description: "Тип отправки: FTL (полная загрузка), LTL и т.д." }
        belts_count: { type: integer, nullable: true, description: "Количество ремней крепления" }
        documents: { type: object, nullable: true, description: "Требуемые документы: объект с полями TIR, T1, CMR, Medbook, GLONASS, Seal, Permit (boolean)" }
        contact_name: { type: string, nullable: true, description: "Имя контактного лица для связи" }
        contact_phone: { type: string, nullable: true, description: "Телефон контакта, например +998901234567" }
        cargo_type_id:
          type: string
          format: uuid
          nullable: true
          description: "UUID типа груза. Получите реальный UUID через GET /v1/reference/cargo-types/hint?q=пшеница → items[0].id"
        company_id: { type: string, format: uuid, nullable: true, description: "UUID компании, от имени которой создаётся груз (опционально)" }
        route_points:
          type: array
          minItems: 2
          items: { $ref: "#/components/schemas/RoutePointInput" }
          description: "Точки маршрута: минимум две точки и минимум одна погрузка (LOAD) и одна выгрузка (UNLOAD); порядок задаётся point_order"
        payment: { $ref: "#/components/schemas/PaymentInput", nullable: true, description: "Условия оплаты (опционально); при указании либо total_amount, либо price_request=true" }
      required: [weight, volume, vehicles_amount, power_plate_type, trailer_plate_type, route_points]
    CargoUpdateRequest:
      type: object
      description: |
        **Тело PUT /api/cargo/:id** — частичное обновление груза. Все поля опциональны; передаются только те, что нужно изменить.
        Статус груза не передаётся в PUT — смена статуса через PATCH /api/cargo/:id/status.
      properties:
        name:
          type: string
          nullable: true
          description: "Короткое название груза (что везём)"
        weight: { type: number, minimum: 0, exclusiveMinimum: true, description: "Вес (т); > 0" }
        volume: { type: number, minimum: 0, exclusiveMinimum: true, description: "Объём (м³); > 0" }
        packaging: { type: string, nullable: true, description: "Упаковка груза" }
        packaging_amount: { type: integer, nullable: true, description: "Количество упаковок (шт.)" }
        dimensions: { type: string, nullable: true, description: "Габариты груза" }
        photos:
          type: array
          items: { type: string }
          nullable: true
          description: "Фото груза (массив ссылок/ID файлов)"
        way_points: { type: array, items: { $ref: "#/components/schemas/WayPointInput" }, nullable: true }
        ready_enabled: { type: boolean }
        ready_at: { type: string, format: date-time, nullable: true }
        comment: { type: string, nullable: true }
        truck_type: { type: string }
        temp_min: { type: number, nullable: true }
        temp_max: { type: number, nullable: true }
        adr_enabled: { type: boolean }
        adr_class: { type: string, nullable: true }
        loading_types: { type: array, items: { type: string } }
        unloading_types: { type: array, items: { type: string } }
        is_two_drivers_required: { type: boolean, nullable: true }
        shipment_type: { type: string, nullable: true }
        belts_count: { type: integer, nullable: true }
        documents: { type: object, nullable: true }
        contact_name: { type: string, nullable: true }
        contact_phone: { type: string, nullable: true }
        route_points: { type: array, items: { $ref: "#/components/schemas/RoutePointInput" } }
        payment: { $ref: "#/components/schemas/PaymentInput", nullable: true }
    RoutePointInput:
      type: object
      description: |
        **Одна точка маршрута** при создании или редактировании груза (POST /api/cargo, PUT /api/cargo/:id).

        **Обязательно:** type (LOAD/UNLOAD/CUSTOMS/TRANSIT), country_code + city_code (коды страны/города из GET /v1/reference/cities), address (улица, дом, склад), lat, lng (координаты), point_order (порядок 1, 2, 3…), **date** (RFC3339 в UTC, например `2026-03-23T10:45:30Z`).

        **Опционально:** orientir — подсказка для водителя, как найти место; place_id; comment; is_main_load / is_main_unload — отметить основную погрузку/выгрузку.
      properties:
        type: { type: string, enum: [LOAD, UNLOAD, CUSTOMS, TRANSIT], description: "Тип точки: LOAD — погрузка, UNLOAD — выгрузка, CUSTOMS — таможня, TRANSIT — транзит" }
        country_code: { type: string, description: "Код страны из справочника GET /v1/reference/cities (например UZ, AE, RU)", example: "UZ" }
        city_code: { type: string, description: "Код города из справочника GET /v1/reference/cities (TAS — Ташкент, SAM — Самарканд, DXB — Дубай и т.д.)", example: "TAS" }
        region_code: { type: string, nullable: true, description: "Код региона/области (опционально)" }
        address: { type: string, description: "Полный адрес: улица, дом, номер склада, промзона" }
        orientir: { type: string, description: "Ориентир для водителя: с какой стороны въезд, рядом с чем, КПП", example: "склад №5, въезд с ул. Мира" }
        lat: { type: number, description: "Широта в градусах (для карты)" }
        lng: { type: number, description: "Долгота в градусах (для карты)" }
        place_id:
          type: string
          nullable: true
          description: "Идентификатор места из карт (для автокомплита и избежания дублей)"
        comment: { type: string, nullable: true, description: "Произвольный комментарий к точке" }
        point_order: { type: integer, description: "Порядок точки в маршруте (1 — первая, 2 — вторая и т.д.)" }
        is_main_load: { type: boolean, default: false, description: "Отметить как основную точку погрузки" }
        is_main_unload: { type: boolean, default: false, description: "Отметить как основную точку выгрузки" }
        date:
          type: string
          format: date-time
          description: "Плановая дата/время точки в UTC (RFC3339), сохраняется и отдаётся в UTC"
          example: "2026-03-23T10:45:30Z"
      required: [type, country_code, city_code, address, lat, lng, point_order, date]
    PaymentInput:
      type: object
      description: |
        **Условия оплаты** при создании или обновлении груза (блок payment в теле POST/PUT /api/cargo). Один блок на груз.

        **Правило:** если передан блок payment и price_request=false, нужно указать total_amount (фиксированная сумма). Если price_request=true — сумма не обязательна (запрос цены от перевозчика).

        **Предоплата:** with_prepayment, prepayment_amount, prepayment_currency; остаток к оплате — remaining_amount, remaining_currency.
      properties:
        is_negotiable: { type: boolean, default: false, description: "Цена договорная (обсуждается с перевозчиком)" }
        price_request: { type: boolean, default: false, description: "Запрос цены: true — без фиксированной суммы, перевозчик предлагает цену сам" }
        total_amount: { type: number, nullable: true, description: "Общая сумма оплаты за перевозку (обязательна при price_request=false)" }
        total_currency: { type: string, nullable: true, example: USD, description: "Валюта: USD, UZS и т.д." }
        with_prepayment: { type: boolean, default: false, description: "Есть предоплата" }
        prepayment_amount: { type: number, nullable: true, description: "Сумма предоплаты" }
        prepayment_currency: { type: string, nullable: true, description: "Валюта предоплаты" }
        prepayment_type: { type: string, nullable: true, description: "Тип/условия предоплаты" }
        remaining_amount: { type: number, nullable: true, description: "Сумма остатка к оплате после доставки" }
        remaining_currency: { type: string, nullable: true, description: "Валюта остатка" }
        remaining_type: { type: string, nullable: true, description: "Условия оплаты остатка" }
        payment_note: { type: string, nullable: true, maxLength: 500, description: "Примечание к оплате (до 500 символов)" }
        payment_terms_note: { type: string, nullable: true, description: "Особые условия оплаты" }
    WayPointInput:
      type: object
      description: "Промежуточная точка маршрута (ехать через) или таможня."
      properties:
        type: { type: string, enum: [TRANSIT, CUSTOMS], description: "Тип точки: TRANSIT или CUSTOMS" }
        country_code: { type: string, nullable: true, example: "KZ" }
        city_code: { type: string, nullable: true, example: "SHY" }
        region_code: { type: string, nullable: true, example: "SHYMKENT" }
        address: { type: string, nullable: true, example: "Трасса М-39, КПП 2" }
        orientir: { type: string, nullable: true, example: "Таможенный пост у северных ворот" }
        lat: { type: number, nullable: true, example: 42.341 }
        lng: { type: number, nullable: true, example: 69.589 }
        place_id: { type: string, nullable: true, example: "maps-customs-2" }
        comment: { type: string, nullable: true, example: "Оформление 3-4 часа" }
    CargoStatusRequest:
      type: object
      description: Тело PATCH /api/cargo/:id/status — смена статуса с проверкой допустимых переходов.
      properties:
        status: { type: string, enum: [PENDING_MODERATION, SEARCHING_ALL, SEARCHING_COMPANY, COMPLETED, CANCELLED], example: "SEARCHING_ALL" }
      required: [status]
    OfferCreateRequest:
      type: object
      description: Тело POST /api/cargo/:id/offers. Оффер от перевозчика (водителя); carrier_id — ID водителя из таблицы drivers.
      properties:
        carrier_id: { type: string, format: uuid, description: "ID перевозчика (водителя)", example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890" }
        price: { type: number, description: "Предлагаемая цена", example: 1500 }
        currency: { type: string, example: "USD" }
        comment: { type: string, nullable: true, example: "Готов выехать завтра, своя тентовая фура" }
      required: [carrier_id, price, currency]
    CargoDetailResponse:
      type: object
      description: Ответ GET /api/cargo/:id — груз с вложенными route_points и payment.
      allOf:
        - $ref: "#/components/schemas/Cargo"
        - type: object
          properties:
            route_points: { type: array, items: { $ref: "#/components/schemas/RoutePoint" } }
            payment: { $ref: "#/components/schemas/Payment", nullable: true }
            offer_invitation_stats:
              type: object
              nullable: true
              description: "Счётчики офферов/приглашений по грузу (GET /api/cargo/:id). from_* — от водителей к владельцу груза; to_* — от диспетчера к водителям."
              properties:
                from_drivers_total: { type: integer, example: 3 }
                from_drivers_pending: { type: integer, example: 1 }
                to_drivers_total: { type: integer, example: 2 }
                to_drivers_pending: { type: integer, example: 0 }
    Trip:
      type: object
      description: "Рейс по грузу. Линейный поток IN_PROGRESS → IN_TRANSIT → DELIVERED → COMPLETED (или CANCELLED)."
      properties:
        id: { type: string, format: uuid }
        cargo_id: { type: string, format: uuid }
        offer_id: { type: string, format: uuid }
        driver_id: { type: string, format: uuid, nullable: true }
        status: { type: string, enum: [IN_PROGRESS, IN_TRANSIT, DELIVERED, COMPLETED, CANCELLED] }
        agreed_price: { type: number }
        agreed_currency: { type: string }
        next_status: { type: string, nullable: true, description: "Следующий шаг после текущего статуса (из DELIVERED обычно COMPLETED)" }
        completion_awaiting_dispatcher_confirm:
          type: boolean
          description: |
            `true`, если водитель запросил завершение рейса (статус остаётся `DELIVERED`), и **cargo manager** должен вызвать `POST /v1/dispatchers/trips/{id}/confirm-transition`, чтобы перевести рейс в `COMPLETED`.
        pending_confirm_to: { type: string, nullable: true, description: "При ожидании завершения — обычно `COMPLETED`" }
        driver_confirmed_at: { type: string, format: date-time, nullable: true }
        dispatcher_confirmed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ProfileTripRatingRequest:
      type: object
      required: [trip_id, stars]
      properties:
        trip_id:
          type: string
          format: uuid
          description: |
            Завершённый рейс (`COMPLETED`), в котором участвовали вы и оцениваемый; одна строка оценки в `trip_ratings` на пару (рейс, кто оценивает).
            Итоговое число на карточке пользователя — агрегат по всем таким оценкам на **профиль** получателя.
        stars:
          type: number
          format: double
          minimum: 1
          maximum: 5
          multipleOf: 0.5
          description: "Оценка по шкале 1.0–5.0 с шагом 0.5 (например 3.5, 5)."

paths:
  /health:
    get:
      summary: Проверка работоспособности
      responses:
        "200":
          description: OK

  /api/cargo:
    post:
      tags: ["Cargo Manager / Cargo CRUD"]
      summary: "1. Создать груз (добавление груза — фриланс-диспетчер)"
      description: |
        **Фриланс-диспетчер:** передайте X-User-Token (JWT после входа) — в груз запишется created_by_type=DISPATCHER.
        **Назначение:** Создание нового груза с точками маршрута и блоком оплаты.

        **Логика:** В одной транзакции создаются запись в `cargo`, записи в `route_points` (все переданные точки), одна запись в `payments` (если передан блок payment). Валидация: weight > 0; минимум одна точка с type=LOAD и одна с type=UNLOAD; у каждой точки обязательны country_code + city_code (коды страны и города из справочника городов), address, lat, lng, point_order, **date** (RFC3339 в UTC, например `2026-03-23T10:45:30Z`); опционально orientir, place_id. Все enum-поля (type, truck_type и т.д.) — в UPPERCASE. Справочник городов: GET /v1/reference/cities (все города мира, коды TAS/SAM/DXB и т.д.). Если указаны temp_min/temp_max — truck_type должен быть REFRIGERATOR; если adr_enabled=true — обязателен adr_class; если ready_enabled=true — обязателен ready_at.

        **Создатель (автоматически):** Если передан заголовок **X-User-Token** (JWT) с ролью admin или dispatcher — в груз записываются created_by_type и created_by_id. Если JWT не передан, но в теле есть company_id — создателем считается компания (created_by_type=company). Опционально в теле можно передать company_id для привязки груза к компании.

        **Что передаём:** Схема CargoCreateRequest — все поля груза (обязательные: weight, volume, vehicles_amount, power_plate_type, trailer_plate_type, route_points) + опционально payment, contact_name, contact_phone, ready_enabled, ready_at, comment, temp_min/temp_max, adr_enabled, adr_class, loading_types, shipment_type, belts_count, documents, cargo_type_id.
        **Важно:** Для фриланс‑диспетчера поле **company_id обычно не передаётся**. Если передать `company_id` — оно должно существовать в `companies`, иначе вернётся 400.
        В ответе возвращается **полный объект груза** (как в GET /api/cargo/:id): data содержит созданный груз с id, route_points, payment и всеми полями.

        **Фото до появления cargo_id (без отдельного шага «создать → потом загрузить»):**
        - **Вариант A — JSON:** поле `photos` — массив **URL** уже выложенных картинок (CDN и т.д.).
        - **Вариант B — multipart/form-data:** `Content-Type: multipart/form-data`, обязательное текстовое поле **`data`** — строка JSON **того же состава**, что и CargoCreateRequest (как в application/json). Файлы — поле **`photos`** (можно несколько раз) или одно поле **`photo`**; макс. **5** файлов, каждый до **10 MB**, типы image/jpeg, image/png, image/webp. Сумма `len(photos в JSON) + число файлов` не больше 5. Сначала создаётся груз, затем файлы сохраняются в `cargo_photos` (как POST /api/cargo/{id}/photos).
        - **Вариант C:** сначала `POST application/json` без файлов → в ответе `data.id`, затем `POST /api/cargo/{id}/photos` для каждого файла.
        - **Вариант D (без cargo_id):** `POST /api/cargo/photos` (multipart, поле `photo`) → в ответе `data.url` вида `/api/cargo/photos/{uuid}` (и `data.id`). Просмотр: `GET /api/cargo/photos/{uuid}`. В `POST /api/cargo` в массиве `photos` передайте эту ссылку **или** сам UUID — после создания груза файл переносится в `cargo_photos`, в `data.photos` будут уже URL вида `/api/cargo/{cargo_id}/photos/{photo_id}`. Один и тот же pending UUID в `photos` дважды недопустим.

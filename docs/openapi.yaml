  /v1/driver/offers/all:
    get:
      tags: ["Drivers / Offers"]
      summary: "Все офферы водителя (входящие и исходящие)"
      description: |
        Единый список офферов для Driver Mobile:
        - `direction=all` (по умолчанию) — оба направления в одном списке
        - `direction=outgoing` — офферы, отправленные водителем (`proposed_by=DRIVER`)
        - `direction=incoming` — офферы/инвайты, отправленные водителю (`proposed_by=DISPATCHER`)

        Поддерживает `status`, пагинацию, фильтр по контрагенту-диспетчеру (`counterparty_id`)
        и счетчики `data.counts.incoming/outgoing`.
        Алиасы: `to_dispatcher_id` (для outgoing), `from_dispatcher_id` (для incoming).
        **Как читать:**
        - `direction=all` + `counts` — общий обзор.
        - `direction=incoming` — приглашения/офферы, отправленные мне.
        - `direction=outgoing` — офферы, отправленные мной.
        **Примеры:**
        - `GET /v1/driver/offers/all?direction=all&page=1&limit=30`
        - `GET /v1/driver/offers/all?direction=incoming&status=PENDING`
        - `GET /v1/driver/offers/all?direction=outgoing&to_dispatcher_id=<dispatcher_uuid>`
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: direction
          in: query
          required: false
          schema: { type: string, example: "all" }
        - name: counterparty_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: to_dispatcher_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: from_dispatcher_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: status
          in: query
          required: false
          schema: { type: string, example: "PENDING" }
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 30, minimum: 1, maximum: 100 }
      responses:
        "200": { description: "data.items, data.total, data.page, data.limit, data.direction, data.counterparty_id, data.counts.incoming, data.counts.outgoing" }
        "400": { description: invalid_payload_detail }
        "401": { description: unauthorized }
        "500": { description: failed_to_list_cargo_offers }

  /v1/driver/cargo/{id}/offers:
    post:
      tags: ["Drivers / Offers"]
      summary: "Оффер по грузу со своей ценой"
      description: |
        Водитель отправляет запрос на перевозку с **предложенной ценой** (`proposed_by=DRIVER`). Диспетчер подтверждает через `POST /v1/dispatchers/offers/{id}/accept` или `POST /api/offers/{id}/accept` (JWT диспетчера). После принятия цена в `payment` груза обновляется.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [price, currency]
              properties:
                price: { type: number, example: 1800 }
                currency: { type: string, example: "USD" }
                comment: { type: string }
      responses:
        "201": { description: "data.id, data.proposed_by=DRIVER" }
        "400": { description: cargo_not_searching / validation }
        "409": { description: "cargo_slots_full (vehicles_left=0, машины уже собраны)" }
        "401": { description: unauthorized }
        "403": { description: SEARCHING_COMPANY — не водитель компании }

  /v1/driver/offers/{id}/accept:
    post:
      tags: ["Drivers / Offers"]
      summary: "Принять цену от диспетчера"
      description: |
        Для офферов с **proposed_by=DISPATCHER** (диспетчер указал цену вам). Тот же обработчик, что `POST /api/offers/{id}/accept` с JWT водителя. **`{id}` — только UUID оффера** в пути; query/body не задают оффер.

        При ошибке смотрите **data.reason**.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: UUID оффера (offer_id), только из path
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "trip_id, cargo_payment_sync" }
        "403": { description: only_driver_accepts_dispatcher_offer / not_your_offer }
        "404": { description: offer_not_found_or_not_pending; data.reason }
        "409": { description: cargo_slots_full / cargo_not_searching / driver_busy; data.reason }
        "500": { description: failed_to_accept; data.reason }

  /v1/driver/offers/{id}:
    get:
      tags: ["Drivers / Offers"]
      summary: "Получить один оффер (водитель) + полный cargo"
      description: |
        Возвращает один оффер по `offer_id` из path (`{id}`) и **полный связанный cargo** (как карточка груза: route_points, payment и пр.).
        Доступно только если `carrier_id` оффера = текущий водитель.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: UUID оффера (offer_id)
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "data.offer, data.cargo, data.trip|null" }
        "403": { description: not_your_offer }
        "404": { description: offer_not_found / cargo_not_found }

  /v1/driver/offers/{id}/reject:
    post:
      tags: ["Drivers / Offers"]
      summary: "Отклонить приглашение диспетчера или отозвать свой оффер (водитель)"
      description: |
        Оффер с **carrier_id** = вы, статус **PENDING**:
        - **proposed_by=DISPATCHER** — отклонить приглашение диспетчера;
        - **proposed_by=DRIVER** — отозвать **свой** исходящий оффер по грузу.
        **reason обязателен.**
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, minLength: 3, description: "Причина отказа: минимум 1 слово и минимум 3 буквы" }
      responses:
        "200": { description: status rejected }
        "400": { description: rejection_reason_required / rejection_reason_too_short / offer_not_found_or_not_pending }
        "403": { description: not_your_offer }
        "404": { description: offer_not_found }

  /v1/driver/active-cargo:
    get:
      tags: ["Legacy / Deprecated"]
      summary: "Мой активный груз"
      description: |
        Возвращает текущий активный груз водителя (если водитель уже привязан к грузу как ACTIVE).
        Это отражает бизнес-правило: **1 водитель может быть только в одном активном грузе**.
        Ответы на 5 языках (заголовок X-Language: ru, uz, en, tr, zh).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: "active=true/false; если true — data.cargo = объект Cargo"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
              examples:
                en: { summary: "English", value: { status: "success", code: 200, description: "OK", data: { active: true, cargo: { id: "ebc30874-161a-4c29-b284-139e4e7d9120", vehicles_amount: 3, vehicles_left: 2, status: "SEARCHING_ALL" } } } }
                ru: { summary: "Русский", value: { status: "success", code: 200, description: "Успешно", data: { active: true, cargo: { id: "ebc30874-161a-4c29-b284-139e4e7d9120", vehicles_amount: 3, vehicles_left: 2, status: "SEARCHING_ALL" } } } }
                uz: { summary: "O'zbek", value: { status: "success", code: 200, description: "Muvaffaqiyatli", data: { active: true, cargo: { id: "ebc30874-161a-4c29-b284-139e4e7d9120", vehicles_amount: 3, vehicles_left: 2, status: "SEARCHING_ALL" } } } }
                tr: { summary: "Türkçe", value: { status: "success", code: 200, description: "Başarılı", data: { active: true, cargo: { id: "ebc30874-161a-4c29-b284-139e4e7d9120", vehicles_amount: 3, vehicles_left: 2, status: "SEARCHING_ALL" } } } }
                zh: { summary: "中文", value: { status: "success", code: 200, description: "成功", data: { active: true, cargo: { id: "ebc30874-161a-4c29-b284-139e4e7d9120", vehicles_amount: 3, vehicles_left: 2, status: "SEARCHING_ALL" } } } }

  /v1/driver/cargo/active:
    post:
      tags: ["Drivers / Cargo view"]
      summary: "Активные грузы по координатам (ближайшие сначала)"
      description: |
        Возвращает грузы в поиске, отсортированные **от ближайшего к дальнему** по координатам водителя.
        Точка расчёта — main load (`route_points.is_main_load=true`).
        Для водителя компании дополнительно учитываются грузы `SEARCHING_COMPANY` своей компании.
        В каждом элементе `data.items[]` возвращается **полный объект cargo** (как в GET /api/cargo/:id), включая `route_points` и `payment`, плюс поля расстояния.

        `radius_km` — опционален. Если передан, в ответ попадают только грузы в указанном радиусе.
        **Примеры body:**
        - `{ "lat": 41.311, "lng": 69.279 }`
        - `{ "lat": 41.311, "lng": 69.279, "radius_km": 150 }`
        - `{ "lat": 41.311, "lng": 69.279, "radius_km": 70, "page": 1, "limit": 20 }`
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lng]
              properties:
                lat: { type: number, format: double, example: 41.311 }
                lng: { type: number, format: double, example: 69.279 }
                radius_km: { type: number, format: double, example: 150 }
                page: { type: integer, default: 1, minimum: 1 }
                limit: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: "data.items — полные cargo (включая route_points и payment) + distance_km, distance_m, origin_lat, origin_lng; сортировка distance:asc"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "400": { description: invalid_payload_detail / invalid_lat / invalid_lng }
        "401": { description: unauthorized }
        "500": { description: failed_to_list }

  /v1/driver/matching-cargo:
    get:
      tags: ["Drivers / Cargo view"]
      summary: "Грузы, подходящие по типу транспорта водителя"
      description: |
        Возвращает грузы, у которых truck_type соответствует типу прицепа/полуприцепа водителя (trailer_plate_type из driver_trailers).
        Маппинг: TENTED→TENT, REEFER→REFRIGERATOR, FLATBED→FLATBED, TANKER→TANKER, BOX→TENT+OTHER, LOWBED→FLATBED+OTHER, остальные→OTHER.
        Если у водителя не указан прицеп — показываются все типы.
        Показываются только грузы со статусом SEARCHING_ALL (+ SEARCHING_COMPANY для водителей компании).
        Пагинация: page (с 1), limit (по умолчанию 20, макс. 100). Сортировка: по дате создания (новые первые).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: |
            data.items — массив грузов (стандартные поля: id, name, weight, volume, truck_type, status, …).
            data.total — общее количество подходящих грузов.
            data.page, data.limit — текущая страница и лимит.
            data.trailer_type — тип прицепа водителя (строка, например TENTED, или пустая если не указан).
            data.matched_types — массив truck_type, по которым фильтровалось (например ["TENT"]).
        "401": { description: unauthorized }
        "404": { description: driver not found }

  /v1/driver/trips/history:
    get:
      tags: ["Drivers / Trips"]
      summary: "История trips/offers (водитель)"
      description: |
        Лента для водителя; `items` отсортированы по `event_at` (новые первые).
        Типы: `trip_active` (рейс не `COMPLETED` в таблице `trips`), `trip_completed`, `trip_cancelled` (архив),
        `offer_accepted` (+ `has_open_trip` — есть ли живой рейс по этому офферу), `offer_rejected`.
        Параметр `limit` ограничивает выборку по каждому источнику до объединения.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 50, minimum: 1, maximum: 100 }
      responses:
        "200": { description: "data.items[]: event_type, event_at, offer?/trip?" }
        "401": { description: unauthorized }

  /v1/driver/trips/me:
    get:
      tags: ["Drivers / Trips"]
      summary: "Мой текущий рейс (водитель)"
      description: |
        Одна строка из `trips` для текущего водителя: статус **не** `COMPLETED` и **не** `CANCELLED`, выбирается по наибольшему `updated_at`.
        Если такого рейса нет — `data.trip` равен `null` (не 404).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: |
            Стандартный `Envelope` (`status`: success, `code`: 200, `description` по `X-Language`).
            `data.trip` — объект `Trip` или `null`, если активного рейса нет.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          trip:
                            nullable: true
                            allOf:
                              - $ref: "#/components/schemas/Trip"
        "401": { description: unauthorized }
        "500": { description: failed_to_list }

  /v1/driver/trips/{id}/confirm:
    post:
      tags: ["Drivers / Trips"]
      summary: "Подтвердить шаг рейса (водитель)"
      description: |
        Переводит рейс на следующий операционный статус: `IN_PROGRESS` → `IN_TRANSIT` → `DELIVERED` (один вызов — один шаг).
        **Завершение:** с `DELIVERED` первый вызов **не** ставит `COMPLETED`: фиксируется запрос водителя, в ответе `completion_awaiting_dispatcher_confirm: true`, статус остаётся `DELIVERED`. Закрывает рейс **cargo manager** через `POST /v1/dispatchers/trips/{id}/confirm-transition`.
        Диспетчер может вызывать тот же переход для промежуточных шагов (см. Cargo Manager / Trips).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: поля рейса после перехода }
        "400": { description: "invalid_status_transition | trip_completion_already_pending" }
        "403": { description: trip not assigned to you }
        "404": { description: trip not found }

  /v1/driver/trips/{id}/reject:
    post:
      tags: ["Drivers / Trips"]
      summary: "Отказ от рейса на любом этапе (водитель)"
      description: |
        Для статусов `IN_PROGRESS`, `IN_TRANSIT`, `DELIVERED`: рейс копируется в `archived_trips`, строка **удаляется** из `trips`, оффер снова `PENDING`, откат `cargo_drivers` / `vehicles_left` по правилам отмены.
        Не завершает рейс как `COMPLETED` — это полный выход из сделки после принятия оффера.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "Как POST /cancel: data.status, trip_id, cargo_id, offer_id" }
        "400": { description: trip_already_completed }
        "403": { description: trip not assigned to you }
        "404": { description: trip not found }

  /v1/driver/trips/{id}/cancel:
    post:
      tags: ["Drivers / Trips"]
      summary: "Отменить рейс до выезда (водитель)"
      description: |
        Только **`IN_PROGRESS`** (ещё не `IN_TRANSIT`): архив + **удаление** строки из `trips` (без отдельного UPDATE `driver_id = NULL` — рейс целиком снимается с доски).
        После `IN_TRANSIT` используйте **`POST .../reject`**.
        До принятия оффера: `POST /v1/driver/offers/{id}/reject` (входящий диспетчера или отзыв своего DRIVER).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: UUID рейса (trip_id)
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "data.status=cancelled, data.trip_id, data.cargo_id, data.offer_id" }
        "400": { description: "trip already completed | trip_cancel_only_in_progress (не IN_PROGRESS)" }
        "403": { description: trip not assigned to you }
        "404": { description: trip not found }

  /v1/driver/trip-notifications:
    get:
      tags: ["Notifications and ratings / Driver"]
      summary: "Список уведомлений по рейсам (водитель)"
      description: |
        Лента уведомлений для текущего водителя: смена статуса рейса, отмена, ожидание cargo manager при завершении.
        Каждый элемент: `id`, `trip_id`, `event_kind`, `step`, `from_status`, `to_status`, `message` (строка по **`X-Language`**: en, ru, uz, tr, zh), `read`, `read_at`, `created_at`.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: unread_only
          in: query
          schema: { type: boolean, default: false }
        - name: limit
          in: query
          schema: { type: integer, default: 30, minimum: 1, maximum: 100 }
      responses:
        "200": { description: "data.items[], data.unread_count" }
        "401": { description: unauthorized }

  /v1/driver/trip-notifications/read-all:
    post:
      tags: ["Notifications and ratings / Driver"]
      summary: "Отметить все уведомления прочитанными (водитель)"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200": { description: "data.updated — число обновлённых строк" }

  /v1/driver/trip-notifications/{id}/read:
    post:
      tags: ["Notifications and ratings / Driver"]
      summary: "Отметить уведомление прочитанным (водитель)"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: UUID записи уведомления (не trip_id)
      responses:
        "200": { description: ok }
        "404": { description: trip_notification_not_found }

  /v1/driver/dispatchers/{dispatcherId}/rating:
    post:
      tags: ["Notifications and ratings / Driver"]
      summary: "Оценить cargo manager по завершённому рейсу (профиль, 1–5 шаг 0.5)"
      description: |
        Путь: **cargo manager** (`dispatcher_id`), которого оцениваете. Тело: **`trip_id`** завершённого рейса и **`stars`**.
        Проверяется `COMPLETED`, вы назначены водителем на этот рейс, и в пути указан именно диспетчер-владелец груза. Оценка в `trip_ratings` и агрегат **`freelance_dispatchers.rating`**.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: dispatcherId
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: UUID диспетчера (cargo manager), получатель оценки
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileTripRatingRequest" }
      responses:
        "200": { description: ok }
        "400": { description: "trip_rating_not_completed | trip_rating_invalid_stars | trip_rating_cargo_manager_unknown | trip_rating_ratee_mismatch" }
        "403": { description: trip not assigned to you }
        "404": { description: trip not found }

  /v1/driver/trips/{id}/state:
    get:
      tags: ["Drivers / Trips"]
      summary: "Состояние рейса и подтверждений (водитель)"
      description: |
        См. GET /v1/dispatchers/trips/:id/state — те же поля для назначенного водителя.
        **en:** Trip state for assigned driver.
        **uz:** Haydovchi uchun reys holati.
        **tr:** Atanmış sürücü için sefer durumu.
        **zh:** 指派司机的行程状态。
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: OK }
        "403": { description: trip not assigned to you }
        "404": { description: trip not found }

  /v1/driver/driver-invitations:
    get:
      tags: ["Drivers / Driver invitations", "Driver Manager"]
      summary: "Список приглашений для водителя"
      description: |
        **Водитель:** приглашения на свой номер телефона (от компании или от фриланс-диспетчера), **включая историю** (кто пригласил — invited_by, итог — status). По активному pending можно принять (POST .../accept) или отказаться (POST .../decline).
        В ответе data.items: token, type (company | freelance), company_id или dispatcher_id, invited_by, status (pending | accepted | declined | cancelled | expired), expires_at, created_at, responded_at.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: "data.items — приглашения (token, type, status, invited_by, company_id/dispatcher_id, expires_at, created_at, responded_at)"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            token: { type: string }
                            type: { type: string, enum: [company, freelance, unknown] }
                            company_id: { type: string, format: uuid }
                            dispatcher_id: { type: string, format: uuid }
                            phone: { type: string }
                            invited_by: { type: string, format: uuid, description: "Диспетчер, отправивший приглашение" }
                            status:
                              type: string
                              enum: [pending, accepted, declined, cancelled, expired]
                            expires_at: { type: string, format: date-time }
                            created_at: { type: string, format: date-time }
                            responded_at: { type: string, format: date-time, nullable: true }
  /v1/driver/driver-invitations/accept:
    post:
      tags: ["Drivers / Driver invitations", "Driver Manager"]
      summary: "Принять приглашение (водитель)"
      description: |
        Тело: token. Телефон водителя должен совпадать с приглашением.
        **От компании:** после принятия у водителя устанавливается company_id. **От фриланс-диспетчера:** у водителя устанавливается freelancer_id = id диспетчера; у диспетчера в списке GET /v1/dispatchers/drivers появляется этот водитель.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
              required: [token]
            example:
              token: "a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789"
      responses:
        "200": { description: "data.company_id или data.freelancer_id" }
        "400": { description: invitation not found or expired }
        "403": { description: invitation was sent to another phone }
  /v1/driver/driver-invitations/decline:
    post:
      tags: ["Drivers / Driver invitations", "Driver Manager"]
      summary: "Отказаться от приглашения (водитель)"
      description: "Тело: token. Приглашение должно быть на номер текущего водителя. Статус становится declined; запись сохраняется в истории."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
              required: [token]
      responses:
        "200": { description: data.status = declined }
        "400": { description: invitation not found or expired }
        "403": { description: invitation was sent to another phone }

  /v1/driver/dispatchers:
    get:
      tags: ["Legacy / Deprecated"]
      summary: "Список моих диспетчеров (водитель)"
      description: |
        **Водитель:** диспетчеры, с которыми связан: 1) фриланс-диспетчер (type=freelance, поле **role** — CARGO_MANAGER | DRIVER_MANAGER), если принял его приглашение; 2) диспетчеры компании (type=company, company_role), если водитель в компании. В ответе data.items: id, name, phone (полный номер), work_status, has_photo, type, role (для freelance), company_role (для company). Язык ответа по X-Language (en, ru, uz, tr, zh).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: "data.items — массив диспетчеров (id, name, phone, work_status, has_photo, type, role для freelance, company_role для company)"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, format: uuid }
                            name: { type: string }
                            phone: { type: string, description: "Номер телефона диспетчера полностью, например +998901234567" }
                            work_status: { type: string }
                            has_photo: { type: boolean }
                            type: { type: string, enum: [freelance, company] }
                            role:
                              allOf:
                                - $ref: "#/components/schemas/FreelanceDispatcherRole"
                              nullable: true
                              description: "Только для type=freelance"
                            company_role: { type: string, description: "Только для type=company (owner, dispatcher и т.д.)" }
        "401": { description: driver not found }
  /v1/driver/dispatchers/{dispatcherId}:
    delete:
      tags: ["Legacy / Deprecated"]
      summary: "Отвязаться от фриланс-диспетчера (водитель)"
      description: |
        **Водитель:** отвязаться от диспетчера (прекратить сотрудничество). Разрешено только если текущий водитель привязан к этому диспетчеру (driver.freelancer_id = dispatcherId). После успеха freelancer_id = null. Для диспетчеров компании отвязка через этот метод недоступна. Ответы на 5 языках (X-Language).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: dispatcherId
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: "UUID диспетчера, от которого отвязываемся"
      responses:
        "200":
          description: "data.status = unlinked"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  data:
                    type: object
                    properties:
                      status: { type: string, example: "unlinked" }
        "400": { description: invalid dispatcher id }
        "403": { description: this dispatcher is not linked to you }

  /v1/driver/dispatchers/catalog:
    get:
      tags: ["Legacy / Deprecated"]
      summary: "Каталог всех фриланс-диспетчеров (водитель)"
      description: |
        **Водитель:** вернуть список всех фриланс-диспетчеров с пагинацией и фильтрами.
        Фильтры:
        - `limit` 1..100 (default 20)
        - `offset` >=0 (default 0)
        - `q` — поиск по `phone` или `name` (ILIKE)
        - `phone_hint` — prefix по `phone` (LIKE 'prefix%')
        - `status` — `account_status`
        - `work_status` — available/loaded/busy
        - `has_photo` — true/false
        - `rating_min`, `rating_max`
        - `role` — фильтр по роли: CARGO_MANAGER или DRIVER_MANAGER (строго верхний регистр)
        **Важно:** `password` не возвращается. В каждом элементе items есть поле `role` (если задано в БД).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, example: 20 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, example: 0 }
        - name: q
          in: query
          required: false
          schema: { type: string, example: "99890" }
        - name: phone_hint
          in: query
          required: false
          schema: { type: string, example: "+99890" }
        - name: status
          in: query
          required: false
          schema: { type: string, example: "active" }
        - name: work_status
          in: query
          required: false
          schema: { type: string, example: "available" }
        - name: has_photo
          in: query
          required: false
          schema: { type: boolean, example: true }
        - name: rating_min
          in: query
          required: false
          schema: { type: number, format: float, example: 4.5 }
        - name: rating_max
          in: query
          required: false
          schema: { type: number, format: float, example: 5 }
        - name: role
          in: query
          required: false
          schema: { $ref: "#/components/schemas/FreelanceDispatcherRole" }
          description: "Фильтр по manager_role (CARGO_MANAGER | DRIVER_MANAGER)"
      responses:
        "200": { description: "data.items + data.total + limit/offset" }
        "400": { description: "Неверные параметры или role (invalid_freelance_dispatcher_role)" }
        "401": { description: unauthorized }

  /v1/driver/dispatchers/hint:
    get:
      tags: ["Legacy / Deprecated"]
      summary: "Hint по номеру диспетчера (водитель)"
      description: |
        **Водитель:** быстрый поиск (typeahead) фриланс-диспетчеров по префиксу номера.
        Параметры: `phone` (обязательно, prefix), `limit` (1..50, default 10).
        **Важно:** `password` не возвращается.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: phone
          in: query
          required: true
          schema: { type: string, example: "+99890" }
        - name: limit
          in: query
          required: false
          schema: { type: integer, example: 10 }
      responses:
        "200": { description: "data.items — массив диспетчеров" }
        "400": { description: phone required / invalid payload }
        "401": { description: unauthorized }

  /v1/driver/dispatcher-invitations:
    get:
      tags: ["Drivers / Invite dispatcher", "Driver Manager"]
      summary: "Список приглашений диспетчерам (отправил водитель)"
      description: |
        **Водитель:** список приглашений, которые **я отправил** диспетчерам, **включая историю**. data.items: token, dispatcher_phone, driver_id, status (pending | accepted | declined | cancelled | expired), expires_at, created_at, responded_at.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: "data.items — приглашения (token, dispatcher_phone, status, expires_at, created_at, responded_at)"
        "401": { description: driver not found }
    post:
      tags: ["Drivers / Invite dispatcher", "Driver Manager"]
      summary: "Пригласить диспетчера (водитель)"
      description: |
        **Водитель:** отправить приглашение диспетчеру по номеру телефона. Диспетчер увидит приглашение в GET /v1/dispatchers/invitations-from-drivers и может принять или отказать. Тело: phone (обязательно). В ответе — token (передать диспетчеру). Если водитель уже привязан к этому диспетчеру — 409 already_linked_to_this_dispatcher.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
              required: [phone]
      responses:
        "201": { description: "data.token, data.expires_in_hours" }
        "400": { description: phone required, invalid payload }
        "409": { description: already linked to this dispatcher }
  /v1/driver/dispatcher-invitations/{token}:
    delete:
      tags: ["Legacy / Deprecated"]
      summary: "Отменить приглашение диспетчеру (водитель)"
      description: "Водитель отменяет отправленное приглашение. Только своё приглашение."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: ok }
        "403": { description: not your invitation }
        "404": { description: invitation not found or expired }

  /v1/dispatchers/invitations-from-drivers:
    get:
      tags: ["Driver Manager / Invitations"]

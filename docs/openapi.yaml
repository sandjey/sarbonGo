  /v1/driver/auth/logout:
    post:
      tags:
      - Drivers / Auth & registration
      summary: "Выход водителя из системы."
      description: "Инвалидирует refresh token и завершает текущую авторизованную сессию."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: "Refresh token, который нужно отозвать."
                access_token:
                  type: string
                  description: "Текущий access token (опционально для серверной очистки контекста)."
      responses:
        '200':
          description: "Выход выполнен успешно."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                required:
                - status
        '400':
          description: "Некорректное тело запроса."
        '401':
          description: "Сессия недействительна или токен невалиден."
  /v1/dispatchers/auth/phone:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: "Запросить OTP-код для входа диспетчера."
      description: "Отправляет одноразовый код на телефон диспетчера."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998901234567'
              required:
              - phone
            example:
              phone: '+998901234567'
      responses:
        '200':
          description: "OTP-код успешно отправлен."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: otp_sent
                  ttl_seconds:
                    type: integer
                    example: 180
        '400':
          description: "Некорректный номер телефона или запрос."
        '429':
          description: Cooldown / rate limit
        '502':
          description: "Ошибка SMS-провайдера или внешнего сервиса."
  /v1/dispatchers/auth/otp/verify:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: "Проверить OTP-код диспетчера."
      description: "Подтверждает OTP и возвращает токены входа или `session_id` для регистрации."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998901234567'
                otp:
                  type: string
                  example: '123456'
              required:
              - phone
              - otp
            example:
              phone: '+998901234567'
              otp: '123456'
      responses:
        '200':
          description: "OTP-код подтвержден."
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  properties:
                    status:
                      type: string
                      example: login
                    tokens:
                      $ref: '#/components/schemas/Tokens'
                - type: object
                  properties:
                    status:
                      type: string
                      example: register
                    session_id:
                      type: string
                      format: uuid
        '401':
          description: "Неверный или просроченный OTP-код."
        '429':
          description: "Превышен лимит попыток проверки OTP."
  /v1/dispatchers/auth/login/password:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: "Вход диспетчера по паролю."
      description: "Авторизует диспетчера по номеру телефона и паролю."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998901234567'
                password:
                  type: string
                  example: TestPass123!
              required:
              - phone
              - password
            example:
              phone: '+998901234567'
              password: TestPass123!
      responses:
        '200':
          description: "Авторизация успешна."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: login
                  tokens:
                    $ref: '#/components/schemas/Tokens'
        '401':
          description: "Неверный телефон или пароль."
  /v1/dispatchers/auth/reset-password/request:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: "Запросить сброс пароля диспетчера."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998901234567'
              required:
              - phone
            example:
              phone: '+998901234567'
      responses:
        '200':
          description: "OTP для сброса пароля отправлен."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: otp_sent
                  session_id:
                    type: string
                    format: uuid
                  ttl_seconds:
                    type: integer
        '400':
          description: "Некорректный формат телефона."
        '404':
          description: "Диспетчер с таким телефоном не найден."
        '502':
          description: "Ошибка SMS-провайдера или внешнего сервиса."
  /v1/dispatchers/auth/reset-password/confirm:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: "Подтвердить сброс пароля диспетчера."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
                otp:
                  type: string
                  example: '123456'
                new_password:
                  type: string
              required:
              - session_id
              - otp
              - new_password
            example:
              session_id: d4e5f6a7-b8c9-0123-def0-234567890123
              otp: '123456'
              new_password: NewPass456!
      responses:
        '200':
          description: "Пароль успешно изменен."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '401':
          description: "Неверный OTP или недействительная сессия сброса."
        '429':
          description: "Превышен лимит попыток."
  /v1/dispatchers/auth/logout:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: "Выход диспетчера из системы."
      description: "Инвалидирует refresh token и завершает сессию диспетчера."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: "Refresh token, который нужно отозвать."
                access_token:
                  type: string
                  description: "Текущий access token (опционально)."
            example:
              access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: "Выход выполнен успешно."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '400':
          description: "Некорректное тело запроса."
        '401':
          description: "Сессия недействительна или токен невалиден."
  /v1/dispatchers/registration/complete:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: "Завершить регистрацию диспетчера."
      description: "Создает аккаунт диспетчера по `session_id`, роли и персональным данным."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
                name:
                  $ref: '#/components/schemas/DisplayName'
                role:
                  $ref: '#/components/schemas/FreelanceDispatcherRole'
                password:
                  type: string
                passport_series:
                  type: string
                  example: AB
                passport_number:
                  type: string
                  example: '1234567'
                pinfl:
                  type: string
                  example: '12345678901234'
              required:
              - session_id
              - name
              - password
              - passport_series
              - passport_number
              - pinfl
            example:
              session_id: d4e5f6a7-b8c9-0123-def0-234567890123
              name: Dispatcher_User
              role: CARGO_MANAGER
              password: SecurePass123!
              passport_series: AB
              passport_number: '1234567'
              pinfl: '31234567890123'
      responses:
        '200':
          description: "Регистрация диспетчера завершена успешно."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: registered
                  tokens:
                    $ref: '#/components/schemas/Tokens'
                  dispatcher:
                    $ref: '#/components/schemas/Dispatcher'
        '400':
          description: "Ошибка валидации данных регистрации."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '401':
          description: "Сессия регистрации недействительна или просрочена."
        '409':
          description: "Пользователь уже зарегистрирован или данные конфликтуют."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /v1/dispatchers/profile:

          nullable: true
          example: '+998901234567'
          description: Телефон контактного лица
        status:
          type: string
          enum:
          - PENDING_MODERATION
          - SEARCHING_ALL
          - SEARCHING_COMPANY
          - COMPLETED
          - CANCELLED
          example: SEARCHING_ALL
          description: 'Статус груза (UPPERCASE). Поток: PENDING_MODERATION → SEARCHING_ALL|SEARCHING_COMPANY (остаётся до завершения всех рейсов) → COMPLETED; CANCELLED.'
        created_at:
          type: string
          format: date-time
          example: '2026-03-23T15:51:33Z'
          description: Дата и время создания записи
        updated_at:
          type: string
          format: date-time
          example: '2026-03-23T15:51:33Z'
          description: Дата и время последнего обновления
        created_by_type:
          type: string
          enum:
          - ADMIN
          - DISPATCHER
          - COMPANY
          nullable: true
          example: DISPATCHER
          description: 'Кто создал груз: ADMIN, DISPATCHER или COMPANY (подставляется автоматически по JWT или company_id)'
        created_by_id:
          type: string
          format: uuid
          nullable: true
          example: 774e18eb-e4ef-488a-ba3a-e01cb1b41192
          description: UUID создателя (админ, диспетчер или компания)
        company_id:
          type: string
          format: uuid
          nullable: true
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
          description: UUID компании. Если передано — груз привязывается к компании.
        cargo_type:
          type: object
          nullable: true
          description: Объект типа груза (из таблицы cargo_types). null если при создании cargo_type_id не был указан.
          properties:
            id:

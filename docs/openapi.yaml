        trip_id:
          type: string
          format: uuid
        cargo_id:
          type: string
          format: uuid
        offer_id:
          type: string
          format: uuid
        driver_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum:
          - IN_PROGRESS
          - IN_TRANSIT
          - DELIVERED
          - COMPLETED
          - CANCELLED
        agreed_price:

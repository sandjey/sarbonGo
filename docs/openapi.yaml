            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
              examples:
                en: { summary: "English", value: { status: "success", code: 201, description: "Added to favorites", data: { driver_id: "11111111-2222-3333-4444-555555555555" } } }
                ru: { summary: "Русский", value: { status: "success", code: 201, description: "Добавлено в избранное", data: { driver_id: "11111111-2222-3333-4444-555555555555" } } }
                uz: { summary: "O'zbek", value: { status: "success", code: 201, description: "Sevimlilarga qo'shildi", data: { driver_id: "11111111-2222-3333-4444-555555555555" } } }
                tr: { summary: "Türkçe", value: { status: "success", code: 201, description: "Favorilere eklendi", data: { driver_id: "11111111-2222-3333-4444-555555555555" } } }
                zh: { summary: "中文", value: { status: "success", code: 201, description: "已添加到收藏", data: { driver_id: "11111111-2222-3333-4444-555555555555" } } }
        "200":
          description: "favorite_already_exists (idempotent)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
              examples:
                en: { summary: "English", value: { status: "success", code: 200, description: "Already in favorites", data: { driver_id: "11111111-2222-3333-4444-555555555555" } } }
                ru: { summary: "Русский", value: { status: "success", code: 200, description: "Уже в избранном", data: { driver_id: "11111111-2222-3333-4444-555555555555" } } }
                uz: { summary: "O'zbek", value: { status: "success", code: 200, description: "Allaqachon sevimlilarda", data: { driver_id: "11111111-2222-3333-4444-555555555555" } } }
                tr: { summary: "Türkçe", value: { status: "success", code: 200, description: "Zaten favorilerde", data: { driver_id: "11111111-2222-3333-4444-555555555555" } } }
                zh: { summary: "中文", value: { status: "success", code: 200, description: "已在收藏中", data: { driver_id: "11111111-2222-3333-4444-555555555555" } } }
        "400":
          description: "invalid_payload_detail"
        "404":
          description: "driver_not_found"
        "500":
          description: "failed_to_create_favorite (5 языков)"

  /v1/dispatchers/favorite-drivers/{driverId}:
    delete:
      tags: ["Freelance Dispatchers / My drivers"]
      summary: "Удалить водителя из избранного"
      description: |
        Удаляет `driverId` из избранного текущего фриланс-диспетчера.
        Ответы на 5 языках.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: driverId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: "favorite_deleted"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
              examples:
                en: { summary: "English", value: { status: "success", code: 200, description: "Removed from favorites", data: { driver_id: "11111111-2222-3333-4444-555555555555" } } }
                ru: { summary: "Русский", value: { status: "success", code: 200, description: "Удалено из избранного", data: { driver_id: "11111111-2222-3333-4444-555555555555" } } }
                uz: { summary: "O'zbek", value: { status: "success", code: 200, description: "Sevimlilardan olib tashlandi", data: { driver_id: "11111111-2222-3333-4444-555555555555" } } }
                tr: { summary: "Türkçe", value: { status: "success", code: 200, description: "Favorilerden kaldırıldı", data: { driver_id: "11111111-2222-3333-4444-555555555555" } } }
                zh: { summary: "中文", value: { status: "success", code: 200, description: "已从收藏中移除", data: { driver_id: "11111111-2222-3333-4444-555555555555" } } }
        "404":
          description: "favorite_not_found"
        "500":
          description: "failed_to_delete_favorite (5 языков)"

  /v1/driver/recommended-cargo:
    get:
      tags: ["Drivers / Trips", "Cargo — Водитель"]
      summary: "Грузы, рекомендованные мне диспетчером"
      description: "Список грузов, которые диспетчер рекомендовал текущему водителю. Принять: POST .../accept; отказать: POST .../decline. Ответы на 5 языках."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 30 }
      responses:
        "200": { description: "data.items — cargo_id, cargo, status, created_at" }
  /v1/driver/recommended-cargo/{cargoId}/accept:
    post:
      tags: ["Drivers / Trips", "Cargo — Водитель"]
      summary: "Принять рекомендованный груз"
      description: "Водитель принимает груз; создаётся оффер по цене груза и автоматически принимается, создаётся рейс. data.trip_id, data.driver_id."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: cargoId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: data.cargo_id, data.trip_id, data.driver_id }
        "400": { description: recommendation not found or not PENDING }
        "409": { description: cargo already assigned }
  /v1/driver/recommended-cargo/{cargoId}/decline:
    post:
      tags: ["Drivers / Trips", "Cargo — Водитель"]
      summary: "Отказаться от рекомендованного груза"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: cargoId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: data.status = DECLINED }
        "400": { description: recommendation not found or not PENDING }

  /v1/driver/cargo-offers:
    get:
      tags: ["Drivers / Trips", "Cargo — Водитель"]
      summary: "Мои офферы по грузам"
      description: |
        Список офферов (запросов на перевозку), которые отправил текущий водитель.
        Фильтр по вкладкам через `bucket`:
        - `sent` = офферы со статусом PENDING
        - `accepted` = офферы со статусом ACCEPTED, но груз ещё НЕ COMPLETED
        - `completed` = офферы со статусом ACCEPTED и груз COMPLETED
        - `rejected` = офферы со статусом REJECTED
        Ответы на 5 языках (X-Language: ru, uz, en, tr, zh).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: bucket
          in: query
          required: false
          schema: { type: string, enum: [sent, accepted, completed, rejected], default: sent }
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 30, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: "data.items — массив (offer_id, cargo_id, status, price, currency, comment, rejection_reason, created_at, cargo{...}, trip{...}); data.total, data.page, data.limit"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "400": { description: invalid_cargo_offer_bucket }
        "401": { description: unauthorized }
        "500": { description: failed_to_list_cargo_offers (5 языков) }

  /v1/driver/active-cargo:
    get:
      tags: ["Drivers / Trips", "Cargo — Водитель"]
      summary: "Мой активный груз"
      description: |
        Возвращает текущий активный груз водителя (если водитель уже привязан к грузу как ACTIVE).
        Это отражает бизнес-правило: **1 водитель может быть только в одном активном грузе**.
        Ответы на 5 языках (заголовок X-Language: ru, uz, en, tr, zh).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: "active=true/false; если true — data.cargo = объект Cargo"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
              examples:
                en: { summary: "English", value: { status: "success", code: 200, description: "OK", data: { active: true, cargo: { id: "ebc30874-161a-4c29-b284-139e4e7d9120", vehicles_amount: 3, vehicles_left: 2, status: "SEARCHING_ALL" } } } }
                ru: { summary: "Русский", value: { status: "success", code: 200, description: "Успешно", data: { active: true, cargo: { id: "ebc30874-161a-4c29-b284-139e4e7d9120", vehicles_amount: 3, vehicles_left: 2, status: "SEARCHING_ALL" } } } }
                uz: { summary: "O'zbek", value: { status: "success", code: 200, description: "Muvaffaqiyatli", data: { active: true, cargo: { id: "ebc30874-161a-4c29-b284-139e4e7d9120", vehicles_amount: 3, vehicles_left: 2, status: "SEARCHING_ALL" } } } }
                tr: { summary: "Türkçe", value: { status: "success", code: 200, description: "Başarılı", data: { active: true, cargo: { id: "ebc30874-161a-4c29-b284-139e4e7d9120", vehicles_amount: 3, vehicles_left: 2, status: "SEARCHING_ALL" } } } }
                zh: { summary: "中文", value: { status: "success", code: 200, description: "成功", data: { active: true, cargo: { id: "ebc30874-161a-4c29-b284-139e4e7d9120", vehicles_amount: 3, vehicles_left: 2, status: "SEARCHING_ALL" } } } }

  /v1/driver/cargo/active:
    get:
      tags: ["Drivers / Profile", "Cargo — Водитель"]
      summary: "Активные грузы в поиске (каталог / маркетплейс для водителя)"
      description: |
        **Назначение:** список **активных** грузов в базе, по которым можно откликаться (по умолчанию статусы поиска: `SEARCHING_ALL`; для водителя компании дополнительно видны грузы `SEARCHING_COMPANY` своей компании по тем же правилам, что и `GET /api/cargo`).

        **Отличие от `GET /api/cargo`:** здесь не нужен общий `/api` — только JWT водителя; фильтры совместимы с `GET /api/cargo`.

        **Переводы `description` в ответе (X-Language):** ru, uz, en, tr, zh — как у `GET /api/cargo`.

        **Параметры (query):** `page`, `limit`, `sort` (`created_at:desc|asc`, `weight:asc|desc`, `status:asc|desc`), `status` (через запятую), `truck_type`, `weight_min`, `weight_max`, `created_from`, `created_to` (YYYY-MM-DD), `with_offers` (true/1), `q` (подстрока в названии груза), `company_id` (UUID — сузить по компании-владельцу груза).

        **Успех (200):** `data.items` — массив грузов (как в GET /api/cargo), `data.total` — всего записей по фильтру.

        **en:** Paginated list of cargo in search (default SEARCHING_ALL); company drivers also see SEARCHING_COMPANY for their company.

        **uz:** Qidiruvdagi yuklar ro‘yxati (standart filtrlar); kompaniya haydovchilari uchun qo‘shimcha qoidalar.

        **tr:** Arama durumundaki yükler; şirket sürücüleri için şirket kuralı.

        **zh:** 搜索中的货物分页列表；公司司机按公司规则可见。

      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: sort
          in: query
          schema: { type: string, example: "created_at:desc" }
        - name: status
          in: query
          description: "Через запятую. По умолчанию на сервере — SEARCHING_ALL если не указано."
          schema: { type: string, example: "SEARCHING_ALL,SEARCHING_COMPANY" }
        - name: truck_type
          in: query
          schema: { type: string }
        - name: weight_min
          in: query
          schema: { type: number, format: double }
        - name: weight_max
          in: query
          schema: { type: number, format: double }
        - name: created_from
          in: query
          schema: { type: string, format: date }
        - name: created_to
          in: query
          schema: { type: string, format: date }
        - name: with_offers
          in: query
          schema: { type: boolean }
        - name: q
          in: query
          description: "Поиск по подстроке в названии груза (ILIKE)"
          schema: { type: string }
        - name: company_id
          in: query
          description: "Опционально: только грузы этой компании (company_id в таблице cargo)"
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: "data.items, data.total — стандартный Envelope (description на языке X-Language)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
              examples:
                en: { summary: "English", value: { status: "success", code: 200, description: "OK", data: { items: [], total: 0 } } }
                ru: { summary: "Русский", value: { status: "success", code: 200, description: "Успешно", data: { items: [], total: 0 } } }
                uz: { summary: "O'zbek", value: { status: "success", code: 200, description: "Muvaffaqiyatli", data: { items: [], total: 0 } } }
                tr: { summary: "Türkçe", value: { status: "success", code: 200, description: "Başarılı", data: { items: [], total: 0 } } }
                zh: { summary: "中文", value: { status: "success", code: 200, description: "成功", data: { items: [], total: 0 } } }
        "401": { description: unauthorized }
        "500": { description: failed_to_list }

  /v1/driver/nearby-cargo:
    get:
      tags: ["Drivers / Profile", "Cargo — Водитель"]
      summary: "Ближайшие грузы по координатам водителя"
      description: |
        Возвращает грузы, отсортированные по расстоянию от точки (lat, lng) водителя до **точки погрузки** груза (route_point с is_main_load=true).
        Показываются только грузы со статусом SEARCHING_ALL (+ SEARCHING_COMPANY для водителей компании).
        Каждый элемент содержит distance_km (расстояние в км), origin_lat, origin_lng (координаты точки погрузки).
        Пагинация: page (с 1), limit (по умолчанию 20, макс. 100).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: lat
          in: query
          required: true
          description: "Широта водителя (-90..90)"
          schema: { type: number, format: double, example: 41.311 }
        - name: lng
          in: query
          required: true
          description: "Долгота водителя (-180..180)"
          schema: { type: number, format: double, example: 69.279 }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: |
            data.items — массив грузов. Каждый элемент содержит стандартные поля груза (id, name, weight, volume, truck_type, status, …) плюс:
              distance_km (число, расстояние в км до точки погрузки),
              origin_lat / origin_lng (координаты точки погрузки).
            data.total — общее количество подходящих грузов.
            data.page, data.limit — текущая страница и лимит.
        "400": { description: "lat/lng отсутствуют или некорректны" }
        "401": { description: unauthorized }

  /v1/driver/matching-cargo:
    get:
      tags: ["Drivers / Profile", "Cargo — Водитель"]
      summary: "Грузы, подходящие по типу транспорта водителя"
      description: |
        Возвращает грузы, у которых truck_type соответствует типу прицепа/полуприцепа водителя (trailer_plate_type из driver_trailers).
        Маппинг: TENTED→TENT, REEFER→REFRIGERATOR, FLATBED→FLATBED, TANKER→TANKER, BOX→TENT+OTHER, LOWBED→FLATBED+OTHER, остальные→OTHER.
        Если у водителя не указан прицеп — показываются все типы.
        Показываются только грузы со статусом SEARCHING_ALL (+ SEARCHING_COMPANY для водителей компании).
        Пагинация: page (с 1), limit (по умолчанию 20, макс. 100). Сортировка: по дате создания (новые первые).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: |
            data.items — массив грузов (стандартные поля: id, name, weight, volume, truck_type, status, …).
            data.total — общее количество подходящих грузов.
            data.page, data.limit — текущая страница и лимит.
            data.trailer_type — тип прицепа водителя (строка, например TENTED, или пустая если не указан).
            data.matched_types — массив truck_type, по которым фильтровалось (например ["TENT"]).
        "401": { description: unauthorized }
        "404": { description: driver not found }

  /v1/driver/trips:
    get:
      tags: ["Drivers / Trips"]
      summary: "Список моих рейсов"
      description: "Рейсы, назначенные текущему водителю. Требуется X-User-Token (driver). Опционально limit."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200": { description: data.items — массив рейсов }

  /v1/driver/trips/{id}/confirm:
    post:
      tags: ["Drivers / Trips"]
      summary: "Принять назначение на рейс"
      description: "Водитель подтверждает рейс; статус рейса → ASSIGNED. Рейс должен быть назначен этому водителю (driver_id = me)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: status ASSIGNED }
        "404": { description: trip not found or not assigned to you }

  /v1/driver/trips/{id}/reject:
    post:
      tags: ["Drivers / Trips"]
      summary: "Отклонить назначение на рейс"
      description: "Снимает водителя с рейса; диспетчер может назначить другого."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: status PENDING_DRIVER }
        "404": { description: trip not found }

  /v1/driver/trips/{id}/status:
    patch:
      tags: ["Drivers / Trips"]
      summary: "Сменить статус рейса (водитель)"
      description: "Тело: status (LOADING | EN_ROUTE | UNLOADING | COMPLETED | CANCELLED). Допустимые переходы по ТЗ."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [LOADING, EN_ROUTE, UNLOADING, COMPLETED, CANCELLED] }
              required: [status]
      responses:
        "200": { description: status }
        "400": { description: invalid status transition }
        "403": { description: trip not assigned to you }

  /v1/driver/driver-invitations:
    get:
      tags: ["Drivers / Driver invitations", "Freelance Dispatchers / Приглашения водителей"]
      summary: "Список приглашений для водителя"
      description: |
        **Водитель:** приглашения на свой номер телефона (от компании или от фриланс-диспетчера). Показывать в чате/разделе приглашений. По каждому приглашению водитель может принять (POST .../accept) или отказаться (POST .../decline).
        В ответе data.items — массив: token, type (company | freelance), company_id или dispatcher_id, expires_at, created_at.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: "data.items — приглашения (token, type, company_id/dispatcher_id, expires_at, created_at)"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            token: { type: string }
                            type: { type: string, enum: [company, freelance, unknown] }
                            company_id: { type: string, format: uuid }
                            dispatcher_id: { type: string, format: uuid }
                            phone: { type: string }
                            expires_at: { type: string, format: date-time }
                            created_at: { type: string, format: date-time }
  /v1/driver/driver-invitations/accept:
    post:
      tags: ["Drivers / Driver invitations", "Freelance Dispatchers / Приглашения водителей"]
      summary: "Принять приглашение (водитель)"
      description: |
        Тело: token. Телефон водителя должен совпадать с приглашением.
        **От компании:** после принятия у водителя устанавливается company_id. **От фриланс-диспетчера:** у водителя устанавливается freelancer_id = id диспетчера; у диспетчера в списке GET /v1/dispatchers/drivers появляется этот водитель.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
              required: [token]
            example:
              token: "a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789"
      responses:
        "200": { description: "data.company_id или data.freelancer_id" }
        "400": { description: invitation not found or expired }
        "403": { description: invitation was sent to another phone }
  /v1/driver/driver-invitations/decline:
    post:
      tags: ["Drivers / Driver invitations", "Freelance Dispatchers / Приглашения водителей"]
      summary: "Отказаться от приглашения (водитель)"
      description: "Тело: token. Приглашение должно быть на номер текущего водителя. Приглашение удаляется."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
              required: [token]
      responses:
        "200": { description: data.status = declined }
        "400": { description: invitation not found or expired }
        "403": { description: invitation was sent to another phone }

  /v1/driver/dispatchers:
    get:
      tags: ["Drivers / My dispatchers"]
      summary: "Список моих диспетчеров (водитель)"
      description: |
        **Водитель:** диспетчеры, с которыми связан: 1) фриланс-диспетчер (type=freelance), если принял его приглашение; 2) диспетчеры компании (type=company, company_role), если водитель в компании. В ответе data.items: id, name, phone (полный номер), work_status, has_photo, type, company_role (для type=company). Язык ответа по X-Language (en, ru, uz, tr, zh).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: "data.items — массив диспетчеров (id, name, phone, work_status, has_photo, type, company_role)"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, format: uuid }
                            name: { type: string }
                            phone: { type: string, description: "Номер телефона диспетчера полностью, например +998901234567" }
                            work_status: { type: string }
                            has_photo: { type: boolean }
                            type: { type: string, enum: [freelance, company] }
                            company_role: { type: string, description: "Только для type=company (owner, dispatcher и т.д.)" }
        "401": { description: driver not found }
  /v1/driver/dispatchers/{dispatcherId}:
    delete:
      tags: ["Drivers / My dispatchers"]
      summary: "Отвязаться от фриланс-диспетчера (водитель)"
      description: |
        **Водитель:** отвязаться от диспетчера (прекратить сотрудничество). Разрешено только если текущий водитель привязан к этому диспетчеру (driver.freelancer_id = dispatcherId). После успеха freelancer_id = null. Для диспетчеров компании отвязка через этот метод недоступна. Ответы на 5 языках (X-Language).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: dispatcherId
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: "UUID диспетчера, от которого отвязываемся"
      responses:
        "200":
          description: "data.status = unlinked"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  data:
                    type: object
                    properties:
                      status: { type: string, example: "unlinked" }
        "400": { description: invalid dispatcher id }
        "403": { description: this dispatcher is not linked to you }

  /v1/driver/dispatchers/catalog:
    get:
      tags: ["Drivers / My dispatchers"]
      summary: "Каталог всех фриланс-диспетчеров (водитель)"
      description: |
        **Водитель:** вернуть список всех фриланс-диспетчеров с пагинацией и фильтрами.
        Фильтры:
        - `limit` 1..100 (default 20)
        - `offset` >=0 (default 0)
        - `q` — поиск по `phone` или `name` (ILIKE)
        - `phone_hint` — prefix по `phone` (LIKE 'prefix%')
        - `status` — `account_status`
        - `work_status` — available/loaded/busy
        - `has_photo` — true/false
        - `rating_min`, `rating_max`
        **Важно:** `password` не возвращается.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, example: 20 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, example: 0 }
        - name: q
          in: query
          required: false
          schema: { type: string, example: "99890" }
        - name: phone_hint
          in: query
          required: false
          schema: { type: string, example: "+99890" }
        - name: status
          in: query
          required: false
          schema: { type: string, example: "active" }
        - name: work_status
          in: query
          required: false
          schema: { type: string, example: "available" }
        - name: has_photo
          in: query
          required: false
          schema: { type: boolean, example: true }
        - name: rating_min
          in: query
          required: false
          schema: { type: number, format: float, example: 4.5 }
        - name: rating_max
          in: query
          required: false
          schema: { type: number, format: float, example: 5 }
      responses:
        "200": { description: "data.items + data.total + limit/offset" }
        "400": { description: invalid payload }
        "401": { description: unauthorized }

  /v1/driver/dispatchers/hint:
    get:
      tags: ["Drivers / My dispatchers"]
      summary: "Hint по номеру диспетчера (водитель)"
      description: |
        **Водитель:** быстрый поиск (typeahead) фриланс-диспетчеров по префиксу номера.
        Параметры: `phone` (обязательно, prefix), `limit` (1..50, default 10).
        **Важно:** `password` не возвращается.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: phone
          in: query
          required: true
          schema: { type: string, example: "+99890" }
        - name: limit
          in: query
          required: false
          schema: { type: integer, example: 10 }
      responses:
        "200": { description: "data.items — массив диспетчеров" }
        "400": { description: phone required / invalid payload }
        "401": { description: unauthorized }

  /v1/driver/dispatcher-invitations:
    get:
      tags: ["Drivers / Invite dispatcher", "Freelance Dispatchers / Приглашения водителей"]
      summary: "Список приглашений диспетчерам (отправил водитель)"
      description: |
        **Водитель:** список приглашений, которые **я отправил** диспетчерам (по номеру телефона). В ответе data.items: token, dispatcher_phone, expires_at, created_at.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: "data.items — приглашения (token, dispatcher_phone, expires_at, created_at)"
        "401": { description: driver not found }
    post:
      tags: ["Drivers / Invite dispatcher", "Freelance Dispatchers / Приглашения водителей"]
      summary: "Пригласить диспетчера (водитель)"
      description: |
        **Водитель:** отправить приглашение диспетчеру по номеру телефона. Диспетчер увидит приглашение в GET /v1/dispatchers/invitations-from-drivers и может принять или отказать. Тело: phone (обязательно). В ответе — token (передать диспетчеру). Если водитель уже привязан к этому диспетчеру — 409 already_linked_to_this_dispatcher.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
              required: [phone]
      responses:
        "201": { description: "data.token, data.expires_in_hours" }
        "400": { description: phone required, invalid payload }
        "409": { description: already linked to this dispatcher }
  /v1/driver/dispatcher-invitations/{token}:
    delete:
      tags: ["Drivers / Invite dispatcher"]
      summary: "Отменить приглашение диспетчеру (водитель)"
      description: "Водитель отменяет отправленное приглашение. Только своё приглашение."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: ok }
        "403": { description: not your invitation }
        "404": { description: invitation not found or expired }

  /v1/dispatchers/invitations-from-drivers:
    get:
      tags: ["Freelance Dispatchers / Invitations from drivers", "Freelance Dispatchers / Приглашения водителей"]
      summary: "Приглашения от водителей (диспетчер)"
      description: |
        **Диспетчер:** список приглашений, которые **водители отправили мне** (на мой номер телефона). В ответе data.items: token, driver_id, driver_name, driver_phone, dispatcher_phone, expires_at, created_at. По token принять (POST .../accept) или отказать (POST .../decline).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: "data.items — приглашения от водителей (token, driver_id, driver_name, driver_phone, expires_at)"
        "401": { description: dispatcher not found }
  /v1/dispatchers/invitations-from-drivers/accept:
    post:
      tags: ["Freelance Dispatchers / Invitations from drivers", "Freelance Dispatchers / Приглашения водителей"]
      summary: "Принять приглашение от водителя (диспетчер)"
      description: |
        **Диспетчер:** принять приглашение от водителя. Тело: token. Приглашение должно быть на мой номер. После принятия у водителя устанавливается freelancer_id = я; водитель появится в GET /v1/dispatchers/drivers.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
              required: [token]
      responses:
        "200": { description: "data.driver_id" }
        "400": { description: invitation not found or expired }
        "403": { description: invitation was sent to another phone }
  /v1/dispatchers/invitations-from-drivers/decline:
    post:
      tags: ["Freelance Dispatchers / Invitations from drivers", "Freelance Dispatchers / Приглашения водителей"]
      summary: "Отказать от приглашения водителя (диспетчер)"
      description: "Тело: token. Приглашение должно быть на мой номер. Приглашение удаляется."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
              required: [token]
      responses:
        "200": { description: data.status = declined }
        "400": { description: invitation not found or expired }
        "403": { description: invitation was sent to another phone }

  /v1/admin/auth/login/password:
    post:
      tags: ["Admin / Auth"]
      summary: "Вход админа (логин + пароль)"
      description: |
        **Безопасность:** Проверяются только X-Device-Type, X-Language, X-Client-Token (admin token не требуется — это вход). Остальные методы Admin требуют также X-User-Token (JWT админа).
        **Поток:** Передаёте login и password из таблицы admins. В ответе — tokens (access_token, refresh_token) и объект admin. Для вызова методов Admin / Companies передавайте X-User-Token = access_token и X-Client-Token.
        **Данные:** login, password (обязательно).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login: { type: string, example: "admin" }
                password: { type: string, example: "secret123" }
              required: [login, password]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  tokens: { $ref: "#/components/schemas/Tokens" }
                  admin:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      login: { type: string }
                      name: { type: string }
                      status: { type: string, example: "active" }
                      type: { type: string, example: "creator" }
        "400": { description: invalid payload }
        "401": { description: invalid login or password }

  /v1/admin/companies:
    post:
      tags: ["Admin / Companies"]
      summary: "Создать компанию (шаг 1 — без владельца)"
      description: |
        **Безопасность:** Только админ. Проверяются X-Client-Token и X-User-Token (JWT с role=admin); при неверном или отсутствующем токене — 401.
        **Шаг 1 из 2.** Создаёт только компанию. Владелец (CEO) не указывается. В теле: name (обязательно), company_type (только CARGO_OWNER / CARRIER / EXPEDITOR), inn, address, phone, email, website, license_number, status, лимиты. В ответе — company_id. Назначить основателя (CEO) — отдельно через **PATCH /v1/admin/companies/{id}/owner** (шаг 2).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: "My Logistics LLC" }
                company_type: { type: string, enum: [CARGO_OWNER, CARRIER, EXPEDITOR], nullable: true, description: "CARGO_OWNER (компания-грузовладелец), CARRIER (компания-перевозчик), EXPEDITOR (экспедитор / универсальная логистическая компания)" }
                inn: { type: string, nullable: true }
                address: { type: string, nullable: true }
                phone: { type: string, nullable: true }
                email: { type: string, nullable: true }
                website: { type: string, nullable: true }
                license_number: { type: string, nullable: true }
                status: { type: string, nullable: true, example: "pending" }
                max_vehicles: { type: integer, example: 10 }
                max_drivers: { type: integer, example: 50 }
                max_cargo: { type: integer, example: 0 }
                max_dispatchers: { type: integer, example: 5 }
                max_managers: { type: integer, example: 5 }
                max_top_dispatchers: { type: integer, example: 1 }
                max_top_managers: { type: integer, example: 1 }
              required: [name]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  company_id: { type: string, format: uuid }
        "400": { description: invalid payload }
        "401": { description: unauthorized }

  /v1/admin/companies/{id}/owner:
    patch:
      tags: ["Admin / Companies"]
      summary: "Назначить владельца компании (шаг 2)"
      description: |
        **Безопасность:** Только админ. Проверяются X-Client-Token и X-User-Token (JWT с role=admin); при неверном или отсутствующем токене — 401.
        **Шаг 2 из 2.** Привязывает основателя компании (CEO). owner_id — UUID из **company_users** с **role=CEO**. После успешного вызова: у компании — owner_id (CEO) и status=active, у пользователя в company_users — company_id (двусторонняя связь).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: "UUID компании (company_id из ответа POST /v1/admin/companies)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [owner_id]
              properties:
                owner_id: { type: string, format: uuid, description: "UUID основателя (company_users.id); у пользователя role должен быть CEO" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  message: { type: string, example: "owner set, status set to active" }
        "400": { description: "invalid company id, invalid owner_id, or owner_id is not a user with role 'owner'" }
        "401": { description: unauthorized }

  /v1/admin/company-users/owners/search:
    get:
      tags: ["Admin / Companies"]
      summary: "Поиск владельцев (для назначения owner компании)"
      description: |
        **Безопасность:** Только админ. Проверяются X-Client-Token и X-User-Token (JWT с role=admin); при неверном или отсутствующем токене — 401.
        Поиск в таблице **company_users** только пользователей с **role = owner**. Поиск по телефону, имени или фамилии (параметр q). Результаты по релевантности: точное совпадение → начинается с → содержит.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
          description: "Строка поиска (телефон, имя или фамилия); частичное совпадение, без учёта регистра"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  code: { type: integer }
                  description: { type: string }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        phone: { type: string }
                        first_name: { type: string, nullable: true }
                        last_name: { type: string, nullable: true }
                        company_id: { type: string, format: uuid, nullable: true }
                        role: { type: string, nullable: true }
                        created_at: { type: string, format: date-time }
                        updated_at: { type: string, format: date-time }
        "401": { description: unauthorized }

  /v1/admin/cargo/moderation:
    get:
      tags: ["Admin / Cargo moderation"]
      summary: "Список грузов на модерации"
      description: "Грузы со статусом PENDING_MODERATION. Админ принимает (accept → SEARCHING_ALL или SEARCHING_COMPANY) или отклоняет (reject → REJECTED с обязательной причиной). Ответы на 5 языках."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200": { description: "data.items, data.total" }
  /v1/admin/cargo/{id}/moderation/accept:
    post:
      tags: ["Admin / Cargo moderation"]
      summary: "Принять груз (модерация)"
      description: |
        Статус груза → **SEARCHING_ALL** (виден всем водителям) или **SEARCHING_COMPANY** (только водителям компании).
        В теле опционально передаётся **search_visibility**: `"all"` (по умолчанию) или `"company"`.
        Для грузов, созданных **фриланс-диспетчером** (created_by_type=DISPATCHER), всегда применяется только `"all"` (выбор company недоступен).
        Для грузов **компании** (created_by_type=COMPANY) админ может выбрать — показывать груз всем или только водителям этой компании.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                search_visibility: { type: string, enum: [all, company], description: "all — груз виден всем (SEARCHING_ALL); company — только водителям компании (SEARCHING_COMPANY). Для диспетчера игнорируется." }
      responses:
        "200": { description: "data.status = SEARCHING_ALL или SEARCHING_COMPANY" }
        "400": { description: cargo not pending moderation }
  /v1/admin/cargo/{id}/moderation/reject:
    post:
      tags: ["Admin / Cargo moderation"]
      summary: "Отклонить груз (модерация)"
      description: "Статус → REJECTED. Причина отклонения обязательна (reason)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
              required: [reason]
      responses:
        "200": { description: "data.status = REJECTED" }
        "400": { description: reason required, or cargo not pending moderation }

  /v1/chat/conversations:
    get:
      tags: [Chat]
      summary: "Список диалогов"
      description: "Список диалогов текущего пользователя. Авторизация: X-User-Token (JWT) или X-User-ID (UUID для теста в Swagger)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: "data.conversations = [{ id, peer_id, created_at }, ...]"
        "401": { description: unauthorized }
    post:
      tags: [Chat]
      summary: "Получить или создать диалог с пользователем"
      description: "body.peer_id — UUID второго участника (водитель/диспетчер). Возвращает id диалога и peer_id."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [peer_id], properties: { peer_id: { type: string, format: uuid } } }
      responses:
        "200":
          description: "data = { id, peer_id, created_at }"
        "400": { description: invalid peer_id or same user }
        "401": { description: unauthorized }

  /v1/chat/conversations/{id}/messages:
    get:
      tags: [Chat]
      summary: "История сообщений диалога"
      description: "Пагинация: cursor = id последнего сообщения из предыдущей страницы, limit (по умолчанию 50)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: cursor
          in: query
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: "data.messages = [Message, ...]"
        "401": { description: unauthorized }
    post:
      tags: [Chat]
      summary: "Отправить сообщение"
      description: "body.body — текст сообщения. Сообщение сохраняется и рассылается по WebSocket участникам диалога."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [body], properties: { body: { type: string } } }
      responses:
        "201":
          description: "data = ChatMessage"
        "400": { description: invalid body }
        "401": { description: unauthorized }
        "404": { description: conversation not found }

  /v1/chat/conversations/{id}/messages/media:
    post:
      tags: [Chat]
      summary: "Отправить медиа (фото/голос/видео/кружок)"
      description: |
        Загружает файл, оптимизирует «как в Telegram» и создаёт сообщение:
        - **PHOTO** → JPEG (оптимизация/пережатие)
        - **VOICE** → OGG/Opus (моно, 48kHz, ~32kbps)
        - **VIDEO** → MP4 (H.264/AAC) + faststart + thumbnail (по возможности)
        - **VIDEO_NOTE** → квадратный MP4 (под UI-кружок) + thumbnail

        Файл хранится на диске сервера, в БД сохраняются метаданные. В `payload` сообщения возвращается `attachment_id` и `url` для скачивания.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [type, file]
              properties:
                type: { type: string, enum: [PHOTO, VOICE, VIDEO, VIDEO_NOTE] }
                body: { type: string, nullable: true, description: "Подпись/текст (опционально)" }
                file: { type: string, format: binary }
            examples:
              voice:
                summary: "VOICE (голосовое)"
                value:
                  type: "VOICE"
                  body: "Голосовое сообщение"
              photo:
                summary: "PHOTO (фото)"
                value:
                  type: "PHOTO"
                  body: "Фото с погрузки"
              video:
                summary: "VIDEO (видео)"
                value:
                  type: "VIDEO"
                  body: "Видео с места"
              video_note:
                summary: "VIDEO_NOTE (кружок)"
                value:
                  type: "VIDEO_NOTE"
                  body: "Кружок"
      responses:
        "201":
          description: "data = ChatMessage (type=PHOTO/VOICE/VIDEO/VIDEO_NOTE; payload содержит url)"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/ChatMessage" }
        "400": { description: invalid payload/file }
        "401": { description: unauthorized }
        "404": { description: conversation not found }

  /v1/chat/messages/{id}:
    patch:
      tags: [Chat]
      summary: "Редактировать своё сообщение"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [body], properties: { body: { type: string } } }
      responses:
        "200": { description: "data = ChatMessage" }
        "404": { description: message not found or not yours }
    delete:
      tags: [Chat]
      summary: "Удалить своё сообщение (мягкое удаление)"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "data.deleted = true" }
        "404": { description: message not found or not yours }

  /v1/chat/presence/{user_id}:
    get:
      tags: [Chat]
      summary: "Онлайн / печатает / последний раз в сети"
      description: "Для user_id возвращает online, last_seen (unix), опционально typing в контексте conversation_id (query)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: conversation_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "data = ChatPresence" }
        "400": { description: invalid user_id }

  /v1/chat/files/{id}:
    get:
      tags: [Chat]
      summary: "Скачать медиа-файл сообщения"
      description: |
        Возвращает файл вложения по `attachment_id`, если текущий пользователь является участником диалога.

        Query:
        - `thumb=1` — вернуть thumbnail (если есть).

        **Кеширование (как в Telegram):**
        - Отдаётся с `Cache-Control: public, max-age=31536000, immutable`
        - `ETag` соответствует sha256 контента (для dedup и 304 Not Modified)
        - При включённом `CHAT_USE_X_ACCEL=1` сервер отвечает через `X-Accel-Redirect`, а Nginx отдаёт файл с поддержкой Range (видео) и быстрым кешем
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: thumb
          in: query
          required: false
          schema: { type: string, example: "1" }
      responses:
        "200":
          description: "Binary file stream"
        "401": { description: unauthorized }
        "404": { description: not found or access denied }

  /v1/chat/ws:
    get:
      tags: [Chat]
      summary: "WebSocket чат"
      description: |
        Подключение к чату в реальном времени. Авторизация через query: **token=JWT**.
        После подключения: отправка типа "typing" с data.conversation_id; получение событий "message" и "typing".

        **Дополнительно (Calls / WebRTC signaling):**
        Сервер принимает от клиента события `webrtc.offer`, `webrtc.answer`, `webrtc.ice`, `call.end` и пересылает peer'у, если отправитель является участником `call_id`.

        **Формат клиента → сервер:**
        `{ "type": "webrtc.offer", "data": { "call_id": "<uuid>", "payload": { ... } } }`

        **Формат сервер → peer:**
        `{ "type": "webrtc.offer", "data": { "call_id": "<uuid>", "from_id": "<uuid>", "payload": { ... } } }`
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: token
          in: query
          description: JWT access token
          schema: { type: string }
      responses:
        "101": { description: Switching Protocols (WebSocket) }
        "401": { description: unauthorized }

  /v1/calls:
    get:
      tags: ["Calls (Voice)"]
      summary: "Список моих звонков"
      description: |
        Возвращает последние звонки (я как caller или callee), отсортировано по created_at DESC.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 50, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  code: { type: integer, example: 200 }
                  description: { type: string, example: "ok" }
                  data:
                    type: object
                    properties:
                      calls:
                        type: array
                        items: { $ref: "#/components/schemas/Call" }
                required: [status, code, description, data]
        "401": { description: unauthorized }
    post:
      tags: ["Calls (Voice)"]
      summary: "Создать исходящий звонок (RINGING)"
      description: |
        Создаёт звонок со статусом **RINGING** и best-effort отправляет событие `call.invite` в WebSocket peer'а (если он онлайн).
        Для защиты от двойного тапа используйте `client_request_id` (идемпотентность по caller_id + client_request_id).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CallCreateRequest" }
            examples:
              basic:
                summary: "Позвонить peer"
                value:
                  peer_id: "11111111-1111-1111-1111-111111111111"
                  client_request_id: "ui-tap-1700000000"
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  code: { type: integer, example: 201 }
                  description: { type: string, example: "created" }
                  data:
                    type: object
                    properties:
                      call: { $ref: "#/components/schemas/Call" }
                required: [status, code, description, data]
        "400": { description: invalid payload }
        "401": { description: unauthorized }
        "409":
          description: busy (caller or peer has ongoing call)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
              examples:
                caller_busy:
                  summary: "Caller already in RINGING/ACTIVE"
                  value:
                    status: "error"
                    code: 409
                    description: "Вы уже в звонке"
                    data: null
                peer_busy:
                  summary: "Peer already in RINGING/ACTIVE"
                  value:
                    status: "error"
                    code: 409
                    description: "Пользователь занят"
                    data: null
        "429":
          description: rate limited
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
              example:
                status: "error"
                code: 429
                description: "Слишком много запросов, попробуйте позже"
                data: null

  /v1/calls/test/bootstrap:
    get:
      tags: ["Calls (Voice) / Test Lab"]
      summary: "Bootstrap для ручного теста voice call"
      description: |
        Возвращает готовые подсказки для теста звонков на 2 устройства:
        - ссылки на `/docs`, `/ws-test`, `/calls-test`

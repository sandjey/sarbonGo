  /v1/reference/dispatchers:
    get:
      tags: ["Reference / Freelance Dispatchers"]
      summary: "Справочник Freelance Dispatchers — work_status"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/ReferenceDispatchersResponse" }

  /v1/reference/cities:
    get:
      tags: ["Reference / Cargo", "Freelance Dispatchers / Добавление груза"]
      summary: "Справочник городов (все города мира)"
      description: |
        Справочник городов на основе библиотеки tidwall/cities (~10k городов) + доп. список для UZ, AE, TM, KG, TJ (Ташкент TAS, Самарканд SAM, Дубай DXB и др.). Ответ из памяти — быстрый hit API.
        В route_points указывается city_code из этого справочника.
        **Query:** country_code (опционально) — фильтр по стране (UZ, AE, KZ, RU и т.д.); q (опционально) — универсальный поиск по коду/названию (совпадения сверху).
        Поле **name** возвращается на языке заголовка **X-Language** (ru | uz | en | tr | zh). Так как датасет фактически ru/en, для языков uz/tr/zh используется fallback на **en**, и только если en отсутствует — на ru.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: country_code
          in: query
          schema: { type: string, example: "UZ" }
          description: "Фильтр по коду страны (UZ, AE, KZ, RU и т.д.)"
        - name: q
          in: query
          required: false
          schema: { type: string, example: "tas" }
          description: "Универсальный поиск по code (TAS) или по названию города (ru/en), независимо от X-Language. Совпадения сверху."
      responses:
        "200":
          description: "data.items — массив { id, code, name, country_code, lat, lng }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, format: uuid }
                            code: { type: string, example: "TAS" }
                            name: { type: string, example: "Ташкент" }
                            country_code: { type: string, example: "UZ" }
                            lat: { type: number, nullable: true }
                            lng: { type: number, nullable: true }

  /v1/reference/cargo-types/hint:
    get:
      tags: ["Reference / Cargo"]
      summary: "Подсказка по типам груза (cargo_types)"
      description: |
        Возвращает список типов груза из таблицы **cargo_types**.

        - Язык названий определяется заголовком **X-Language** (ru, uz, en, tr, zh) — выбирается соответствующая колонка name_ru/name_uz/name_en/name_tr/name_zh.
        - Параметр **q** (опционально) фильтрует по подстроке в названии на выбранном языке.

        Используется как hint для поля `cargo_type_id` в `POST /api/cargo` (подбор типа груза из справочника).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string, example: "пшеница" }
          description: "Фильтр по подстроке в названии типа груза (с учётом выбранного X-Language)"
      responses:
        "200":
          description: "data.items — массив типов груза"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                id: { type: string, format: uuid, description: "UUID записи cargo_types" }
                                code: { type: string, description: "Код типа груза (UPPERCASE, латиницей)" }
                                name: { type: string, description: "Название типа груза на языке X-Language" }

  /v1/reference/countries:
    get:
      tags: ["Reference / Cargo", "Freelance Dispatchers / Добавление груза"]
      summary: "Справочник стран (коды ISO + имя на языке X-Language)"
      description: |
        Возвращает **все** известные коды стран (ISO 3166-1 alpha-2) и поле **name** на языке, заданном заголовком **X-Language** (ru | uz | en | tr | zh).
        Если перевод для конкретной страны отсутствует, сервер вернёт английское имя как fallback.
        Используйте для UI фильтра по стране перед вызовом GET /v1/reference/cities?country_code=...
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string, example: "uz" }
          description: "Универсальный поиск по коду страны (например UZ) или по названию страны на любом из языков (ru/uz/en/tr/zh), независимо от X-Language. В ответе name всегда на языке X-Language. Совпадения сверху."
      responses:
        "200":
          description: "data.items — массив { code, name }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            code: { type: string, example: "UZ" }
                            name: { type: string, example: "Узбекистан" }
        "400":
          description: "invalid X-Language (allowed: ru, uz, en, tr, zh)"

  /v1/driver/auth/phone:
    post:
      tags: ["Drivers / Auth"]
      summary: "Шаг 1. Отправить OTP на телефон"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение).
        **Назначение:** Запрос кода подтверждения. Телефон в формате +998XXXXXXXXX. OTP отправляется через Telegram Gateway. Ответ: status=otp_sent, ttl_seconds. Дальше — ввод кода и вызов /v1/driver/auth/otp/verify.
        **Данные:** В теле только phone (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998331108810" }
              required: [phone]
      responses:
        "200":
          description: OTP отправлен
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "otp_sent" }
                  ttl_seconds: { type: integer, example: 180 }
                required: [status, ttl_seconds]
        "400":
          description: Некорректный payload / телефон; или no account — у номера нет аккаунта Telegram
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "429":
          description: Cooldown / rate limit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "502":
          description: OTP не отправлен (ошибка шлюза/сети), message — otp send failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/auth/otp/verify:
    post:
      tags: ["Drivers / Auth"]
      summary: "Шаг 2. Подтвердить OTP"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение).
        **Назначение:** Ввод кода из шага 1. Если номер уже в drivers → status=login и tokens (вход выполнен). Если новый → status=register и session_id для регистрации (POST /v1/driver/registration/start), JWT пока не выдаётся.
        **Данные:** phone, otp (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998331108810" }
                otp: { type: string, example: "123456" }
              required: [phone, otp]
      responses:
        "200":
          description: Login или сессия регистрации
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      status: { type: string, example: "login" }
                      tokens: { $ref: "#/components/schemas/Tokens" }
                    required: [status, tokens]
                  - type: object
                    properties:
                      status: { type: string, example: "register" }
                      session_id: { type: string, format: uuid }
                    required: [status, session_id]
        "401":
          description: OTP неверный/истёк
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "429":
          description: Превышено количество попыток
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/registration/start:
    post:
      tags: ["Drivers / Registration"]
      summary: "Шаг 3. Создать профиль (имя + оферта)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение), после otp/verify при status=register.
        **Назначение:** Создание записи в drivers: registration_status=start, registration_step=name-oferta. В ответе — tokens и объект driver; дальше все запросы с X-User-Token.
        **Данные:** session_id (из otp/verify), name, oferta_accepted (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                name: { type: string, example: "Ali Valiyev" }
                oferta_accepted: { type: boolean, example: true }
              required: [session_id, name, oferta_accepted]
      responses:
        "200":
          description: Профиль создан + токены
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "registered" }
                  tokens: { $ref: "#/components/schemas/Tokens" }
                  driver: { $ref: "#/components/schemas/Driver" }
                  registration_status: { type: string, example: "start" }
                  registration_step: { type: string, example: "name-oferta" }
                required: [status, tokens]
        "401":
          description: session_id неверный/истёк
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/profile:
    get:
      tags: ["Drivers / Profile"]
      summary: "Получить профиль водителя"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). Обязателен X-User-Token (JWT).
        **Назначение:** Получение текущего профиля — все поля водителя (id, phone, name, паспорт, ТС, прицеп, registration_step, work_status и т.д.). В ответе data — объект driver.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401":
          description: Не авторизован
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
    delete:
      tags: ["Drivers / Profile"]
      summary: "Удалить профиль водителя"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). Обязателен X-User-Token.
        **Назначение:** Жёсткое удаление аккаунта: запись переносится в deleted_drivers, из drivers удаляется. Связанные рейсы (trips) отвязываются от водителя (driver_id = NULL), затем удаляется строка водителя.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401":
          description: Не авторизован
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "404":
          description: Водитель не найден (driver_not_found)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/profile/driver:
    patch:
      tags: ["Drivers / Profile"]
      summary: "Редактировать данные водителя (имя, статус, паспорт)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Частичное обновление: name, work_status (available/loaded/busy), driver_passport_series, driver_passport_number, driver_pinfl. Остальные поля не меняются.
        **Данные:** В теле только те поля, которые нужно изменить.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: "Ali Valiyev" }
                work_status:
                  type: string
                  enum: ["available","loaded","busy"]
                  example: "available"
                driver_passport_series: { type: string, example: "AB" }
                driver_passport_number: { type: string, example: "1234567" }
                driver_pinfl: { type: string, example: "12345678901234" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/profile/heartbeat:
    put:
      tags: ["Drivers / Profile"]
      summary: "Обновить гео и время последней активности"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Обновление координат (и при необходимости last_online_at) в профиле водителя.
        **Данные:** только latitude и longitude. last_online_at в API не передаётся — обновляется на сервере автоматически (в т.ч. при каждом запросе водителя).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                latitude: { type: number, format: double, example: 41.311081 }
                longitude: { type: number, format: double, example: 69.240562 }
              required: ["latitude","longitude"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/profile/photo:
    post:
      tags: ["Drivers / Profile"]
      summary: "Загрузить фото водителя"
      description: |
        **Формат:** multipart/form-data, поле **photo** — файл изображения (image/jpeg или image/png). Макс. размер 10 MB.
        Фото необязательно при регистрации; можно добавить или обновить когда угодно. Сохраняется в БД. В профиле (GET /profile) поле has_photo будет true; само изображение — через GET /v1/driver/profile/photo.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
                  description: "Файл изображения (JPEG или PNG, макс. 10 MB)"
      responses:
        "200":
          description: Фото сохранено
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  data:
                    type: object
                    properties:
                      status: { type: string, example: "ok" }
                      event: { type: string, example: "photo_uploaded" }
        "400": { description: "Нет файла, неверный тип или размер" }
        "401": { description: Не авторизован }
    get:
      tags: ["Drivers / Profile"]
      summary: "Получить фото водителя"
      description: |
        Возвращает загруженное фото (бинарные данные) с заголовком Content-Type (image/jpeg или image/png).
        Если фото не загружалось — 404.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: Изображение
          content:
            image/jpeg: { schema: { type: string, format: binary } }
            image/png: { schema: { type: string, format: binary } }
        "401": { description: Не авторизован }
        "404": { description: Фото не найдено }
    delete:
      tags: ["Drivers / Profile"]
      summary: "Удалить фото водителя"
      description: |
        Удаляет загруженное фото из профиля. Можно вызвать когда угодно; если фото не было — операция всё равно успешна (no-op).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: Фото удалено
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  data:
                    type: object
                    properties:
                      status: { type: string, example: "ok" }
                      event: { type: string, example: "photo_deleted" }
        "401": { description: Не авторизован }

  /v1/driver/profile/phone-change/request:
    post:
      tags: ["Drivers / Profile"]
      summary: "Смена телефона — запрос OTP"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Запрос OTP на новый номер. Если номер уже занят — ошибка. Иначе OTP отправлен, возвращается session_id для шага verify.
        **Данные:** new_phone (обязательно, формат +998XXXXXXXXX).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_phone: { type: string, example: "+998901234567" }
              required: ["new_phone"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "400": { description: Некорректный new_phone; или no account — у номера нет аккаунта Telegram }
        "502": { description: otp send failed — OTP не отправлен }

  /v1/driver/profile/phone-change/verify:
    post:
      tags: ["Drivers / Profile"]
      summary: "Смена телефона — подтверждение OTP"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Подтверждение смены телефона. Передаёте session_id из request и otp. При успехе обновляется drivers.phone; при ошибке — сообщение об ошибке.
        **Данные:** session_id, otp (обязательно).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                otp: { type: string, example: "123456" }
              required: ["session_id","otp"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/profile/power:
    patch:
      tags: ["Drivers / Profile"]
      summary: "Редактировать данные тягача (Power Unit)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Обновление полей тягача: power_plate_number, power_tech_series, power_tech_number, power_owner_name, power_scan_status.
        **Данные:** В теле только изменяемые поля тягача.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                power_plate_number: { type: string, example: "01A123BC" }
                power_tech_series: { type: string, example: "AA" }
                power_tech_number: { type: string, example: "9876543" }
                power_owner_name: { type: string, example: "Ali Valiyev" }
                power_scan_status: { type: boolean, example: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/profile/trailer:
    patch:
      tags: ["Drivers / Profile"]
      summary: "Редактировать данные прицепа (Trailer Unit)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Обновление полей прицепа: trailer_plate_number, trailer_tech_series, trailer_tech_number, trailer_owner_name, trailer_scan_status.
        **Данные:** В теле только изменяемые поля прицепа.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trailer_plate_number: { type: string, example: "01A123BC" }
                trailer_tech_series: { type: string, example: "AA" }
                trailer_tech_number: { type: string, example: "9876543" }
                trailer_owner_name: { type: string, example: "Ali Valiyev" }
                trailer_scan_status: { type: boolean, example: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/registration/geo-push:
    patch:
      tags: ["Drivers / Registration"]
      summary: "Шаг 4. Указать гео и push-токен"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** При передаче latitude и longitude — registration_step переводится в geo-push (если ещё не transport-type). push_token сохраняется в любом случае. Без гео шаг не меняется.
        **Данные:** latitude, longitude (опц.), push_token (опц.).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                latitude: { type: number, format: double, example: 41.311081 }
                longitude: { type: number, format: double, example: 69.240562 }
                push_token: { type: string, example: "optional-device-token" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  driver: { $ref: "#/components/schemas/Driver" }
                required: [status, driver]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/registration/transport-type:
    patch:
      tags: ["Drivers / Registration"]
      summary: "Шаг 5. Выбрать тип транспорта"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Указание типа водителя и ТС. После успешного запроса: registration_step=transport-type, registration_status=basic. Справочники кодов: GET /v1/driver/transport-options.
        **Данные:** driver_type (company/freelancer/driver), power_plate_type, trailer_plate_type (обязательно); freelancer_id, company_id (опц.).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_type:
                  type: string
                  enum: ["company","freelancer","driver"]
                  example: "driver"
                power_plate_type:
                  type: string
                  example: "uz_private"
                trailer_plate_type:
                  type: string
                  example: "uz_private"
                freelancer_id: { type: string, format: uuid, nullable: true }
                company_id: { type: string, format: uuid, nullable: true }
              required: ["driver_type","power_plate_type","trailer_plate_type"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  driver: { $ref: "#/components/schemas/Driver" }
                required: [status, driver]

  /v1/driver/kyc:
    patch:
      tags: ["Drivers / KYC"]
      summary: "Отправить KYC (паспорт, ТС, прицеп)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Загрузка документов: driver_data (паспорт, PINFL, driver_scan_status), power_data (тягач: номер, техпаспорт, владелец, power_scan_status), trailer_data (прицеп — то же или не указывать), driver_owner (true/false). registration_status=full выставляется только при полном и подтверждённом заполнении (scan_status=true где нужно).
        **Данные:** driver_owner, driver_data, power_data, trailer_data (все блоки обязательны).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_owner: { type: boolean, example: true }
                driver_data:
                  type: object
                  properties:
                    driver_passport_series: { type: string, example: "AB" }
                    driver_passport_number: { type: string, example: "1234567" }
                    driver_pinfl: { type: string, example: "12345678901234" }
                    driver_scan_status: { type: boolean, example: true }
                  required: ["driver_passport_series","driver_passport_number","driver_pinfl","driver_scan_status"]
                power_data:
                  type: object
                  properties:
                    power_plate_number: { type: string, example: "01A123BC" }
                    power_tech_series: { type: string, example: "AA" }
                    power_tech_number: { type: string, example: "9876543" }
                    power_owner_name: { type: string, example: "Ali Valiyev" }
                    power_scan_status: { type: boolean, example: true }
                  required: ["power_plate_number","power_tech_series","power_tech_number","power_owner_name","power_scan_status"]
                trailer_data:
                  type: object
                  properties:
                    trailer_plate_number: { type: string, example: "01A123BC" }
                    trailer_tech_series: { type: string, example: "AA" }
                    trailer_tech_number: { type: string, example: "9876543" }
                    trailer_owner_name: { type: string, example: "Ali Valiyev" }
                    trailer_scan_status: { type: boolean, example: true }
                  required: ["trailer_plate_number","trailer_tech_series","trailer_tech_number","trailer_owner_name","trailer_scan_status"]
              required:
                - driver_owner
                - driver_data
                - power_data
                - trailer_data
      responses:
        "200":
          description: |
            Успех. Тело в стандартной обёртке API: `data` содержит поля ниже (корневые `status`/`code`/`description` — см. общую схему ответа).
          content:
            application/json:
              schema:
                type: object
                description: "Поле data в Envelope"
                properties:
                  event: { type: string, example: "updated" }
                  is_full: { type: boolean, example: true, description: "true если все блоки заполнены и scan_status подтверждены" }
                  driver: { $ref: "#/components/schemas/Driver" }
                required: [event, is_full, driver]

  /v1/driver/auth/refresh:
    post:
      tags: ["Drivers / Auth"]
      summary: "Обновить JWT токены (водитель)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение) при истёкшем или скоро истекающем access_token.
        **Назначение:** По refresh_token выдать новую пару access_token + refresh_token. В ответе tokens с expires_in, expires_at, refresh_expires_at (Unix).
        **Тело:** { "refresh_token": "..." }. После вызова старый refresh_token недействителен (rotation).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401":
          description: invalid refresh_token

  /v1/dispatchers/auth/refresh:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: "Обновить JWT токены (диспетчер)"
      description: |
        **Кто вызывает:** Диспетчер при истёкшем/скоро истекающем access_token.
        **Тело:** { "refresh_token": "..." }. В ответе — tokens (access_token, refresh_token, expires_in, expires_at, refresh_expires_at).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401":
          description: invalid refresh_token

  /v1/admin/auth/refresh:
    post:
      tags: ["Admin / Auth"]
      summary: "Обновить JWT токены (админ)"
      description: |
        **Кто вызывает:** Админ при истёкшем access_token.
        **Тело:** { "refresh_token": "..." }. В ответе — tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401":
          description: invalid refresh_token

  /v1/company-users/auth/refresh:
    post:
      tags: ["Company / App user auth"]
      summary: "Обновить JWT токены (пользователь компании)"
      description: |
        **Кто вызывает:** Пользователь компании (app user) при истёкшем access_token.
        **Тело:** { "refresh_token": "..." }. В ответе — tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401":
          description: invalid refresh_token

  /v1/driver/auth/logout:
    post:
      tags: ["Drivers / Auth"]
      summary: "Выход (отзыв сессии)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение).
        **Назначение:** Инвалидация сессии. Передайте **refresh_token** — отзывается одна сессия (этот refresh больше нельзя использовать). Передайте **access_token** — отзываются все сессии водителя. Нужен хотя бы один из токенов.
        **Валидация:** при невалидном или истёкшем токене возвращается 401.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string, description: "JWT refresh — отзыв одной сессии" }
                access_token: { type: string, description: "JWT access — отзыв всех сессий водителя" }
      responses:
        "200":
          description: OK (сессия/сессии инвалидированы)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                required: [status]
        "400": { description: Нет ни refresh_token, ни access_token }
        "401": { description: Невалидный или истёкший токен; refresh уже использован }

  /v1/dispatchers/auth/phone:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: "Шаг 1. Отправить OTP на телефон"
      description: |
        **Поток:** Ввод телефона в формате +998XXXXXXXXX → запрос отправляет OTP через Telegram Gateway. Код приходит в Telegram/смс. Используется и для входа (существующий диспетчер), и для регистрации (новый номер). Ответ: status=otp_sent, ttl_seconds.
        **Данные:** В теле только phone (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
              required: [phone]
            example:
              phone: "+998901234567"
      responses:
        "200":
          description: OTP отправлен
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "otp_sent" }
                  ttl_seconds: { type: integer, example: 180 }
        "400": { description: Некорректный payload; или no account — у номера нет аккаунта Telegram }
        "429": { description: Cooldown / rate limit }
        "502": { description: OTP не отправлен (otp send failed) }

  /v1/dispatchers/auth/otp/verify:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: "Шаг 2. Подтвердить OTP"
      description: |
        **Поток:** Передаёте phone и otp (код из шага 1). Если диспетчер уже зарегистрирован → в ответе status=login и tokens (access_token, refresh_token) — вход выполнен. Если телефон новый → status=register и session_id — переходите к регистрации (POST /v1/dispatchers/registration/complete), JWT пока не выдаётся.
        **Данные:** phone, otp (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
                otp: { type: string, example: "123456" }
              required: [phone, otp]
            example:
              phone: "+998901234567"
              otp: "123456"
      responses:
        "200":
          description: login (tokens) или register (session_id)
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      status: { type: string, example: "login" }
                      tokens: { $ref: "#/components/schemas/Tokens" }
                  - type: object
                    properties:
                      status: { type: string, example: "register" }
                      session_id: { type: string, format: uuid }
        "401": { description: OTP неверный/истёк }
        "429": { description: Превышено количество попыток }

  /v1/dispatchers/auth/login/password:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: "Вход по паролю (без OTP)"
      description: |
        **Поток:** Для уже зарегистрированного диспетчера. Передаёте phone и password → в ответе tokens. Дальше все запросы к профилю и т.д. с заголовком X-User-Token = access_token.
        **Данные:** phone, password (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
                password: { type: string, example: "TestPass123!" }
              required: [phone, password]
            example:
              phone: "+998901234567"
              password: "TestPass123!"
      responses:
        "200":
          description: OK, tokens в data
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "login" }
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401": { description: Неверный телефон или пароль }

  /v1/dispatchers/auth/reset-password/request:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: Запросить OTP для сброса пароля
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
              required: [phone]
            example:
              phone: "+998901234567"
      responses:
        "200":
          description: OTP отправлен, session_id для confirm
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "otp_sent" }
                  session_id: { type: string, format: uuid }
                  ttl_seconds: { type: integer }
        "400": { description: no account — у номера нет аккаунта Telegram }
        "404": { description: Диспетчер не найден }
        "502": { description: otp send failed — OTP не отправлен }

  /v1/dispatchers/auth/reset-password/confirm:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: Подтвердить сброс пароля (session_id + otp + new_password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                otp: { type: string, example: "123456" }
                new_password: { type: string }
              required: [session_id, otp, new_password]
            example:
              session_id: "d4e5f6a7-b8c9-0123-def0-234567890123"
              otp: "123456"
              new_password: "NewPass456!"
      responses:
        "200":
          description: Пароль обновлён
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
        "401": { description: Сессия/OTP неверны }
        "429": { description: Превышено количество попыток }

  /v1/dispatchers/auth/logout:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: "Выход (отзыв сессии)"
      description: |
        **Кто вызывает:** Freelance-диспетчер (клиент после входа по OTP или по паролю).
        **Назначение:** Инвалидация сессии. Передайте **refresh_token** — отзывается одна сессия. Передайте **access_token** — отзываются все сессии диспетчера. Нужен хотя бы один из токенов.
        **Валидация:** при невалидном или истёкшем токене возвращается 401.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string, description: "JWT refresh — отзыв одной сессии" }
                access_token: { type: string, description: "JWT access — отзыв всех сессий диспетчера" }
            example:
              access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        "200":
          description: OK (сессия/сессии инвалидированы)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "400": { description: Нет ни refresh_token, ни access_token }
        "401": { description: Невалидный или истёкший токен; refresh уже использован; роль не dispatcher }

  /v1/dispatchers/registration/complete:
    post:
      tags: ["Freelance Dispatchers / Registration"]
      summary: "Шаг 3. Завершить регистрацию (имя, пароль, паспорт)"
      description: |
        **Поток:** Вызывается после otp/verify, когда получен status=register и session_id. В теле передаёте session_id (обязательно), name, password, passport_series, passport_number, pinfl (все обязательны). Создаётся запись в freelance_dispatchers, в ответе — tokens и объект dispatcher. После этого диспетчер может входить по phone+password или по OTP. Фото загружается отдельно через POST /v1/dispatchers/profile/photo.
        **Данные:** session_id, name, password, passport_series, passport_number, pinfl.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                name: { type: string, example: "Dispetcher Name" }
                password: { type: string }
                passport_series: { type: string, example: "AB" }
                passport_number: { type: string, example: "1234567" }
                pinfl: { type: string, example: "12345678901234" }
              required: [session_id, name, password, passport_series, passport_number, pinfl]
            example:
              session_id: "d4e5f6a7-b8c9-0123-def0-234567890123"
              name: "Алексей Диспетчеров"
              password: "SecurePass123!"
              passport_series: "AB"
              passport_number: "1234567"
              pinfl: "31234567890123"
      responses:
        "200":
          description: Зарегистрирован или логин (если телефон уже был)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "registered" }
                  tokens: { $ref: "#/components/schemas/Tokens" }
                  dispatcher: { $ref: "#/components/schemas/Dispatcher" }
        "401": { description: session_id неверный/истёк }
        "409": { description: Телефон уже зарегистрирован }

  /v1/dispatchers/profile:
    get:
      tags: ["Freelance Dispatchers / Profile"]
      summary: "Получить профиль диспетчера"
      description: |
        **Поток:** Запрос с заголовком X-User-Token (JWT access_token). В ответе data.dispatcher — объект диспетчера (id, name, phone, паспорт, pinfl, work_status, rating и т.д.).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: OK, data.dispatcher
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401": { description: Не авторизован }
    patch:
      tags: ["Freelance Dispatchers / Profile"]
      summary: Редактировать профиль диспетчера
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                passport_series: { type: string }
                passport_number: { type: string }
                pinfl: { type: string }
                photo: { type: string, nullable: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401": { description: Не авторизован }
    delete:
      tags: ["Freelance Dispatchers / Profile"]
      summary: Удалить профиль диспетчера (архивация)
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401": { description: Не авторизован }
        "404": { description: Диспетчер не найден }

  /v1/dispatchers/profile/photo:
    post:
      tags: ["Freelance Dispatchers / Profile"]
      summary: "Загрузить фото диспетчера"
      description: |
        **Формат:** multipart/form-data, поле **photo** — файл изображения (image/jpeg или image/png). Макс. размер 10 MB.
        Фото сохраняется в БД. В профиле (GET /profile) поле has_photo будет true; само изображение отдаётся через GET /v1/dispatchers/profile/photo.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
                  description: "Файл изображения (JPEG или PNG, макс. 10 MB)"
      responses:
        "200":
          description: Фото сохранено
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  code: { type: integer, example: 200 }
                  description: { type: string, example: "Photo uploaded" }
                  data:
                    type: object
                    properties:
                      status: { type: string, example: "ok" }
                      event: { type: string, example: "photo_uploaded" }
              examples:
                en: { summary: "English", value: { status: "success", code: 200, description: "Photo uploaded", data: { status: "ok", event: "photo_uploaded" } } }
                ru: { summary: "Русский", value: { status: "success", code: 200, description: "Фото загружено", data: { status: "ok", event: "photo_uploaded" } } }
                uz: { summary: "O'zbek", value: { status: "success", code: 200, description: "Foto yuklandi", data: { status: "ok", event: "photo_uploaded" } } }
                tr: { summary: "Türkçe", value: { status: "success", code: 200, description: "Fotoğraf yüklendi", data: { status: "ok", event: "photo_uploaded" } } }
                zh: { summary: "中文", value: { status: "success", code: 200, description: "照片已上传", data: { status: "ok", event: "photo_uploaded" } } }
        "400": { description: "Нет файла, неверный тип или размер" }
        "401": { description: Не авторизован }
    get:
      tags: ["Freelance Dispatchers / Profile"]
      summary: "Получить фото диспетчера"
      description: |
        Возвращает загруженное фото (бинарные данные) с заголовком Content-Type (image/jpeg или image/png).
        Если фото не загружалось — 404.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: Изображение
          content:
            image/jpeg: { schema: { type: string, format: binary } }
            image/png: { schema: { type: string, format: binary } }
        "401": { description: Не авторизован }
        "404": { description: Фото не найдено }
    delete:
      tags: ["Freelance Dispatchers / Profile"]
      summary: "Удалить фото диспетчера"
      description: |
        Удаляет загруженное фото диспетчера из БД. После удаления has_photo = false.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: Фото удалено
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  code: { type: integer, example: 200 }
                  description:
                    type: string
                    description: "Локализованное описание (зависит от X-Language)"
                    example: "Photo deleted"
                  data:
                    type: object
                    properties:
                      status: { type: string, example: "ok" }
                      event: { type: string, example: "photo_deleted" }
              examples:
                en: { summary: "English", value: { status: "success", code: 200, description: "Photo deleted", data: { status: "ok", event: "photo_deleted" } } }
                ru: { summary: "Русский", value: { status: "success", code: 200, description: "Фото удалено", data: { status: "ok", event: "photo_deleted" } } }
                uz: { summary: "O'zbek", value: { status: "success", code: 200, description: "Foto o'chirildi", data: { status: "ok", event: "photo_deleted" } } }
                tr: { summary: "Türkçe", value: { status: "success", code: 200, description: "Fotoğraf silindi", data: { status: "ok", event: "photo_deleted" } } }
                zh: { summary: "中文", value: { status: "success", code: 200, description: "照片已删除", data: { status: "ok", event: "photo_deleted" } } }
        "401": { description: Не авторизован }

  /v1/dispatchers/profile/password:
    put:
      tags: ["Freelance Dispatchers / Profile"]
      summary: Сменить пароль (текущий + новый)
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password: { type: string }
                new_password: { type: string }
              required: [current_password, new_password]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
        "401": { description: Неверный current_password }

  /v1/dispatchers/profile/phone-change/request:
    post:
      tags: ["Freelance Dispatchers / Profile"]
      summary: Смена телефона — запрос OTP
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_phone: { type: string, example: "+998901234567" }
              required: [new_phone]
      responses:
        "200":
          description: OTP отправлен, session_id для verify
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "otp_sent" }
                  session_id: { type: string, format: uuid }
                  ttl_seconds: { type: integer }
        "400": { description: no account — у номера нет аккаунта Telegram }
        "409": { description: Телефон уже зарегистрирован }
        "502": { description: otp send failed — OTP не отправлен }

  /v1/dispatchers/profile/phone-change/verify:
    post:
      tags: ["Freelance Dispatchers / Profile"]
      summary: Смена телефона — подтверждение OTP
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                otp: { type: string, example: "123456" }
              required: [session_id, otp]
      responses:
        "200":
          description: Телефон обновлён
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  dispatcher: { $ref: "#/components/schemas/Dispatcher" }
        "401": { description: Сессия/OTP неверны }
        "409": { description: Телефон уже занят }

  /v1/dispatchers/companies:
    get:
      tags: ["Company / Dispatcher (приглашённый)"]
      summary: "Список моих компаний"
      description: "Компании, где диспетчер приглашён (диспетчер не создаёт компанию). Требуется X-User-Token."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200": { description: "data.items — массив объектов с полями id, name, type, role" }

  /v1/dispatchers/auth/switch-company:
    post:
      tags: ["Company / Dispatcher (приглашённый)"]
      summary: "Переключить контекст на компанию"
      description: "Тело: company_id (UUID). В ответе — access_token, refresh_token, expires_in, expires_at (Unix), refresh_expires_in, refresh_expires_at (Unix)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company_id: { type: string, format: uuid }
              required: [company_id]
      responses:
        "200": { description: "access_token, refresh_token, expires_in, expires_at, refresh_expires_in, refresh_expires_at (все даты — Unix)" }
        "403": { description: company not found or access denied }

  /v1/dispatchers/companies/{companyId}/invitations:
    post:
      tags: ["Company / Dispatcher (приглашённый)"]
      summary: "Пригласить диспетчера в компанию (по телефону)"
      description: "Тело: phone, role (dispatcher | top_dispatcher). Требуется доступ к компании. В ответе — token для accept."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
                role: { type: string, enum: [dispatcher, top_dispatcher] }
              required: [phone, role]
      responses:
        "201": { description: data.token, data.expires_in_hours }
        "403": { description: access denied }

  /v1/dispatchers/invitations/accept:
    post:
      tags: ["Company / Dispatcher (приглашённый)"]
      summary: "Принять приглашение в компанию"
      description: "Тело: token. Телефон диспетчера должен совпадать с приглашением. Требуется X-User-Token (dispatcher)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
              required: [token]
      responses:
        "200": { description: data.company_id }
        "400": { description: invitation not found or expired }
        "403": { description: invitation was sent to another phone }

  /v1/dispatchers/invitations/decline:
    post:
      tags: ["Company / Dispatcher (приглашённый)"]
      summary: "Отклонить приглашение"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200": { description: declined }

  /v1/dispatchers/driver-invitations:
    get:
      tags: ["Freelance Dispatchers / Приглашения водителей", "Freelance Dispatchers / My drivers"]
      summary: "Список отправленных приглашений (диспетчер)"
      description: |
        **Диспетчер:** список приглашений, которые **я отправил** (по компании и фриланс). Только не истёкшие. В ответе data.items: token, phone, type (company | freelance), company_id или dispatcher_id, expires_at, created_at. По token можно отменить приглашение через DELETE .../driver-invitations/:token.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200": { description: "data.items — массив приглашений (token, phone, type, company_id/dispatcher_id, expires_at, created_at)" }
    post:
      tags: ["Freelance Dispatchers / Приглашения водителей", "Freelance Dispatchers / My drivers"]
      summary: "Отправить приглашение водителю (фриланс — без компании)"
      description: |
        **Фриланс-диспетчер:** пригласить водителя. Передайте **phone** (номер телефона) **или** **driver_id** (UUID водителя из поиска GET /v1/dispatchers/drivers/find). Достаточно одного из полей. В ответе — token; передать водителю (чат/ссылка). Водитель: GET /v1/driver/driver-invitations → список; POST /v1/driver/driver-invitations/accept (token) или POST .../decline (token). После принятия у водителя freelancer_id = текущий диспетчер. X-User-Token (dispatcher).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567", description: "Номер телефона водителя (если не указан driver_id)" }
                driver_id: { type: string, format: uuid, description: "UUID водителя из поиска GET .../drivers/find (приглашение по id)" }
            example:
              phone: "+998901234567"
            examples:
              by_phone:
                summary: "По номеру телефона"
                value: { phone: "+998901234567" }
              by_driver_id:
                summary: "По ID водителя (после поиска)"
                value: { driver_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890" }
      responses:
        "201": { description: "data.token, data.expires_in_hours" }
        "400": { description: "Неверное тело; нет phone и driver_id; водитель не найден по номеру; driver_id не существует" }
        "409": { description: "Неистёкшее приглашение на этот номер уже отправлено (driver_invitation_already_pending)" }

  /v1/dispatchers/driver-invitations/{token}:
    delete:
      tags: ["Freelance Dispatchers / Приглашения водителей", "Freelance Dispatchers / My drivers"]
      summary: "Отменить приглашение (диспетчер)"
      description: |
        **Диспетчер:** отменить (отозвать) отправленное приглашение. Можно отменить только своё приглашение. token — из GET /v1/dispatchers/driver-invitations.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string, example: "a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789" }
      responses:
        "200": { description: "data.message = cancelled" }
        "403": { description: "not your invitation" }
        "404": { description: "invitation not found or expired" }

  /v1/dispatchers/drivers/find:
    get:
      tags: ["Freelance Dispatchers / Приглашения водителей", "Freelance Dispatchers / Drivers catalog"]
      summary: "Поиск водителей по номеру телефона"
      description: |
        **Диспетчер:** поиск водителей по части номера (phone). Совпадения по полному номеру выше. Результат — список водителей (id, phone, name, work_status, driver_type, freelancer_id, company_id); использовать id для приглашения через POST /v1/dispatchers/driver-invitations (body driver_id). X-User-Token (dispatcher).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: phone
          in: query
          required: true
          schema: { type: string, example: "+998901234567" }
          description: "Часть или полный номер телефона для поиска"
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: "data.items — массив водителей (id, phone, name, work_status, driver_type, freelancer_id, company_id); точные совпадения сверху"

  /v1/dispatchers/drivers:
    get:
      tags: ["Freelance Dispatchers / Приглашения водителей", "Freelance Dispatchers / My drivers"]
      summary: "Список моих водителей (с фильтрами и пагинацией)"
      description: |
        **Фриланс-диспетчер:** водители, привязанные к нему (freelancer_id = me). По этому списку диспетчер может отправлять им **таклиф** (рекомендацию груза) — POST /v1/dispatchers/cargo/:id/recommend (body: driver_id).
        **Фильтры:** phone (поиск по номеру), work_status (available, busy, loaded…), truck_type (тип тягача: TENT, REFRIGERATOR… из power_plate_type). **Пагинация:** page (с 1), limit (по умолчанию 20, макс. 100). **Сортировка:** sort=updated_at:desc (по умолчанию), name:asc, last_online_at:desc, work_status:asc.
        X-User-Token (dispatcher). Ответы на 5 языках (заголовок X-Language: ru, uz, en, tr, zh).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: phone
          in: query
          schema: { type: string }
          description: "Поиск по номеру телефона (частичное совпадение)"
        - name: work_status
          in: query
          schema: { type: string, example: "available" }
          description: "Фильтр по статусу водителя (available, busy, loaded и т.д.)"
        - name: truck_type
          in: query
          schema: { type: string, example: "TENT" }
          description: "Фильтр по типу тягача (power_plate_type): TENT, REFRIGERATOR, FLATBED, TANKER, OTHER"
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: sort
          in: query
          schema: { type: string, default: "updated_at:desc", example: "updated_at:desc" }
          description: "Сортировка: updated_at:desc, name:asc, last_online_at:desc, work_status:asc"
      responses:
        "200": { description: "data.items — массив водителей, data.total — всего записей" }

  /v1/dispatchers/drivers/all:
    get:
      tags: ["Freelance Dispatchers / Drivers catalog"]
      summary: "Общий список водителей (каталог, с фильтрами и пагинацией)"
      description: |
        **Фриланс-диспетчер:** общий каталог всех водителей в системе (не только тех, кто уже принял ваше приглашение). Можно использовать для подбора новых водителей по параметрам и затем:
        - отправить приглашение: POST /v1/dispatchers/driver-invitations (body: phone или driver_id);
        - после привязки — отправлять **таклиф** по грузам: POST /v1/dispatchers/cargo/:id/recommend (body: driver_id);
        - водитель увидит приглашённые грузы в GET /v1/driver/recommended-cargo.

        **Фильтры:** phone, name, work_status, truck_type (power_plate_type), driver_type, account_status, has_photo.
        **Гео-фильтр:** latitude + longitude + radius_km (в километрах) — вернёт водителей в радиусе по их текущим координатам.
        **Адаптивная пагинация:** frontend передаёт `limit` (1..100) и `page` (с 1).
        **Сортировка:** sort=updated_at:desc (по умолчанию), name:asc, last_online_at:desc, work_status:asc.

        Требуется X-User-Token (dispatcher). Ответы на 5 языках (заголовок X-Language: ru, uz, en, tr, zh).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: phone
          in: query

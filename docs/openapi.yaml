                ru: { summary: "Русский", value: { status: "success", code: 200, description: "Успешно", data: { items: [{ id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890", mime: "image/jpeg", size_bytes: 245760, created_at: "2026-03-23T16:00:00Z", url: "/api/cargo/ebc30874-161a-4c29-b284-139e4e7d9120/photos/a1b2c3d4-e5f6-7890-abcd-ef1234567890" }] } } }
                uz: { summary: "O'zbek", value: { status: "success", code: 200, description: "Muvaffaqiyatli", data: { items: [{ id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890", mime: "image/jpeg", size_bytes: 245760, created_at: "2026-03-23T16:00:00Z", url: "/api/cargo/ebc30874-161a-4c29-b284-139e4e7d9120/photos/a1b2c3d4-e5f6-7890-abcd-ef1234567890" }] } } }
                tr: { summary: "Türkçe", value: { status: "success", code: 200, description: "Başarılı", data: { items: [{ id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890", mime: "image/jpeg", size_bytes: 245760, created_at: "2026-03-23T16:00:00Z", url: "/api/cargo/ebc30874-161a-4c29-b284-139e4e7d9120/photos/a1b2c3d4-e5f6-7890-abcd-ef1234567890" }] } } }
                zh: { summary: "中文", value: { status: "success", code: 200, description: "成功", data: { items: [{ id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890", mime: "image/jpeg", size_bytes: 245760, created_at: "2026-03-23T16:00:00Z", url: "/api/cargo/ebc30874-161a-4c29-b284-139e4e7d9120/photos/a1b2c3d4-e5f6-7890-abcd-ef1234567890" }] } } }

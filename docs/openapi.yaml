paths:
  /health:
    get:
      summary: Проверка работоспособности
      responses:
        '200':
          description: OK
  /api/cargo:
    post:
      tags:
      - Cargo Manager / Cargo
      summary: 1. Создать груз (добавление груза — фриланс-диспетчер)
      description: '**Фриланс-диспетчер:** передайте X-User-Token (JWT после входа) — в груз запишется created_by_type=DISPATCHER.

        **Назначение:** Создание нового груза с точками маршрута и блоком оплаты.


        **Логика:** В одной транзакции создаются запись в `cargo`, записи в `route_points` (все переданные точки), одна запись в `payments` (если передан блок payment). Валидация: weight > 0; минимум одна
        точка с type=LOAD и одна с type=UNLOAD; у каждой точки обязательны country_code + city_code (коды страны и города из справочника городов), address, lat, lng, point_order, **date** (RFC3339 в UTC,
        например `2026-03-23T10:45:30Z`); опционально orientir, place_id. Все enum-поля (type, truck_type и т.д.) — в UPPERCASE. Справочник городов: GET /v1/reference/cities (все города мира, коды TAS/SAM/DXB
        и т.д.). Если указаны temp_min/temp_max — truck_type должен быть REFRIGERATOR; если adr_enabled=true — обязателен adr_class; если ready_enabled=true — обязателен ready_at.


        **Создатель (автоматически):** Если передан заголовок **X-User-Token** (JWT) с ролью admin или dispatcher — в груз записываются created_by_type и created_by_id. Если JWT не передан, но в теле есть
        company_id — создателем считается компания (created_by_type=company). Опционально в теле можно передать company_id для привязки груза к компании.


        **Что передаём:** Схема CargoCreateRequest — все поля груза (обязательные: weight, volume, vehicles_amount, power_plate_type, trailer_plate_type, route_points) + опционально payment, contact_name,
        contact_phone, ready_enabled, ready_at, comment, temp_min/temp_max, adr_enabled, adr_class, loading_types, shipment_type, belts_count, documents, cargo_type_id.

        **Важно:** Для фриланс‑диспетчера поле **company_id обычно не передаётся**. Если передать `company_id` — оно должно существовать в `companies`, иначе вернётся 400.

        В ответе возвращается **полный объект груза** (как в GET /api/cargo/:id): data содержит созданный груз с id, route_points, payment и всеми полями.


        **Фото до появления cargo_id (без отдельного шага «создать → потом загрузить»):**

        - **Вариант A — JSON:** поле `photos` — массив **URL** уже выложенных картинок (CDN и т.д.).

        - **Вариант B — multipart/form-data:** `Content-Type: multipart/form-data`, обязательное текстовое поле **`data`** — строка JSON **того же состава**, что и CargoCreateRequest (как в application/json).
        Файлы — поле **`photos`** (можно несколько раз) или одно поле **`photo`**; макс. **5** файлов, каждый до **10 MB**, типы image/jpeg, image/png, image/webp. Сумма `len(photos в JSON) + число файлов`
        не больше 5. Сначала создаётся груз, затем файлы сохраняются в `cargo_photos` (как POST /api/cargo/{id}/photos).

        - **Вариант C:** сначала `POST application/json` без файлов → в ответе `data.id`, затем `POST /api/cargo/{id}/photos` для каждого файла.

        - **Вариант D (без cargo_id):** `POST /api/cargo/photos` (multipart, поле `photo`) → в ответе `data.url` вида `/api/cargo/photos/{uuid}` (и `data.id`). Просмотр: `GET /api/cargo/photos/{uuid}`.
        В `POST /api/cargo` в массиве `photos` передайте эту ссылку **или** сам UUID — после создания груза файл переносится в `cargo_photos`, в `data.photos` будут уже URL вида `/api/cargo/{cargo_id}/photos/{photo_id}`.
        Один и тот же pending UUID в `photos` дважды недопустим.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CargoCreateRequest'
            description: 'Примеры:

              Примечание: поле `cargo_type_id` **опционально**. Если хотите привязать груз к типу — получите актуальный UUID через `GET /v1/reference/cargo-types/hint?q=...` и подставьте в запрос.

              '
            examples:
              freelance_dispatcher:
                summary: Freelance dispatcher с типом груза Пшеница
                value:
                  name: Пшеница, Ташкент → Самарканд, тент 20т/82м³
                  packaging: Мешки по 50 кг на паллетах
                  packaging_amount: 120
                  dimensions: 13.6x2.45x2.7
                  photos:
                  - https://cdn.example.com/cargo/123-photo1.jpg
                  - https://cdn.example.com/cargo/123-photo2.jpg
                  weight: 20
                  volume: 82
                  vehicles_amount: 1
                  power_plate_type: TRUCK
                  trailer_plate_type: TENTED
                  ready_enabled: true
                  ready_at: '2026-03-15T08:00:00Z'
                  comment: Погрузка сверху, склад сухой. Груз пшеница, мешки 50 кг.
                  adr_enabled: false
                  adr_class: null
                  loading_types:
                  - TOP
                  - SIDE
                  unloading_types:
                  - REAR
                  is_two_drivers_required: false
                  shipment_type: FTL
                  belts_count: 6
                  documents:
                    TIR: true
                    T1: false
                    CMR: true
                    Medbook: false
                    GLONASS: false
                    Seal: true
                    Permit: false
                  contact_name: Иван Петров
                  contact_phone: '+998901234567'
                  route_points:
                  - type: LOAD
                    country_code: UZ
                    city_code: TAS
                    address: ул. Амира Темура 1, склад №5
                    orientir: Въезд со стороны метро Хамза, ворота А
                    lat: 41.311081
                    lng: 69.240562
                    place_id: maps-tas-warehouse-5
                    comment: Склад зерна, погрузка с 08:00 до 18:00
                    point_order: 1
                    is_main_load: true
                    is_main_unload: false
                    date: '2026-03-23T08:00:00Z'
                  - type: UNLOAD
                    country_code: UZ
                    city_code: SAM
                    address: промзона Южная, терминал А
                    orientir: За КПП 2, склад напротив
                    lat: 39.654167
                    lng: 66.959722
                    place_id: maps-sam-terminal-a
                    comment: Выгрузка в течение 2 часов по прибытии
                    point_order: 2
                    is_main_load: false
                    is_main_unload: true
                    date: '2026-03-24T14:00:00Z'
                  way_points:
                  - type: CUSTOMS
                    country_code: UZ
                    city_code: TAS
                    address: Таможенный пост Сергели
                    lat: 41.22
                    lng: 69.21
                    comment: Оформление до 2 часов
                  payment:
                    is_negotiable: false
                    price_request: false
                    total_amount: 1500
                    total_currency: USD
                    with_prepayment: true
                    prepayment_amount: 500
                    prepayment_currency: USD
                    prepayment_type: BANK_TRANSFER
                    remaining_amount: 1000
                    remaining_currency: USD
                    remaining_type: ON_DELIVERY
                    payment_note: Оплата после выгрузки в течение 24 часов
                    payment_terms_note: При досрочной доставке +2% бонус
              company:
                summary: 'Company cargo: с company_id и cargo_type_id'
                value:
                  name: Пшеница, Ташкент → Самарканд, тент 20т/82м³
                  weight: 20
                  volume: 82
                  vehicles_amount: 1
                  power_plate_type: TRUCK
                  trailer_plate_type: TENTED
                  contact_name: Иван Петров
                  contact_phone: '+998901234567'
                  company_id: aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
                  route_points:
                  - type: LOAD
                    country_code: UZ
                    city_code: TAS
                    address: ул. Амира Темура 1, склад №5
                    lat: 41.311081
                    lng: 69.240562
                    point_order: 1
                    date: '2026-03-23T08:00:00Z'
                  - type: UNLOAD
                    country_code: UZ
                    city_code: SAM
                    address: промзона Южная, терминал А
                    lat: 39.654167
                    lng: 66.959722
                    point_order: 2
                    date: '2026-03-24T14:00:00Z'
          multipart/form-data:
            schema:
              type: object
              required:
              - data
              properties:
                data:
                  type: string
                  description: 'JSON-строка с телом создания груза (тот же объект, что CargoCreateRequest в application/json).

                    Пример минимального значения: скопируйте JSON из примера freelance_dispatcher выше в одну строку или многострочно в форме.

                    '
                photos:
                  type: array
                  description: Файлы изображений (повторяйте поле photos для каждого файла). Макс. 5. Альтернатива — одно поле photo.
                  items:
                    type: string
                    format: binary
                photo:
                  type: string
                  format: binary
                  description: Один файл (если не используете массив photos)
            encoding:
              data:
                contentType: text/plain
      responses:
        '201':
          description: Груз создан. В data — полный объект груза (id, route_points, payment и все поля).
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Envelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/CargoDetailResponse'
                      description: Полный объект созданного груза (как в GET /api/cargo/:id) — id, weight, volume, route_points, payment и все остальные поля
        '400':
          description: Ошибка валидации (неверные поля, нет load/unload точек и т.д.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '500':
          description: Груз создан, но ошибка при сохранении вложенного фото; в data.cargo_id — id для дозагрузки через POST /api/cargo/{id}/photos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
    get:
      tags:
      - Legacy / Deprecated
      deprecated: true
      summary: 2. (Legacy) Список грузов (фильтры, пагинация)
      description: '**Legacy endpoint.** Для тестирования/интеграций используйте новые эндпоинты Cargo Manager:


        - `GET /v1/dispatchers/cargo/mine` — **мои грузы**

        - `GET /v1/dispatchers/cargo/all` — **все грузы (каталог)**


        **Кто вызывает:** Водитель (чаще всего с status=SEARCHING), диспетчер, компания, админ.

        **Назначение:** Получение списка грузов. Водитель вызывает с фильтром status=SEARCHING, чтобы видеть грузы, по которым ищут перевозчика.


        **Логика:** Удалённые (soft delete) не возвращаются. Применяются фильтры по query-параметрам. Сортировка по sort (например created_at:desc). Пагинация: page (с 1), limit (по умолчанию 20, макс.
        100). В ответе data.items — массив грузов, data.total — общее количество записей.


        **Параметры:** status (несколько через запятую), weight_min, weight_max, truck_type, created_from (YYYY-MM-DD), created_to, with_offers (true — только грузы с офферами), page, limit, sort.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      parameters:
      - name: status
        in: query
        schema:
          type: string
          example: SEARCHING_ALL,SEARCHING_COMPANY
        description: Статусы через запятую (SEARCHING_ALL, SEARCHING_COMPANY, COMPLETED, CANCELLED). Для водителя с X-User-Token при фильтре по searching автоматически показываются грузы SEARCHING_ALL +
          SEARCHING_COMPANY (только своей компании). Для фриланс-диспетчера с X-User-Token (role=dispatcher) дополнительно показываются только грузы, созданные этим диспетчером (created_by_type=DISPATCHER).
      - name: weight_min
        in: query
        schema:
          type: number
          example: 10
        description: Минимальный вес (т)
      - name: weight_max
        in: query
        schema:
          type: number
          example: 25
        description: Максимальный вес (т)
      - name: truck_type
        in: query
        schema:
          type: string
          example: TENT
        description: Тип транспорта из справочника (TENT, REFRIGERATOR, FLATBED, TANKER, OTHER)
      - name: created_from
        in: query
        schema:
          type: string
          format: date
        description: Дата создания от (YYYY-MM-DD)
      - name: created_to
        in: query
        schema:
          type: string
          format: date
        description: Дата создания до (YYYY-MM-DD)
      - name: with_offers
        in: query
        schema:
          type: boolean
        description: true — только грузы, у которых есть хотя бы один оффер
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          example: 1
        description: Номер страницы (с 1)
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          example: 20
        description: Записей на странице (макс. 100)
      - name: sort
        in: query
        schema:
          type: string
          example: created_at:desc
        description: Сортировка (поле:направление), например created_at:desc, weight:asc
      responses:
        '200':
          description: 'data = { items: Cargo[], total: number }'
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Envelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/CargoListResponse'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /api/cargo/{id}/photos:
    post:
      tags:
      - Cargo Manager / Cargo
      summary: Загрузить фото к существующему грузу
      description: '`multipart/form-data`, поле **`photo`** — файл JPEG/PNG/WebP, макс. **10 MB**. Дозагрузка после `POST /api/cargo` (лимит количества фото на стороне сервера).


        Ответ: `data.id`, `data.url` вида `/api/cargo/{cargo_id}/photos/{photo_id}`.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - photo
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        '200':
          description: photo_uploaded — data.id, data.url
        '400':
          description: photo_file_required | file_too_large | allowed_image_types
        '404':
          description: cargo_not_found
        '500':
          description: internal_error
    get:
      tags:
      - Cargo Manager / Cargo
      summary: Список фото груза (метаданные)
      description: Возвращает `data.items[]` — `id`, `mime`, `size_bytes`, `created_at`, `url`.
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: ok — data.items
        '404':
          description: cargo_not_found
        '500':
          description: failed_to_list

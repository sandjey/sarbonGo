      summary: "Справочник городов (все города мира)"
      description: |
        Справочник городов на основе библиотеки tidwall/cities (~10k городов) + доп. список для UZ, AE, TM, KG, TJ (Ташкент TAS, Самарканд SAM, Дубай DXB и др.). Ответ из памяти — быстрый hit API.
        В route_points указывается city_code из этого справочника.
        **Query:** country_code (опционально) — фильтр по стране (UZ, AE, KZ, RU и т.д.); q (опционально) — универсальный поиск по коду/названию (совпадения сверху).
        Поле **name** возвращается на языке заголовка **X-Language** (ru | uz | en | tr | zh). Так как датасет фактически ru/en, для языков uz/tr/zh используется fallback на **en**, и только если en отсутствует — на ru.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: country_code
          in: query
          schema: { type: string, example: "UZ" }
          description: "Фильтр по коду страны (UZ, AE, KZ, RU и т.д.)"
        - name: q
          in: query
          required: false
          schema: { type: string, example: "tas" }
          description: "Универсальный поиск по code (TAS) или по названию города (ru/en), независимо от X-Language. Совпадения сверху."
      responses:
        "200":
          description: "data.items — массив { id, code, name, country_code, lat, lng }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, format: uuid }
                            code: { type: string, example: "TAS" }
                            name: { type: string, example: "Ташкент" }
                            country_code: { type: string, example: "UZ" }
                            lat: { type: number, nullable: true }
                            lng: { type: number, nullable: true }

  /v1/reference/cargo-types/hint:
    get:
      tags: ["Reference / Cargo"]
      summary: "Подсказка по типам груза (cargo_types)"
      description: |
        Возвращает список типов груза из таблицы **cargo_types**.

        - Язык названий определяется заголовком **X-Language** (ru, uz, en, tr, zh) — выбирается соответствующая колонка name_ru/name_uz/name_en/name_tr/name_zh.
        - Параметр **q** (опционально) фильтрует по подстроке в названии на выбранном языке.

        Используется как hint для поля `cargo_type_id` в `POST /api/cargo` (подбор типа груза из справочника).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string, example: "пшеница" }
          description: "Фильтр по подстроке в названии типа груза (с учётом выбранного X-Language)"
      responses:
        "200":
          description: "data.items — массив типов груза"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                id: { type: string, format: uuid, description: "UUID записи cargo_types" }
                                code: { type: string, description: "Код типа груза (UPPERCASE, латиницей)" }
                                name: { type: string, description: "Название типа груза на языке X-Language" }

  /v1/reference/countries:
    get:
      tags: ["Reference / Cargo", "Cargo Manager"]
      summary: "Справочник стран (коды ISO + имя на языке X-Language)"
      description: |
        Возвращает **все** известные коды стран (ISO 3166-1 alpha-2) и поле **name** на языке, заданном заголовком **X-Language** (ru | uz | en | tr | zh).
        Если перевод для конкретной страны отсутствует, сервер вернёт английское имя как fallback.
        Используйте для UI фильтра по стране перед вызовом GET /v1/reference/cities?country_code=...
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string, example: "uz" }
          description: "Универсальный поиск по коду страны (например UZ) или по названию страны на любом из языков (ru/uz/en/tr/zh), независимо от X-Language. В ответе name всегда на языке X-Language. Совпадения сверху."
      responses:
        "200":
          description: "data.items — массив { code, name }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            code: { type: string, example: "UZ" }
                            name: { type: string, example: "Узбекистан" }
        "400":
          description: "invalid X-Language (allowed: ru, uz, en, tr, zh)"

  /v1/driver/auth/phone:
    post:
      tags: ["Drivers / Auth"]
      summary: "Шаг 1. Отправить OTP на телефон"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение).
        **Назначение:** Запрос кода подтверждения. Телефон в формате +998XXXXXXXXX. OTP отправляется через Telegram Gateway. Ответ: status=otp_sent, ttl_seconds. Дальше — ввод кода и вызов /v1/driver/auth/otp/verify.
        **Данные:** В теле только phone (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998331108810" }
              required: [phone]
      responses:
        "200":
          description: OTP отправлен
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "otp_sent" }
                  ttl_seconds: { type: integer, example: 180 }
                required: [status, ttl_seconds]
        "400":
          description: Некорректный payload / телефон; или no account — у номера нет аккаунта Telegram
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "429":
          description: Cooldown / rate limit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "502":
          description: OTP не отправлен (ошибка шлюза/сети), message — otp send failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/auth/otp/verify:
    post:
      tags: ["Drivers / Auth"]
      summary: "Шаг 2. Подтвердить OTP"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение).
        **Назначение:** Ввод кода из шага 1. Если номер уже в drivers → status=login и tokens (вход выполнен). Если новый → status=register и session_id для регистрации (POST /v1/driver/registration/start), JWT пока не выдаётся.
        **Данные:** phone, otp (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998331108810" }
                otp: { type: string, example: "123456" }
              required: [phone, otp]
      responses:
        "200":
          description: Login или сессия регистрации
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      status: { type: string, example: "login" }
                      tokens: { $ref: "#/components/schemas/Tokens" }
                    required: [status, tokens]
                  - type: object
                    properties:
                      status: { type: string, example: "register" }
                      session_id: { type: string, format: uuid }
                    required: [status, session_id]
        "401":
          description: OTP неверный/истёк
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "429":
          description: Превышено количество попыток
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/registration/start:
    post:
      tags: ["Drivers / Registration"]
      summary: "Шаг 3. Создать профиль (имя + оферта)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение), после otp/verify при status=register.
        **Назначение:** Создание записи в drivers: registration_status=start, registration_step=name-oferta. В ответе — tokens и объект driver; дальше все запросы с X-User-Token.
        **Данные:** session_id (из otp/verify), name, oferta_accepted (обязательно).
        **Имя (name):** см. схему DisplayName — только латиница и `_`, 2–64 символа; глобально уникально среди водителей и диспетчеров (регистр не важен).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                name: { $ref: "#/components/schemas/DisplayName" }
                oferta_accepted: { type: boolean, example: true }
              required: [session_id, name, oferta_accepted]
      responses:
        "200":
          description: Профиль создан + токены
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "registered" }
                  tokens: { $ref: "#/components/schemas/Tokens" }
                  driver: { $ref: "#/components/schemas/Driver" }
                  registration_status: { type: string, example: "start" }
                  registration_step: { type: string, example: "name-oferta" }
                required: [status, tokens]
        "400":
          description: "Некорректное имя (invalid_display_name, name_too_short, name_too_long)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401":
          description: session_id неверный/истёк
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "409":
          description: Имя уже занято (display_name_taken)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/profile:
    get:
      tags: ["Drivers / Profile"]
      summary: "Получить профиль водителя"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). Обязателен X-User-Token (JWT).
        **Назначение:** Получение текущего профиля в сгруппированном виде.  
        В ответе `data.driver` содержит 3 блока:
        - `profile` — основные данные водителя (id, phone, name, статусы, паспорт, координаты и т.д.)
        - `power_plate` — данные тягача
        - `trailer_plate` — данные прицепа
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: "OK (data.driver.profile, data.driver.power_plate, data.driver.trailer_plate)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401":
          description: Не авторизован
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
    delete:
      tags: ["Drivers / Profile"]
      summary: "Удалить профиль водителя"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). Обязателен X-User-Token.
        **Назначение:** Жёсткое удаление аккаунта: запись переносится в deleted_drivers, из drivers удаляется. Связанные рейсы (trips) отвязываются от водителя (driver_id = NULL), затем удаляется строка водителя.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401":
          description: Не авторизован
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "404":
          description: Водитель не найден (driver_not_found)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/profile/driver:
    patch:
      tags: ["Drivers / Profile"]
      summary: "Редактировать данные водителя (имя, статус, паспорт)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Частичное обновление: name, work_status (available/loaded/busy), driver_passport_series, driver_passport_number, driver_pinfl. Остальные поля не меняются.
        **Данные:** В теле только те поля, которые нужно изменить.
        **name:** схема DisplayName (латиница и `_`, 2–64; уникально среди водителей и диспетчеров, без учёта регистра).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { $ref: "#/components/schemas/DisplayName" }
                work_status:
                  type: string
                  enum: ["available","loaded","busy"]
                  example: "available"
                driver_passport_series: { type: string, example: "AB" }
                driver_passport_number: { type: string, example: "1234567" }
                driver_pinfl: { type: string, example: "12345678901234" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "400":
          description: "Некорректное имя (invalid_display_name и др.)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "409":
          description: Имя занято (display_name_taken)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/profile/heartbeat:
    put:
      tags: ["Drivers / Profile"]
      summary: "Обновить гео и время последней активности"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Обновление координат (и при необходимости last_online_at) в профиле водителя.
        **Данные:** только latitude и longitude. last_online_at в API не передаётся — обновляется на сервере автоматически (в т.ч. при каждом запросе водителя).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                latitude: { type: number, format: double, example: 41.311081 }
                longitude: { type: number, format: double, example: 69.240562 }
              required: ["latitude","longitude"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/profile/photo:
    post:
      tags: ["Drivers / Profile"]
      summary: "Загрузить фото водителя"
      description: |
        **Формат:** multipart/form-data, поле **photo** — файл изображения (image/jpeg или image/png). Макс. размер 10 MB.
        Фото необязательно при регистрации; можно добавить или обновить когда угодно. Сохраняется в БД. В профиле (GET /profile) поле has_photo будет true; само изображение — через GET /v1/driver/profile/photo.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
                  description: "Файл изображения (JPEG или PNG, макс. 10 MB)"
      responses:
        "200":
          description: Фото сохранено
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  data:
                    type: object
                    properties:
                      status: { type: string, example: "ok" }
                      event: { type: string, example: "photo_uploaded" }
        "400": { description: "Нет файла, неверный тип или размер" }
        "401": { description: Не авторизован }
    get:
      tags: ["Drivers / Profile"]
      summary: "Получить фото водителя"
      description: |
        Возвращает загруженное фото (бинарные данные) с заголовком Content-Type (image/jpeg или image/png).
        Если фото не загружалось — 404.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: Изображение
          content:
            image/jpeg: { schema: { type: string, format: binary } }
            image/png: { schema: { type: string, format: binary } }
        "401": { description: Не авторизован }
        "404": { description: Фото не найдено }
    delete:
      tags: ["Drivers / Profile"]
      summary: "Удалить фото водителя"
      description: |
        Удаляет загруженное фото из профиля. Можно вызвать когда угодно; если фото не было — операция всё равно успешна (no-op).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: Фото удалено
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  data:
                    type: object
                    properties:
                      status: { type: string, example: "ok" }
                      event: { type: string, example: "photo_deleted" }
        "401": { description: Не авторизован }

  /v1/driver/profile/phone-change/request:
    post:
      tags: ["Drivers / Profile"]
      summary: "Смена телефона — запрос OTP"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Запрос OTP на новый номер. Если номер уже занят — ошибка. Иначе OTP отправлен, возвращается session_id для шага verify.
        **Данные:** new_phone (обязательно, формат +998XXXXXXXXX).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_phone: { type: string, example: "+998901234567" }
              required: ["new_phone"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "400": { description: Некорректный new_phone; или no account — у номера нет аккаунта Telegram }
        "502": { description: otp send failed — OTP не отправлен }

  /v1/driver/profile/phone-change/verify:
    post:
      tags: ["Drivers / Profile"]
      summary: "Смена телефона — подтверждение OTP"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Подтверждение смены телефона. Передаёте session_id из request и otp. При успехе обновляется drivers.phone; при ошибке — сообщение об ошибке.
        **Данные:** session_id, otp (обязательно).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                otp: { type: string, example: "123456" }
              required: ["session_id","otp"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/profile/power:
    patch:
      tags: ["Drivers / Profile"]
      summary: "Редактировать данные тягача (Power Unit)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Обновление полей тягача: power_plate_number, power_tech_series, power_tech_number, power_owner_name, power_scan_status.
        **Данные:** В теле только изменяемые поля тягача.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                power_plate_number: { type: string, example: "01A123BC" }
                power_tech_series: { type: string, example: "AA" }
                power_tech_number: { type: string, example: "9876543" }
                power_owner_name: { type: string, example: "Ali Valiyev" }
                power_scan_status: { type: boolean, example: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/profile/trailer:
    patch:
      tags: ["Drivers / Profile"]
      summary: "Редактировать данные прицепа (Trailer Unit)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Обновление полей прицепа: trailer_plate_number, trailer_tech_series, trailer_tech_number, trailer_owner_name, trailer_scan_status.
        **Данные:** В теле только изменяемые поля прицепа.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trailer_plate_number: { type: string, example: "01A123BC" }
                trailer_tech_series: { type: string, example: "AA" }
                trailer_tech_number: { type: string, example: "9876543" }
                trailer_owner_name: { type: string, example: "Ali Valiyev" }
                trailer_scan_status: { type: boolean, example: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/registration/geo-push:
    patch:
      tags: ["Drivers / Registration"]
      summary: "Шаг 4. Указать гео и push-токен"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** При передаче latitude и longitude — registration_step переводится в geo-push (если ещё не transport-type). push_token сохраняется в любом случае. Без гео шаг не меняется.
        **Данные:** latitude, longitude (опц.), push_token (опц.).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                latitude: { type: number, format: double, example: 41.311081 }
                longitude: { type: number, format: double, example: 69.240562 }
                push_token: { type: string, example: "optional-device-token" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  driver: { $ref: "#/components/schemas/Driver" }
                required: [status, driver]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/driver/registration/transport-type:
    patch:
      tags: ["Drivers / Registration"]
      summary: "Шаг 5. Выбрать тип транспорта"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Указание типа водителя и ТС. После успешного запроса: registration_step=transport-type, registration_status=basic. Справочники кодов: GET /v1/driver/transport-options.
        **Данные:** driver_type (company/freelancer/driver), power_plate_type, trailer_plate_type (обязательно); freelancer_id, company_id (опц.).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_type:
                  type: string
                  enum: ["company","freelancer","driver"]
                  example: "driver"
                power_plate_type:
                  type: string
                  example: "uz_private"
                trailer_plate_type:
                  type: string
                  example: "uz_private"
                freelancer_id: { type: string, format: uuid, nullable: true }
                company_id: { type: string, format: uuid, nullable: true }
              required: ["driver_type","power_plate_type","trailer_plate_type"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  driver: { $ref: "#/components/schemas/Driver" }
                required: [status, driver]

  /v1/driver/kyc:
    patch:
      tags: ["Drivers / KYC"]
      summary: "Отправить KYC (паспорт, ТС, прицеп)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Загрузка документов: driver_data (паспорт, PINFL, driver_scan_status), power_data (тягач: номер, техпаспорт, владелец, power_scan_status), trailer_data (прицеп — то же или не указывать), driver_owner (true/false). registration_status=full выставляется только при полном и подтверждённом заполнении (scan_status=true где нужно).
        **Данные:** driver_owner, driver_data, power_data, trailer_data (все блоки обязательны).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_owner: { type: boolean, example: true }
                driver_data:
                  type: object
                  properties:
                    driver_passport_series: { type: string, example: "AB" }
                    driver_passport_number: { type: string, example: "1234567" }
                    driver_pinfl: { type: string, example: "12345678901234" }
                    driver_scan_status: { type: boolean, example: true }
                  required: ["driver_passport_series","driver_passport_number","driver_pinfl","driver_scan_status"]
                power_data:
                  type: object
                  properties:
                    power_plate_number: { type: string, example: "01A123BC" }
                    power_tech_series: { type: string, example: "AA" }
                    power_tech_number: { type: string, example: "9876543" }
                    power_owner_name: { type: string, example: "Ali Valiyev" }
                    power_scan_status: { type: boolean, example: true }
                  required: ["power_plate_number","power_tech_series","power_tech_number","power_owner_name","power_scan_status"]
                trailer_data:
                  type: object
                  properties:
                    trailer_plate_number: { type: string, example: "01A123BC" }
                    trailer_tech_series: { type: string, example: "AA" }
                    trailer_tech_number: { type: string, example: "9876543" }
                    trailer_owner_name: { type: string, example: "Ali Valiyev" }
                    trailer_scan_status: { type: boolean, example: true }
                  required: ["trailer_plate_number","trailer_tech_series","trailer_tech_number","trailer_owner_name","trailer_scan_status"]
              required:
                - driver_owner
                - driver_data
                - power_data
                - trailer_data
      responses:
        "200":
          description: |
            Успех. Тело в стандартной обёртке API: `data` содержит поля ниже (корневые `status`/`code`/`description` — см. общую схему ответа).
          content:
            application/json:
              schema:
                type: object
                description: "Поле data в Envelope"
                properties:
                  event: { type: string, example: "updated" }
                  is_full: { type: boolean, example: true, description: "true если все блоки заполнены и scan_status подтверждены" }
                  driver: { $ref: "#/components/schemas/Driver" }
                required: [event, is_full, driver]

  /v1/driver/auth/refresh:
    post:
      tags: ["Drivers / Auth"]
      summary: "Обновить JWT токены (водитель)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение) при истёкшем или скоро истекающем access_token.
        **Назначение:** По refresh_token выдать новую пару access_token + refresh_token. В ответе tokens с expires_in, expires_at, refresh_expires_at (Unix).
        **Тело:** { "refresh_token": "..." }. После вызова старый refresh_token недействителен (rotation).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401":
          description: invalid refresh_token

  /v1/dispatchers/auth/refresh:
    post:
      tags: ["Cargo Manager / Auth", "Driver Manager"]
      summary: "Обновить JWT токены (диспетчер)"
      description: |
        **Кто вызывает:** Диспетчер при истёкшем/скоро истекающем access_token.
        **Тело:** { "refresh_token": "..." }. В ответе — tokens (access_token, refresh_token, expires_in, expires_at, refresh_expires_at).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401":
          description: invalid refresh_token

  /v1/admin/auth/refresh:
    post:
      tags: ["Admin / Auth"]
      summary: "Обновить JWT токены (админ)"
      description: |
        **Кто вызывает:** Админ при истёкшем access_token.
        **Тело:** { "refresh_token": "..." }. В ответе — tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401":
          description: invalid refresh_token

  /v1/company-users/auth/refresh:
    post:
      tags: ["Company / App user auth"]
      summary: "Обновить JWT токены (пользователь компании)"
      description: |
        **Кто вызывает:** Пользователь компании (app user) при истёкшем access_token.
        **Тело:** { "refresh_token": "..." }. В ответе — tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401":
          description: invalid refresh_token

  /v1/driver/auth/logout:
    post:
      tags: ["Drivers / Auth"]
      summary: "Выход (отзыв сессии)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение).
        **Назначение:** Инвалидация сессии. Передайте **refresh_token** — отзывается одна сессия (этот refresh больше нельзя использовать). Передайте **access_token** — отзываются все сессии водителя. Нужен хотя бы один из токенов.
        **Валидация:** при невалидном или истёкшем токене возвращается 401.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string, description: "JWT refresh — отзыв одной сессии" }
                access_token: { type: string, description: "JWT access — отзыв всех сессий водителя" }
      responses:
        "200":
          description: OK (сессия/сессии инвалидированы)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                required: [status]
        "400": { description: Нет ни refresh_token, ни access_token }
        "401": { description: Невалидный или истёкший токен; refresh уже использован }

  /v1/dispatchers/auth/phone:
    post:
      tags: ["Cargo Manager / Auth", "Driver Manager"]
      summary: "Шаг 1. Отправить OTP на телефон"
      description: |
        **Поток:** Ввод телефона в формате +998XXXXXXXXX → запрос отправляет OTP через Telegram Gateway. Код приходит в Telegram/смс. Используется и для входа (существующий диспетчер), и для регистрации (новый номер). Ответ: status=otp_sent, ttl_seconds.
        **Данные:** В теле только phone (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
              required: [phone]
            example:
              phone: "+998901234567"
      responses:
        "200":
          description: OTP отправлен
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "otp_sent" }
                  ttl_seconds: { type: integer, example: 180 }
        "400": { description: Некорректный payload; или no account — у номера нет аккаунта Telegram }
        "429": { description: Cooldown / rate limit }
        "502": { description: OTP не отправлен (otp send failed) }

  /v1/dispatchers/auth/otp/verify:
    post:
      tags: ["Cargo Manager / Auth", "Driver Manager"]
      summary: "Шаг 2. Подтвердить OTP"
      description: |
        **Поток:** Передаёте phone и otp (код из шага 1). Если диспетчер уже зарегистрирован → в ответе status=login и tokens (access_token, refresh_token) — вход выполнен. Если телефон новый → status=register и session_id — переходите к регистрации (POST /v1/dispatchers/registration/complete), JWT пока не выдаётся.
        **Данные:** phone, otp (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
                otp: { type: string, example: "123456" }
              required: [phone, otp]
            example:
              phone: "+998901234567"
              otp: "123456"
      responses:
        "200":
          description: login (tokens) или register (session_id)
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      status: { type: string, example: "login" }
                      tokens: { $ref: "#/components/schemas/Tokens" }
                  - type: object
                    properties:
                      status: { type: string, example: "register" }
                      session_id: { type: string, format: uuid }
        "401": { description: OTP неверный/истёк }
        "429": { description: Превышено количество попыток }

  /v1/dispatchers/auth/login/password:
    post:
      tags: ["Cargo Manager / Auth", "Driver Manager"]
      summary: "Вход по паролю (без OTP)"
      description: |
        **Поток:** Для уже зарегистрированного диспетчера. Передаёте phone и password → в ответе tokens. Дальше все запросы к профилю и т.д. с заголовком X-User-Token = access_token.
        **Данные:** phone, password (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
                password: { type: string, example: "TestPass123!" }
              required: [phone, password]
            example:
              phone: "+998901234567"
              password: "TestPass123!"
      responses:
        "200":
          description: OK, tokens в data
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "login" }
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401": { description: Неверный телефон или пароль }

  /v1/dispatchers/auth/reset-password/request:
    post:
      tags: ["Cargo Manager / Auth", "Driver Manager"]
      summary: Запросить OTP для сброса пароля
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
              required: [phone]
            example:
              phone: "+998901234567"
      responses:
        "200":
          description: OTP отправлен, session_id для confirm
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "otp_sent" }
                  session_id: { type: string, format: uuid }
                  ttl_seconds: { type: integer }
        "400": { description: no account — у номера нет аккаунта Telegram }
        "404": { description: Диспетчер не найден }
        "502": { description: otp send failed — OTP не отправлен }

  /v1/dispatchers/auth/reset-password/confirm:
    post:
      tags: ["Cargo Manager / Auth", "Driver Manager"]
      summary: Подтвердить сброс пароля (session_id + otp + new_password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                otp: { type: string, example: "123456" }
                new_password: { type: string }
              required: [session_id, otp, new_password]
            example:
              session_id: "d4e5f6a7-b8c9-0123-def0-234567890123"
              otp: "123456"
              new_password: "NewPass456!"
      responses:
        "200":
          description: Пароль обновлён
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
        "401": { description: Сессия/OTP неверны }
        "429": { description: Превышено количество попыток }

  /v1/dispatchers/auth/logout:
    post:
      tags: ["Cargo Manager / Auth", "Driver Manager"]
      summary: "Выход (отзыв сессии)"
      description: |
        **Кто вызывает:** Freelance-диспетчер (клиент после входа по OTP или по паролю).
        **Назначение:** Инвалидация сессии. Передайте **refresh_token** — отзывается одна сессия. Передайте **access_token** — отзываются все сессии диспетчера. Нужен хотя бы один из токенов.
        **Валидация:** при невалидном или истёкшем токене возвращается 401.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string, description: "JWT refresh — отзыв одной сессии" }
                access_token: { type: string, description: "JWT access — отзыв всех сессий диспетчера" }
            example:
              access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        "200":
          description: OK (сессия/сессии инвалидированы)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "400": { description: Нет ни refresh_token, ни access_token }
        "401": { description: Невалидный или истёкший токен; refresh уже использован; роль не dispatcher }

  /v1/dispatchers/registration/complete:
    post:
      tags: ["Cargo Manager / Registration", "Driver Manager"]
      summary: "Шаг 3. Завершить регистрацию (имя, пароль, паспорт)"
      description: |
        **Поток:** Вызывается после otp/verify, когда получен status=register и session_id. В теле передаёте session_id (обязательно), name, **role** (при **новой** регистрации обязательно: CARGO_MANAGER или DRIVER_MANAGER — только заглавные буквы; если телефон уже зарегистрирован, возвращается status=login и role в теле не проверяется), password, passport_series, passport_number, pinfl. Создаётся запись в freelance_dispatchers, в ответе — tokens и объект dispatcher (в т.ч. поле role). После этого диспетчер может входить по phone+password или по OTP. Фото загружается отдельно через POST /v1/dispatchers/profile/photo.
        **Данные:** session_id, name, role, password, passport_series, passport_number, pinfl.
        **name:** схема DisplayName (латиница и `_`, 2–64; уникально среди водителей и диспетчеров).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                name: { $ref: "#/components/schemas/DisplayName" }
                role: { $ref: "#/components/schemas/FreelanceDispatcherRole" }
                password: { type: string }
                passport_series: { type: string, example: "AB" }
                passport_number: { type: string, example: "1234567" }
                pinfl: { type: string, example: "12345678901234" }
              required: [session_id, name, password, passport_series, passport_number, pinfl]
            example:
              session_id: "d4e5f6a7-b8c9-0123-def0-234567890123"
              name: "Dispatcher_User"
              role: CARGO_MANAGER
              password: "SecurePass123!"
              passport_series: "AB"
              passport_number: "1234567"
              pinfl: "31234567890123"
      responses:
        "200":
          description: Зарегистрирован или логин (если телефон уже был)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "registered" }
                  tokens: { $ref: "#/components/schemas/Tokens" }
                  dispatcher: { $ref: "#/components/schemas/Dispatcher" }
        "400":
          description: "Некорректные данные (invalid_display_name, freelance_dispatcher_role_required, invalid_freelance_dispatcher_role и др.)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401": { description: session_id неверный/истёк }
        "409":
          description: Телефон уже зарегистрирован или имя занято (phone_already_registered / display_name_taken)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/dispatchers/profile:
    get:
      tags: ["Cargo Manager / Profile", "Driver Manager"]
      summary: "Получить профиль диспетчера"
      description: |
        **Поток:** Запрос с заголовком X-User-Token (JWT access_token). В ответе data.dispatcher — объект диспетчера (id, name, phone, **role**, паспорт, pinfl, work_status, rating и т.д.).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: OK, data.dispatcher
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401": { description: Не авторизован }
    patch:
      tags: ["Cargo Manager / Profile", "Driver Manager"]
      summary: Редактировать профиль диспетчера
      description: |
        Частичное обновление. Поле **name** — схема DisplayName (латиница и `_`, 2–64; уникально среди водителей и диспетчеров).
        Поле **role** — `CARGO_MANAGER` или `DRIVER_MANAGER` (строго верхний регистр). Список допустимых значений с подписями: GET /v1/reference/dispatchers (`roles` / `manager_roles`).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { $ref: "#/components/schemas/DisplayName" }
                role: { $ref: "#/components/schemas/FreelanceDispatcherRole" }
                passport_series: { type: string }
                passport_number: { type: string }
                pinfl: { type: string }
                photo: { type: string, nullable: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "400":
          description: "Некорректные данные (invalid_display_name, invalid_freelance_dispatcher_role и др.)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401": { description: Не авторизован }
        "409":
          description: Имя занято (display_name_taken)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
    delete:
      tags: ["Cargo Manager / Profile", "Driver Manager"]
      summary: Удалить профиль диспетчера (архивация)
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401": { description: Не авторизован }
        "404": { description: Диспетчер не найден }

  /v1/dispatchers/profile/photo:
    post:
      tags: ["Cargo Manager / Profile", "Driver Manager"]
      summary: "Загрузить фото диспетчера"
      description: |
        **Формат:** multipart/form-data, поле **photo** — файл изображения (image/jpeg или image/png). Макс. размер 10 MB.
        Фото сохраняется в БД. В профиле (GET /profile) поле has_photo будет true; само изображение отдаётся через GET /v1/dispatchers/profile/photo.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
                  description: "Файл изображения (JPEG или PNG, макс. 10 MB)"
      responses:
        "200":
          description: Фото сохранено
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  code: { type: integer, example: 200 }
                  description: { type: string, example: "Photo uploaded" }
                  data:
                    type: object
                    properties:
                      status: { type: string, example: "ok" }
                      event: { type: string, example: "photo_uploaded" }
              examples:
                en: { summary: "English", value: { status: "success", code: 200, description: "Photo uploaded", data: { status: "ok", event: "photo_uploaded" } } }
                ru: { summary: "Русский", value: { status: "success", code: 200, description: "Фото загружено", data: { status: "ok", event: "photo_uploaded" } } }
                uz: { summary: "O'zbek", value: { status: "success", code: 200, description: "Foto yuklandi", data: { status: "ok", event: "photo_uploaded" } } }
                tr: { summary: "Türkçe", value: { status: "success", code: 200, description: "Fotoğraf yüklendi", data: { status: "ok", event: "photo_uploaded" } } }
                zh: { summary: "中文", value: { status: "success", code: 200, description: "照片已上传", data: { status: "ok", event: "photo_uploaded" } } }
        "400": { description: "Нет файла, неверный тип или размер" }
        "401": { description: Не авторизован }
    get:
      tags: ["Cargo Manager / Profile", "Driver Manager"]
      summary: "Получить фото диспетчера"
      description: |
        Возвращает загруженное фото (бинарные данные) с заголовком Content-Type (image/jpeg или image/png).
        Если фото не загружалось — 404.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: Изображение
          content:
            image/jpeg: { schema: { type: string, format: binary } }
            image/png: { schema: { type: string, format: binary } }
        "401": { description: Не авторизован }
        "404": { description: Фото не найдено }
    delete:
      tags: ["Cargo Manager / Profile", "Driver Manager"]
      summary: "Удалить фото диспетчера"
      description: |
        Удаляет загруженное фото диспетчера из БД. После удаления has_photo = false.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: Фото удалено
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  code: { type: integer, example: 200 }
                  description:
                    type: string
                    description: "Локализованное описание (зависит от X-Language)"
                    example: "Photo deleted"
                  data:
                    type: object
                    properties:
                      status: { type: string, example: "ok" }
                      event: { type: string, example: "photo_deleted" }
              examples:
                en: { summary: "English", value: { status: "success", code: 200, description: "Photo deleted", data: { status: "ok", event: "photo_deleted" } } }
                ru: { summary: "Русский", value: { status: "success", code: 200, description: "Фото удалено", data: { status: "ok", event: "photo_deleted" } } }
                uz: { summary: "O'zbek", value: { status: "success", code: 200, description: "Foto o'chirildi", data: { status: "ok", event: "photo_deleted" } } }
                tr: { summary: "Türkçe", value: { status: "success", code: 200, description: "Fotoğraf silindi", data: { status: "ok", event: "photo_deleted" } } }
                zh: { summary: "中文", value: { status: "success", code: 200, description: "照片已删除", data: { status: "ok", event: "photo_deleted" } } }
        "401": { description: Не авторизован }

  /v1/dispatchers/profile/password:
    put:
      tags: ["Cargo Manager / Profile", "Driver Manager"]
      summary: Сменить пароль (текущий + новый)
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password: { type: string }
                new_password: { type: string }
              required: [current_password, new_password]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
        "401": { description: Неверный current_password }

  /v1/dispatchers/profile/phone-change/request:
    post:
      tags: ["Cargo Manager / Profile", "Driver Manager"]
      summary: Смена телефона — запрос OTP
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_phone: { type: string, example: "+998901234567" }
              required: [new_phone]
      responses:
        "200":
          description: OTP отправлен, session_id для verify
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "otp_sent" }
                  session_id: { type: string, format: uuid }
                  ttl_seconds: { type: integer }
        "400": { description: no account — у номера нет аккаунта Telegram }
        "409": { description: Телефон уже зарегистрирован }
        "502": { description: otp send failed — OTP не отправлен }

  /v1/dispatchers/profile/phone-change/verify:
    post:
      tags: ["Cargo Manager / Profile", "Driver Manager"]
      summary: Смена телефона — подтверждение OTP
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                otp: { type: string, example: "123456" }
              required: [session_id, otp]
      responses:
        "200":
          description: Телефон обновлён
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  dispatcher: { $ref: "#/components/schemas/Dispatcher" }
        "401": { description: Сессия/OTP неверны }
        "409": { description: Телефон уже занят }

  /v1/dispatchers/companies:
    get:
      tags: ["Company / Dispatcher (приглашённый)"]
      summary: "Список моих компаний"
      description: "Компании, где диспетчер приглашён (диспетчер не создаёт компанию). Требуется X-User-Token."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200": { description: "data.items — массив объектов с полями id, name, type, role" }

  /v1/dispatchers/auth/switch-company:
    post:
      tags: ["Cargo Manager / Auth", "Driver Manager"]
      summary: "Переключить контекст на компанию"
      description: "Тело: company_id (UUID). В ответе — access_token, refresh_token, expires_in, expires_at (Unix), refresh_expires_in, refresh_expires_at (Unix)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company_id: { type: string, format: uuid }
              required: [company_id]
      responses:
        "200": { description: "access_token, refresh_token, expires_in, expires_at, refresh_expires_in, refresh_expires_at (все даты — Unix)" }
        "403": { description: company not found or access denied }

  /v1/dispatchers/companies/{companyId}/invitations:
    post:
      tags: ["Company / Dispatcher (приглашённый)"]
      summary: "Пригласить диспетчера в компанию (по телефону)"
      description: "Тело: phone, role (dispatcher | top_dispatcher). Требуется доступ к компании. В ответе — token для accept."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
                role: { type: string, enum: [dispatcher, top_dispatcher] }
              required: [phone, role]
      responses:
        "201": { description: data.token, data.expires_in_hours }
        "403": { description: access denied }

  /v1/dispatchers/invitations/accept:
    post:
      tags: ["Company / Dispatcher (приглашённый)"]
      summary: "Принять приглашение в компанию"
      description: "Тело: token. Телефон диспетчера должен совпадать с приглашением. Требуется X-User-Token (dispatcher)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
              required: [token]
      responses:
        "200": { description: data.company_id }
        "400": { description: invitation not found or expired }
        "403": { description: invitation was sent to another phone }

  /v1/dispatchers/invitations/decline:
    post:
      tags: ["Company / Dispatcher (приглашённый)"]
      summary: "Отклонить приглашение"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200": { description: declined }

  /v1/dispatchers/driver-invitations:
    get:
      tags: ["Driver Manager / Invitations"]
      summary: "Список отправленных приглашений (диспетчер)"
      description: |
        **Диспетчер:** список приглашений, которые **я отправил** (по компании и фриланс), **включая историю**: принятые, отклонённые, отменённые, истёкшие (status=expired для ещё не обработанных после expires_at). В ответе data.items: token, phone, recipient_phone, type (company | freelance), company_id или dispatcher_id, invited_by (UUID диспетчера-отправителя), status (pending | accepted | declined | cancelled | expired), expires_at, created_at, responded_at (если есть). Отменить только pending: DELETE .../driver-invitations/:token.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200": { description: "data.items — массив приглашений (token, phone, type, status, invited_by, company_id/dispatcher_id, expires_at, created_at, responded_at)" }
    post:
      tags: ["Driver Manager / Invitations"]
      summary: "Отправить приглашение водителю (фриланс — без компании)"
      description: |
        **Фриланс-диспетчер:** пригласить водителя. Передайте **phone** (номер телефона) **или** **driver_id** (UUID водителя из поиска GET /v1/dispatchers/drivers/find). Достаточно одного из полей. В ответе — token; передать водителю (чат/ссылка). Водитель: GET /v1/driver/driver-invitations → список; POST /v1/driver/driver-invitations/accept (token) или POST .../decline (token). После принятия у водителя freelancer_id = текущий диспетчер. X-User-Token (dispatcher).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567", description: "Номер телефона водителя (если не указан driver_id)" }
                driver_id: { type: string, format: uuid, description: "UUID водителя из поиска GET .../drivers/find (приглашение по id)" }
            example:
              phone: "+998901234567"
            examples:
              by_phone:
                summary: "По номеру телефона"
                value: { phone: "+998901234567" }
              by_driver_id:
                summary: "По ID водителя (после поиска)"
                value: { driver_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890" }
      responses:
        "201": { description: "data.token, data.expires_in_hours" }
        "400": { description: "Неверное тело; нет phone и driver_id; водитель не найден по номеру; driver_id не существует" }
        "409": { description: "Неистёкшее приглашение на этот номер уже отправлено (driver_invitation_already_pending)" }

  /v1/dispatchers/driver-invitations/{token}:
    delete:
      tags: ["Driver Manager / Invitations"]
      summary: "Отменить приглашение (диспетчер)"
      description: |
        **Диспетчер:** отменить (отозвать) отправленное приглашение. Можно отменить только своё приглашение. token — из GET /v1/dispatchers/driver-invitations.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string, example: "a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789" }
      responses:
        "200": { description: "data.message = cancelled" }
        "403": { description: "not your invitation" }
        "404": { description: "invitation not found or expired" }

  /v1/dispatchers/drivers/find:
    get:
      tags: ["Driver Manager / Drivers catalog"]
      summary: "Поиск водителей по номеру телефона"
      description: |
        **Диспетчер:** поиск водителей по части номера (phone). Совпадения по полному номеру выше. Результат — список водителей (id, phone, name, work_status, driver_type, freelancer_id, company_id); использовать id для приглашения через POST /v1/dispatchers/driver-invitations (body driver_id). X-User-Token (dispatcher).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: phone
          in: query
          required: true
          schema: { type: string, example: "+998901234567" }
          description: "Часть или полный номер телефона для поиска"
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: "data.items — массив водителей (id, phone, name, work_status, driver_type, freelancer_id, company_id); точные совпадения сверху"

  /v1/dispatchers/drivers:
    get:
      tags: ["Driver Manager / My drivers"]
      summary: "Список моих водителей (с фильтрами и пагинацией)"
      description: |
        **Фриланс-диспетчер:** водители, привязанные к нему (freelancer_id = me). По этому списку диспетчер может отправлять им **таклиф** (рекомендацию груза) — POST /v1/dispatchers/cargo/:id/recommend (body: driver_id).
        **Фильтры:** phone (поиск по номеру), work_status (available, busy, loaded…), truck_type (тип тягача: TENT, REFRIGERATOR… из power_plate_type). **Пагинация:** page (с 1), limit (по умолчанию 20, макс. 100). **Сортировка:** sort=updated_at:desc (по умолчанию), name:asc, last_online_at:desc, work_status:asc.
        X-User-Token (dispatcher). Ответы на 5 языках (заголовок X-Language: ru, uz, en, tr, zh).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: phone
          in: query
          schema: { type: string }
          description: "Поиск по номеру телефона (частичное совпадение)"
        - name: work_status
          in: query
          schema: { type: string, example: "available" }
          description: "Фильтр по статусу водителя (available, busy, loaded и т.д.)"
        - name: truck_type
          in: query
          schema: { type: string, example: "TENT" }
          description: "Фильтр по типу тягача (power_plate_type): TENT, REFRIGERATOR, FLATBED, TANKER, OTHER"
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: sort
          in: query
          schema: { type: string, default: "updated_at:desc", example: "updated_at:desc" }
          description: "Сортировка: updated_at:desc, name:asc, last_online_at:desc, work_status:asc"
      responses:
        "200": { description: "data.items — массив водителей, data.total — всего записей" }

  /v1/dispatchers/drivers/all:
    get:
      tags: ["Driver Manager / Drivers catalog"]
      summary: "Общий список водителей (каталог, с фильтрами и пагинацией)"
      description: |
        **Фриланс-диспетчер:** общий каталог всех водителей в системе (не только тех, кто уже принял ваше приглашение). Можно использовать для подбора новых водителей по параметрам и затем:
        - отправить приглашение: POST /v1/dispatchers/driver-invitations (body: phone или driver_id);
        - отправлять офферы/приглашения по грузам через API офферов.

        **Фильтры:** phone, name, work_status, truck_type (power_plate_type), driver_type, account_status, has_photo.
        **Гео-фильтр:** latitude + longitude + radius_km (в километрах) — вернёт водителей в радиусе по их текущим координатам.
        **Адаптивная пагинация:** frontend передаёт `limit` (1..100) и `page` (с 1).
        **Сортировка:** sort=updated_at:desc (по умолчанию), name:asc, last_online_at:desc, work_status:asc.

        Требуется X-User-Token (dispatcher). Ответы на 5 языках (заголовок X-Language: ru, uz, en, tr, zh).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: phone
          in: query
          schema: { type: string }
          description: "Поиск по номеру телефона (частичное совпадение)"
        - name: name
          in: query
          schema: { type: string }
          description: "Поиск по имени водителя (частичное совпадение)"
        - name: work_status
          in: query
          schema: { type: string, example: "available" }
          description: "Фильтр по статусу водителя (available, busy, loaded и т.д.)"
        - name: truck_type
          in: query
          schema: { type: string, example: "TENT" }
          description: "Фильтр по типу тягача (power_plate_type): TENT, REFRIGERATOR, FLATBED, TANKER, OTHER"
        - name: driver_type
          in: query
          schema: { type: string, example: "freelancer" }
          description: "Фильтр по типу водителя (driver_type)"
        - name: account_status
          in: query
          schema: { type: string, example: "active" }
          description: "Фильтр по account_status"
        - name: has_photo
          in: query
          schema: { type: boolean, example: true }
          description: "Фильтр по наличию фото профиля"
        - name: latitude
          in: query
          schema: { type: number, format: float, example: 41.3111 }
          description: "Широта центра для гео-поиска (использовать вместе с longitude и radius_km)"
        - name: longitude
          in: query
          schema: { type: number, format: float, example: 69.2797 }
          description: "Долгота центра для гео-поиска (использовать вместе с latitude и radius_km)"
        - name: radius_km
          in: query
          schema: { type: number, format: float, example: 25 }
          description: "Радиус поиска в километрах (использовать вместе с latitude и longitude)"
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: sort
          in: query
          schema: { type: string, default: "updated_at:desc", example: "updated_at:desc" }
          description: "Сортировка: updated_at:desc, name:asc, last_online_at:desc, work_status:asc"
      responses:
        "200": { description: "data.items — массив водителей со всеми данными, data.total/page/limit/total_pages/has_next — мета пагинации" }

  /v1/dispatchers/drivers/{driverId}:
    delete:
      tags: ["Driver Manager / My drivers"]
      summary: "Удалить водителя из списка (отвязать)"
      description: |
        **Диспетчер:** отвязать водителя от себя (driver.freelancer_id = NULL). Водитель должен быть в списке «мои водители» (принял приглашение). После отвязки водитель исчезает из GET /v1/dispatchers/drivers.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: driverId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "data.message = unlinked" }
        "403": { description: "driver not found or not linked to you" }

  /v1/dispatchers/drivers/{driverId}/power:
    put:
      tags: ["Driver Manager / My drivers"]
      summary: "Добавить или изменить тягач водителя"
      description: |
        **Диспетчер:** добавить/обновить данные тягача для водителя. Водитель должен быть принят по приглашению (freelancer_id = текущий диспетчер). Данные сохраняются и отображаются у водителя. Тело: power_plate_type, power_plate_number, power_tech_series, power_tech_number, power_owner_name, power_scan_status (все опционально для частичного обновления).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: driverId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                power_plate_type: { type: string, example: "TRACTOR" }
                power_plate_number: { type: string }
                power_tech_series: { type: string }
                power_tech_number: { type: string }
                power_owner_name: { type: string }
                power_scan_status: { type: boolean }
      responses:
        "200": { description: "data.event = updated, data.driver — полный объект водителя с тягачом" }
        "403": { description: "driver must have accepted your invitation" }
        "404": { description: "driver not found" }

  /v1/dispatchers/drivers/{driverId}/trailer:
    put:
      tags: ["Driver Manager / My drivers"]
      summary: "Добавить или изменить прицеп водителя"
      description: |
        **Диспетчер:** добавить/обновить данные прицепа для водителя. Водитель должен быть принят по приглашению (freelancer_id = текущий диспетчер). Данные сохраняются и отображаются у водителя. Тело: trailer_plate_type, trailer_plate_number, trailer_tech_series, trailer_tech_number, trailer_owner_name, trailer_scan_status (все опционально).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: driverId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                trailer_plate_type: { type: string, example: "TENTED" }
                trailer_plate_number: { type: string }
                trailer_tech_series: { type: string }
                trailer_tech_number: { type: string }
                trailer_owner_name: { type: string }
                trailer_scan_status: { type: boolean }
      responses:
        "200": { description: "data.event = updated, data.driver — полный объект водителя с прицепом" }
        "403": { description: "driver must have accepted your invitation" }
        "404": { description: "driver not found" }

  /v1/dispatchers/companies/{companyId}/driver-invitations:
    post:
      tags: ["Driver Manager / Invitations"]
      summary: "Пригласить водителя в компанию (по телефону)"
      description: "Тело: phone. В ответе — token. Водитель принимает через POST /v1/driver/driver-invitations/accept."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid, example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
              required: [phone]
            example:
              phone: "+998971234567"
      responses:
        "201": { description: "data.token, data.expires_in_hours" }
        "403": { description: access denied }
        "409": { description: "Неистёкшее приглашение в эту компанию на этот номер уже есть (driver_invitation_already_pending)" }

  /v1/dispatchers/trips:
    get:
      tags: ["Cargo Manager / Trips"]
      summary: "Список рейсов (cargo manager)"
      description: |
        Возвращает рейсы по грузам, к которым у диспетчера есть доступ:
        - грузы созданные этим диспетчером (`created_by_type=DISPATCHER`), или
        - грузы выбранной компании после `POST /v1/dispatchers/auth/switch-company` (`created_by_type=COMPANY` + `company_id` из JWT/контекста).

        Фильтры:
        - `cargo_id` (UUID) — рейсы только по одному грузу;
        - `driver_id` (UUID) — рейсы только по водителю;
        - `status` — список через запятую (например `IN_PROGRESS,IN_TRANSIT`).

        Пагинация: `limit` (max 100), `offset`.
        Сортировка: `sort=created_at|updated_at` + `order=asc|desc` (по умолчанию `created_at desc`).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: cargo_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: driver_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: status
          in: query
          required: false
          schema: { type: string, example: "IN_PROGRESS,IN_TRANSIT" }
        - name: limit
          in: query
          required: false
          schema: { type: integer, example: 50, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, example: 0, minimum: 0 }
        - name: sort
          in: query
          required: false
          schema: { type: string, example: "created_at" }
        - name: order
          in: query
          required: false
          schema: { type: string, example: "desc" }
      responses:
        "200": { description: "data.items[], data.total, data.limit, data.offset" }
        "401": { description: unauthorized }

  /v1/dispatchers/cargo/{id}/trips:
    get:
      tags: ["Cargo Manager / Trips"]
      summary: "Рейсы по cargo_id (cargo manager)"
      description: "Возвращает все рейсы указанного груза. Доступно только владельцу груза (диспетчер/компания после switch-company)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: UUID груза (cargo_id)
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "data.cargo_id, data.items[], data.total" }
        "403": { description: not_your_cargo }
        "404": { description: cargo_not_found }

  /v1/dispatchers/trips/{id}:
    get:
      tags: ["Cargo Manager / Trips"]
      summary: "Получить рейс по trip_id (cargo manager)"
      description: "Возвращает рейс по `trip_id`. Доступно только если груз рейса принадлежит диспетчеру/компании (см. GET /v1/dispatchers/trips)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: UUID рейса (trip_id)
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "data — объект рейса" }
        "403": { description: not_your_cargo }
        "404": { description: trip_not_found }

  /v1/dispatchers/trips/history:
    get:
      tags: ["Cargo Manager / Trips"]
      summary: "История trips/offers (cargo manager)"
      description: |
        Лента для cargo manager; `items` по `event_at` (новые первые).
        Типы: `trip_active`, `trip_completed`, `trip_cancelled`, `offer_accepted` (+ `has_open_trip`), `offer_rejected`.
        Параметр `limit` ограничивает выборку по каждому источнику.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 50, minimum: 1, maximum: 100 }
      responses:
        "200": { description: "data.items[]: event_type, event_at, offer?/trip?" }
        "401": { description: unauthorized }

  /v1/dispatchers/trips/{id}/confirm-transition:
    post:
      tags: ["Cargo Manager / Trips"]
      summary: "Подтвердить следующий статус рейса (диспетчер)"
      description: |
        **Роль `CARGO_MANAGER`:** через этот метод может только **закрыть** рейс — поставить `COMPLETED`, и только когда рейс в `DELIVERED` и водитель уже запросил завершение (`POST /v1/driver/trips/{id}/confirm`). Промежуточные шаги (`IN_PROGRESS`→`IN_TRANSIT`→`DELIVERED`) для cargo manager **запрещены** (ответ `403`, ключ `trip_cargo_manager_completed_only`); их подтверждает водитель или диспетчер с ролью `DRIVER_MANAGER`.
        **Роль `DRIVER_MANAGER` (и прочие диспетчеры без роли cargo manager):** промежуточные шаги (`IN_PROGRESS`→`IN_TRANSIT`→`DELIVERED`) — как раньше, совместно с водителем.
        **Закрытие (`COMPLETED`):** с `DELIVERED` никто не может перейти в `COMPLETED`, пока водитель не запросил завершение. Если водитель ещё не запросил — `400` `trip_completion_needs_driver_first`.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: data — поля рейса после шага (см. GET /api/trips/:id) }
        "400": { description: "invalid_status_transition | trip_completion_needs_driver_first | trip_completion_already_pending" }
        "403": { description: "not your cargo | trip_cargo_manager_completed_only (CARGO_MANAGER cannot confirm non-COMPLETED steps)" }
        "404": { description: trip not found }

  /v1/dispatchers/trips/{id}/cancel:
    post:
      tags: ["Cargo Manager / Trips"]
      summary: "Отменить рейс (диспетчер)"
      description: |
        Отмена без второй стороны: рейс архивируется и удаляется из trips; груз остаётся для новой попытки; оффер возвращается в PENDING.
        Параметр пути **`id`** — UUID **рейса** (`trip_id`), не идентификатор оффера.
        **en:** Cancel trip; trip archived, cargo kept for retry.
        **uz:** Reysni bekor qilish; yuk qayta urinish uchun qoladi.
        **tr:** Sefer iptal; yük yeniden deneme için kalır.
        **zh:** 取消行程；货物保留可重试。
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: UUID рейса (trip_id)
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "data.status=cancelled, data.trip_id, data.cargo_id, data.offer_id" }
        "400": { description: trip already completed }
        "403": { description: not your cargo }
        "404": { description: trip not found }

  /v1/dispatchers/trips/{id}/state:
    get:
      tags: ["Cargo Manager / Trips"]
      summary: "Состояние рейса и подтверждений (диспетчер)"
      description: |
        Рейс, next_status, pending_confirm_to, метки подтверждений, кратко cargo (id, status).
        **en:** Trip state and bilateral confirmation progress.
        **uz:** Reys holati va tasdiqlar.
        **tr:** Sefer durumu ve onaylar.
        **zh:** 行程状态与确认进度。
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: OK }
        "403": { description: not your cargo }
        "404": { description: trip not found }

  /v1/dispatchers/trip-notifications:
    get:
      tags: ["Notifications and ratings / Cargo manager"]
      summary: "Список уведомлений по рейсам (cargo manager)"
      description: |
        Аналогично водителю; дополнительно приходит `COMPLETION_PENDING_MANAGER`, когда водитель запросил завершение и ждёт вашего `POST .../confirm-transition` для `COMPLETED`.
        Текст уведомления в каждом элементе — поле **`message`** по заголовку **`X-Language`** (не все языки сразу).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: unread_only
          in: query
          schema: { type: boolean, default: false }
        - name: limit
          in: query
          schema: { type: integer, default: 30, minimum: 1, maximum: 100 }
      responses:
        "200": { description: "data.items[], data.unread_count" }

  /v1/dispatchers/trip-notifications/read-all:
    post:
      tags: ["Notifications and ratings / Cargo manager"]
      summary: "Отметить все уведомления прочитанными (cargo manager)"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200": { description: "data.updated" }

  /v1/dispatchers/trip-notifications/{id}/read:
    post:
      tags: ["Notifications and ratings / Cargo manager"]
      summary: "Отметить уведомление прочитанным (cargo manager)"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: ok }
        "404": { description: trip_notification_not_found }

  /v1/dispatchers/drivers/{driverId}/rating:
    post:
      tags: ["Notifications and ratings / Cargo manager"]
      summary: "Оценить водителя по завершённому рейсу (профиль, 1–5 шаг 0.5)"
      description: |
        Путь: **водитель** (`driver_id`), которого оцениваете. Тело: **`trip_id`** завершённого рейса и **`stars`**.
        Проверяется, что рейс `COMPLETED`, груз ваш, и на рейсе назначен этот водитель. Оценка сохраняется в `trip_ratings` и участвует в агрегате **`drivers.rating`**.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: driverId
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: UUID водителя (получатель оценки)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileTripRatingRequest" }
      responses:
        "200": { description: ok }
        "400": { description: trip_rating_not_completed | trip_rating_invalid_stars | trip_rating_ratee_mismatch }
        "403": { description: not your cargo }
        "404": { description: trip not found }

  /v1/dispatchers/offers/{id}/accept:
    post:
      tags: ["Cargo Manager / Offers"]
      summary: "Принять оффер водителя (его цену)"
      description: |
        Для офферов с **proposed_by=DRIVER**. Подтверждаете предложенную водителем цену; создаётся рейс с договорной ценой на рейсе; **payments** груза не меняются. Эквивалентно `POST /api/offers/{id}/accept` с JWT диспетчера-владельца груза (фриланс-автор груза **или** компания через switch-company).

        Тело запроса не требуется. **`{id}` в пути — это только UUID оффера** (`offer_id`); query/body для выбора оффера не используются.

        При ошибке смотрите **data.reason** (см. описание `POST /api/offers/{id}/accept`).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: UUID оффера (offer_id), только из path
          schema: { type: string, format: uuid }
      responses:
        "200": { description: cargo_id, offer_id, trip_id, agreed_price, agreed_currency }
        "403": { description: not_your_cargo / only_dispatcher_accepts_driver_offer }
        "404": { description: offer_not_found_or_not_pending; data.reason }
        "409": { description: cargo_slots_full / cargo_not_searching / driver_busy; data.reason }
        "500": { description: failed_to_accept; data.reason }

  /v1/dispatchers/offers/{id}:
    get:
      tags: ["Cargo Manager / Offers"]
      summary: "Получить один оффер (cargo manager) + полный cargo"
      description: |
        Возвращает один оффер по `offer_id` из path (`{id}`) и **полный связанный cargo** (как карточка груза: route_points, payment и пр.).
        Доступно только владельцу груза: диспетчер-создатель груза или диспетчер выбранной компании после switch-company.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: UUID оффера (offer_id)
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "data.offer, data.cargo, data.trip|null" }
        "403": { description: not_your_cargo }
        "404": { description: offer_not_found / cargo_not_found }

  /v1/dispatchers/offers/{id}/reject:
    post:
      tags: ["Cargo Manager / Offers"]
      summary: "Отклонить оффер водителя или отозвать своё приглашение (диспетчер)"
      description: |
        Для **своего груза** (создатель-диспетчер или компания после switch-company), оффер **PENDING**:
        - **proposed_by=DRIVER** — отклонить входящую заявку водителя;
        - **proposed_by=DISPATCHER** — отозвать своё исходящее приглашение этому водителю.
        **reason обязателен** (текст причины).
        en: Reject driver offer or withdraw your dispatcher offer; reason required.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, minLength: 3, description: "Причина отказа: минимум 1 слово и минимум 3 буквы" }
      responses:
        "200": { description: "data.status = rejected" }
        "400": { description: rejection_reason_required / rejection_reason_too_short / offer_not_found_or_not_pending }
        "403": { description: not_your_cargo }
        "404": { description: offer_not_found }

  /v1/dispatchers/offers/all:
    get:
      tags: ["Cargo Manager / Offers"]
      summary: "Все офферы Cargo Manager (исходящие и входящие)"
      description: |
        Единый список офферов для Cargo Manager с переключением направления:
        - `direction=all` (по умолчанию) — оба направления в одном списке
        - `direction=outgoing` — офферы, **отправленные мной** водителям (`proposed_by=DISPATCHER`)
        - `direction=incoming` — офферы, **отправленные мне** водителями (`proposed_by=DRIVER`)

        Структура элемента: блоки `cargo`, `offer`, `trip` (если уже создан рейс).
        Поддерживает фильтр `status` (PENDING, ACCEPTED, REJECTED), пагинацию и счетчики `data.counts.incoming/outgoing`.
        **Как читать:**
        - `direction=all` + `counts` — полный обзор.
        - `direction=outgoing` — только отправленные мной.
        - `direction=incoming` — только отправленные мне.
        **Примеры:**
        - `GET /v1/dispatchers/offers/all?direction=all&page=1&limit=30`
        - `GET /v1/dispatchers/offers/all?direction=incoming&status=PENDING`
        - `GET /v1/dispatchers/offers/all?direction=outgoing&to_driver_id=<driver_uuid>`
        Допустимые алиасы `direction`: outgoing/from_me/sent/by и incoming/to_me/received.
        Ответы на 5 языках (X-Language: ru, uz, en, tr, zh).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: direction
          in: query
          required: false
          description: "Направление офферов: all (по умолчанию), outgoing или incoming"
          schema: { type: string, example: "all" }
        - name: counterparty_id
          in: query
          required: false
          description: "Фильтр по контрагенту (driver_id). Для outgoing = на кого отправлено, для incoming = от кого отправлено."
          schema: { type: string, format: uuid }
        - name: to_driver_id
          in: query
          required: false
          description: "Алиас для outgoing: на какого водителя отправлено."
          schema: { type: string, format: uuid }
        - name: from_driver_id
          in: query
          required: false
          description: "Алиас для incoming: от какого водителя получено."
          schema: { type: string, format: uuid }
        - name: status
          in: query
          required: false
          schema: { type: string, example: "PENDING" }
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 30, minimum: 1, maximum: 100 }
      responses:
        "200": { description: "data.items, data.total, data.page, data.limit, data.direction, data.counterparty_id, data.counts.incoming, data.counts.outgoing" }
        "400": { description: invalid_payload_detail }
        "401": { description: unauthorized }
        "500": { description: failed_to_list_sent_offers }

  /v1/dispatchers/cargo/mine:
    get:
      tags: ["Cargo Manager / View Cargo"]
      summary: "Мои грузы (только созданные мной) — фильтры/сортировка/пагинация + от/до город"
      description: |
        Возвращает **только грузы**, созданные текущим Cargo Manager (created_by_type=DISPATCHER, created_by_id=me).
        По умолчанию (если не передан `status`) возвращаются только **активные** грузы со статусом `SEARCHING_ALL`.
        Поддерживает фильтрацию/сортировку/пагинацию как `GET /api/cargo`, плюс фильтр по городам:
        - `from_city_code` — city_code основной LOAD точки (route_points.is_main_load=true)
        - `to_city_code` — city_code основной UNLOAD точки (route_points.is_main_unload=true)
        **Примеры:**
        - `GET /v1/dispatchers/cargo/mine?page=1&limit=20`
        - `GET /v1/dispatchers/cargo/mine?status=SEARCHING_ALL,COMPLETED&sort=created_at:desc`

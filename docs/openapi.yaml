        in: query
        required: false
        schema:
          type: string
      - name: to_city_code
        in: query
        required: false
        schema:
          type: string
      - name: driver_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: cargo_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: sections
        in: query
        required: false
        schema:
          type: string
          example: summary,kpi,funnel,timeline,top,contracts
      - name: contract_scope
        in: query
        required: false
        schema:
          type: string
          enum: [all, successful, cancelled, in_execution]
          default: all
      responses:
        '200':
          description: XLSX-файл
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '400':
          description: invalid_payload_detail
        '403':
          description: forbidden (роль не DRIVER_MANAGER)
        '500':
          description: internal_error




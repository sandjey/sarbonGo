          description: Уникальный идентификатор груза (UUID)
        name:
          type: string
          nullable: true
          example: Пшеница, Ташкент → Самарканд, тент 20т/82м³
          description: Короткое имя/название груза (что везём), отображается в списках
        weight:
          type: number

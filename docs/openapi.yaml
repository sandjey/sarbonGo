  /v1/dispatchers/drivers/find:
    get:
      tags:
      - Driver Manager / Drivers & connections
      summary: Поиск водителей по номеру телефона
      description: '**Диспетчер:** поиск водителей по части номера (phone). Совпадения по полному номеру выше. Результат — список водителей (id, phone, name, work_status, driver_type, freelancer_id, company_id);
        использовать id для приглашения через POST /v1/dispatchers/driver-invitations (body driver_id). X-User-Token (dispatcher).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: phone
        in: query
        required: true

  /v1/dispatchers/offers/all:
    get:
      tags:
      - Cargo Manager / Offers
      - Driver Manager / Offers
      summary: Все офферы диспетчера (исходящие и входящие)
      description: 'Единый список офферов для диспетчера (JWT `freelance_dispatchers`): Cargo Manager и Driver Manager используют один и тот же путь.

        - **Cargo Manager:** грузы, где вы создатель (`created_by_type=DISPATCHER`, `created_by_id=вы`).

        - **Driver Manager:** дополнительно видны **ваши** исходящие офферы как менеджер (`proposed_by=DRIVER_MANAGER` и `proposed_by_id=вы`) по **любому** грузу — чтобы они попадали в список после `…/offers/send-by-driver-manager`.


        Направление:

        - `direction=all` (по умолчанию) — оба направления в одном списке (см. правила выше).

        - `direction=outgoing` — вы как владелец груза отправили цену водителю (`proposed_by=DISPATCHER`), **или** вы как driver manager отправили оффер (`proposed_by=DRIVER_MANAGER`, `proposed_by_id=вы`).

        - `direction=incoming` — офферы **по вашим грузам**, входящие от водителей и менеджеров (`proposed_by=DRIVER` и `proposed_by=DRIVER_MANAGER`).


        Структура элемента: блоки `cargo`, `offer`, `trip` (если уже создан рейс).

        Поддерживает фильтр `status` (PENDING, ACCEPTED, REJECTED, CANCELED, WAITING_DRIVER_CONFIRM), пагинацию и счетчики `data.counts.incoming/outgoing`.

        **Как читать:**

        - `direction=all` + `counts` — полный обзор.

        - `direction=outgoing` — только отправленные мной.

        - `direction=incoming` — только отправленные мне.

        **Примеры:**

        - `GET /v1/dispatchers/offers/all?direction=all&page=1&limit=30`

        - `GET /v1/dispatchers/offers/all?direction=incoming&status=PENDING`

        - `GET /v1/dispatchers/offers/all?direction=outgoing&to_driver_id=<driver_uuid>`

        Допустимые алиасы `direction`: outgoing/from_me/sent/by и incoming/to_me/received.

        Ответы на 5 языках (X-Language: ru, uz, en, tr, zh).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: direction
        in: query
        required: false
        description: 'Направление офферов: all (по умолчанию), outgoing или incoming'
        schema:
          type: string
          example: all
      - name: counterparty_id
        in: query
        required: false
        description: Фильтр по контрагенту (driver_id). Для outgoing = на кого отправлено, для incoming = от кого отправлено.
        schema:
          type: string
          format: uuid
      - name: to_driver_id
        in: query
        required: false
        description: 'Алиас для outgoing: на какого водителя отправлено.'
        schema:
          type: string
          format: uuid
      - name: from_driver_id
        in: query
        required: false
        description: 'Алиас для incoming: от какого водителя получено.'
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        required: false
        schema:
          type: string
          example: PENDING
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 30
          minimum: 1
          maximum: 100
      responses:
        '200':
          description: data.items, data.total, data.page, data.limit, data.direction, data.counterparty_id, data.counts.incoming, data.counts.outgoing
        '400':
          description: invalid_payload_detail
        '401':
          description: unauthorized
        '500':
          description: failed_to_list_sent_offers

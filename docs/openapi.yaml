        `conversation_read`. В каждом элементе `messages[]` — поля **read_by_me** / **read_by_peer** (по курсорам прочитанного), не только для последнего сообщения.'
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      - UserIDHeader: []
      parameters:

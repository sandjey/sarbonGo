      - Company / Users & auth
      summary: Проверить OTP — вход или регистрация
      description: Если пользователь с таким телефоном есть — возвращает status=login и tokens. Если нет — status=register и session_id для завершения регистрации.
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - phone
              - otp
              properties:
                phone:
                  type: string
                otp:
                  type: string
      responses:
        '200':
          description: login (tokens + user) или register (session_id)
        '401':
          description: otp expired or invalid
  /v1/company-users/registration/complete:
    post:
      tags:
      - Company / Users & auth
      summary: Завершить регистрацию (после OTP)
      description: Вызывается после otp/verify при status=register. Передать session_id, first_name, last_name (опц.), password. Номер телефона берётся из сессии (уже верифицирован в шаге OTP). Роль автоматически
        owner. В ответе — tokens и user.
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - session_id
              - first_name
              - password
              properties:
                session_id:
                  type: string
                  format: uuid
                first_name:
                  type: string
                last_name:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: registered, tokens + user (role=owner)
        '400':
          description: invalid payload or phone mismatch
        '401':
          description: session expired
        '409':
          description: phone already registered
  /v1/auth/companies:
    get:
      tags:
      - Company
      summary: Список компаний пользователя
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: companies with role and is_current
        '401':
          description: unauthorized
  /v1/auth/switch-company:
    post:
      tags:
      - Company
      summary: Переключить текущую компанию
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - company_id
              properties:
                company_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: new token + company
        '401':
          description: unauthorized
        '403':
          description: not a member
  /v1/companies:
    post:
      tags:
      - Company
      summary: Создать компанию
      description: Создатель становится OWNER. type — только SHIPPER, CARRIER или BROKER (верхний регистр).
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - type
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum:
                  - SHIPPER
                  - CARRIER
                  - BROKER
                  description: Тип компании из справочника
                inn:
                  type: string
                phone:
                  type: string
                address:
                  type: string
      responses:
        '201':
          description: company created
        '401':
          description: unauthorized
  /v1/companies/{companyId}/invitations:
    post:
      tags:
      - Company
      summary: Пригласить сотрудника (Owner/CEO/TopManager/TopDispatcher)
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: companyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - role_id
              properties:
                email:
                  type: string
                  format: email
                role_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: invite_link, expires_at
        '403':
          description: forbidden
  /v1/companies/{companyId}/users:
    get:
      tags:
      - Company
      summary: Список сотрудников компании
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: companyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        schema:
          type: integer
      - name: limit
        in: query
        schema:
          type: integer
      responses:
        '200':
          description: users with roles
        '403':
          description: forbidden
  /v1/companies/{companyId}/users/{userId}/role:
    put:
      tags:

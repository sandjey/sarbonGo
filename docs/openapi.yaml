      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - photo
              properties:
                photo:
                  type: string
                  format: binary
                  description: "Файл изображения профиля."
      responses:
        '200':
          description: "Фото профиля успешно загружено."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  code:
                    type: integer
                    example: 200
                  description:
                    type: string
                    example: Photo uploaded
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      event:
                        type: string
                        example: photo_uploaded
              examples:
                en:
                  summary: English
                  value:
                    status: success
                    code: 200
                    description: Photo uploaded
                    data:
                      status: ok
                      event: photo_uploaded
                ru:
                  summary: Русский
                  value:
                    status: success
                    code: 200
                    description: Фото загружено
                    data:
                      status: ok
                      event: photo_uploaded
                uz:
                  summary: O'zbek
                  value:
                    status: success
                    code: 200
                    description: Foto yuklandi
                    data:
                      status: ok
                      event: photo_uploaded
                tr:
                  summary: Türkçe
                  value:
                    status: success
                    code: 200
                    description: Fotoğraf yüklendi
                    data:
                      status: ok
                      event: photo_uploaded
                zh:
                  summary: 中文
                  value:
                    status: success
                    code: 200
                    description: 照片已上传
                    data:
                      status: ok
                      event: photo_uploaded
        '400':
          description: "Некорректный файл (тип, размер, отсутствие файла)."
        '401':
          description: "Требуется авторизация диспетчера."
    get:
      tags:
      - Dispatchers / Profile
      summary: "Получить фото профиля диспетчера."
      description: "Возвращает бинарное изображение текущей фотографии профиля."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: "Фото профиля получено."
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '401':
          description: "Требуется авторизация диспетчера."
        '404':
          description: "Фото профиля отсутствует."
    delete:
      tags:
      - Dispatchers / Profile
      summary: "Удалить фото профиля диспетчера."
      description: "Удаляет текущую фотографию профиля диспетчера."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: "Фото профиля удалено."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  code:
                    type: integer
                    example: 200
                  description:
                    type: string
                    description: "Локализованное текстовое описание результата операции."
                    example: Photo deleted
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      event:
                        type: string
                        example: photo_deleted
              examples:
                en:
                  summary: English
                  value:
                    status: success
                    code: 200
                    description: Photo deleted
                    data:
                      status: ok
                      event: photo_deleted
                ru:
                  summary: Русский
                  value:
                    status: success
                    code: 200
                    description: Фото удалено
                    data:
                      status: ok
                      event: photo_deleted
                uz:
                  summary: O'zbek
                  value:
                    status: success
                    code: 200
                    description: Foto o'chirildi
                    data:
                      status: ok
                      event: photo_deleted
                tr:
                  summary: Türkçe
                  value:
                    status: success
                    code: 200
                    description: Fotoğraf silindi
                    data:
                      status: ok
                      event: photo_deleted
                zh:
                  summary: 中文
                  value:
                    status: success
                    code: 200
                    description: 照片已删除
                    data:
                      status: ok
                      event: photo_deleted
        '401':
          description: "Требуется авторизация диспетчера."
  /v1/dispatchers/profile/password:
    put:
      tags:
      - Dispatchers / Profile
      summary: "Изменить пароль диспетчера."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
              required:
              - current_password
              - new_password
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '401':
          description: "Текущий пароль неверен или сессия недействительна."
  /v1/dispatchers/profile/phone-change/request:
    post:
      tags:
      - Dispatchers / Profile
      summary: "Запросить смену телефона диспетчера."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_phone:
                  type: string
                  example: '+998901234567'
              required:
              - new_phone
      responses:
        '200':
          description: "OTP для подтверждения смены телефона отправлен."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: otp_sent
                  session_id:
                    type: string
                    format: uuid
                  ttl_seconds:
                    type: integer
        '400':
          description: "Некорректный формат нового телефона."
        '409':
          description: "Новый телефон уже используется."
        '502':
          description: "Ошибка SMS-провайдера или внешнего сервиса."
  /v1/dispatchers/profile/phone-change/verify:
    post:
      tags:
      - Dispatchers / Profile
      summary: "Подтвердить смену телефона диспетчера."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
                otp:
                  type: string
                  example: '123456'
              required:
              - session_id
              - otp
      responses:
        '200':
          description: "Телефон успешно изменен."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  dispatcher:
                    $ref: '#/components/schemas/Dispatcher'
        '401':
          description: "Неверный OTP или недействительная сессия подтверждения."
        '409':
          description: "Телефон уже занят другим пользователем."
  /v1/dispatchers/connection-offers:
    get:
      tags:
      - Driver Manager / Drivers & connections
      summary: "Список приглашений на связь."
      description: "Возвращает входящие/исходящие invitation-офферы на связь водителей и диспетчеров."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: direction
        in: query
        required: false
        schema:
          type: string
          enum:
          - all
          - incoming
          - outgoing
          default: all
      responses:
        '200':
          description: data.direction, data.items[]
        '400':
          description: invalid direction
    post:
      tags:
      - Driver Manager / Drivers & connections
      summary: "Создать приглашение на связь."
      description: "Создает invitation для привязки водителя к менеджеру водителей."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_id:
                  type: string
                  format: uuid
              required:
              - driver_id
      responses:
        '201':
          description: data.token, data.expires_in_hours, data.linked
        '400':
          description: invalid driver_id
        '403':
          description: access denied
        '404':
          description: driver not found
        '409':
          description: driver already linked or invitation pending (driver_invitation_already_pending)
  /v1/dispatchers/connection-offers/{token}:
    delete:
      tags:
      - Driver Manager / Drivers & connections
      summary: "Отменить приглашение по токену."
      description: "Удаляет/отклоняет invitation с указанием причины."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
          example: a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: driver does not respond
              required:
              - reason
      responses:
        '200':
          description: ok (invitation row deleted)
        '400':
          description: rejection_reason_required / rejection_reason_too_short
        '403':
          description: not your invitation
        '404':
          description: invitation not found or expired
  /v1/dispatchers/connection-offers/accept:
    post:
      tags:
      - Driver Manager / Drivers & connections
      summary: "Принять приглашение на связь."
      description: "Принимает invitation по токену и создает связь с водителем."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
              required:
              - token
      responses:
        '200':
          description: data.driver_id
        '400':
          description: invitation not found or expired
        '403':
          description: "Недостаточно прав или invitation принадлежит другому пользователю."
  /v1/dispatchers/connection-offers/decline:
    post:
      tags:
      - Driver Manager / Drivers & connections
      summary: "Отклонить приглашение на связь."
      description: "Отклоняет invitation по токену."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
              required:
              - token
      responses:
        '200':
          description: data.status = declined
        '400':
          description: invitation not found or expired
        '403':
          description: invitation was sent to another phone

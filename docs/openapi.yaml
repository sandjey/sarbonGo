  /v1/dispatchers/cargo/active:
    get:
      tags: ["Freelance Dispatchers / Добавление груза", "Cargo — Диспетчер, компания, админ"]
      summary: "Активные грузы в поиске (маркетплейс для фриланс-диспетчера)"
      description: |
        **Назначение:** каталог **всех** грузов в базе в статусе поиска (по умолчанию `SEARCHING_ALL`), **не только** созданных текущим диспетчером — чтобы подбирать машины и отправлять рекомендации (`POST /v1/dispatchers/cargo/:id/recommend`).

        **Отличие от `GET /api/cargo` с JWT диспетчера:** там список ограничен «мои грузы» (`created_by`). Здесь — полный маркетплейс по фильтрам.

        **Переводы `description` в ответе:** задаются заголовком `X-Language` (ru, uz, en, tr, zh).

        **Параметры:** те же, что у `GET /v1/driver/cargo/active` (page, limit, sort, status, truck_type, weight_min/max, created_from/to, with_offers, q, company_id).

        **en:** Marketplace of all searching cargo (default SEARCHING_ALL), not limited to cargo you created.

        **uz:** Barcha qidiruvdagi yuklar (standart filtrlar); faqat o‘zingiz yaratganlari emas.

        **tr:** Yalnızca sizin oluşturduğunuz yükler değil — tüm arama durumundaki yükler.

        **zh:** 全平台在寻货中的货物（默认 SEARCHING_ALL），不限于本人创建。

      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: sort
          in: query
          schema: { type: string, example: "created_at:desc" }
        - name: status
          in: query
          description: "По умолчанию SEARCHING_ALL. Можно SEARCHING_ALL,SEARCHING_COMPANY и др."
          schema: { type: string, example: "SEARCHING_ALL" }
        - name: truck_type
          in: query
          schema: { type: string }
        - name: weight_min
          in: query
          schema: { type: number, format: double }
        - name: weight_max
          in: query
          schema: { type: number, format: double }
        - name: created_from
          in: query
          schema: { type: string, format: date }
        - name: created_to
          in: query
          schema: { type: string, format: date }
        - name: with_offers
          in: query
          schema: { type: boolean }
        - name: q
          in: query
          description: "Подстрока в названии груза"
          schema: { type: string }
        - name: company_id
          in: query
          description: "Только грузы выбранной компании"
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: "data.items, data.total — Envelope; description на языке X-Language"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
              examples:
                en: { summary: "English", value: { status: "success", code: 200, description: "OK", data: { items: [], total: 0 } } }
                ru: { summary: "Русский", value: { status: "success", code: 200, description: "Успешно", data: { items: [], total: 0 } } }
                uz: { summary: "O'zbek", value: { status: "success", code: 200, description: "Muvaffaqiyatli", data: { items: [], total: 0 } } }
                tr: { summary: "Türkçe", value: { status: "success", code: 200, description: "Başarılı", data: { items: [], total: 0 } } }
                zh: { summary: "中文", value: { status: "success", code: 200, description: "成功", data: { items: [], total: 0 } } }
        "401": { description: unauthorized }
        "500": { description: failed_to_list }

  /v1/dispatchers/cargo/{id}/drivers:
    get:
      tags: ["Freelance Dispatchers / Добавление груза", "Cargo — Диспетчер, компания, админ"]
      summary: "Список водителей по грузу (multi-vehicle)"
      description: |

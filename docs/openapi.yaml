  /v1/driver/offers/{id}/reject:
    post:
      tags:
      - Drivers / Offers
      summary: Отклонить приглашение диспетчера или отозвать свой оффер (водитель)
      description: 'Оффер с **carrier_id** = вы:

        - статус **PENDING**: **proposed_by=DISPATCHER** — отклонить приглашение → **REJECTED**, `data.status` = **REJECTED**; **proposed_by=DRIVER** — отозвать свой исходящий оффер → **CANCELED**, `data.status`
        = **CANCELED**;

        - статус **WAITING_DRIVER_CONFIRM**: отказ водителя от сделки после согласования менеджера (**proposed_by=DISPATCHER** или **DRIVER_MANAGER**) → **REJECTED**.

        SSE: уведомления **Cargo Manager** и **Driver Manager** (если есть в цепочке).

        **reason обязателен.**


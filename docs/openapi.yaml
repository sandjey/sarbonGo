  /v1/driver/auth/phone:
    post:
      tags:
      - Drivers / Auth & registration
      summary: Шаг 1. Отправить OTP на телефон
      description: '**Кто вызывает:** Водитель (мобильное приложение).

        **Назначение:** Запрос кода подтверждения. Телефон в формате +998XXXXXXXXX. OTP отправляется через Telegram Gateway. Ответ: status=otp_sent, ttl_seconds. Дальше — ввод кода и вызов /v1/driver/auth/otp/verify.

        **Данные:** В теле только phone (обязательно).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998331108810'
              required:
              - phone
      responses:
        '200':
          description: OTP отправлен
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: otp_sent
                  ttl_seconds:
                    type: integer
                    example: 180
                required:
                - status
                - ttl_seconds
        '400':
          description: Некорректный payload / телефон; или no account — у номера нет аккаунта Telegram
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '429':
          description: Cooldown / rate limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '502':
          description: OTP не отправлен (ошибка шлюза/сети), message — otp send failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /v1/driver/auth/otp/verify:
    post:
      tags:
      - Drivers / Auth & registration
      summary: Шаг 2. Подтвердить OTP
      description: '**Кто вызывает:** Водитель (мобильное приложение).

        **Назначение:** Ввод кода из шага 1. Если номер уже в drivers → status=login и tokens (вход выполнен). Если новый → status=register и session_id для регистрации (POST /v1/driver/registration/start),
        JWT пока не выдаётся.

        **Данные:** phone, otp (обязательно).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998331108810'
                otp:
                  type: string
                  example: '123456'
              required:
              - phone
              - otp
      responses:
        '200':
          description: Login или сессия регистрации
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  properties:
                    status:
                      type: string
                      example: login
                    tokens:
                      $ref: '#/components/schemas/Tokens'
                  required:
                  - status
                  - tokens
                - type: object
                  properties:
                    status:
                      type: string
                      example: register
                    session_id:
                      type: string
                      format: uuid
                  required:
                  - status
                  - session_id
        '401':
          description: OTP неверный/истёк
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '429':
          description: Превышено количество попыток
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /v1/driver/registration/start:
    post:
      tags:
      - Drivers / Auth & registration
      summary: Шаг 3. Создать профиль (имя + оферта)
      description: '**Кто вызывает:** Водитель (мобильное приложение), после otp/verify при status=register.

        **Назначение:** Создание записи в drivers: registration_status=start, registration_step=name-oferta. В ответе — tokens и объект driver; дальше все запросы с X-User-Token.

        **Данные:** session_id (из otp/verify), name, oferta_accepted (обязательно).

        **Имя (name):** см. схему DisplayName — только латиница и `_`, 2–64 символа; глобально уникально среди водителей и диспетчеров (регистр не важен).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
                name:
                  $ref: '#/components/schemas/DisplayName'
                oferta_accepted:
                  type: boolean
                  example: true
              required:
              - session_id
              - name
              - oferta_accepted
      responses:
        '200':
          description: Профиль создан + токены
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: registered
                  tokens:
                    $ref: '#/components/schemas/Tokens'
                  driver:
                    $ref: '#/components/schemas/Driver'
                  registration_status:
                    type: string
                    example: start
                  registration_step:
                    type: string
                    example: name-oferta
                required:
                - status
                - tokens
        '400':
          description: Некорректное имя (invalid_display_name, name_too_short, name_too_long)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '401':
          description: session_id неверный/истёк
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '409':
          description: Имя уже занято (display_name_taken)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /v1/driver/profile:
    get:

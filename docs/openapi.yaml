  /v1/driver/kyc:
    patch:
      tags:
      - Drivers / Profile & KYC
      summary: Отправить KYC (паспорт, ТС, прицеп)
      description: '**Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.

        **Назначение:** Загрузка документов: driver_data (паспорт, PINFL, driver_scan_status), power_data (тягач: номер, техпаспорт, владелец, power_scan_status), trailer_data (прицеп — то же или не указывать),
        driver_owner (true/false). registration_status=full выставляется только при полном и подтверждённом заполнении (scan_status=true где нужно).

        **Данные:** driver_owner, driver_data, power_data, trailer_data (все блоки обязательны).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_owner:
                  type: boolean
                  example: true
                driver_data:
                  type: object
                  properties:
                    driver_passport_series:
                      type: string
                      example: AB
                    driver_passport_number:
                      type: string
                      example: '1234567'
                    driver_pinfl:
                      type: string
                      example: '12345678901234'
                    driver_scan_status:
                      type: boolean
                      example: true
                  required:
                  - driver_passport_series
                  - driver_passport_number
                  - driver_pinfl
                  - driver_scan_status
                power_data:
                  type: object
                  properties:
                    power_plate_number:
                      type: string
                      example: 01A123BC
                    power_tech_series:
                      type: string
                      example: AA
                    power_tech_number:
                      type: string
                      example: '9876543'
                    power_owner_name:
                      type: string
                      example: Ali Valiyev
                    power_scan_status:
                      type: boolean
                      example: true
                  required:
                  - power_plate_number
                  - power_tech_series
                  - power_tech_number
                  - power_owner_name
                  - power_scan_status
                trailer_data:
                  type: object
                  properties:
                    trailer_plate_number:
                      type: string
                      example: 01A123BC
                    trailer_tech_series:
                      type: string
                      example: AA
                    trailer_tech_number:
                      type: string
                      example: '9876543'
                    trailer_owner_name:
                      type: string
                      example: Ali Valiyev
                    trailer_scan_status:
                      type: boolean
                      example: true
                  required:
                  - trailer_plate_number
                  - trailer_tech_series
                  - trailer_tech_number
                  - trailer_owner_name
                  - trailer_scan_status
              required:
              - driver_owner
              - driver_data
              - power_data
              - trailer_data
      responses:
        '200':
          description: 'Успех. Тело в стандартной обёртке API: `data` содержит поля ниже (корневые `status`/`code`/`description` — см. общую схему ответа).

            '
          content:
            application/json:
              schema:
                type: object
                description: Поле data в Envelope
                properties:
                  event:
                    type: string
                    example: updated
                  is_full:
                    type: boolean
                    example: true
                    description: true если все блоки заполнены и scan_status подтверждены
                  driver:
                    $ref: '#/components/schemas/Driver'
                required:
                - event
                - is_full
                - driver
  /v1/driver/auth/refresh:
    post:
      tags:
      - Drivers / Auth & registration
      summary: Обновить JWT токены (водитель)
      description: '**Кто вызывает:** Водитель (мобильное приложение) при истёкшем или скоро истекающем access_token.

        **Назначение:** По refresh_token выдать новую пару access_token + refresh_token. В ответе tokens с expires_in, expires_at, refresh_expires_at (Unix).

        **Тело:** { "refresh_token": "..." }. После вызова старый refresh_token недействителен (rotation).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required:
              - refresh_token
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    $ref: '#/components/schemas/Tokens'
        '401':
          description: invalid refresh_token
  /v1/dispatchers/auth/refresh:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: Обновить JWT токены (диспетчер)
      description: '**Кто вызывает:** Диспетчер при истёкшем/скоро истекающем access_token.

        **Тело:** { "refresh_token": "..." }. В ответе — tokens (access_token, refresh_token, expires_in, expires_at, refresh_expires_at).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required:
              - refresh_token
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    $ref: '#/components/schemas/Tokens'
        '401':
          description: invalid refresh_token
  /v1/admin/auth/refresh:
    post:
      tags:
      - Admin / Auth
      summary: Обновить JWT токены (админ)
      description: '**Кто вызывает:** Админ при истёкшем access_token.

        **Тело:** { "refresh_token": "..." }. В ответе — tokens.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required:
              - refresh_token
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    $ref: '#/components/schemas/Tokens'
        '401':
          description: invalid refresh_token
  /v1/company-users/auth/refresh:
    post:
      tags:
      - Company / Users & auth
      summary: Обновить JWT токены (пользователь компании)
      description: '**Кто вызывает:** Пользователь компании (app user) при истёкшем access_token.

        **Тело:** { "refresh_token": "..." }. В ответе — tokens.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required:
              - refresh_token
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    $ref: '#/components/schemas/Tokens'
        '401':
          description: invalid refresh_token
  /v1/driver/auth/logout:
    post:
      tags:
      - Drivers / Auth & registration
      summary: Выход (отзыв сессии)
      description: '**Кто вызывает:** Водитель (мобильное приложение).

        **Назначение:** Инвалидация сессии. Передайте **refresh_token** — отзывается одна сессия (этот refresh больше нельзя использовать). Передайте **access_token** — отзываются все сессии водителя. Нужен
        хотя бы один из токенов.

        **Валидация:** при невалидном или истёкшем токене возвращается 401.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: JWT refresh — отзыв одной сессии
                access_token:
                  type: string
                  description: JWT access — отзыв всех сессий водителя
      responses:
        '200':
          description: OK (сессия/сессии инвалидированы)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                required:
                - status
        '400':
          description: Нет ни refresh_token
          ни access_token: null
        '401':
          description: Невалидный или истёкший токен; refresh уже использован
  /v1/dispatchers/auth/phone:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: Шаг 1. Отправить OTP на телефон
      description: '**Поток:** Ввод телефона в формате +998XXXXXXXXX → запрос отправляет OTP через Telegram Gateway. Код приходит в Telegram/смс. Используется и для входа (существующий диспетчер), и для
        регистрации (новый номер). Ответ: status=otp_sent, ttl_seconds.

        **Данные:** В теле только phone (обязательно).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998901234567'
              required:
              - phone
            example:
              phone: '+998901234567'
      responses:
        '200':
          description: OTP отправлен
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: otp_sent
                  ttl_seconds:
                    type: integer
                    example: 180
        '400':
          description: Некорректный payload; или no account — у номера нет аккаунта Telegram
        '429':
          description: Cooldown / rate limit
        '502':
          description: OTP не отправлен (otp send failed)
  /v1/dispatchers/auth/otp/verify:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: Шаг 2. Подтвердить OTP
      description: '**Поток:** Передаёте phone и otp (код из шага 1). Если диспетчер уже зарегистрирован → в ответе status=login и tokens (access_token, refresh_token) — вход выполнен. Если телефон новый
        → status=register и session_id — переходите к регистрации (POST /v1/dispatchers/registration/complete), JWT пока не выдаётся.

        **Данные:** phone, otp (обязательно).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998901234567'
                otp:
                  type: string
                  example: '123456'
              required:
              - phone
              - otp
            example:
              phone: '+998901234567'
              otp: '123456'
      responses:
        '200':
          description: login (tokens) или register (session_id)
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  properties:
                    status:
                      type: string
                      example: login
                    tokens:
                      $ref: '#/components/schemas/Tokens'
                - type: object
                  properties:
                    status:
                      type: string
                      example: register
                    session_id:
                      type: string
                      format: uuid
        '401':
          description: OTP неверный/истёк
        '429':
          description: Превышено количество попыток
  /v1/dispatchers/auth/login/password:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: Вход по паролю (без OTP)
      description: '**Поток:** Для уже зарегистрированного диспетчера. Передаёте phone и password → в ответе tokens. Дальше все запросы к профилю и т.д. с заголовком X-User-Token = access_token.

        **Данные:** phone, password (обязательно).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998901234567'
                password:
                  type: string
                  example: TestPass123!
              required:
              - phone
              - password
            example:
              phone: '+998901234567'
              password: TestPass123!
      responses:
        '200':
          description: OK, tokens в data
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: login
                  tokens:
                    $ref: '#/components/schemas/Tokens'
        '401':
          description: Неверный телефон или пароль
  /v1/dispatchers/auth/reset-password/request:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: Запросить OTP для сброса пароля
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998901234567'
              required:
              - phone
            example:
              phone: '+998901234567'
      responses:
        '200':
          description: OTP отправлен, session_id для confirm
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: otp_sent
                  session_id:
                    type: string
                    format: uuid
                  ttl_seconds:
                    type: integer
        '400':
          description: no account — у номера нет аккаунта Telegram
        '404':
          description: Диспетчер не найден
        '502':
          description: otp send failed — OTP не отправлен
  /v1/dispatchers/auth/reset-password/confirm:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: Подтвердить сброс пароля (session_id + otp + new_password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
                otp:
                  type: string
                  example: '123456'
                new_password:
                  type: string
              required:
              - session_id
              - otp
              - new_password
            example:
              session_id: d4e5f6a7-b8c9-0123-def0-234567890123
              otp: '123456'
              new_password: NewPass456!
      responses:
        '200':
          description: Пароль обновлён
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '401':
          description: Сессия/OTP неверны
        '429':
          description: Превышено количество попыток
  /v1/dispatchers/auth/logout:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: Выход (отзыв сессии)
      description: '**Кто вызывает:** Freelance-диспетчер (клиент после входа по OTP или по паролю).

        **Назначение:** Инвалидация сессии. Передайте **refresh_token** — отзывается одна сессия. Передайте **access_token** — отзываются все сессии диспетчера. Нужен хотя бы один из токенов.

        **Валидация:** при невалидном или истёкшем токене возвращается 401.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: JWT refresh — отзыв одной сессии
                access_token:
                  type: string
                  description: JWT access — отзыв всех сессий диспетчера
            example:
              access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: OK (сессия/сессии инвалидированы)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '400':
          description: Нет ни refresh_token
          ни access_token: null
        '401':
          description: Невалидный или истёкший токен; refresh уже использован; роль не dispatcher
  /v1/dispatchers/registration/complete:
    post:
      tags:
      - Dispatchers / Auth & registration
      summary: Шаг 3. Завершить регистрацию (имя, пароль, паспорт)
      description: '**Поток:** Вызывается после otp/verify, когда получен status=register и session_id. В теле передаёте session_id (обязательно), name, **role** (при **новой** регистрации обязательно:
        CARGO_MANAGER или DRIVER_MANAGER — только заглавные буквы; если телефон уже зарегистрирован, возвращается status=login и role в теле не проверяется), password, passport_series, passport_number,
        pinfl. Создаётся запись в freelance_dispatchers, в ответе — tokens и объект dispatcher (в т.ч. поле role). После этого диспетчер может входить по phone+password или по OTP. Фото загружается отдельно
        через POST /v1/dispatchers/profile/photo.

        **Данные:** session_id, name, role, password, passport_series, passport_number, pinfl.

        **name:** схема DisplayName (латиница и `_`, 2–64; уникально среди водителей и диспетчеров).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
                name:
                  $ref: '#/components/schemas/DisplayName'
                role:
                  $ref: '#/components/schemas/FreelanceDispatcherRole'
                password:
                  type: string
                passport_series:
                  type: string
                  example: AB
                passport_number:
                  type: string
                  example: '1234567'
                pinfl:
                  type: string
                  example: '12345678901234'
              required:
              - session_id
              - name
              - password
              - passport_series
              - passport_number
              - pinfl
            example:
              session_id: d4e5f6a7-b8c9-0123-def0-234567890123
              name: Dispatcher_User
              role: CARGO_MANAGER
              password: SecurePass123!
              passport_series: AB
              passport_number: '1234567'
              pinfl: '31234567890123'
      responses:
        '200':
          description: Зарегистрирован или логин (если телефон уже был)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: registered
                  tokens:
                    $ref: '#/components/schemas/Tokens'
                  dispatcher:
                    $ref: '#/components/schemas/Dispatcher'
        '400':
          description: Некорректные данные (invalid_display_name, freelance_dispatcher_role_required, invalid_freelance_dispatcher_role и др.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '401':
          description: session_id неверный/истёк
        '409':
          description: Телефон уже зарегистрирован или имя занято (phone_already_registered / display_name_taken)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /v1/dispatchers/profile:
    get:
      tags:
      - Dispatchers / Profile
      summary: Получить профиль диспетчера
      description: '**Поток:** Запрос с заголовком X-User-Token (JWT access_token). В ответе data.dispatcher — объект диспетчера (id, name, phone, **role**, паспорт, pinfl, work_status, rating и т.д.).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: OK, data.dispatcher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '401':
          description: Не авторизован
    patch:
      tags:
      - Dispatchers / Profile
      summary: Редактировать профиль диспетчера
      description: 'Частичное обновление. Поле **name** — схема DisplayName (латиница и `_`, 2–64; уникально среди водителей и диспетчеров).

        Поле **role** — `CARGO_MANAGER` или `DRIVER_MANAGER` (строго верхний регистр). Список допустимых значений с подписями: GET /v1/reference/dispatchers (`roles` / `manager_roles`).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: '#/components/schemas/DisplayName'
                role:
                  $ref: '#/components/schemas/FreelanceDispatcherRole'
                passport_series:
                  type: string
                passport_number:
                  type: string
                pinfl:
                  type: string
                photo:
                  type: string
                  nullable: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '400':
          description: Некорректные данные (invalid_display_name, invalid_freelance_dispatcher_role и др.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '401':
          description: Не авторизован
        '409':
          description: Имя занято (display_name_taken)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /v1/dispatchers/driver-invitations:
    post:
      tags:
      - Driver Manager / Drivers & connections
      summary: Пригласить водителя (Driver Manager)
      description: '**Driver Manager:** Отправить приглашение водителю по его UUID.

        Лимит: 10 активных связей.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_id:
                  type: string
                  format: uuid
                  example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
              required:
              - driver_id
      responses:
        '201':
          description: created, data.token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '409':
          description: connection_limit_reached / driver_invitation_already_pending
        '401':
          description: Не авторизован
        '404':
          description: Диспетчер не найден
  /v1/dispatchers/profile/photo:
    post:
      tags:
      - Dispatchers / Profile
      summary: Загрузить фото диспетчера
      description: '**Формат:** multipart/form-data, поле **photo** — файл изображения (image/jpeg или image/png). Макс. размер 10 MB.

        Фото сохраняется в БД. В профиле (GET /profile) поле has_photo будет true; само изображение отдаётся через GET /v1/dispatchers/profile/photo.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - photo
              properties:
                photo:
                  type: string
                  format: binary
                  description: Файл изображения (JPEG или PNG, макс. 10 MB)
      responses:
        '200':
          description: Фото сохранено
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  code:
                    type: integer
                    example: 200
                  description:
                    type: string
                    example: Photo uploaded
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      event:
                        type: string
                        example: photo_uploaded
              examples:
                en:
                  summary: English
                  value:
                    status: success
                    code: 200
                    description: Photo uploaded
                    data:
                      status: ok
                      event: photo_uploaded
                ru:
                  summary: Русский
                  value:
                    status: success
                    code: 200
                    description: Фото загружено
                    data:
                      status: ok
                      event: photo_uploaded
                uz:
                  summary: O'zbek
                  value:
                    status: success
                    code: 200
                    description: Foto yuklandi
                    data:
                      status: ok
                      event: photo_uploaded
                tr:
                  summary: Türkçe
                  value:
                    status: success
                    code: 200
                    description: Fotoğraf yüklendi
                    data:
                      status: ok
                      event: photo_uploaded
                zh:
                  summary: 中文
                  value:
                    status: success
                    code: 200
                    description: 照片已上传
                    data:
                      status: ok
                      event: photo_uploaded
        '400':
          description: Нет файла, неверный тип или размер
        '401':
          description: Не авторизован
    get:
      tags:
      - Dispatchers / Profile
      summary: Получить фото диспетчера
      description: 'Возвращает загруженное фото (бинарные данные) с заголовком Content-Type (image/jpeg или image/png).

        Если фото не загружалось — 404.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: Изображение
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '401':
          description: Не авторизован
        '404':
          description: Фото не найдено
    delete:
      tags:
      - Dispatchers / Profile
      summary: Удалить фото диспетчера
      description: 'Удаляет загруженное фото диспетчера из БД. После удаления has_photo = false.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: Фото удалено
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  code:
                    type: integer
                    example: 200
                  description:
                    type: string
                    description: Локализованное описание (зависит от X-Language)
                    example: Photo deleted
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      event:
                        type: string
                        example: photo_deleted
              examples:
                en:
                  summary: English
                  value:
                    status: success
                    code: 200
                    description: Photo deleted
                    data:
                      status: ok
                      event: photo_deleted
                ru:
                  summary: Русский
                  value:
                    status: success
                    code: 200
                    description: Фото удалено
                    data:
                      status: ok
                      event: photo_deleted
                uz:
                  summary: O'zbek
                  value:
                    status: success
                    code: 200
                    description: Foto o'chirildi
                    data:
                      status: ok
                      event: photo_deleted
                tr:
                  summary: Türkçe
                  value:
                    status: success
                    code: 200
                    description: Fotoğraf silindi
                    data:
                      status: ok
                      event: photo_deleted
                zh:
                  summary: 中文
                  value:
                    status: success
                    code: 200
                    description: 照片已删除
                    data:
                      status: ok
                      event: photo_deleted
        '401':
          description: Не авторизован
  /v1/dispatchers/profile/password:
    put:
      tags:
      - Dispatchers / Profile
      summary: Сменить пароль (текущий + новый)

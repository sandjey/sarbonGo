        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - reason
              properties:
                reason:
                  type: string
                  minLength: 3
                  description: 'Причина отказа: минимум 1 слово и минимум 3 буквы'
      responses:
        '200':
          description: data.status = REJECTED или CANCELED (см. описание метода)
        '400':
          description: rejection_reason_required / rejection_reason_too_short / offer_not_found_or_not_pending
        '403':
          description: not_your_offer
        '404':
          description: offer_not_found

          type: string
          example: '+998901234567'
        description: Часть или полный номер телефона для поиска
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      responses:
        '200':
          description: data.items — массив водителей (id, phone, name, work_status, driver_type, freelancer_id, company_id); точные совпадения сверху
  /v1/dispatchers/drivers:
    get:
      tags:
      - Driver Manager / Drivers & connections
      summary: Список моих водителей (с фильтрами и пагинацией)
      description: '**Фриланс-диспетчер:** водители, привязанные к нему (freelancer_id = me). По этому списку диспетчер может отправлять им **таклиф** (рекомендацию груза) — POST /v1/dispatchers/cargo/:id/recommend
        (body: driver_id).

        **Фильтры:** phone (поиск по номеру), work_status (available, busy, loaded…), truck_type (тип тягача: TENT, REFRIGERATOR… из power_plate_type). **Пагинация:** page (с 1), limit (по умолчанию 20,
        макс. 100). **Сортировка:** sort=updated_at:desc (по умолчанию), name:asc, last_online_at:desc, work_status:asc.

        X-User-Token (dispatcher). Ответы на 5 языках (заголовок X-Language: ru, uz, en, tr, zh).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: phone
        in: query
        schema:
          type: string
        description: Поиск по номеру телефона (частичное совпадение)
      - name: work_status
        in: query
        schema:
          type: string
          example: available
        description: Фильтр по статусу водителя (available, busy, loaded и т.д.)
      - name: truck_type
        in: query
        schema:
          type: string
          example: TENT
        description: 'Фильтр по типу тягача (power_plate_type): TENT, REFRIGERATOR, FLATBED, TANKER, OTHER'
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort
        in: query
        schema:
          type: string
          default: updated_at:desc
          example: updated_at:desc
        description: 'Сортировка: updated_at:desc, name:asc, last_online_at:desc, work_status:asc'
      responses:
        '200':
          description: data.items — массив водителей, data.total — всего записей
  /v1/dispatchers/drivers/all:
    get:
      tags:
      - Driver Manager / Drivers & connections
      summary: Общий список водителей (каталог, с фильтрами и пагинацией)
      description: '**Фриланс-диспетчер:** общий каталог всех водителей в системе (не только тех, кто уже принял ваше приглашение). Можно использовать для подбора новых водителей по параметрам и затем:

        - отправить connection offer: POST /v1/dispatchers/driver-invitations (body: driver_id);

        - отправлять офферы/приглашения по грузам через API офферов.


        **Фильтры:** phone, name, work_status, truck_type (power_plate_type), driver_type, account_status, has_photo.

        **Гео-фильтр:** latitude + longitude + radius_km (в километрах) — вернёт водителей в радиусе по их текущим координатам.

        **Адаптивная пагинация:** frontend передаёт `limit` (1..100) и `page` (с 1).

        **Сортировка:** sort=updated_at:desc (по умолчанию), name:asc, last_online_at:desc, work_status:asc.


        Требуется X-User-Token (dispatcher). Ответы на 5 языках (заголовок X-Language: ru, uz, en, tr, zh).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: phone
        in: query
        schema:
          type: string
        description: Поиск по номеру телефона (частичное совпадение)
      - name: name
        in: query
        schema:
          type: string
        description: Поиск по имени водителя (частичное совпадение)
      - name: work_status
        in: query
        schema:
          type: string
          example: available
        description: Фильтр по статусу водителя (available, busy, loaded и т.д.)
      - name: truck_type
        in: query
        schema:
          type: string
          example: TENT
        description: 'Фильтр по типу тягача (power_plate_type): TENT, REFRIGERATOR, FLATBED, TANKER, OTHER'
      - name: driver_type
        in: query
        schema:
          type: string
          example: freelancer
        description: Фильтр по типу водителя (driver_type)
      - name: account_status
        in: query
        schema:
          type: string
          example: active
        description: Фильтр по account_status
      - name: has_photo
        in: query
        schema:
          type: boolean
          example: true
        description: Фильтр по наличию фото профиля
      - name: latitude
        in: query
        schema:
          type: number
          format: float
          example: 41.3111
        description: Широта центра для гео-поиска (использовать вместе с longitude и radius_km)
      - name: longitude
        in: query
        schema:
          type: number
          format: float
          example: 69.2797
        description: Долгота центра для гео-поиска (использовать вместе с latitude и radius_km)
      - name: radius_km
        in: query
        schema:
          type: number
          format: float
          example: 25
        description: Радиус поиска в километрах (использовать вместе с latitude и longitude)
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort
        in: query
        schema:
          type: string
          default: updated_at:desc
          example: updated_at:desc
        description: 'Сортировка: updated_at:desc, name:asc, last_online_at:desc, work_status:asc'
      responses:
        '200':
          description: data.items — массив водителей со всеми данными, data.total/page/limit/total_pages/has_next — мета пагинации
  /v1/dispatchers/drivers/{driverId}:
    get:
      tags:

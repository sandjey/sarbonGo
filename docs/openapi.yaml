  /v1/driver/auth/phone:
    post:
      tags:
      - Drivers / Auth & registration
      summary: "Запросить OTP-код для входа водителя."
      description: "Отправляет одноразовый код на указанный номер телефона."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998331108810'
              required:
              - phone
      responses:
        '200':
          description: "OTP-код успешно отправлен."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: otp_sent
                  ttl_seconds:
                    type: integer
                    example: 180
                required:
                - status
                - ttl_seconds
        '400':
          description: "Некорректный номер телефона или тело запроса."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '429':
          description: Cooldown / rate limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '502':
          description: "Ошибка SMS-провайдера или внешнего сервиса."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /v1/driver/auth/otp/verify:
    post:
      tags:
      - Drivers / Auth & registration
      summary: "Проверить OTP-код водителя."
      description: "Подтверждает код и возвращает либо токены входа, либо `session_id` для регистрации."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '+998331108810'
                otp:
                  type: string
                  example: '123456'
              required:
              - phone
              - otp
      responses:
        '200':
          description: "Код подтвержден."
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  properties:
                    status:
                      type: string
                      example: login
                    tokens:
                      $ref: '#/components/schemas/Tokens'
                  required:
                  - status
                  - tokens
                - type: object
                  properties:
                    status:
                      type: string
                      example: register
                    session_id:
                      type: string
                      format: uuid
                  required:
                  - status
                  - session_id
        '401':
          description: "Неверный или просроченный OTP-код."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '429':
          description: "Превышен лимит попыток проверки OTP."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /v1/driver/registration/start:
    post:
      tags:
      - Drivers / Auth & registration
      summary: "Начать регистрацию водителя."
      description: "Завершает стартовый шаг регистрации по `session_id` и выдает токены."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
                name:
                  $ref: '#/components/schemas/DisplayName'
                oferta_accepted:
                  type: boolean
                  example: true
              required:
              - session_id
              - name
              - oferta_accepted
      responses:
        '200':
          description: "Регистрация успешно начата, токены и профиль возвращены."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: registered
                  tokens:
                    $ref: '#/components/schemas/Tokens'
                  driver:
                    $ref: '#/components/schemas/Driver'
                  registration_status:
                    type: string
                    example: start
                  registration_step:
                    type: string
                    example: name-oferta
                required:
                - status
                - tokens
        '400':
          description: "Ошибка валидации входных данных регистрации."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '401':
          description: "Сессия регистрации недействительна или просрочена."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '409':
          description: "Пользователь уже зарегистрирован."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'

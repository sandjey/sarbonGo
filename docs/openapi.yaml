openapi: 3.0.3
info:
  title: Sarbon API — документация и руководство
  version: 0.1.0
  description: ''
servers:
- url: /
security:
- DeviceTypeHeader: []
  LanguageHeader: []
  ClientTokenHeader: []
tags:
- name: Drivers / Auth & registration
- name: Drivers / Profile & KYC
- name: Drivers / Cargo
- name: Drivers / Offers
- name: Drivers / Trips
- name: Drivers / Likes
- name: Drivers / Relations
- name: Drivers / Notifications
- name: Drivers / SSE
- name: Dispatchers / Auth & registration
- name: Dispatchers / Profile
- name: Dispatchers / Notifications & ratings
- name: Cargo Manager / Cargo
- name: Cargo Manager / Offers
- name: Cargo Manager / Trips
- name: Cargo Manager / Likes
- name: Cargo Manager / Driver managers
- name: Driver Manager / Drivers & connections
- name: Driver Manager / Offers
- name: Driver Manager / Trips
- name: Driver Manager / Cargo
- name: Driver Manager / Likes
- name: Admin / Auth
- name: Admin / Companies
- name: Admin / Tools
- name: Reference
- name: Chat
- name: Chat / Voice
- name: Company / Users & auth
- name: Company
- name: Legacy / Deprecated
- name: Cargo Manager / Analytics
- name: Driver Manager / Analytics
components:
  securitySchemes:
    DeviceTypeHeader:
      type: apiKey
      in: header
      name: X-Device-Type
      description: 'Обязателен для всех запросов. Допустимые значения: web, ios, android. Один раз выбранное значение действует для всех разделов (Drivers, Dispatchers, Admin, Cargo, Chat, Company).'
    LanguageHeader:
      type: apiKey
      in: header
      name: X-Language
      description: 'Обязателен для всех запросов. Допустимые значения: ru, uz, en, tr, zh. Один раз выбранное значение действует для всех разделов (любой язык в любом разделе).'
    ClientTokenHeader:
      type: apiKey
      in: header
      name: X-Client-Token
      description: Обязателен для всех API-запросов (включая Admin). Проверяется сервером на каждом запросе /v1/*.
    UserTokenHeader:
      type: apiKey
      in: header
      name: X-User-Token
      description: JWT access token. Для разделов Admin — обязательно JWT с role=admin (после /v1/admin/auth/login/password); сервер отклоняет запрос при другой роли или неверном токене.
    UserIDHeader:
      type: apiKey
      in: header
      name: X-User-ID
      description: Для теста чата в Swagger — UUID пользователя (водитель/диспетчер). Подставляется вместо JWT.
  schemas:
    NotificationItem:
      type: object
      description: |
        Одна запись из ленты уведомлений (`GET /v1/driver/notifications` и `GET /v1/dispatchers/notifications`).
        Лента объединяет все категории: рейсы (`trip_notification`), грузовые офферы (`cargo_offer`),
        приглашения/связи (`connection_offer`), сообщения чата (`message`), звонки (`call`) и
        обновления профиля водителя (`driver_profile_edit`). Поле `trip_id` заполняется только для
        `trip_notification`; для остальных типов оно равно `null`. Поле `payload` содержит исходный
        JSON-конверт, который был отправлен в SSE/WebSocket/Firebase, что позволяет клиенту показать
        богатое уведомление (id оффера, данные собеседника и т. д.).
      properties:
        id:
          type: string
          format: uuid
          description: UUID уведомления — передаётся в `PATCH /notifications/{id}`.
        trip_id:
          type: string
          format: uuid
          nullable: true
          description: UUID рейса (только для `type=trip_notification`). Для остальных типов — `null`.
        event_kind:
          type: string
          description: |
            Исходный kind события. Для рейсов: `IN_TRANSIT`, `DELIVERED`, `COMPLETED`, `CANCELLED`,
            `COMPLETION_PENDING_MANAGER`. Для остальных типов — имя события из payload
            (`cargo_offer_created`, `connection_offer_created`, `message.new`, `call.invite`,
            `driver.profile.patch`, ...).
        type:
          type: string
          enum:
          - connection_offer
          - cargo_offer
          - message
          - call
          - driver_profile_edit
          - trip_notification
          description: Нормализованный тип уведомления для mobile-клиента.
        step:
          type: string
          description: Текущий шаг — обычно совпадает с `to_status` или `event_kind`.
        from_status:
          type: string
          nullable: true
        to_status:
          type: string
          nullable: true
        message:
          type: string
          description: Читаемый текст по заголовку `X-Language` (ru/uz/en/tr/zh). Для рейсов — локализованное сообщение, для остальных типов — человеко-читаемый `event_kind`.
        payload:
          nullable: true
          description: |
            Исходный JSON-конверт события (тот же, что был отправлен в SSE/WS/Firebase). Содержит
            поля вроде `kind`, `event`, `offer_id`, `cargo_id`, `token`, `driver_id`, `updated_at` и т. п.
          oneOf:
          - type: object
            additionalProperties: true
          - type: array
            items: {}
        read:
          type: boolean
          description: true если уведомление уже прочитано.
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
      - id
      - event_kind
      - type
      - step
      - message
      - read
      - created_at
    Envelope:
      type: object
      properties:
        status:
          type: string
          enum:
          - success
          - error
        code:
          type: integer
          example: 200
        description:
          type: string
          example: ok
        data:
          nullable: true
      required:
      - status
      - code
      - description
      - data
    ChatMessage:
      type: object
      description: 'Сообщение чата. Поддерживаются типы:

        - TEXT: текст в поле body

        - PHOTO/VOICE/VIDEO/VIDEO_NOTE: body = опциональная подпись, payload = объект с attachment_id/url и метаданными

        - LOCATION: body = опциональная подпись, payload = { lat, lng, address?, place_id? }

        '
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        sender_id:
          type: string
          format: uuid
        type:
          type: string
          enum:
          - TEXT
          - PHOTO
          - VOICE
          - VIDEO
          - VIDEO_NOTE
          - LOCATION
        body:
          type: string
          nullable: true
          description: Текст/подпись (опционально)
        payload:
          type: object
          nullable: true
          description: Type-specific payload (см. ChatMediaPayload/ChatLocationPayload)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
        read_by_me:
          type: boolean
          description: Для GET истории входящее сообщение помечено прочитанным вами (курсор chat_conversation_reads)
        read_by_peer:
          type: boolean
          description: Для GET истории ваше сообщение прочитано собеседником
      required:
      - id
      - conversation_id
      - sender_id
      - type
      - created_at
      - updated_at
    ChatMediaPayload:
      type: object
      description: payload для PHOTO/VOICE/VIDEO/VIDEO_NOTE
      properties:
        attachment_id:
          type: string
          format: uuid
        url:
          type: string
          example: /v1/chat/files/aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
        thumb_url:
          type: string
          nullable: true
          description: Превью (если есть)
        mime:
          type: string
          example: video/mp4
        size_bytes:
          type: integer
          format: int64
        duration_ms:
          type: integer
          nullable: true
          description: Длительность (voice/video), мс
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
      required:
      - attachment_id
      - url
      - mime
      - size_bytes
    ChatLocationPayload:
      type: object
      description: payload для LOCATION
      properties:
        lat:
          type: number
          format: double
          example: 41.311081
        lng:
          type: number
          format: double
          example: 69.240562
        address:
          type: string
          nullable: true
        place_id:
          type: string
          nullable: true
      required:
      - lat
      - lng
    ChatPresence:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        online:
          type: boolean
        last_seen:
          type: integer
          nullable: true
          description: Unix seconds
        typing:
          type: boolean
          nullable: true
      required:
      - user_id
      - online
    Call:
      type: object
      description: 'Сессия голосового звонка (1:1). Медиа не проходит через API — только управление состоянием + signaling по WebSocket.

        '
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
          nullable: true
        caller_id:
          type: string
          format: uuid
        callee_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - RINGING
          - ACTIVE
          - ENDED
          - DECLINED
          - MISSED
          - CANCELLED
          - FAILED
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        ended_at:
          type: string
          format: date-time
          nullable: true
        ended_by:
          type: string
          format: uuid
          nullable: true
        ended_reason:
          type: string
          nullable: true
        client_request_id:
          type: string
          nullable: true
          description: Идемпотентность (уникально на caller_id)
      required:
      - id
      - caller_id
      - callee_id
      - status
      - created_at
    CallCreateRequest:
      type: object
      properties:
        peer_id:
          type: string
          format: uuid
          description: Кому звоним
        conversation_id:
          type: string
          format: uuid
          nullable: true
          description: 'Опционально: существующий chat conversation_id (если уже есть)'
        client_request_id:
          type: string
          nullable: true
          description: 'Идемпотентность: любое короткое значение от клиента'
      required:
      - peer_id
    CallDeclineRequest:
      type: object
      properties:
        reason:
          type: string
          nullable: true
          example: busy
    CallEndRequest:
      type: object
      properties:
        reason:
          type: string
          nullable: true
          example: hangup
    Tokens:
      type: object
      description: 'Во всех auth API: 1) время жизни (expires_in, refresh_expires_in — секунды);

        2) expires_at и refresh_expires_at — Unix timestamp в миллисекундах (ms). Расчёт везде по времени Ташкента (Asia/Tashkent). Для JS: new Date(expires_at).

        '
      properties:
        access_token:
          type: string
          example: eyJhbGciOi...
        refresh_token:
          type: string
          example: eyJhbGciOi...
        expires_in:
          type: integer
          example: 900
          description: Время жизни access токена (секунды)
        expires_at:
          type: integer
          example: 1741600800000
          description: 'Unix ms — когда истекает access токен (когда обновить); JS: new Date(expires_at)'
        refresh_expires_in:
          type: integer
          example: 604800
          description: Время жизни refresh токена (секунды)
        refresh_expires_at:
          type: integer
          example: 1742205600000
          description: 'Unix ms — когда истекает refresh токен; JS: new Date(refresh_expires_at)'
      required:
      - access_token
      - refresh_token
      - expires_in
      - expires_at
    DisplayName:
      type: string
      minLength: 2
      maxLength: 64
      pattern: ^[A-Za-z_]{2,64}$
      description: 'Отображаемое имя: только латиница (A–Z, a–z) и символ подчёркивания `_`, длина 2–64.

        Должно быть уникально среди всех водителей и фриланс-диспетчеров (без учёта регистра).

        Ключи ошибок в теле ответа: `invalid_display_name` (HTTP 400), `display_name_taken` (HTTP 409).

        '
      example: John_Doe
    Driver:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
          example: '+998331108810'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_online_at:
          type: string
          format: date-time
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
          example: 41.311081
        longitude:
          type: number
          format: double
          nullable: true
          example: 69.240562
        push_token:
          type: string
          nullable: true
          example: optional-device-token
        registration_step:
          type: string
          nullable: true
          enum:
          - name-oferta
          - geo-push
          - transport-type
          - completed
          description: После PATCH /v1/driver/kyc сервер выставляет completed.
        registration_status:
          type: string
          nullable: true
          enum:
          - start
          - basic
          - full
        name:
          type: string
          nullable: true
          example: Ali Valiyev
        driver_type:
          type: string
          nullable: true
          enum:
          - company
          - freelancer
          - driver
        rating:
          type: number
          format: double
          nullable: true
        work_status:
          type: string
          nullable: true
          enum:
          - available
          - loaded
          - busy
          example: available
        freelancer_id:
          type: string
          format: uuid
          nullable: true
        company_id:
          type: string
          format: uuid
          nullable: true
        account_status:
          type: string
          nullable: true
        driver_passport_series:
          type: string
          nullable: true
          example: AB
        driver_passport_number:
          type: string
          nullable: true
          example: '1234567'
        driver_pinfl:
          type: string
          nullable: true
          example: '12345678901234'
        driver_scan_status:
          type: boolean
          nullable: true
          example: true
        power_plate_type:
          type: string
          nullable: true
          example: TRUCK
          description: TRUCK или TRACTOR (см. GET /v1/driver/transport-options)
        power_plate_number:
          type: string
          nullable: true
          example: 01A123BC
        power_tech_series:
          type: string
          nullable: true
        power_tech_number:
          type: string
          nullable: true
        power_owner_name:
          type: string
          nullable: true
          example: Ali Valiyev
        power_scan_status:
          type: boolean
          nullable: true
        trailer_plate_type:
          type: string
          nullable: true
          example: TENTED
          description: Должен соответствовать power_plate_type (см. transport-options)
        trailer_plate_number:
          type: string
          nullable: true
        trailer_tech_series:
          type: string
          nullable: true
        trailer_tech_number:
          type: string
          nullable: true
        trailer_owner_name:
          type: string
          nullable: true
          example: Ali Valiyev
        trailer_scan_status:
          type: boolean
          nullable: true
        driver_owner:
          type: boolean
          nullable: true
          example: true
        kyc_status:
          type: string
          nullable: true
          enum:
          - pending
          - approved
          description: pending — KYC не полный или не все scan_status=true; approved — полный KYC (is_full).
          example: pending
        has_trips:
          type: boolean
          description: true если у водителя есть активный рейс (статус trip не COMPLETED/CANCELLED), иначе false.
        has_photo:
          type: boolean
          description: true если загружено фото в БД (получить через GET /v1/driver/profile/photo). Фото необязательно при регистрации; можно добавить/обновить/удалить когда угодно.
      required:
      - id
      - phone
      - created_at
      - updated_at
    Dispatcher:
      type: object
      description: Пароль никогда не возвращается в JSON (поле отсутствует).
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
          example: Dispetcher Name
        phone:
          type: string
          example: '+998331108810'
        passport_series:
          type: string
          nullable: true
          example: AB
        passport_number:
          type: string
          nullable: true
          example: '1234567'
        pinfl:
          type: string
          nullable: true
          example: '12345678901234'
        cargo_id:
          type: string
          format: uuid
          nullable: true
        driver_id:
          type: string
          format: uuid
          nullable: true
        rating:
          type: number
          format: double
          nullable: true
        work_status:
          type: string
          nullable: true
          example: available
        status:
          type: string
          nullable: true
          example: active
        role:
          allOf:
          - $ref: '#/components/schemas/FreelanceDispatcherRole'
          nullable: true
          description: Роль менеджера (груз / водители). У старых записей до ввода поля может быть null.
        photo:
          type: string
          nullable: true
          description: Ссылка/путь (устаревшее); для загруженного фото см. has_photo
        has_photo:
          type: boolean
          description: true если загружено фото в БД (получить через GET /v1/dispatchers/profile/photo)
        last_online_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
      required:
      - id
      - phone
      - created_at
      - updated_at
    PowerPlateOption:
      type: object
      properties:
        code:
          type: string
          example: TRUCK
        label:
          type: string
          example: Грузовик + прицеп
      required:
      - code
      - label
    TrailerPlateOption:
      type: object
      properties:
        code:
          type: string
          example: FLATBED
        label:
          type: string
          example: Бортовой прицеп
      required:
      - code
      - label
    TransportOptionsResponse:
      type: object
      description: Списки power_plate_type и trailer_plate_type по типу базовой машины.
      properties:
        power_plate_types:
          type: array
          items:
            $ref: '#/components/schemas/PowerPlateOption'
        trailer_plate_types_by_power:
          type: object
          description: 'Ключи — TRUCK, TRACTOR.

            TRUCK: FLATBED, TENTED, BOX, REEFER, TANKER, TIPPER, CAR_CARRIER.

            TRACTOR: FLATBED, TENTED, BOX, REEFER, TANKER, LOWBED, CONTAINER.

            '
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/TrailerPlateOption'
      required:
      - power_plate_types
      - trailer_plate_types_by_power
    ItemWithLabel:
      type: object
      description: Элемент справочника (value — код для API, label — подпись для UI).
      properties:
        value:
          type: string
        label:
          type: string
    ItemWithLabelAndDescription:
      type: object
      description: Элемент справочника с пояснением (используется для cargo_status — описание, что означает каждый статус).
      properties:
        value:
          type: string
          description: Код для API (например PENDING_MODERATION, SEARCHING_ALL)
        label:
          type: string
          description: Краткая подпись для UI
        description:
          type: string
          description: Подробное описание значения
    RoleRef:
      type: object
      description: Роль в компании (из app_roles).
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
    ReferenceDriversResponse:
      type: object
      properties:
        registration_step:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabel'
        registration_status:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabel'
        driver_type:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabel'
        work_status:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabel'
        power_plate_types:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabel'
        trailer_plate_types_by_power:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/ItemWithLabel'
    ReferenceCargoResponse:
      type: object
      description: 'Справочник для раздела Cargo. Все значения из справочника обязательны при валидации (POST/PUT /api/cargo).

        cargo_status — первый PENDING_MODERATION; route_point_type (LOAD, UNLOAD, CUSTOMS, TRANSIT); truck_type (TENT, REFRIGERATOR…); shipment_type (FTL, LTL…);

        currency — для total_currency, prepayment_currency, remaining_currency; prepayment_type, remaining_type; loading_type — способы погрузки.

        '
      properties:
        cargo_status:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabelAndDescription'
        route_point_type:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabel'
        offer_status:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabel'
        created_by_type:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabel'
        truck_type:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabel'
        trip_status:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabel'
        shipment_type:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabel'
          description: 'Тип отправки: FTL, LTL, PACKAGE, OTHER'
        currency:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabel'
          description: 'Валюты для total_currency, prepayment_currency, remaining_currency: USD, UZS, EUR, RUB, KZT, AED, OTHER'
        prepayment_type:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabel'
          description: 'Способ предоплаты: BANK_TRANSFER, CASH, CARD, INVOICE, OTHER'
        remaining_type:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabel'
          description: 'Условия оплаты остатка: ON_DELIVERY, AFTER_INVOICE, CASH, DEFERRED, OTHER'
        loading_type:
          type: array
          items:
            $ref: '#/components/schemas/ItemWithLabel'

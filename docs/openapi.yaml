        description: "Фильтр по типу кузова/транспорта."
      - name: driver_type
        in: query
        schema:
          type: string
          example: freelancer
        description: "Фильтр по типу водителя."
      - name: account_status
        in: query
        schema:
          type: string
          example: active
        description: "Фильтр по статусу аккаунта."
      - name: has_photo
        in: query
        schema:
          type: boolean
          example: true
        description: "Фильтр по наличию фотографии профиля."
      - name: latitude
        in: query
        schema:
          type: number
          format: float
          example: 41.3111
        description: "Широта центра поиска по радиусу."
      - name: longitude
        in: query
        schema:
          type: number
          format: float
          example: 69.2797
        description: "Долгота центра поиска по радиусу."
      - name: radius_km
        in: query
        schema:
          type: number
          format: float
          example: 25
        description: "Радиус поиска в километрах."
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort
        in: query
        schema:
          type: string
          default: updated_at:desc
          example: updated_at:desc
        description: "Сортировка в формате `поле:направление`."
      responses:
        '200':

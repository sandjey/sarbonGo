  /v1/driver/profile/photo:
    post:
      tags:
      - Drivers / Profile & KYC
      summary: Загрузить фото водителя
      description: '**Формат:** multipart/form-data, поле **photo** — файл изображения (image/jpeg или image/png). Макс. размер 10 MB.

        Фото необязательно при регистрации; можно добавить или обновить когда угодно. Сохраняется в БД. В профиле (GET /profile) поле has_photo будет true; само изображение — через GET /v1/driver/profile/photo.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - photo
              properties:
                photo:
                  type: string
                  format: binary
                  description: Файл изображения (JPEG или PNG, макс. 10 MB)
      responses:
        '200':
          description: Фото сохранено
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      event:
                        type: string
                        example: photo_uploaded
        '400':
          description: Нет файла, неверный тип или размер
        '401':
          description: Не авторизован
    get:
      tags:
      - Drivers / Profile & KYC
      summary: Получить фото водителя
      description: 'Возвращает загруженное фото (бинарные данные) с заголовком Content-Type (image/jpeg или image/png).

        Если фото не загружалось — 404.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: Изображение
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '401':
          description: Не авторизован
        '404':
          description: Фото не найдено
    delete:
      tags:
      - Drivers / Profile & KYC
      summary: Удалить фото водителя
      description: 'Удаляет загруженное фото из профиля. Можно вызвать когда угодно; если фото не было — операция всё равно успешна (no-op).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: Фото удалено
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      event:
                        type: string
                        example: photo_deleted
        '401':
          description: Не авторизован
  /v1/driver/profile/phone-change/request:

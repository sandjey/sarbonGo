      description: "company_type — только CARGO_OWNER, CARRIER, EXPEDITOR. company_user_roles — только OWNER, CEO, TOP_MANAGER, TOP_DISPATCHER, DISPATCHER, MANAGER. company_status — ACTIVE, INACTIVE, BLOCKED, PENDING. roles — из БД (id, name, description) для приглашений. Все value в верхнем регистре."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]

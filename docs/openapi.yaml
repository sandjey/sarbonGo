  /v1/driver/offers/all:
    get:
      tags:
      - Drivers / Offers
      summary: Все офферы водителя (входящие и исходящие)
      description: 'Единый список офферов для Driver Mobile:

        - `direction=all` (по умолчанию) — оба направления в одном списке

        - `direction=outgoing` — офферы, отправленные водителем (`proposed_by=DRIVER`)

        - `direction=incoming` — офферы/инвайты, отправленные водителю (`proposed_by=DISPATCHER` или `proposed_by=DRIVER_MANAGER`)


        Поддерживает `status`, пагинацию, фильтр по контрагенту-диспетчеру (`counterparty_id`)

        и счетчики `data.counts.incoming/outgoing`.

        Алиасы: `to_dispatcher_id` (для outgoing), `from_dispatcher_id` (для incoming).

        В каждом `data.items[].offer` возвращаются:

        - `driver_id` — ID водителя (carrier);

        - `cargo_manager_id` — ID cargo manager (если груз создан диспетчером; иначе `null`).

        - `source_role` — источник входящего оффера: `CARGO_MANAGER` или `DRIVER_MANAGER` (для исходящих у водителя: `DRIVER`);

        - `source_id` — UUID отправителя оффера (`offers.proposed_by_id` для входящих).

        **Как читать:**

        - `direction=all` + `counts` — общий обзор.

        - `direction=incoming` — приглашения/офферы, отправленные мне.

        - `direction=outgoing` — офферы, отправленные мной.

        **Примеры:**

        - `GET /v1/driver/offers/all?direction=all&page=1&limit=30`

        - `GET /v1/driver/offers/all?direction=incoming&status=PENDING`

        - `GET /v1/driver/offers/all?direction=outgoing&to_dispatcher_id=<dispatcher_uuid>`

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: direction
        in: query
        required: false
        schema:
          type: string
          example: all
      - name: counterparty_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: to_dispatcher_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: from_dispatcher_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        required: false
        schema:
          type: string
          example: PENDING
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 30
          minimum: 1
          maximum: 100
      responses:
        '200':
          description: data.items, data.total, data.page, data.limit, data.direction, data.counterparty_id, data.counts.incoming, data.counts.outgoing
        '400':
          description: invalid_payload_detail
        '401':
          description: unauthorized
        '500':
          description: failed_to_list_cargo_offers

          description: Комментарий к грузу/условиям (общий комментарий)
        truck_type:
          type: string
          example: TENT
          description: 'Тип кузова: TENT, REFRIGERATOR, FLATBED, TANKER, OTHER'
        power_plate_type:
          type: string
          example: TRUCK
          description: 'Тип основной машины: TRUCK или TRACTOR (из GET /v1/driver/transport-options → power_plate_types)'
        trailer_plate_type:
          type: string
          example: TENTED
          description: Тип прицепа/полуприцепа (из GET /v1/driver/transport-options → trailer_plate_types_by_power[power_plate_type])
        temp_min:

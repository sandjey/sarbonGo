      summary: Изменить роль сотрудника
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: companyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - role_id
              properties:
                role_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: old_role, new_role
        '403':
          description: forbidden
  /v1/companies/{companyId}/users/{userId}:
    delete:
      tags:
      - Company
      summary: Удалить сотрудника из компании
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: companyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: no content
        '403':
          description: forbidden
  /v1/invitations/accept:
    post:
      tags:
      - Company
      summary: Принять приглашение по токену
      description: Требуется X-User-Token (пользователь компании). Добавляет текущего пользователя в компанию с ролью из приглашения. Сначала войдите или зарегистрируйтесь через /v1/company-users/auth/...
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - token
              properties:
                token:
                  type: string
      responses:
        '200':
          description: status, company_id, company_name, role, requires_registration
        '401':
          description: invitation not found or expired
  /v1/dispatchers/analytics/cargo-manager/dashboard:
    get:
      tags:
      - Cargo Manager / Analytics
      summary: Cargo Manager analytics dashboard
      description: 'Full business analytics for CARGO_MANAGER role: KPI, period timeline, top routes, and top drivers.'
      security: &id001
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: date_from
        in: query
        required: true
        schema:
          type: string
          format: date
        description: Start date (YYYY-MM-DD)
      - name: date_to
        in: query
        required: true
        schema:
          type: string
          format: date
        description: End date (YYYY-MM-DD)
      - name: group_by
        in: query
        required: false
        schema:
          type: string
          enum:
          - day
          - week
          - month
          default: day
      - name: timezone
        in: query
        required: false
        schema:
          type: string
          default: Asia/Tashkent
      - name: status
        in: query
        required: false
        schema:
          type: string
        description: CSV statuses, for example SEARCHING_ALL,COMPLETED
      - name: truck_type
        in: query
        required: false
        schema:
          type: string
        description: CSV truck types, for example TENT,REFRIGERATOR
      - name: from_city_code
        in: query
        required: false
        schema:
          type: string
      - name: to_city_code
        in: query
        required: false
        schema:
          type: string
      - name: driver_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: cargo_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Envelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/CMAnalyticsDashboardData'
        '400':
          description: invalid_payload_detail (date/timezone/group_by/filter)
        '403':
          description: forbidden (role is not CARGO_MANAGER)
        '500':
          description: internal_error
  /v1/dispatchers/analytics/cargo-manager/export.xlsx:
    get:
      tags:
      - Cargo Manager / Analytics
      summary: Export Cargo Manager analytics to Excel
      description: Exports the same analytics as the dashboard endpoint into XLSX (Summary, Timeline, Top_* sheets). Supports section-based export via sections and contract filtering via contract_scope.
      security: *id001
      parameters:
      - name: date_from
        in: query
        required: true
        schema:
          type: string
          format: date
        description: Start date (YYYY-MM-DD)
      - name: date_to
        in: query
        required: true
        schema:
          type: string
          format: date
        description: End date (YYYY-MM-DD)
      - name: group_by
        in: query
        required: false
        schema:
          type: string
          enum:
          - day
          - week
          - month
          default: day
      - name: timezone
        in: query
        required: false
        schema:
          type: string
          default: Asia/Tashkent
      - name: status
        in: query
        required: false
        schema:
          type: string
        description: CSV statuses, for example SEARCHING_ALL,COMPLETED
      - name: truck_type
        in: query
        required: false
        schema:
          type: string
        description: CSV truck types, for example TENT,REFRIGERATOR
      - name: from_city_code
        in: query
        required: false
        schema:
          type: string
      - name: to_city_code
        in: query
        required: false
        schema:
          type: string
      - name: driver_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: cargo_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: sections
        in: query
        required: false
        schema:
          type: string
          example: summary,kpi,funnel,timeline,top,contracts
        description: 'CSV export sections. Available: summary,kpi,funnel,timeline,top,contracts'
      - name: contract_scope
        in: query
        required: false
        schema:
          type: string
          enum:
          - all
          - successful
          - cancelled
          - in_execution
          default: all
        description: Contracts filter for Contracts sheet
      responses:
        '200':
          description: XLSX file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '400':
          description: invalid_payload_detail
        '403':
          description: forbidden (role is not CARGO_MANAGER)
        '500':
          description: internal_error

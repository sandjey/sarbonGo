  /v1/driver/sse/realtime:
    get:
      tags:
      - Drivers / SSE
      - Drivers / Trips
      summary: 'SSE: один поток уведомлений + trip_status (как FCM data)'
      description: 'Рекомендуемый поток для **мобильного приложения водителя**. Объединяет:

        - все push из категории **notifications** (офферы `cargo_offer`, приглашения `connection_offer`, `trip_notification` и др.);

        - снимки рейса **`kind=trip_status`** (как отдельный FCM `stream_kind=trip_status`).


        В **каждой** строке `data:` сервер добавляет поля **`stream_kind`** (`notifications` | `trip_status`), **`recipient_kind`**, **`recipient_id`** — те же имена, что и в **Firebase `data`**, чтобы
        один парсер обрабатывал SSE и push.


        **Авторизация:** **X-User-Token** или query **`token`** + базовые заголовки (или query `device_type`, `language`, `client_token`).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: token
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: text/event-stream; `data:` — JSON с `stream_kind` + полезная нагрузка
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          description: unauthorized
  /v1/driver/sse/trip-notifications:
    get:
      tags:
      - Drivers / SSE
      summary: 'SSE: полный inbox уведомлений (рейсы + офферы + связи)'
      description: '**Server-Sent Events.** Полный поток без фильтра: `trip_notification`, `cargo_offer`, `connection_offer` (как раньше в одном канале).


        Для **production** предпочтительнее **`GET /v1/driver/sse/realtime`** — тот же контент плюс `trip_status` и поля, выровненные с FCM.


        **Авторизация:** **X-User-Token** или query **`token`**.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: token
        in: query
        required: false
        schema:
          type: string
        description: Дублирует JWT из X-User-Token (для EventSource, где нет кастомных заголовков).
      responses:
        '200':
          description: 'text/event-stream; фрагменты `data:` — см. #/components/schemas/SSETripNotificationEvent; комментарии `: ping`'
          content:
            text/event-stream:
              schema:
                type: string
                example: 'data: {"kind":"trip_notification","notification_id":"...","trip_id":"...","event_kind":"IN_TRANSIT","created_at":"2026-04-10T12:00:00Z"}


                  '
        '401':
          description: unauthorized

  /v1/dispatchers/offers/{id}/reject:
    post:
      tags:
      - Cargo Manager / Offers
      summary: Отклонить оффер водителя или отозвать своё приглашение (диспетчер)
      description: 'Для **своего груза** (создатель-диспетчер или компания в текущем контексте JWT), оффер **PENDING** или **WAITING_DRIVER_CONFIRM** (отмена до подтверждения водителем):

        - **proposed_by=DRIVER** — отклонить входящую заявку водителя → статус оффера **REJECTED**, `data.status` = **REJECTED**;

        - **proposed_by=DRIVER_MANAGER** — отклонить входящую заявку менеджера водителя (обязательно с причиной) → **REJECTED**;

        - **proposed_by=DISPATCHER** — отозвать своё исходящее приглашение этому водителю → **CANCELED**, `data.status` = **CANCELED**.

        **Driver Manager** в **WAITING_DRIVER_CONFIRM** как **negotiation_dispatcher_id** снимает сделку до ответа водителя → **CANCELED**. Иначе (входящее по грузу другого CM) → **REJECTED**.

        SSE: уведомления **водителю**, **Cargo Manager** и **Driver Manager** (если применимо).

        **reason обязателен** (текст причины).

        en: Reject incoming offer (REJECTED) or withdraw your own outgoing offer (CANCELED); reason required.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []

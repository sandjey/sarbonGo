      description: 'Возвращает `enabled`, `project_id` и объект **`data.config`** (без секретов): флаги из env после загрузки,

        найден ли файл ключа по пути, абсолютный путь к ключу. Если раньше `enabled=false` при правильном `.env` в папке проекта —

        проверьте, что не подхватывался чужой `.env` из родительской директории (исправлено: сначала грузится `./.env` в cwd).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  code:
                    type: integer
                    example: 200
                  description:
                    type: string
                    example: OK
                  data:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        example: true
                        description: true — FCM клиент поднят; false — см. data.config.
                      project_id:
                        type: string
                        example: sarbon-firebase-project
                        description: project_id при активном FCM; иначе пусто.
                      config:
                        type: object
                        description: Диагностика env (не содержит private key).
                        properties:
                          push_notifications_enabled:
                            type: boolean
                          firebase_project_id_configured:
                            type: boolean
                          firebase_project_id:
                            type: string
                          firebase_credentials_file_raw:
                            type: string
                            description: Значение FIREBASE_CREDENTIALS_FILE из env
                          firebase_credentials_path_resolved:
                            type: string
                            description: Абсолютный путь после join с cwd (для относительных путей)
                          firebase_credentials_file_found:
                            type: boolean
                            description: Файл по resolved path существует
                          push_service_initialized:
                            type: boolean
                            description: false — push.New вернул ошибку при старте, см. логи
        '401':
          description: unauthorized (не админ)
  /v1/admin/push/send:
    post:
      tags:
      - Admin / Tools
      summary: Отправить тестовый push на FCM-токен
      description: 'Отправляет тестовое push-уведомление на конкретный FCM device token.


        **Как получить токен для теста:**

        - Мобильное приложение вызывает `POST /v1/chat/push-token` с токеном Firebase после логина.

        - Или при регистрации водитель передаёт `push_token` в `PATCH /v1/driver/registration/geo-push`.

        - В базе данных: `drivers.push_token` / `freelance_dispatchers.push_token`.


        **Возможные ошибки:**

        - `502` — Firebase вернул ошибку (протухший токен, неверный token, неправильный project_id и т.д.). Тело содержит текст ошибки Firebase.

        - `503` — Firebase отключён на сервере (PUSH_NOTIFICATIONS_ENABLED=false или credentials не заданы).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - push_token
              properties:
                push_token:
                  type: string
                  example: dxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
                  description: FCM registration token устройства (полученный мобильным приложением от Firebase SDK)
                title:
                  type: string
                  example: Sarbon Test
                  description: Заголовок уведомления. По умолчанию 'Sarbon Test'.
                body:
                  type: string
                  example: Test push notification from admin
                  description: Текст уведомления. По умолчанию 'Test push notification from admin'.
                data:
                  type: object
                  additionalProperties:
                    type: string
                  example:
                    custom_key: custom_value
                  description: Дополнительные data-поля (key-value, все строки). Будут добавлены к FCM data payload.
                recipient_kind:
                  type: string
                  enum: [driver, dispatcher]
                  description: |
                    Опционально. Если передано вместе с `recipient_id`, переданный `push_token`
                    будет сохранён в БД (`drivers.push_token` / `freelance_dispatchers.push_token`),
                    и системные события (cargo_offer, connection_offer, chat, call, …) сразу
                    начнут доставлять push этому пользователю — проблема "работает только админ-тест"
                    решается одним вызовом.
                recipient_id:
                  type: string
                  format: uuid
                  description: UUID водителя или фриланс-диспетчера — используется вместе с `recipient_kind`.
      responses:
        '200':
          description: 'FCM принял сообщение (`sent: true`). Если на устройстве тишина: тот же Firebase-проект, что в приложении;

            Android — каналы уведомлений в приложении; iOS — APNs в Firebase Console; приложение не в фокусе / отключены уведомления.

            `fcm_message_id` — искать доставку в Firebase Console (Cloud Messaging).

            '
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  code:
                    type: integer
                    example: 200
                  description:
                    type: string
                    example: OK
                  data:
                    type: object
                    properties:
                      sent:
                        type: boolean
                        example: true
                      token:
                        type: string
                        description: Токен, на который было отправлено уведомление
                      fcm_message_id:
                        type: string
                        description: ID сообщения от FCM (диагностика)
                      firebase_project:
                        type: string
                        description: FIREBASE_PROJECT_ID сервера
                      token_saved:
                        type: boolean
                        description: true — токен успешно записан в БД для (recipient_kind, recipient_id).
                      token_save_error:
                        type: string
                        description: Текст ошибки сохранения токена в БД (если сохранение запрошено, но не удалось).
        '400':
          description: push_token не передан или слишком короткий
        '401':
          description: unauthorized (не админ)
        '502':
          description: Firebase вернул ошибку (например, токен истёк, неверный токен)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  code:
                    type: integer
                    example: 502
                  description:
                    type: string
                    example: 'firebase error: registration-token-not-registered'
                  data:
                    nullable: true
        '503':
          description: Firebase отключён на сервере (PUSH_NOTIFICATIONS_ENABLED=false)
  /v1/admin/push/recipient-status:
    get:
      tags:
      - Admin / Tools
      summary: Диагностика — есть ли FCM-токен у водителя/диспетчера в БД
      description: |
        Быстрая проверка, почему системные push (cargo_offer, connection_offer, chat, call, ...)
        не доходят до конкретного пользователя. Возвращает `token_found`, `token_length` и
        короткий префикс токена, а также `source` — откуда он взят (`drivers.push_token`,
        `freelance_dispatchers.push_token` или fallback). Если `token_found=false`, мобильное
        приложение **не вызвало** `POST /v1/chat/push-token` после логина.
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - in: query
        name: kind
        required: true
        schema:
          type: string
          enum: [driver, dispatcher]
      - in: query
        name: id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  code: { type: integer, example: 200 }
                  description: { type: string, example: OK }
                  data:
                    type: object
                    properties:
                      kind: { type: string, enum: [driver, dispatcher] }
                      id: { type: string, format: uuid }
                      token_found: { type: boolean }
                      token_length: { type: integer }
                      token_prefix:
                        type: string
                        description: Первые 16 символов токена (безопасно логировать).
                      source:
                        type: string
                        enum:
                        - drivers.push_token
                        - freelance_dispatchers.push_token
                        - drivers.push_token(fallback)
                        - freelance_dispatchers.push_token(fallback)
                        - token_not_found
                        - recipient_id_nil
        '400':
          description: invalid kind/id
        '401':
          description: unauthorized (не админ)
        '503':
          description: Firebase отключён на сервере
  /v1/admin/push/send-by-recipient:
    post:
      tags:
      - Admin / Tools
      summary: Отправить push через системный путь (по user id)
      description: |
        Отправляет push **по тому же коду**, которым пользуется бэкенд при реальных событиях
        (`cargo_offer`, `connection_offer`, chat, call, ...). Резолвит токен по `(kind, id)` из
        `drivers.push_token` / `freelance_dispatchers.push_token`. Если вернулось
        `token_found=false`, мобильное приложение не зарегистрировало свой FCM-токен —
        системный поток просто не может дозвониться до этого пользователя.

        Это ответ на классический кейс "через admin /push/send работает, а система не шлёт":
        admin/send бьёт напрямую токеном, а система всегда идёт через resolve по id.
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, id]
              properties:
                kind:
                  type: string
                  enum: [driver, dispatcher]
                id:
                  type: string
                  format: uuid
                title:
                  type: string
                  example: Sarbon
                body:
                  type: string
                  example: System push (admin trigger)
                data:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  code: { type: integer, example: 200 }
                  description: { type: string, example: OK }
                  data:
                    type: object
                    properties:
                      sent: { type: boolean, example: true }
                      kind: { type: string, enum: [driver, dispatcher] }
                      id: { type: string, format: uuid }
                      token_found: { type: boolean }
                      token_prefix: { type: string }
                      source: { type: string }
                      fcm_message_id: { type: string }
                      firebase_project: { type: string }
        '400':
          description: invalid payload / invalid id / invalid kind
        '401':
          description: unauthorized (не админ)
        '502':
          description: |
            Firebase вернул ошибку **или** токен не найден в БД. В `data.token_found=false` →
            мобильное приложение не вызывало `POST /v1/chat/push-token`.
        '503':
          description: Firebase отключён на сервере

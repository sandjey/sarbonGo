  /v1/chat/files/{id}:
    get:
      tags:
      - Chat
      summary: Скачать медиа-файл сообщения
      description: 'Возвращает файл вложения по `attachment_id`, если текущий пользователь является участником диалога.


        Query:

        - `thumb=1` — вернуть thumbnail (если есть).


        **Кеширование (как в Telegram):**

        - Отдаётся с `Cache-Control: public, max-age=31536000, immutable`

        - `ETag` соответствует sha256 контента (для dedup и 304 Not Modified)

        - При включённом `CHAT_USE_X_ACCEL=1` сервер отвечает через `X-Accel-Redirect`, а Nginx отдаёт файл с поддержкой Range (видео) и быстрым кешем

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      - UserIDHeader: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: thumb
        in: query
        required: false
        schema:
          type: string
          example: '1'
      responses:
        '200':
          description: Binary file stream
        '401':
          description: unauthorized
        '404':
          description: not found or access denied
  /v1/chat/ws:
    get:
      tags:
      - Chat
      summary: WebSocket чат
      description: 'Подключение к чату в реальном времени. Авторизация через query: **token=JWT**.

        Каждое входящее JSON-сообщение от клиента продлевает TTL «онлайн» в Redis (присутствие).


        **Клиент → сервер (чат):**

        - `typing` — `{ "type":"typing", "data":{ "conversation_id":"<uuid>" } }`

        - `typing_stop` — сброс индикатора набора у собеседника: `{ "type":"typing_stop", "data":{ "conversation_id":"<uuid>" } }`


        **Сервер → клиент:**

        - `message` — новое сообщение (`data` = ChatMessage)

        - `typing` / `typing_stop` — индикатор набора (`data.conversation_id`, `data.user_id`)

        - `conversation_read` — собеседник отметил диалог прочитанным: `data.conversation_id`, `data.reader_id`

        - `message_updated` — отредактировано сообщение (`data` = ChatMessage)

        - `message_deleted` — мягкое удаление: `data.conversation_id`, `data.message_id`


        **Дополнительно (Calls / WebRTC signaling):**

        Сервер принимает от клиента события `webrtc.offer`, `webrtc.answer`, `webrtc.ice`, `call.end` и пересылает peer''у, если отправитель является участником `call_id`.


        **Формат клиента → сервер:**

        `{ "type": "webrtc.offer", "data": { "call_id": "<uuid>", "payload": { ... } } }`


        **Формат сервер → peer:**

        `{ "type": "webrtc.offer", "data": { "call_id": "<uuid>", "from_id": "<uuid>", "payload": { ... } } }`

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      parameters:
      - name: token
        in: query
        description: JWT access token
        schema:
          type: string
      responses:
        '101':
          description: Switching Protocols (WebSocket)
        '401':
          description: unauthorized

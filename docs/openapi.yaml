          type: string
          format: uuid
          description: "Описание на русском языке."
        stars:
          type: number
          format: double
          minimum: 1
          maximum: 5
          multipleOf: 0.5
          description: "Описание на русском языке."
    AnalyticsFilters:
      type: object

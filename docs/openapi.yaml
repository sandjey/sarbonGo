          description: data.status = declined
        '400':
          description: invitation not found or expired
        '403':
          description: invitation was sent to another phone
  /v1/driver/connection-offers:
    get:
      tags:
      - Drivers / Relations
      summary: Список connection offers водителя (incoming/outgoing)
      description: 'Единый список connection offers между водителем и диспетчерами.

        Параметр `direction`:

        - `incoming` — приглашения, которые пришли водителю от диспетчеров;

        - `outgoing` — приглашения, которые водитель отправил диспетчерам;

        - `all` — оба направления (по умолчанию).

        Параметр `exclude_accepted`:

        - `false` (по умолчанию) — показывать все статусы;

        - `true` — скрыть уже принятые (`status=accepted`) офферы.

        В элементах списка дополнительно возвращаются:

        - `driver_id`, `driver_phone`


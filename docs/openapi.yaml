    get:
      tags: ["Legacy / Deprecated"]
      deprecated: true
      summary: "2. (Legacy) Список грузов (фильтры, пагинация)"
      description: |
        **Legacy endpoint.** Для тестирования/интеграций используйте новые эндпоинты Cargo Manager:

        - `GET /v1/dispatchers/cargo/mine` — **мои грузы**
        - `GET /v1/dispatchers/cargo/all` — **все грузы (каталог)**

        **Кто вызывает:** Водитель (чаще всего с status=SEARCHING), диспетчер, компания, админ.
        **Назначение:** Получение списка грузов. Водитель вызывает с фильтром status=SEARCHING, чтобы видеть грузы, по которым ищут перевозчика.

        **Логика:** Удалённые (soft delete) не возвращаются. Применяются фильтры по query-параметрам. Сортировка по sort (например created_at:desc). Пагинация: page (с 1), limit (по умолчанию 20, макс. 100). В ответе data.items — массив грузов, data.total — общее количество записей.

        **Параметры:** status (несколько через запятую), weight_min, weight_max, truck_type, created_from (YYYY-MM-DD), created_to, with_offers (true — только грузы с офферами), page, limit, sort.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: status
          in: query
          schema: { type: string, example: "SEARCHING_ALL,SEARCHING_COMPANY" }
          description: "Статусы через запятую (SEARCHING_ALL, SEARCHING_COMPANY, COMPLETED, CANCELLED). Для водителя с X-User-Token при фильтре по searching автоматически показываются грузы SEARCHING_ALL + SEARCHING_COMPANY (только своей компании). Для фриланс-диспетчера с X-User-Token (role=dispatcher) дополнительно показываются только грузы, созданные этим диспетчером (created_by_type=DISPATCHER)."
        - name: weight_min
          in: query
          schema: { type: number, example: 10 }
          description: "Минимальный вес (т)"
        - name: weight_max
          in: query
          schema: { type: number, example: 25 }
          description: "Максимальный вес (т)"
        - name: truck_type
          in: query
          schema: { type: string, example: "TENT" }
          description: "Тип транспорта из справочника (TENT, REFRIGERATOR, FLATBED, TANKER, OTHER)"
        - name: created_from
          in: query
          schema: { type: string, format: date }
          description: "Дата создания от (YYYY-MM-DD)"
        - name: created_to
          in: query
          schema: { type: string, format: date }
          description: "Дата создания до (YYYY-MM-DD)"
        - name: with_offers
          in: query
          schema: { type: boolean }
          description: "true — только грузы, у которых есть хотя бы один оффер"
        - name: page
          in: query
          schema: { type: integer, default: 1, example: 1 }
          description: "Номер страницы (с 1)"
        - name: limit
          in: query
          schema: { type: integer, default: 20, example: 20 }
          description: "Записей на странице (макс. 100)"
        - name: sort
          in: query
          schema: { type: string, example: "created_at:desc" }
          description: "Сортировка (поле:направление), например created_at:desc, weight:asc"
      responses:
        "200":
          description: "data = { items: Cargo[], total: number }"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CargoListResponse" }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
  /api/cargo/{id}:
    get:
      tags: ["Cargo Manager / Cargo CRUD"]
      summary: "3. Получить груз по ID (карточка)"
      description: |
        **Кто вызывает:** Водитель (перед отправкой оффера), диспетчер, компания, админ.
        **Назначение:** Детальная карточка груза с точками маршрута и блоком оплаты.

        **Логика:** По id возвращается одна запись из cargo; к ней подгружаются все route_points (по point_order) и одна запись payment (если есть). Удалённые грузы не возвращаются (404).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid, example: "b2c3d4e5-f6a7-8901-bcde-f12345678901" }
          description: "UUID груза"
      responses:
        "200":
          description: "data содержит груз + route_points + payment"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CargoDetailResponse" }
        "404":
          description: "Груз не найден или удалён"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
    put:
      tags: ["Cargo Manager / Cargo CRUD"]
      summary: "4. Обновить груз"
      description: |
        **Кто вызывает:** Диспетчер, компания, админ. Водитель не редактирует грузы.
        **Назначение:** Редактирование груза (поля груза, точки маршрута, оплата).

        **Логика:** Передаются только те поля, которые нужно изменить (частичное обновление). После перехода в статус assigned (и далее) менять маршрут и оплату нельзя — запрос вернёт 400. Можно менять контакт/комментарии. Если переданы route_points — старые точки заменяются на новый набор (при условии что статус ещё не assigned/in_transit/delivered).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid, example: "b2c3d4e5-f6a7-8901-bcde-f12345678901" }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CargoUpdateRequest" }
      responses:
        "200":
          description: "Обновление применено. data.id = id груза."
        "400":
          description: "Валидация не прошла или нельзя редактировать после assigned"
        "404":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
    delete:
      tags: ["Cargo Manager / Cargo CRUD"]
      summary: "5. Удалить груз (soft delete)"
      description: |
        **Кто вызывает:** Диспетчер, компания, админ.
        **Назначение:** Мягкое удаление груза (deleted_at). В списках и по ID такой груз больше не возвращается.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid, example: "b2c3d4e5-f6a7-8901-bcde-f12345678901" }
      responses:
        "200":
          description: "Груз помечен удалённым"
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
  /api/cargo/{id}/status:
    patch:
      tags: ["Cargo Manager / Cargo CRUD"]
      summary: "6. Изменить статус груза"
      description: |
        **Кто вызывает:** Диспетчер, компания, админ. Водитель статусы груза не меняет.
        **Назначение:** Смена статуса с проверкой допустимых переходов.

        **Допустимые переходы:** created → searching | cancelled; searching → assigned | cancelled; assigned → in_transit | cancelled; in_transit → delivered; delivered и cancelled — конечные. Любой другой переход вернёт 400.

        **Тело запроса:** Один объект с полем status (значение из enum).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid, example: "b2c3d4e5-f6a7-8901-bcde-f12345678901" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CargoStatusRequest" }
            example:
              status: "SEARCHING_ALL"
      responses:
        "200":
          description: "Статус обновлён"
        "400":
          description: "Переход недопустим (например delivered → searching)"
  /api/cargo/{id}/offers:
    get:
      tags: ["Cargo Manager / Offers"]
      summary: "7. Список офферов по грузу"
      description: |
        **Кто вызывает:** Диспетчер, компания, админ (перед принятием оффера). Водитель может смотреть свои офферы через список грузов или отдельный экран.
        **Назначение:** Просмотр офферов по конкретному грузу.

        **Логика:** По умолчанию — все записи из `offers` с `cargo_id = id`, отсортированные по `created_at` (новые сверху).
        В каждом элементе `items[]`:
        - `offer` — поля оффера (id, cargo_id, carrier_id, proposed_by, price, currency, comment, status, rejection_reason, created_at);
        - `cargo` — кратко по грузу: `cargo_type_name`, `weight`, `volume`;
        - `driver` — водитель оффера: `phone`, `name`.

        **Фильтры (query)** — те же смыслы, что у `GET /v1/dispatchers/offers/all`, но в рамках одного груза:
        - `direction` — необязательно; если не передан — показываются **все** направления. `outgoing` / алиасы from_me, sent, by — `proposed_by=DISPATCHER`; `incoming` / to_me, received — `proposed_by=DRIVER`.
        - `status` — PENDING, ACCEPTED или REJECTED (необязательно).
        - `counterparty_id` — фильтр по `carrier_id` (водитель). При необходимости алиасы: `to_driver_id` (удобно при outgoing), `from_driver_id` (при incoming); если `direction` не задан — берётся `to_driver_id`, иначе `from_driver_id`, если первый пуст.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid, example: "b2c3d4e5-f6a7-8901-bcde-f12345678901" }
          description: "UUID груза"
        - name: direction
          in: query
          required: false
          description: "Исходящие/входящие офферы по грузу (необязательно; без параметра — все)"
          schema: { type: string, example: "outgoing" }
        - name: counterparty_id
          in: query
          required: false
          description: "Фильтр по водителю (carrier_id)"
          schema: { type: string, format: uuid }
        - name: to_driver_id
          in: query
          required: false
          description: "Алиас при direction=outgoing"
          schema: { type: string, format: uuid }
        - name: from_driver_id
          in: query
          required: false
          description: "Алиас при direction=incoming"
          schema: { type: string, format: uuid }
        - name: status
          in: query
          required: false
          schema: { type: string, example: "PENDING" }
      responses:
        "200":
          description: "data.items — массив элементов {offer, cargo, driver}; при использовании фильтров — data.direction (если задан), data.status, data.counterparty_id"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                offer: { $ref: "#/components/schemas/Offer" }
                                cargo:
                                  type: object
                                  properties:
                                    cargo_type_name: { type: string, nullable: true }
                                    weight: { type: number }
                                    volume: { type: number }
                                driver:
                                  type: object
                                  properties:
                                    phone: { type: string, nullable: true }
                                    name: { type: string, nullable: true }
                          direction: { type: string, nullable: true }
                          status: { type: string }
                          counterparty_id: { type: string, format: uuid, nullable: true }
        "400":
          description: invalid_payload_detail / invalid_id
    post:
      tags: ["Cargo Manager / Offers"]
      summary: "8. Создать оффер (водитель или диспетчер)"
      description: |
        **Назначение:** Предложить **цену** по грузу (переговоры). В теле: carrier_id (водитель-исполнитель), price, currency, comment.

        - С **X-User-Token** водителя: оффер считается предложением водителя (**proposed_by=DRIVER**); carrier_id должен совпадать с id водителя из JWT.
        - С **X-User-Token** диспетчера: оффер считается предложением диспетчера выбранному водителю (**proposed_by=DISPATCHER**); принять цену может только этот водитель (см. POST /api/offers/{id}/accept или POST /v1/driver/offers/{id}/accept).

        Удобный путь для водителя без ручного carrier_id: **POST /v1/driver/cargo/{id}/offers** (только price, currency, comment).

        Для грузов SEARCHING_COMPANY оффер могут отправить только водители той же компании.

        **Логика:** запись в offers со status=PENDING. В ответе data.id — UUID оффера.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid, example: "b2c3d4e5-f6a7-8901-bcde-f12345678901" }
          description: "UUID груза"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OfferCreateRequest" }
            example:
              carrier_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              price: 1500
              currency: "USD"
              comment: "Готов выехать завтра, своя тентовая фура"
      responses:
        "201":
          description: "Оффер создан. data.id — UUID оффера."
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "409":
          description: "dispatcher_offer_already_exists / cargo_slots_full"
  /api/offers/{id}/accept:
    post:
      tags: ["Legacy / Deprecated"]
      summary: "9. Принять оффер (согласовать цену)"
      description: |
        **Обязательно:** заголовок **X-User-Token** (JWT).

        - Если в оффере **proposed_by=DRIVER** (водитель предложил цену): принять может только **диспетчер** — владелец груза: создатель груза `DISPATCHER` (тот же `user_id`), **или** груз компании (`created_by_type=COMPANY`) при совпадении `company_id` с JWT после switch-company.
        - Если **proposed_by=DISPATCHER** (диспетчер предложил цену водителю): принять может только **водитель** из carrier_id этого оффера.

        **Ошибки (data не null):** в `data.reason` машинный код: `offer_not_pending`, `cargo_slots_full`, `cargo_not_searching`, `driver_busy`, `driver_cargo_link_conflict`, `trip_create_failed`, `trip_assign_driver_failed`, `accept_failed`, `transaction_aborted`.

        После принятия: у оффера **status=ACCEPTED**; создаётся рейс с **договорной ценой** на рейсе (`agreed_price`, `agreed_currency` = цена оффера). **Сумма в payments по грузу не меняется** (объявленная цена груза остаётся). В ответе: **trip_id**, **agreed_price**, **agreed_currency**.

        **Идентификатор оффера задаётся только в пути** (`{id}` = `offer_id`). `trip_id`, `cargo_id` или дублирующий `offer_id` в query/body **не** участвуют в выборе оффера.

        Алиасы с тем же телом: **POST /v1/dispatchers/offers/{id}/accept** (диспетчер), **POST /v1/driver/offers/{id}/accept** (водитель).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid, example: "e5f6a7b8-c9d0-1234-ef56-789012345678" }
          description: "UUID оффера (offer_id), только из path"
      responses:
        "200":
          description: "data: cargo_id, offer_id, status=ACCEPTED"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          cargo_id: { type: string, format: uuid }
                          offer_id: { type: string, format: uuid }
                          trip_id: { type: string, format: uuid, nullable: true, description: "Созданный рейс (IN_PROGRESS); присутствует если рейс создан" }
                          driver_id: { type: string, format: uuid, nullable: true, description: "UUID водителя-перевозчика; присутствует если рейс создан" }
                          status: { type: string, example: "accepted" }
                          agreed_price: { type: number, format: double, description: "Договор на рейсе (копия с оффера)" }
                          agreed_currency: { type: string, example: "USD" }
        "400":
          description: "Некорректный id или proposed_by в БД"
        "401":
          description: "Нет X-User-Token"
        "403":
          description: "Неверная роль для данного proposed_by (см. описание)"
        "404":
          description: "offer_not_found_or_not_pending; data.reason=offer_not_pending"
        "409":
          description: "cargo_slots_full / cargo_not_searching / driver_busy; см. data.reason"
        "500":
          description: "failed_to_accept; см. data.reason (trip_create_failed и т.д.)"


  /v1/admin/cargo/moderation:
    get:
      tags:
      - Admin / Tools
      summary: Список грузов на модерации
      description: Возвращает грузы со статусом `PENDING_MODERATION` для очереди административной модерации.
      security:
      - DeviceTypeHeader: []
        LanguageHeader: []
        ClientTokenHeader: []
        UserTokenHeader: []
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          minimum: 0
      responses:
        '200':
          description: Список грузов на модерации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '401':
          description: unauthorized
        '500':
          description: failed_to_list
  /v1/admin/cargo/{id}/moderation/accept:
    post:
      tags:
      - Admin / Tools
      summary: Принять груз на модерации
      description: Переводит груз из `PENDING_MODERATION` в `SEARCHING_ALL` или `SEARCHING_COMPANY`.
      security:
      - DeviceTypeHeader: []
        LanguageHeader: []
        ClientTokenHeader: []
        UserTokenHeader: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                search_visibility:
                  type: string
                  enum: [all, company]
                  description: "`all` -> `SEARCHING_ALL`, `company` -> `SEARCHING_COMPANY`"
      responses:
        '200':
          description: Груз принят на модерации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '400':
          description: invalid_id или cargo_not_pending_moderation
        '404':
          description: cargo_not_found
  /v1/admin/cargo/{id}/moderation/reject:
    post:
      tags:
      - Admin / Tools
      summary: Отклонить груз на модерации
      description: Отклоняет груз на модерации. Причина отклонения обязательна.
      security:
      - DeviceTypeHeader: []
        LanguageHeader: []
        ClientTokenHeader: []
        UserTokenHeader: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: Груз отклонён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '400':
          description: invalid_id, moderation_rejection_reason_required или cargo_not_pending_moderation
  /v1/admin/push/status:
    get:
      tags:
      - Admin / Tools
      summary: Статус push-инфраструктуры
      description: Диагностика конфигурации Firebase и текущего состояния push-сервиса.
      security:
      - DeviceTypeHeader: []
        LanguageHeader: []
        ClientTokenHeader: []
        UserTokenHeader: []
      responses:
        '200':
          description: Статус push-инфраструктуры
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '401':
          description: unauthorized
  /v1/admin/push/send:
    post:
      tags:
      - Admin / Tools
      summary: Тестовая отправка push по FCM token
      description: Отправляет push на конкретный `FCM token`. Можно дополнительно сохранить токен за пользователем.
      security:
      - DeviceTypeHeader: []
        LanguageHeader: []
        ClientTokenHeader: []
        UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:

      summary: "10. Список фото груза"
      description: |
        Возвращает список всех фото груза (метаданные + URL для скачивания).
        Каждое фото содержит id, mime-тип, размер, дату загрузки и URL для получения бинарного файла.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: id

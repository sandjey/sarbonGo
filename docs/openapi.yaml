        - Язык названий определяется заголовком **X-Language** (ru, uz, en, tr, zh) — выбирается соответствующая колонка name_ru/name_uz/name_en/name_tr/name_zh.

        - Параметр **q** (опционально) фильтрует по подстроке в названии на выбранном языке.



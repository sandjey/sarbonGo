  /v1/driver/kyc:
    patch:
      tags:
      - Drivers / Profile & KYC
      summary: "Отправить KYC-данные водителя."
      description: "Принимает документы водителя и данные по тягачу/прицепу для KYC-проверки."
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_owner:
                  type: boolean
                  example: true
                driver_data:
                  type: object
                  properties:
                    driver_passport_series:
                      type: string
                      example: AB
                    driver_passport_number:
                      type: string
                      example: '1234567'
                    driver_pinfl:
                      type: string
                      example: '12345678901234'
                    driver_scan_status:
                      type: boolean
                      example: true
                  required:
                  - driver_passport_series
                  - driver_passport_number
                  - driver_pinfl
                  - driver_scan_status
                power_data:
                  type: object
                  properties:
                    power_plate_number:
                      type: string
                      example: 01A123BC
                    power_tech_series:
                      type: string
                      example: AA
                    power_tech_number:
                      type: string
                      example: '9876543'
                    power_owner_name:
                      type: string
                      example: Ali Valiyev
                    power_scan_status:
                      type: boolean
                      example: true
                  required:
                  - power_plate_number
                  - power_tech_series
                  - power_tech_number
                  - power_owner_name
                  - power_scan_status
                trailer_data:
                  type: object
                  properties:
                    trailer_plate_number:
                      type: string
                      example: 01A123BC
                    trailer_tech_series:
                      type: string
                      example: AA
                    trailer_tech_number:
                      type: string
                      example: '9876543'
                    trailer_owner_name:
                      type: string
                      example: Ali Valiyev
                    trailer_scan_status:
                      type: boolean
                      example: true
                  required:
                  - trailer_plate_number
                  - trailer_tech_series
                  - trailer_tech_number
                  - trailer_owner_name
                  - trailer_scan_status
              required:
              - driver_owner
              - driver_data
              - power_data
              - trailer_data
      responses:
        '200':
          description: "KYC-данные успешно сохранены."
          content:
            application/json:
              schema:
                type: object
                description: "Ответ по результату обновления KYC."
                properties:
                  event:
                    type: string
                    example: updated
                  is_full:
                    type: boolean
                    example: true
                    description: "Признак, что профиль заполнен полностью."
                  driver:
                    $ref: '#/components/schemas/Driver'
                required:
                - event
                - is_full
                - driver

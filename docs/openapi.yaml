      security:
      - DeviceTypeHeader: []
        LanguageHeader: []
        ClientTokenHeader: []
        UserTokenHeader: []
      parameters:
      - name: date_from
        in: query
        required: true
        schema:
          type: string
          format: date
      - name: date_to
        in: query
        required: true
        schema:
          type: string
          format: date
      - name: group_by
        in: query
        required: false
        schema:
          type: string
          enum: [day, week, month]
          default: day

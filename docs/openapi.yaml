        in: query
        schema:
          type: string
        description: "Фильтр по телефону водителя."
      - name: name
        in: query
        schema:
          type: string
        description: "Фильтр по имени водителя."
      - name: work_status
        in: query
        schema:
          type: string
          example: available
        description: "Фильтр по рабочему статусу."
      - name: truck_type
        in: query
        schema:
          type: string

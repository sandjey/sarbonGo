                          deleted: { type: boolean, example: true }
              examples:
                en: { summary: "English", value: { status: "success", code: 200, description: "Photo deleted", data: { deleted: true } } }
                ru: { summary: "Русский", value: { status: "success", code: 200, description: "Фото удалено", data: { deleted: true } } }
                uz: { summary: "O'zbek", value: { status: "success", code: 200, description: "Foto o'chirildi", data: { deleted: true } } }
                tr: { summary: "Türkçe", value: { status: "success", code: 200, description: "Fotoğraf silindi", data: { deleted: true } } }
                zh: { summary: "中文", value: { status: "success", code: 200, description: "照片已删除", data: { deleted: true } } }
        "404": { description: "Фото не найдено" }

  /api/trips:

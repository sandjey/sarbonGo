      summary: Подтвердить сделку, принятую менеджером
      description: 'Вызывается водителем, когда оффер в статусе **WAITING_DRIVER_CONFIRM**:

        - после того как Cargo Manager принял оффер с **proposed_by=DRIVER_MANAGER**;

        - или после того как Driver Manager принял исходящий оффер Cargo Manager (**proposed_by=DISPATCHER**).


        После подтверждения статус оффера становится ACCEPTED и создаётся Trip. SSE: **Cargo Manager** и **Driver Manager** (negotiation_dispatcher_id), если они разные.

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      parameters:
      - name: id
        in: path
        required: true
        description: UUID оффера (offer_id)
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: 'trip_id, status: accepted, trip_flow (via_driver_manager)'
        '400':
          description: 'offer_not_waiting_driver_confirm — в `data`: current_status, expected_status (WAITING_DRIVER_CONFIRM);

            invalid_payload_detail — agreed_price_out_of_range (при создании рейса).

            '
        '401':
          description: user_not_identified
        '403':
          description: not_your_offer
        '404':
          description: offer_not_found / offer_not_found_or_not_pending
        '409':
          description: 'cargo_not_searching, cargo_slots_full, driver_busy_with_another_cargo, driver_cargo_link_conflict;

            trip_create_failed (дубликат/конфликт INSERT в trips) — в `data` при ошибках БД: pg_code, pg_constraint, pg_message (диагностика).

            '
        '500':
          description: 'internal_error, failed_to_accept, trip_create_failed — в `data`: reason, offer_id, при сбое БД pg_* поля.

            '

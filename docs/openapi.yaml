  /v1/driver/profile/driver:
    patch:
      tags:
      - Drivers / Profile & KYC
      summary: Редактировать данные водителя (имя, статус, паспорт)
      description: '**Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.

        **Назначение:** Частичное обновление: name, work_status (available/loaded/busy), driver_passport_series, driver_passport_number, driver_pinfl. Остальные поля не меняются.

        **Данные:** В теле только те поля, которые нужно изменить.

        **name:** схема DisplayName (латиница и `_`, 2–64; уникально среди водителей и диспетчеров, без учёта регистра).

        '
      security:
      - DeviceTypeHeader: []
      - LanguageHeader: []
      - ClientTokenHeader: []
      - UserTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: '#/components/schemas/DisplayName'
                work_status:
                  type: string
                  enum:
                  - available
                  - loaded
                  - busy
                  example: available
                driver_passport_series:
                  type: string
                  example: AB
                driver_passport_number:
                  type: string
                  example: '1234567'
                driver_pinfl:
                  type: string
                  example: '12345678901234'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '400':
          description: Некорректное имя (invalid_display_name и др.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '409':
          description: Имя занято (display_name_taken)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /v1/driver/profile/heartbeat:
